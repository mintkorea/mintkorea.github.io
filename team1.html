<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; margin: 0; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-tab.active { color: #2E4077; border-bottom: 3px solid #2E4077; background-color: white; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; }
        .calendar-day { min-height: 80px; padding: 4px; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; background: white; }
        .row-highlight { background-color: #fef9c3 !important; font-weight: 800; color: #b45309 !important; }
        .worker-card { transition: transform 0.2s; }
        .worker-card:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="sticky top-0 z-50 bg-white border-bottom shadow-sm">
        <div class="px-4 py-3 flex justify-between items-center">
            <h1 class="text-lg font-black text-slate-800">성의교정 통합 관리</h1>
            <div id="clock" class="text-[10px] text-slate-500 font-mono"></div>
        </div>
        <nav class="flex border-t">
            <button id="btn-status" onclick="openTab('status')" class="nav-tab active flex-1 py-3 text-sm font-bold text-slate-400">실시간 현황</button>
            <button id="btn-calendar" onclick="openTab('calendar')" class="nav-tab flex-1 py-3 text-sm font-bold text-slate-400">근무 달력</button>
            <button id="btn-schedule" onclick="openTab('schedule')" class="nav-tab flex-1 py-3 text-sm font-bold text-slate-400">전체 시간표</button>
        </nav>
    </div>

    <main class="p-4 pb-20">
        <div id="status" class="tab-content active">
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 mb-4 text-center">
                <div id="time-msg"></div>
            </div>
            <div id="worker-cards" class="grid grid-cols-2 gap-3 mb-4" style="display:none;"></div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table id="status-table" class="w-full text-xs text-center border-collapse"></table>
            </div>
        </div>

        <div id="calendar" class="tab-content">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)" class="p-2 text-slate-400 font-bold">◀</button>
                    <h2 id="calendar-title" class="font-black text-slate-700 text-lg"></h2>
                    <button onclick="changeMonth(1)" class="p-2 text-slate-400 font-bold">▶</button>
                </div>
                <div class="grid grid-cols-7 mb-2">
                    <div class="text-center text-[10px] font-bold text-red-500">일</div>
                    <div class="text-center text-[10px] font-bold text-slate-400">월</div>
                    <div class="text-center text-[10px] font-bold text-slate-400">화</div>
                    <div class="text-center text-[10px] font-bold text-slate-400">수</div>
                    <div class="text-center text-[10px] font-bold text-slate-400">목</div>
                    <div class="text-center text-[10px] font-bold text-slate-400">금</div>
                    <div class="text-center text-[10px] font-bold text-blue-500">토</div>
                </div>
                <div id="calendar-body" class="calendar-grid"></div>
            </div>
        </div>

        <div id="schedule" class="tab-content">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
                <h3 class="font-bold text-slate-700 mb-3">C조 표준 근무 시간표</h3>
                <div id="full-schedule-table" class="text-[11px]"></div>
            </div>
        </div>
    </main>

    <script>
        // 초기 설정 및 데이터
        let config = {
            baseDate: "2025-01-01",
            baseShift: "C",
            patterns: [{name:'A', color:'#E2E8F0'}, {name:'B', color:'#E2E8F0'}, {name:'C', color:'#2E4077', highlight:'#DBEAFE'}]
        };
        let vData = {}, staffData = [], currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();

        const DATA_LIST = [
            ["07:00", "08:00", "순찰", "정문", "본관", "별관"],
            ["08:00", "11:00", "정문", "순찰", "별관", "본관"],
            ["11:00", "14:00", "순찰", "정문", "본관", "별관"],
            ["14:00", "17:00", "정문", "순찰", "별관", "본관"],
            ["17:00", "18:00", "순찰", "정문", "본관", "별관"],
            ["18:00", "22:00", "휴게", "휴게", "휴게", "휴게"],
            ["22:00", "01:00", "의산A", "의산B", "순찰", "정문"],
            ["01:00", "04:00", "순찰", "정문", "의산A", "의산B"],
            ["04:00", "07:00", "휴게", "휴게", "휴게", "휴게"]
        ];

        const WORKER_COLORS = {
            "김태언": {bg: "#2563eb", toneUp: "#eff6ff"},
            "황재업": {bg: "#059669", toneUp: "#ecfdf5"},
            "이중석": {bg: "#d97706", toneUp: "#fffbeb"},
            "박종욱": {bg: "#7c3aed", toneUp: "#f5f3ff"}
        };

        const firebaseConfig = { /* Your Config */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function getShift(date) {
            const diff = Math.floor((new Date(date).setHours(0,0,0,0) - new Date(config.baseDate).setHours(0,0,0,0)) / 86400000);
            return config.patterns[((diff % config.patterns.length) + config.patterns.length) % config.patterns.length];
        }

        function getNextCDate(d) {
            let t = new Date(d);
            for(let i=1; i<=5; i++) {
                t.setDate(t.getDate() + 1);
                if(getShift(t).name === 'C') return t;
            }
            return null;
        }

        function getWorkers(date, isTable) {
            const key = date.toISOString().split('T')[0];
            const vocations = vData[key] || [];
            let list = ["김태언", "황재업", "이중석", "박종욱"];
            
            // 연차자 처리 로직 (team(new)의 핵심 기능)
            vocations.forEach(v => {
                const idx = list.indexOf(v);
                if(idx > -1) {
                    const out = list.splice(idx, 1)[0];
                    list.push(out);
                }
            });
            return list;
        }

        function renderStatus() {
            const now = new Date();
            const hr = now.getHours(), min = now.getMinutes(), totalMin = hr * 60 + min;
            const todayShift = getShift(now).name;
            const yesterdayShift = getShift(new Date(now.getTime() - 86400000)).name;

            let mainMsg = "", subMsg = "", showCards = false, targetDate = now;

            // 오리지널의 세분화된 메시지 로직
            if (todayShift === 'C') {
                targetDate = now;
                if (totalMin < 390) {
                    mainMsg = "🗓️ 오늘은 <span class='text-blue-600'>C조 근무</span> 날입니다.";
                    subMsg = "근무 시작 전입니다. (07:00 시작)";
                } else if (totalMin < 420) {
                    mainMsg = "🛡️ 근무 교대 및 준비 중";
                    subMsg = "잠시 후 07:00부터 근무가 시작됩니다.";
                    showCards = true;
                } else {
                    mainMsg = "🛡️ 현재 <span class='text-blue-600 font-black'>C조 근무 중</span>입니다.";
                    subMsg = "시설 보안 및 정기 순찰 진행 중";
                    showCards = true;
                }
            } else if (yesterdayShift === 'C' && totalMin < 420) {
                targetDate = new Date(now.getTime() - 86400000);
                mainMsg = "🌙 현재 <span class='text-indigo-600 font-black'>야간 근무 중</span>";
                subMsg = "밤샘 근무가 진행 중입니다. (07:00 종료)";
                showCards = true;
            } else {
                mainMsg = "☕ 오늘은 <span class='text-slate-500'>C조 휴무일</span>입니다.";
                subMsg = "편안한 휴식 되세요!";
                targetDate = getNextCDate(now);
            }

            const nextC = getNextCDate(now);
            const nextStr = nextC ? `${nextC.getMonth()+1}/${nextC.getDate()}` : "-";
            document.getElementById('time-msg').innerHTML = `
                <div class="text-base font-bold">${mainMsg}</div>
                <div class="text-[11px] text-slate-500 mt-1">${subMsg}</div>
                <div class="mt-2 inline-block px-2 py-0.5 bg-red-50 text-red-600 text-[10px] font-bold rounded-full border border-red-100">📅 다음 근무: ${nextStr}</div>
            `;

            const ws = getWorkers(targetDate, false);
            const cards = document.getElementById('worker-cards');
            cards.style.display = showCards ? 'grid' : 'none';
            cards.innerHTML = ws.map((w, idx) => `
                <div class="worker-card bg-white p-3 rounded-xl shadow-sm border-l-4" style="border-color: ${WORKER_COLORS[w]?.bg || '#ccc'}">
                    <div class="text-[10px] font-bold text-slate-400 mb-1">${['조장','회관','의산A','의산B'][idx]}</div>
                    <div class="text-sm font-black" style="color:${WORKER_COLORS[w]?.bg}">${w}</div>
                </div>`).join('');

            let h = `<thead class="bg-slate-50 text-[10px] font-bold">
                <tr><th class="p-2 border border-slate-200">시간</th><th colspan="2" class="p-2 border border-slate-200">회관</th><th colspan="2" class="p-2 border border-slate-200">의산연</th></tr>
                <tr><th class="border border-slate-200 italic font-normal text-slate-400">Time</th>${ws.map(w => `<th class="border border-slate-200" style="color:${WORKER_COLORS[w]?.bg}">${w}</th>`).join('')}</tr>
            </thead><tbody>`;

            DATA_LIST.forEach(r => {
                const [sH, sM] = r[0].split(':').map(Number);
                const [eH, eM] = r[1].split(':').map(Number);
                let rowS = sH * 60 + sM, rowE = eH * 60 + eM;
                if(rowE <= rowS) rowE += 1440;
                let isCurr = false;
                if(showCards) {
                    const checkT = (totalMin < 420 && yesterdayShift === 'C') ? totalMin + 1440 : totalMin;
                    if(checkT >= rowS && checkT < rowE) isCurr = true;
                }
                h += `<tr class="${isCurr ? 'row-highlight' : ''}">
                    <td class="p-2 border border-slate-100">${r[0]}~${r[1]}</td>
                    ${r.slice(2).map(cell => `<td class="p-2 border border-slate-100">${cell}</td>`).join('')}
                </tr>`;
            });
            document.getElementById('status-table').innerHTML = h + `</tbody>`;
        }

        function renderCalendar() {
            const first = new Date(currentYear, currentMonth, 1);
            const last = new Date(currentYear, currentMonth + 1, 0);
            document.getElementById('calendar-title').innerText = `${currentYear}년 ${currentMonth + 1}월`;
            
            let h = "";
            for(let i=0; i<first.getDay(); i++) h += `<div class="calendar-day bg-slate-50"></div>`;
            for(let d=1; d<=last.getDate(); d++) {
                const dt = new Date(currentYear, currentMonth, d);
                const shift = getShift(dt);
                const isC = shift.name === 'C';
                const vocs = vData[dt.toISOString().split('T')[0]] || [];
                h += `<div class="calendar-day relative ${isC ? 'bg-blue-50/50' : ''}">
                    <div class="text-[10px] ${dt.getDay()===0?'text-red-500':dt.getDay()===6?'text-blue-500':'text-slate-400'}">${d}</div>
                    <div class="text-center mt-1 font-black text-xs" style="color:${isC?'#2E4077':'#cbd5e1'}">${shift.name}</div>
                    ${vocs.length > 0 ? `<div class="mt-1 flex flex-wrap gap-0.5">${vocs.map(v => `<span class="w-1.5 h-1.5 rounded-full bg-red-400"></span>`).join('')}</div>` : ''}
                </div>`;
            }
            document.getElementById('calendar-body').innerHTML = h;
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content, .nav-tab').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
            if(id === 'status') renderStatus();
            else if(id === 'calendar') renderCalendar();
        }

        function changeMonth(v) { currentMonth += v; if(currentMonth<0){currentMonth=11;currentYear--;} else if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(); }

        window.onload = () => {
            db.collection("vocation_app").doc("data").onSnapshot(doc => {
                if(doc.exists) { 
                    vData = doc.data().vocation || {}; 
                    renderStatus(); 
                    renderCalendar(); 
                }
            });
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleString();
                if(document.getElementById('status').classList.contains('active')) renderStatus();
            }, 1000);
        };
    </script>
</body>
</html>
