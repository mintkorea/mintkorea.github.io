<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C조 통합 시스템 v1.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; margin: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-tab.active { color: #2E4077; border-bottom: 3px solid #2E4077; background-color: white; }
        .custom-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; table-layout: fixed; background: white; }
        .custom-table th { background: #f8fafc; padding: 6px 1px; border: 1px solid #e2e8f0; font-weight: 800; }
        .custom-table td { border: 1px solid #e2e8f0; padding: 6px 1px; height: 38px; }
        .time-cell { width: 85px !important; background-color: #f8fafc; font-weight: 700; }
        .status-card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
        .worker-card { background: white; padding: 15px 10px; border-radius: 12px; border: 1px solid #e2e8f0; text-align: center; display: flex; flex-direction: column; }
        .worker-name { font-size: 11px; font-weight: 800; color: #64748b; margin-bottom: 4px; }
        .worker-pos { font-size: 18px; font-weight: 900; }
        .vocation-flag { color: #ef4444; font-size: 10px; }
        .big-msg-box { background: white; color: #1e40af; padding: 20px 15px; border-radius: 24px; text-align: center; font-weight: 900; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .sunday { color: #ef4444 !important; }
        .saturday { color: #3b82f6 !important; }
    </style>
</head>
<body>
    <div id="main-wrapper" class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col relative">
        <div class="bg-[#2E4077] p-6 text-center text-white">
            <h1 class="text-xl font-black" id="headTitle">C조 통합 시스템</h1>
            <p id="current-time" class="text-[10px] opacity-70 font-bold"></p>
        </div>

        <div class="flex border-b bg-slate-50 sticky top-0 z-50">
            <button onclick="openTab('status')" id="btn-status" class="nav-tab active flex-1 py-4 text-[11px] font-black">🕒 실시간현황</button>
            <button onclick="openTab('schedule')" id="btn-schedule" class="nav-tab flex-1 py-4 text-[11px] font-black text-slate-400">📅 근무편성표</button>
            <button onclick="openTab('calendar')" id="btn-calendar" class="nav-tab flex-1 py-4 text-[11px] font-black text-slate-400">🏥 근무달력</button>
        </div>

        <div id="status" class="tab-content active p-3">
            <div id="worker-cards" class="status-card-grid"></div>
            <div id="time-msg"></div>
            <div class="flex justify-between items-center mb-2 px-1">
                <span class="text-[11px] font-black text-slate-400">🕒 상세 근무 시간표 (연차 스왑 반영)</span>
                <button onclick="toggleFullTable()" class="text-[9px] bg-slate-700 text-white px-3 py-1 rounded-full font-bold">전체보기</button>
            </div>
            <div class="overflow-hidden rounded-xl border border-slate-200 shadow-sm"><table class="custom-table" id="status-table"></table></div>
        </div>

        <div id="schedule" class="tab-content p-3">
            <div class="bg-slate-50 p-4 rounded-xl mb-4 border">
                <input type="range" id="month-slider" min="-12" max="12" value="1" oninput="renderSchedule()" class="w-full accent-[#2E4077]">
                <select id="worker-focus" onchange="renderSchedule()" class="w-full mt-3 p-3 border rounded-xl text-xs font-bold outline-none">
                    <option value="none">✨ 강조할 이름 선택</option>
                    <option value="황재업">황재업</option><option value="김태언">김태언</option><option value="이태원">이태원</option><option value="이정석">이정석</option>
                </select>
            </div>
            <div class="overflow-hidden rounded-xl border"><table class="custom-table" id="schedule-list"></table></div>
        </div>
        
        <div id="calendar" class="tab-content p-3">
            <select id="shiftSelect" onchange="renderCalendar()" class="w-full p-3 border rounded-xl text-xs font-bold mb-4"></select>
            <div id="calendar-grid-body" class="calendar-grid"></div>
        </div>
    </div>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU", authDomain: "catholic-security-system.firebaseapp.com", projectId: "catholic-security-system", storageBucket: "catholic-security-system.firebasestorage.app", messagingSenderId: "978946205343", appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa" });
        const db = firebase.firestore();

        const config = { appTitle: 'C조 통합 시스템', baseDate: '2026-03-09', adminPassword: '7979' };
        let vData = {}, isFullTable = false, curY = new Date().getFullYear(), curM = new Date().getMonth();

        const WORKER_COLORS = { "황재업": { bg: "#2E4077", toneUp: "#E3F2FD" }, "김태언": { bg: "#059669", toneUp: "#ECFDF5" }, "이태원": { bg: "#D97706", toneUp: "#FFFBEB" }, "이정석": { bg: "#7C3AED", toneUp: "#F5F3FF" } };
        const DATA_LIST = [["07:00", "08:00", "보안실", "로비", "로비", "휴게"], ["08:00", "09:00", "보안실", "휴게", "휴게", "로비"], ["09:00", "10:00", "보안실", "순찰", "휴게", "로비"], ["10:00", "11:00", "휴게", "보안실", "로비", "휴게"], ["11:00", "12:00", "보안실", "중식", "로비", "중식"], ["12:00", "13:00", "중식", "보안실", "중식", "로비"], ["13:00", "14:00", "보안실", "휴게", "순찰", "로비"], ["14:00", "15:00", "순찰", "보안실", "로비", "휴게"], ["15:00", "16:00", "보안실", "휴게", "로비", "휴게"], ["16:00", "17:00", "휴게", "보안실", "휴게", "로비"], ["17:00", "18:00", "보안실", "휴게", "휴게", "로비"], ["18:00", "19:00", "보안실", "석식", "로비", "석식"], ["19:00", "20:00", "보안실", "보안실", "석식", "로비"], ["20:00", "21:00", "석식", "보안실", "로비", "휴게"], ["21:00", "22:00", "보안실", "순찰", "로비", "휴게"], ["22:00", "23:00", "순찰", "보안실", "순찰", "로비"], ["23:00", "00:00", "보안실", "휴게", "휴게", "로비"], ["00:00", "01:00", "보안실", "휴게", "휴게", "로비"], ["01:00", "01:40", "보안실", "휴게", "휴게", "로비"], ["01:40", "02:00", "보안실", "보안실", "로비", "로비"], ["02:00", "03:00", "휴게", "보안실", "로비", "휴게"], ["03:00", "04:00", "휴게", "보안실", "로비", "휴게"], ["04:00", "05:00", "휴게", "보안실", "로비", "휴게"], ["05:00", "06:00", "보안실", "순찰", "로비", "순찰"], ["06:00", "07:00", "보안실", "정리", "로비", "정리"]];

        function getShift(d) {
            let base = new Date(config.baseDate); base.setHours(0,0,0,0);
            let diff = Math.round((new Date(d).setHours(0,0,0,0) - base) / 86400000);
            return ['C', 'A', 'B'][((diff % 3) + 3) % 3];
        }

        // [핵심] C조 18일 주기 보직 계산 (AB 교차 포함)
        function getRawWorkers(d) {
            let base = new Date(config.baseDate); base.setHours(0,0,0,0);
            let diffDays = Math.round((new Date(d).setHours(0,0,0,0) - base) / 86400000);
            let dutyCount = Math.floor(diffDays / 3);
            
            const members = ["김태언", "이정석", "이태원"];
            const hallIdx = Math.floor(((dutyCount % 6) + 6) % 6 / 2); // 2회씩 회관 순환
            const hallWorker = members[hallIdx];
            const others = members.filter(m => m !== hallWorker);
            
            let medicalA, medicalB;
            // 회관 근무자별 기본 AB 설정 (첫 근무일 기준)
            if (hallWorker === "김태언") { medicalA = "이태원"; medicalB = "이정석"; }
            else if (hallWorker === "이정석") { medicalA = "김태언"; medicalB = "이태원"; }
            else { medicalA = "이정석"; medicalB = "김태언"; }

            // [추가] 두 사람 사이의 AB는 다음 근무(짝수 회차) 때 반대
            if (dutyCount % 2 !== 0) { [medicalA, medicalB] = [medicalB, medicalA]; }

            return ["황재업", hallWorker, medicalA, medicalB];
        }

        function getSwappedWorkers(d) {
            let names = getRawWorkers(d);
            const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate());
            const monthlyV = vData[`${y}-${m}`] || {};
            for (let i = 1; i < names.length; i++) {
                if (monthlyV[names[i]] && monthlyV[names[i]].split(',').map(v => v.trim()).includes(day)) {
                    if (i !== 1) [names[1], names[i]] = [names[i], names[1]];
                    break;
                }
            }
            return names;
        }

        async function fetchVocation() { const doc = await db.collection("vocation_app").doc("data").get(); if (doc.exists) vData = doc.data().vocation || {}; }

        function renderStatus() {
            const now = new Date(); const hr = now.getHours(); const realMin = hr * 60 + now.getMinutes();
            const todayS = getShift(now), yesterdayS = getShift(new Date(now - 86400000));
            let targetDate = now, showCards = false, isHighlight = false;

            if (todayS === 'C') { targetDate = now; showCards = realMin >= 390; isHighlight = realMin >= 420; }
            else if (yesterdayS === 'C' && realMin < 420) { targetDate = new Date(now - 86400000); showCards = true; isHighlight = true; }
            
            const workers = getSwappedWorkers(targetDate);
            const y = targetDate.getFullYear(), m = String(targetDate.getMonth() + 1).padStart(2, '0'), d = String(targetDate.getDate());
            const todayV = vData[`${y}-${m}`] || {};

            // 카드 출력
            document.getElementById('worker-cards').innerHTML = workers.map((w, idx) => `
                <div class="worker-card" style="border-left: 8px solid ${WORKER_COLORS[w]?.bg}">
                    <div class="worker-name">${['조장','회관','의산A','의산B'][idx]} ${w}${todayV[w]?' 🚩':''}</div>
                    <div class="worker-pos" style="color:${WORKER_COLORS[w]?.bg}">${isHighlight ? '근무 중' : '대기'}</div>
                </div>`).join('');

            // 시간표 헤더 및 본문 (기존 로직 적용)
            let h = `<thead><tr><th rowspan="2">시간</th><th colspan="2">성의회관</th><th colspan="2">의산연</th></tr><tr>`;
            workers.forEach(w => h += `<th style="background:${WORKER_COLORS[w]?.toneUp}">${w}</th>`);
            document.getElementById('status-table').innerHTML = h + `</tr></thead><tbody>` + 
                DATA_LIST.map(r => `<tr><td class="time-cell">${r[0]}~${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td></tr>`).join('') + `</tbody>`;
        }

        function renderSchedule() {
            let h = `<thead><tr><th>날짜</th><th>조장</th><th>회관</th><th>의산A</th><th>의산B</th></tr></thead><tbody>`;
            for (let i = 0; i < 31; i++) {
                let d = new Date(); d.setDate(d.getDate() + i);
                if (getShift(d) === 'C') {
                    const ws = getSwappedWorkers(d);
                    h += `<tr><td>${d.getMonth()+1}/${d.getDate()}</td>` + ws.map(w => `<td>${w}</td>`).join('') + `</tr>`;
                }
            }
            document.getElementById('schedule-list').innerHTML = h + `</tbody>`;
        }

        function openTab(id) { document.querySelectorAll('.tab-content, .nav-tab').forEach(el => el.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById('btn-'+id).classList.add('active'); if(id==='schedule') renderSchedule(); else renderStatus(); }

        window.onload = async () => { await fetchVocation(); renderStatus(); };
    </script>
</body>
</html>
