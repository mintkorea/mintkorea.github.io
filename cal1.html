<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>근무 달력 시스템 (독립형)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; padding: 12px; }
        
        /* 캘린더 기본 구조 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; background: white; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; aspect-ratio: 1 / 1.3; min-height: 60px; position: relative; }
        
        /* 날짜 및 조 표시 영역 */
        .date-area { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; }
        .shift-area { flex: 1.2; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; }
        
        /* 공통 색상 */
        .sunday { color: #ef4444 !important; }
        .saturday { color: #3b82f6 !important; }
        .is-today { outline: 3px solid #ef4444; outline-offset: -3px; z-index: 10; background-color: #fef2f2 !important; }
        
        /* 이동 버튼 스타일 */
        .nav-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #f8fafc; border-radius: 8px; font-weight: bold; color: #475569; transition: all 0.2s; }
        .nav-btn:active { background: #e2e8f0; transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center justify-between">
                <span class="text-xs font-black text-slate-500">강조 조 선택:</span>
                <select id="shiftSelect" onchange="renderCalendar()" class="text-xs p-2 bg-slate-50 border rounded-lg font-black w-36 outline-none text-[#2E4077]">
                    <option value="none">강조 안 함</option>
                    <option value="A">A조 강조</option>
                    <option value="B">B조 강조</option>
                    <option value="C">C조 강조</option>
                </select>
            </div>
        </div>

        <div id="singleNav" class="flex items-center justify-between bg-white p-2 rounded-2xl border border-slate-200 shadow-sm">
            <div class="flex gap-1">
                <button onclick="changeYear(-1)" class="nav-btn text-slate-300">≪</button>
                <button onclick="changeMonth(-1)" class="nav-btn">＜</button>
            </div>
            <h2 id="cal-title" class="text-sm font-black text-[#2E4077]"></h2>
            <div class="flex gap-1">
                <button onclick="changeMonth(1)" class="nav-btn">＞</button>
                <button onclick="changeYear(1)" class="nav-btn text-slate-300">≫</button>
            </div>
        </div>

        <div id="calendar-area">
            <div id="single-view" class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200">
                <div class="grid grid-cols-7 text-center font-black text-[10px] py-3 bg-slate-50 text-slate-400 border-b">
                    <div class="sunday">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="saturday">토</div>
                </div>
                <div id="calendar-grid-body" class="calendar-grid"></div>
            </div>

            <div id="multi-view" class="hidden space-y-6"></div>
        </div>

        <div class="flex justify-center pt-4">
            <button onclick="toggleViewMode()" id="toggleModeBtn" class="bg-[#2E4077] text-white px-8 py-4 rounded-full font-black text-sm shadow-xl active:scale-95 transition-all">📅 6개월 모아보기</button>
        </div>
    </div>

    <script>
        // 기본 설정 (패턴 및 기준일)
        const config = {
            baseDate: '2026-03-09', // C조 기준일
            patterns: [
                { name: 'C', color: '#E3F2FD', highlight: '#1976D2' },
                { name: 'A', color: '#FFF3E0', highlight: '#F57C00' },
                { name: 'B', color: '#FFEBEE', highlight: '#D32F2F' }
            ]
        };

        let viewMode = 'single';
        let curY = new Date().getFullYear();
        let curM = new Date().getMonth();

        // 근무 조 계산 로직
        function getShift(targetDate) {
            const d = new Date(targetDate); d.setHours(0,0,0,0);
            const base = new Date(config.baseDate); base.setHours(0,0,0,0);
            const diff = Math.round((d - base) / 86400000);
            return config.patterns[((diff % 3) + 3) % 3];
        }

        // 달력 그리드 생성 함수
        function renderGrid(container, year, month) {
            container.innerHTML = '';
            const target = document.getElementById('shiftSelect').value;
            const first = new Date(year, month, 1).getDay();
            const last = new Date(year, month + 1, 0).getDate();
            const todayStr = new Date().toDateString();

            // 시작 빈 칸
            for(let i=0; i<first; i++) {
                container.innerHTML += `<div class="calendar-cell bg-slate-50/50"></div>`;
            }

            // 날짜 칸 생성
            for(let d=1; d<=last; d++) {
                const dt = new Date(year, month, d);
                dt.setHours(12, 0, 0, 0);
                const shift = getShift(dt);
                const isHighlighted = (target === shift.name);
                
                const cell = document.createElement('div');
                cell.className = `calendar-cell ${dt.toDateString() === todayStr ? 'is-today' : ''}`;
                
                // 강조 시 배경색 적용
                cell.style.backgroundColor = isHighlighted ? shift.highlight : 'transparent';
                
                // 텍스트 색상 결정
                const dateClass = isHighlighted ? 'text-white' : (dt.getDay() === 0 ? 'sunday' : dt.getDay() === 6 ? 'saturday' : '');
                const shiftStyle = isHighlighted ? 'background:transparent; color:white;' : `background:${shift.color}; color:#1e293b;`;

                cell.innerHTML = `
                    <div class="date-area ${dateClass}">${d}</div>
                    <div class="shift-area" style="${shiftStyle}">${shift.name}</div>
                `;
                container.appendChild(cell);
            }
        }

        // 메인 렌더링 컨트롤러
        function renderCalendar() {
            const singleView = document.getElementById('single-view');
            const multiView = document.getElementById('multi-view');
            const nav = document.getElementById('singleNav');

            if(viewMode === 'single') {
                singleView.classList.remove('hidden');
                multiView.classList.add('hidden');
                nav.classList.remove('hidden');
                document.getElementById('cal-title').innerText = `${curY}년 ${curM + 1}월`;
                renderGrid(document.getElementById('calendar-grid-body'), curY, curM);
            } else {
                singleView.classList.add('hidden');
                multiView.classList.remove('hidden');
                nav.classList.add('hidden');
                multiView.innerHTML = '';
                
                for(let i=0; i<6; i++){
                    let d = new Date(curY, curM + i, 1);
                    let year = d.getFullYear();
                    let month = d.getMonth();
                    
                    let card = document.createElement('div');
                    card.className = "bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden";
                    card.innerHTML = `<div class="p-3 bg-[#2E4077] text-white text-center font-black text-xs">${year}년 ${month + 1}월</div>`;
                    
                    let grid = document.createElement('div');
                    grid.className = 'calendar-grid';
                    renderGrid(grid, year, month);
                    
                    card.appendChild(grid);
                    multiView.appendChild(card);
                }
            }
        }

        // 유틸리티 함수들
        function toggleViewMode() {
            viewMode = (viewMode === 'single' ? 'multi' : 'single');
            document.getElementById('toggleModeBtn').innerText = (viewMode === 'single' ? '📅 6개월 모아보기' : '📱 상세 달력 보기');
            renderCalendar();
        }

        function changeMonth(v) {
            curM += v;
            if(curM < 0) { curM = 11; curY--; }
            else if(curM > 11) { curM = 0; curY++; }
            renderCalendar();
        }

        function changeYear(v) {
            curY += v;
            renderCalendar();
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
