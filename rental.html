<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/732/732220.png">
    <title>성의교정 대관 현황</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .day-red { color: #ef4444 !important; }
        .day-blue { color: #3b82f6 !important; }
        .flatpickr-day.sunday { color: #ef4444 !important; }
        .flatpickr-day.saturday { color: #3b82f6 !important; }
        .bu-chip { transition: all 0.2s; border: 1.5px solid #e2e8f0; cursor: pointer; background: white; white-space: nowrap; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; height: 40px; border-radius: 12px; }
        .bu-chip.active { background-color: #1E3A5F; color: white; border-color: #1E3A5F; font-weight: 900; }
        .fixed-table { table-layout: fixed; width: 100%; border-collapse: collapse; background: white; }
        .fixed-table th { background-color: #f8fafc; color: #64748b; font-weight: 700; font-size: 10px; padding: 10px 2px; border-bottom: 1px solid #e2e8f0; text-align: center; }
        .fixed-table td { padding: 10px 4px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; line-height: 1.3; font-size: 11px; }
        .col-place { width: 110px; } .col-time { width: 75px; } .col-count { width: 45px; } .col-dept { width: 100px; } .col-status { width: 55px; }
        .status-badge { font-weight: 800; padding: 2px 4px; border-radius: 4px; font-size: 9px; display: inline-block; border: 1px solid transparent; }
        .period-text { font-size: 9px; font-weight: 800; color: #8B5CF6; margin-top: 2px; line-height: 1.1; }
        .rental-card { border: 1.2px solid #e2e8f0; background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; border-left-width: 6px; }

        @media (max-width: 768px) and (orientation: portrait) {
            .view-pc { display: none !important; }
            .view-mo { display: block !important; }
        }
        @media (min-width: 769px), (orientation: landscape) {
            .view-pc { display: block !important; }
            .view-mo { display: none !important; }
        }
    </style>
</head>
<body class="p-3 md:p-6">
    <div class="max-w-4xl mx-auto">
        <div class="bg-[#EEF2F6] rounded-3xl p-5 mb-4 border border-slate-200 shadow-sm flex flex-col items-center">
            <h1 class="text-xl font-black text-[#1E3A5F] mb-4">성의교정 대관 현황</h1>
            <input type="text" id="rangePicker" class="w-full max-w-xs h-12 rounded-2xl border-2 border-white font-black text-slate-700 shadow-sm text-center text-sm">
        </div>

        <div class="w-full mb-4 px-1">
            <div class="grid grid-cols-4 gap-1.5 w-full mb-4" id="buContainer"></div>
            <div class="flex items-center gap-2">
                <button onclick="loadFromGoogle(true)" class="h-9 px-4 rounded-lg border border-slate-200 bg-white font-black text-[11px] text-[#1E3A5F]">🔄 동기화</button>
                <button onclick="downloadExcel()" class="h-9 px-4 rounded-lg bg-[#1E3A5F] text-white font-black text-[11px]">📥 엑셀다운(인쇄)</button>
            </div>
        </div>

        <div id="outputArea" class="space-y-6 pb-20"></div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzKtqrzNK11rX4sCdDFv0lcgUcdVwsNiUnlXYc8Zjm0dJNlNV8ThwKrtqOgKBeVrP3g/exec";
        const BUILDINGS = ["전체", "성의회관", "의산연", "옴니버스 파크", "의과대학", "간호대학", "대학본관", "서울성모별관"];
        const HOLIDAYS = ["2026-01-01", "2026-03-01", "2026-05-05", "2026-06-06", "2026-08-15", "2026-10-03", "2026-10-09", "2026-12-25"];
        
        let selectedBu = ["성의회관", "의산연"]; 
        let sheetData = [];
        const now = new Date();
        const kstToday = new Date(now.getTime() + (9 * 60 * 60 * 1000)).toISOString().split('T')[0];
        let dateRange = { start: kstToday, end: kstToday };

        async function loadFromGoogle(isManual = false) {
            const cached = localStorage.getItem("rental_db_cache");
            if (cached && !isManual) {
                sheetData = JSON.parse(cached);
                renderUI();
            }
            if (isManual || !sheetData.length) {
                try {
                    const res = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
                    const data = await res.json();
                    if (data && data.length > 0) {
                        sheetData = data;
                        localStorage.setItem("rental_db_cache", JSON.stringify(data));
                        renderUI();
                        if (isManual) alert("업데이트 완료");
                    }
                } catch (e) { console.error(e); }
            }
        }

        function getShift(dateStr) {
            const base = new Date('2026-03-09').setHours(0,0,0,0);
            const target = new Date(dateStr).setHours(0,0,0,0);
            const diff = Math.floor((target - base) / 86400000);
            const patterns = [{n:'C', c:'#1976D2'}, {n:'A', c:'#F57C00'}, {n:'B', c:'#D32F2F'}];
            return patterns[((diff % 3) + 3) % 3];
        }

        function renderUI() {
            const area = document.getElementById('outputArea');
            area.innerHTML = '';
            let curr = new Date(dateRange.start + 'T00:00:00');
            const stop = new Date(dateRange.end + 'T00:00:00');

            while (curr <= stop) {
                const dStr = curr.toLocaleDateString('en-CA');
                const shift = getShift(dStr);
                const dayIdx = curr.getDay();
                const dayName = ["일","월","화","수","목","금","토"][dayIdx];
                let dayClass = (dayIdx === 0 || HOLIDAYS.includes(dStr)) ? 'day-red' : (dayIdx === 6 ? 'day-blue' : 'text-slate-600');

                let dayHtml = `<div>
                    <div class="flex items-center justify-between bg-[#EEF2F6] border border-slate-200 p-3 rounded-2xl mb-4 shadow-sm">
                        <span class="font-black text-sm text-slate-600">${dStr.replace(/-/g,'.')} <span class="${dayClass}">(${dayName})</span></span>
                        <span class="text-white text-[10px] px-2 py-0.5 rounded-md font-black" style="background-color:${shift.c}">${shift.n}조 근무</span>
                    </div>`;

                selectedBu.forEach(buName => {
                    const searchBu = buName === "의산연" ? "의생명산업연구원" : buName;
                    const filtered = sheetData.filter(d => d.rawDate === dStr && d.bu.includes(searchBu));
                    dayHtml += `<div class="mb-6"><div class="flex items-center gap-2 px-1 font-black text-xs text-[#1E3A5F] mb-2"><span class="w-1.5 h-3 bg-[#1E3A5F] rounded-full"></span>${buName} (${filtered.length})</div>`;

                    if (filtered.length > 0) {
                        dayHtml += `<div class="view-pc overflow-hidden border border-slate-200 rounded-xl bg-white shadow-sm"><table class="fixed-table"><thead><tr><th class="col-place">장소</th><th class="col-time">시간</th><th>행사명</th><th class="col-count">인원</th><th class="col-dept">부서</th><th class="col-status">상태</th></tr></thead><tbody>`;
                        filtered.forEach(i => {
                            const statusColor = (i.status === '확정' || i.status === '승인') ? 'text-orange-600 bg-orange-50' : 'text-slate-400 bg-slate-50';
                            dayHtml += `<tr><td class="text-center font-bold text-slate-600">${i.place}</td><td class="text-center font-bold text-red-500">${i.time}</td><td class="px-2"><div class="font-black text-slate-900">${i.event}</div>${i.type === '기간' ? `<div class="period-text">📅 ${i.period} (${i.yoil})</div>` : ''}</td><td class="text-center font-bold text-slate-500">${i.people || i.count || '-'}</td><td class="text-center text-slate-400 font-bold italic">${i.dept}</td><td class="text-center"><span class="status-badge ${statusColor}">${i.status}</span></td></tr>`;
                        });
                        dayHtml += `</tbody></table></div>`;
                        
                        dayHtml += `<div class="view-mo space-y-2">`;
                        filtered.forEach(i => {
                            const statusColor = (i.status === '확정' || i.status === '승인') ? 'text-orange-600 bg-orange-50' : 'text-slate-400 bg-slate-50';
                            dayHtml += `<div class="rental-card ${i.type === '기간' ? 'border-l-purple-500' : 'border-l-blue-500'}">
                                <div class="flex justify-between items-center mb-1"><span class="text-[12px] font-bold text-slate-500">📍 ${i.place}</span><span class="text-[10px] font-bold text-red-500">🕒 ${i.time}</span></div>
                                <div class="text-[14px] font-black text-slate-900 leading-tight mb-2">${i.event}</div>
                                ${i.type === '기간' ? `<div class="period-text mb-2">📅 ${i.period} (${i.yoil})</div>` : ''}
                                <div class="flex justify-between items-center pt-1 border-t border-slate-50 mt-1">
                                    <div class="flex items-center gap-1.5">
                                        <span class="status-badge ${statusColor}">${i.status}</span>
                                        <span class="text-[10px] font-bold text-slate-400 italic">${i.dept}</span>
                                    </div>
                                    <span class="text-[11px] font-black text-slate-700">👥 ${i.people || i.count || '-'}명</span>
                                </div>
                            </div>`;
                        });
                        dayHtml += `</div>`;
                    }
                    dayHtml += `</div>`;
                });
                area.innerHTML += dayHtml + `</div>`;
                curr.setDate(curr.getDate() + 1);
            }
        }

        async function downloadExcel() {
            if (!sheetData.length) return;
            const workbook = new ExcelJS.Workbook();
            const sheet = workbook.addWorksheet('대관현황');
            sheet.columns = [{ width: 20 }, { width: 14 }, { width: 45 }, { width: 20 }, { width: 10 }, { width: 10 }];
            
            let rIdx = 1;
            let curr = new Date(dateRange.start + 'T00:00:00');
            const end = new Date(dateRange.end + 'T00:00:00');

            while (curr <= end) {
                const dStr = curr.toLocaleDateString('en-CA');
                
                // [날짜 구분 헤더] - 높이 35
                sheet.mergeCells(rIdx, 1, rIdx, 6);
                const dCell = sheet.getCell(rIdx, 1);
                dCell.value = `📅 성의교정 대관 내역 - ${dStr} (${getShift(dStr).n}조)`;
                dCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1E3A5F' } };
                dCell.font = { color: { argb: 'FFFFFFFF' }, bold: true };
                dCell.alignment = { vertical: 'middle', horizontal: 'center' };
                sheet.getRow(rIdx).height = 35;
                rIdx++;

                selectedBu.forEach(bu => {
                    const search = (bu === "의산연") ? "의생명산업연구원" : bu;
                    const filtered = sheetData.filter(d => d.rawDate === dStr && d.bu.includes(search));
                    
                    // [건물 구분 헤더] - 높이 35
                    sheet.mergeCells(rIdx, 1, rIdx, 6);
                    const bCell = sheet.getCell(rIdx, 1);
                    bCell.value = `🏢 ${bu} (${filtered.length}건)`;
                    bCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE9ECEF' } };
                    bCell.font = { bold: true };
                    bCell.alignment = { vertical: 'middle', horizontal: 'center' };
                    sheet.getRow(rIdx).height = 35;
                    rIdx++;

                    if (filtered.length > 0) {
                        // [열 항목 헤더] - 높이 35
                        const hRow = sheet.addRow(['장소', '시간', '행사명', '부서', '인원', '상태']);
                        hRow.height = 35;
                        hRow.eachCell(c => {
                            c.font = { bold: true };
                            c.alignment = { vertical: 'middle', horizontal: 'center' };
                            c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8F9FA' } };
                            c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                        });
                        rIdx++;

                        filtered.forEach(i => {
                            const evt = i.type === '기간' ? `${i.event}\n(${i.period})` : i.event;
                            const row = sheet.addRow([i.place, i.time, evt, i.dept, i.people || '-', i.status]);
                            row.height = 35; 
                            row.eachCell((c, col) => {
                                c.alignment = { vertical: 'middle', horizontal: col === 3 ? 'left' : 'center', wrapText: col === 3 };
                                if (col === 5 || col === 6) c.font = { bold: true, size: 10 };
                                c.border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };
                            });
                            rIdx++;
                        });
                        
                        // [건물 사이 빈 행] - 테두리 제거 및 높이 17
                        const emptyBuRow = sheet.addRow([]);
                        emptyBuRow.height = 17;
                        for(let i=1; i<=6; i++) { emptyBuRow.getCell(i).border = {}; }
                        rIdx++;
                    }
                });
                
                // [날짜 사이 빈 행] - 테두리 제거 및 높이 25
                const emptyDateRow = sheet.addRow([]);
                emptyDateRow.height = 25;
                for(let i=1; i<=6; i++) { emptyDateRow.getCell(i).border = {}; }
                rIdx++;

                curr.setDate(curr.getDate() + 1);
            }
            
            const buffer = await workbook.xlsx.writeBuffer();
            // [수정] 파일명에 날짜 기간 포함: 성의교정 대관 내역(시작일~종료일).xlsx
            const fileName = `성의교정 대관 내역(${dateRange.start}~${dateRange.end}).xlsx`;
            saveAs(new Blob([buffer]), fileName);
        }

        window.onload = () => {
            initBuChips();
            flatpickr("#rangePicker", {
                mode: "range", locale: "ko", dateFormat: "Y-m-d", defaultDate: [kstToday, kstToday],
                onClose: (dates) => { if(dates.length === 2) { 
                    dateRange.start = dates[0].toLocaleDateString('en-CA'); 
                    dateRange.end = dates[1].toLocaleDateString('en-CA'); 
                    renderUI(); 
                } }
            });
            loadFromGoogle();
        };

        function initBuChips() {
            const container = document.getElementById('buContainer');
            BUILDINGS.forEach(bu => {
                const chip = document.createElement('div');
                chip.className = `bu-chip shadow-sm ${selectedBu.includes(bu) ? 'active' : ''}`;
                chip.innerText = bu;
                chip.onclick = () => {
                    if (bu === "전체") selectedBu = (selectedBu.length === BUILDINGS.length - 1) ? [] : BUILDINGS.filter(b => b !== "전체");
                    else selectedBu.includes(bu) ? selectedBu = selectedBu.filter(b => b !== bu) : selectedBu.push(bu);
                    document.querySelectorAll('.bu-chip').forEach(c => c.classList.toggle('active', c.innerText === "전체" ? selectedBu.length === BUILDINGS.length - 1 : selectedBu.includes(c.innerText)));
                    renderUI();
                };
                container.appendChild(chip);
            });
        }
    </script>
</body>
</html>
