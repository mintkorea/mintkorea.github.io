<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>강의실 개방 일람 (모바일)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        
        /* 야간/새벽 가독성을 위한 다크 모드 기본 적용 */
        body { 
            background-color: #0f172a; 
            margin: 0; 
            padding: 0; 
            color: #e2e8f0; 
            -webkit-tap-highlight-color: transparent; 
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: #1e293b; 
            min-height: 100vh; 
            padding: 16px; 
        }
        
        /* 헤더 영역 */
        .header { 
            margin-bottom: 20px; 
            border-bottom: 1px solid #334155; 
            padding-bottom: 12px; 
        }
        .title { 
            font-size: 20px; 
            font-weight: 900; 
            color: #38bdf8; 
            margin: 0; 
        }
        .subtitle { 
            font-size: 13px; 
            color: #94a3b8; 
            margin-top: 4px; 
            font-weight: 600; 
        }

        /* 날짜 표시 바 */
        .date-badge {
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 800;
            color: #f8fafc;
            margin-bottom: 15px;
            border: 1px solid #334155;
        }

        /* 메인 카드 스타일 */
        .schedule-card {
            background: #0f172a;
            border: 1.5px solid #334155;
            border-left: 6px solid #ef4444; /* 미개방/확인 필요 시 강조 색상 변경 가능 */
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .card-active {
            border-left-color: #10b981; /* 현재 진행 중인 스케줄은 녹색 강조 */
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .cat-tag {
            background: #1e3a8a;
            color: #93c5fd;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
        }
        .period-text {
            font-size: 12px;
            color: #64748b;
            font-weight: 600;
        }
        
        .info-row {
            margin: 8px 0;
            font-size: 15px;
            line-height: 1.4;
        }
        .label {
            color: #94a3b8;
            font-weight: 700;
            display: inline-block;
            width: 50px;
        }
        .value {
            color: #f8fafc;
            font-weight: 800;
        }
        .value-highlight {
            color: #f59e0b; /* 장소/시간 하이라이트 노란색 */
        }

        /* 비고 / 지시사항 박스 */
        .notice-box {
            background: #1c1917;
            border: 1px solid #78716c;
            padding: 10px 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 13.5px;
            color: #fca5a5;
            font-weight: 700;
        }

        /* 데이터 없음 안내 */
        .no-data {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
            font-weight: 700;
        }

        /* 새로고침 버튼 */
        .btn-refresh {
            width: 100%;
            padding: 12px;
            background: #334155;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-refresh:active { background: #475569; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 class="title">🏫 강의실 개방 일람</h2>
        <div class="subtitle">경영대학원 및 학사지원팀 주말 변동 스케줄 연동</div>
    </div>

    <!-- 오늘 날짜 자동 표시 -->
    <div class="date-badge" id="today-display">조회 중...</div>

    <!-- 스케줄 카드가 렌더링될 구역 -->
    <div id="schedule-container">
        <div class="no-data">데이터를 불러오는 중입니다...</div>
    </div>

    <button class="btn-refresh" onclick="fetchSpreadsheet()">🔄 실시간 스케줄 새로고침</button>
</div>

<script>
    // ⚠️ [필수 고쳐야 할 부분] 구글시트 파일 -> 웹에게시 -> CSV 선택 후 나온 주소를 여기에 넣으세요.
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQpOX8Ll6no4uXd5jnK0umTY3U_eKZXcDK2z_f2EsxSQDuOqk4YGzNkULJn_WgjTFBUseCbl6smBh0Z/pub?gid=1424582869&single=true&output=csv";

    // 오늘 날짜 표시 및 비교용 객체 생성
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    const dayName = dayNames[now.getDay()];
    
    // 화면 상단에 오늘 날짜 세팅
    document.getElementById('today-display').innerText = `📅 기준일: ${yyyy}-${mm}-${dd} (${dayName}요일)`;

    async function fetchSpreadsheet() {
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            processCSV(csvText);
        } catch (error) {
            document.getElementById('schedule-container').innerHTML = `
                <div class="no-data" style="color:#ef4444;">❌ 데이터를 가져오지 못했습니다.<br>시트 연동 및 네트워크 상태를 확인하세요.</div>
            `;
        }
    }

    function processCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if(lines.length <= 1) {
            document.getElementById('schedule-container').innerHTML = '<div class="no-data">등록된 강의실 개방 일정이 없습니다.</div>';
            return;
        }

        const container = document.getElementById('schedule-container');
        container.innerHTML = "";
        let activeCount = 0;

        // CSV 라인 파싱 (첫 줄 헤더 제외)
        for (let i = 1; i < lines.length; i++) {
            const row = splitCSVLine(lines[i]);
            if (row.length < 6) continue;

            // 열 구조: 0:시작일, 1:종료일, 2:구분, 3:요일, 4:장소, 5:시간, 6:비고
            const startDate = new Date(row[0].trim());
            const endDate = new Date(row[1].trim());
            const category = row[2] || "구분 없음";
            const days = row[3] || "";
            const location = row[4] || "";
            const time = row[5] || "";
            const note = row[6] || "";

            // 오늘 날짜가 시작일과 종료일 사이에 있는지 판별
            const todayTarget = new Date(`${yyyy}-${mm}-${dd}`);
            const isTodayIncluded = (todayTarget >= startDate && todayTarget <= endDate);

            if (isTodayIncluded) {
                activeCount++;
                
                // 비고 내용 존재 여부에 따른 마크업 처리
                const noteMarkup = note ? `<div class="notice-box">⚠️ 지시: ${note}</div>` : '';
                
                container.insertAdjacentHTML('beforeend', `
                    <div class="schedule-card card-active">
                        <div class="card-header">
                            <span class="cat-tag">${category}</span>
                            <span class="period-text">적용: ${row[0]} ~ ${row[1]}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">장소</span>
                            <span class="value value-highlight">${location}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">시간</span>
                            <span class="value value-highlight">${time}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">요일</span>
                            <span class="value">${days}</span>
                        </div>
                        ${noteMarkup}
                    </div>
                `);
            }
        }

        if (activeCount === 0) {
            container.innerHTML = '<div class="no-data">☕ 오늘 예정된 대학원 수업 또는 강의실 개방 일정이 없습니다.</div>';
        }
    }

    // 따옴표(쉼표 포함 데이터) 대응 CSV 분리 함수
    function splitCSVLine(line) {
        const result = [];
        let cur = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim());
        return result.map(v => v.replace(/^"|"$/g, '').trim());
    }

    // 앱 실행 시 즉시 데이터 로딩
    fetchSpreadsheet();
</script>
</body>
</html>
