<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sung-eui Workplace Hub</title>
    <style>
        /* 기본 스타일 및 다크모드 기반 테마 */
        :root {
            --bg-color: #121212;
            --sidebar-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #0d6efd;
            --hover-bg: #2d2d2d;
            --border-color: #333;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
        }

        /* 반응형 사이드바 레이아웃 */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        .sidebar h2 {
            font-size: 1.2rem;
            margin-left: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 사이트맵 메뉴 스타일 */
        .sitemap-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-weight: 500;
            transition: background 0.2s;
        }

        .menu-item:hover {
            background-color: var(--hover-bg);
        }

        .menu-item.active {
            background-color: var(--accent-color);
            color: #fff;
        }

        /* 메인 콘텐츠 영역 */
        .main-content {
            flex: 1;
            padding: 30px;
            box-sizing: border-box;
        }

        .page-panel {
            display: none;
        }

        .page-panel.active {
            display: block;
        }

        /* 서브 탭 스타일 (페이지 내부 상세 메뉴) */
        .sub-tabs {
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #888;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .tab-btn.active {
            color: var(--text-color);
            border-bottom: 2px solid var(--accent-color);
            font-weight: bold;
        }

        /* 모바일 대응 스크립트용 간단 대책 */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }
    </style>
</head>
<body>

    <!-- 왼쪽 사이드바: 🧭 사이트맵 메뉴 -->
    <nav class="sidebar">
        <h2>🧭 사이트맵</h2>
        <ul class="sitemap-menu">
            <li class="menu-item active" onclick="switchPage('facility-page', this)">🏢 시설 및 대관 관리</li>
            <li class="menu-item" onclick="switchPage('shift-page', this)">🧭 근무 일정 관리</li>
            <li class="menu-item" onclick="switchPage('campus-page', this)">📢 캠퍼스 소식</li>
        </ul>
    </nav>

    <!-- 오른쪽 영역: 선택된 메인 콘텐츠 화면 (기존 소스 연동용) -->
    <main class="main-content">
        
        <!-- 1. 시설 및 대관 관리 -->
        <section id="facility-page" class="page-panel active">
            <h2>🏢 시설 및 대관 관리</h2>
            <div class="sub-tabs">
                <button class="tab-btn active">📱 모바일 대관 현황</button>
                <button class="tab-btn">💻 PC 대관 예약</button>
            </div>
            <div class="content-body">
                <!-- 기존 모바일/PC 대관 관련 iframe 이나 기능 코드가 들어갈 자리 -->
                <p>여기에 기존 대관 관리 시스템 내용을 넣어주세요.</p>
            </div>
        </section>

        <!-- 2. 근무 일정 관리 -->
        <section id="shift-page" class="page-panel">
            <h2>🧭 근무 일정 관리</h2>
            <div class="sub-tabs">
                <button class="tab-btn active">📅 실시간 근무조 조회</button>
                <button class="tab-btn">🧑‍✈️ 근무자 프로필/대차</button>
            </div>
            <div class="content-body">
                <!-- 기존 C조 순환 배정 및 프로필 코드가 들어갈 자리 -->
                <p>여기에 기존 근무조 및 순찰 관리 내용을 넣어주세요.</p>
            </div>
        </section>

        <!-- 3. 캠퍼스 소식 -->
        <section id="campus-page" class="page-panel">
            <h2>📢 캠퍼스 소식</h2>
            <div class="sub-tabs">
                <button class="tab-btn active">📋 내부 공지사항</button>
                <button class="tab-btn">🍔 주간 식단표</button>
                <button class="tab-btn">📞 행정/보안 연락망</button>
            </div>
            <div class="content-body">
                <!-- 기존 GAS 공지사항 연동 및 식단/연락망 코드가 들어갈 자리 -->
                <p>여기에 기존 공지사항, 식단표 스캔, 연락망 내용을 넣어주세요.</p>
            </div>
        </section>

    </main>

    <!-- 페이지 전환을 제어하는 자바스크립트 -->
    <script>
        function switchPage(pageId, element) {
            // 1. 모든 메인 콘텐츠 패널 숨기기
            const panels = document.querySelectorAll('.page-panel');
            panels.forEach(panel => panel.classList.remove('active'));

            // 2. 모든 사이드바 메뉴 활성화 클래스 제거
            const menuItems = document.querySelectorAll('.menu-item');
            menuItems.forEach(item => item.classList.remove('active'));

            // 3. 선택한 페이지와 메뉴 항목 활성화
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
