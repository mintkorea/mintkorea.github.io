<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 주요 전화</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jschardet/3.0.0/jschardet.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f8fafc; margin: 0; padding: 0; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; padding: 12px; position: relative; }
        .app-title { font-weight: 900; color: #1e3a8a; font-size: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; padding: 0 4px; }
        .search-area { background: #f1f5f9; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .search-container { position: relative; width: 100%; margin-bottom: 8px; }
        .search-box { width: 100%; padding: 12px 40px 12px 14px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 16px; outline: none; transition: all 0.2s; }
        .search-box:focus { border-color: #1e3a8a; background: white; }
        .clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; background: #94a3b8; color: white; border-radius: 50%; border: none; font-size: 14px; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .option-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #475569; font-weight: 700; padding-left: 2px; }
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 15px; }
        .tab { padding: 10px 0; background: #f1f5f9; border-radius: 6px; font-size: 13px; cursor: pointer; color: #64748b; font-weight: 700; text-align: center; }
        .tab.active { background: #1e3a8a; color: white; }
        .phone-item { border-bottom: 1px solid #f1f5f9; padding: 12px 4px; display: flex; align-items: flex-start; }
        .info-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; justify-content: center; min-height: 28px; }
        .top-row { display: flex; align-items: center; justify-content: space-between; }
        .name-area { font-size: 15px; font-weight: 800; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 170px; }
        .num-area { font-size: 14px; font-weight: 800; color: #1e3a8a; text-align: right; margin-right: 12px; flex: 1; letter-spacing: -0.02em; min-width: 80px; }
        /* 특정 번호 스타일링: 이탤릭체 + 하늘색 */
        .highlight-num { color: #0ea5e9; font-style: italic; }
        .icon-area { width: 64px; display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; align-self: center; }
        .btn-icon { text-decoration: none; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 800; font-size: 12px; border: 1px solid #e2e8f0; background: #f8fafc; color: #475569; }
        .btn-m { background: #ecfdf5; color: #059669; border-color: #d1fae5; }
        .btn-placeholder { width: 28px; }
        .work-text { font-size: 12px; color: #64748b; font-weight: 500; margin-top: 4px; }
        #admin-view { display: none; padding-bottom: 80px; }
        .table-wrapper { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 700px; }
        th, td { border: 1px solid #e2e8f0; padding: 8px 4px; }
        .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 10px; border-top: 2px solid #e2e8f0; display: flex; gap: 8px; max-width: 600px; margin: 0 auto; z-index: 100; }
        .sync-box { background:#f1f5f9; padding:15px; border-radius:10px; margin-bottom:15px; border: 1px dashed #cbd5e1; }
        .btn-sync { background:#4285f4; color:white; border:none; padding:10px 15px; border-radius:6px; cursor:pointer; font-weight:bold; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-title">성의교정 주요 전화 <button onclick="checkAdminPw()" style="border:none; background:none; color:#eee; font-size:10px;">Admin</button></div>

    <div id="user-view">
        <div class="search-area">
            <div class="search-container">
                <input type="text" id="search-input" class="search-box" placeholder="성함, 부서, 번호(4자리) 검색...">
                <button id="clear-search" class="clear-btn" onclick="clearSearch()">×</button>
            </div>
            <div class="option-row">
                <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
                    <input type="checkbox" id="dept-only" onchange="renderList()"> 부서/장소명으로만 검색
                </label>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="filterTab('전체')">전체</div>
            <div class="tab" onclick="filterTab('보안')">보안</div>
            <div class="tab" onclick="filterTab('시설')">시설</div>
            <div class="tab" onclick="filterTab('미화')">미화</div>
            <div class="tab" onclick="filterTab('총무')">총무</div>
            <div class="tab" onclick="filterTab('지원')">지원</div>
            <div class="tab" onclick="filterTab('기타')">기타</div>
        </div>
        <div id="list-container"></div>
    </div>

    <div id="admin-view">
        <div class="sync-box">
            <strong>☁️ 구글 시트 동기화</strong>
            <button onclick="syncWithGoogleSheet()" class="btn-sync" style="margin-top:10px;">데이터 가져오기</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead><tr style="background:#f8fafc;"><th>구분</th><th>부서</th><th>성함</th><th>전화</th><th>휴대폰</th><th>비고</th><th>삭제</th></tr></thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
        <div class="save-bar">
            <button onclick="saveAll()" style="flex:2; padding:15px; background:#1e3a8a; color:white; border:none; border-radius:8px; font-weight:bold;">저장</button>
            <button onclick="location.reload()" style="flex:1; padding:15px; background:#64748b; color:white; border:none; border-radius:8px; font-weight:bold;">취소</button>
        </div>
    </div>
</div>

<script>
    let allData = [];
    let currentTab = "전체";
    const tabPriority = { "보안": 1, "시설": 2, "미화": 3, "총무": 4, "지원": 5, "기타": 6 };
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQpOX8Ll6no4uXd5jnK0umTY3U_eKZXcDK2z_f2EsxSQDuOqk4YGzNkULJn_WgjTFBUseCbl6smBh0Z/pub?gid=1424582869&single=true&output=csv";

    function getChosung(str) {
        const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
        let result = "";
        for (let i = 0; i < str.length; i++) {
            const code = str.charCodeAt(i) - 44032;
            if (code > -1 && code < 11172) result += cho[Math.floor(code / 588)];
            else result += str.charAt(i);
        }
        return result;
    }

    const dbName = "YellowPage_DB";
    let db;
    const request = indexedDB.open(dbName, 1);
    request.onupgradeneeded = e => { e.target.result.createObjectStore("contacts", { keyPath: "id", autoIncrement: true }); };
    request.onsuccess = e => {
        db = e.target.result;
        checkInitialData();
    };

    function checkInitialData() {
        const transaction = db.transaction(["contacts"], "readonly");
        const store = transaction.objectStore("contacts");
        const getAll = store.getAll();
        getAll.onsuccess = () => {
            allData = getAll.result;
            if (allData.length === 0) syncWithGoogleSheet(true);
            else renderList();
        };
    }

    async function syncWithGoogleSheet(isAuto = false) {
        if (!isAuto && !confirm("최신 데이터로 동기화하시겠습니까?")) return;
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            const lines = csvText.split(/\r?\n/).filter(l => l.trim());
            allData = lines.slice(1).map(line => {
                const c = splitCSVLine(line);
                return { cat: c[0]||"", dept: c[1]||"", name: c[2]||"", tel: c[3]||"", hp: c[4]||"", work: c[5]||"" };
            });
            await performSave();
            renderList();
            if(!isAuto) alert("동기화 완료");
        } catch (e) {
            console.error(e);
            if(!isAuto) alert("동기화 실패");
        }
    }

    function renderList() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        const deptOnly = document.getElementById('dept-only').checked;
        const container = document.getElementById('list-container');
        document.getElementById('clear-search').style.display = query ? "flex" : "none";
        container.innerHTML = "";

        const sorted = [...allData].sort((a, b) => {
            const getTabRank = (cat) => {
                for (let k in tabPriority) { if (cat.includes(k)) return tabPriority[k]; }
                return 99;
            };
            const rA = getTabRank(a.cat), rB = getTabRank(b.cat);
            if (rA !== rB) return rA - rB;
            const numA = parseInt(a.cat.replace(/[^0-9]/g, "")) || 0;
            const numB = parseInt(b.cat.replace(/[^0-9]/g, "")) || 0;
            if (numA !== numB) return numA - numB;
            return new Intl.Collator('ko', {numeric: true}).compare(a.dept || "", b.dept || "");
        });

        sorted.filter(item => {
            const tabMatch = (currentTab === "전체") || (item.cat && item.cat.includes(currentTab));
            if (!tabMatch) return false;
            if (!query) return true;
            const name = (item.name || "").toLowerCase();
            const dept = (item.dept || "").toLowerCase();
            const tel = (item.tel || "").replace(/[^0-9]/g, "");
            const hp = (item.hp || "").replace(/[^0-9]/g, "");
            if (deptOnly) return dept.includes(query) || getChosung(dept).includes(query);
            return name.includes(query) || getChosung(name).includes(query) || 
                   dept.includes(query) || getChosung(dept).includes(query) ||
                   (query.length >= 4 && (tel.includes(query) || hp.includes(query)));
        }).forEach(r => {
            const dName = r.name ? `${r.dept} ${r.name}` : r.dept;
            const isSecurity = r.cat && r.cat.includes("보안"); // 보안팀 여부 확인
            
            // 1. 번호 텍스트 가공
            let displayNum = (r.tel||"").toString().replace('02-3147-','').replace('02-2258-','');
            const rawHp = (r.hp || "").toString().replace(/[^0-9]/g, "");
            
            if (!displayNum && rawHp) displayNum = r.hp; // 휴대폰만 있을 때

            // 보안팀 번호 미노출 처리
            if (isSecurity) displayNum = ""; 

            // 특정 번호 스타일링 적용 함수
            const getStyledNum = (numStr) => {
                if (!numStr) return "";
                if (numStr.includes('*1') || numStr.includes('2258')) {
                    return `<span class="highlight-num">${numStr}</span>`;
                }
                return numStr;
            };

            // 2. 버튼 생성
            const mBtn = (rawHp.length > 5) 
                ? `<a href="tel:${rawHp}" class="btn-icon btn-m">M</a>` 
                : `<div class="btn-placeholder"></div>`;

            let callLink = "";
            const rawTel = (r.tel || "").toString().replace(/[^0-9*]/g,'');
            if (rawTel) {
                if (r.tel.includes('*1')) callLink = "022258" + rawTel.replace('*1', '');
                else if (rawTel.length === 4) callLink = "023147" + rawTel;
                else callLink = rawTel;
            }
            const tBtn = callLink ? `<a href="tel:${callLink}" class="btn-icon">T</a>` : `<div class="btn-placeholder"></div>`;

            container.insertAdjacentHTML('beforeend', `
                <div class="phone-item">
                    <div class="info-area">
                        <div class="top-row">
                            <div class="name-area">${dName}</div>
                            <div class="num-area">${getStyledNum(displayNum)}</div>
                        </div>
                        ${r.work ? `<div class="work-text">${r.work}</div>` : ''}
                    </div>
                    <div class="icon-area">${tBtn}${mBtn}</div>
                </div>`);
        });
    }

    function splitCSVLine(line) {
        const result = [];
        let cur = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
            else cur += char;
        }
        result.push(cur.trim());
        return result.map(v => v.replace(/^"|"$/g, ''));
    }

    async function performSave() {
        return new Promise((resolve) => {
            const transaction = db.transaction(["contacts"], "readwrite");
            const store = transaction.objectStore("contacts");
            store.clear();
            allData.forEach(item => { const {id, ...rest} = item; store.add(rest); });
            transaction.oncomplete = () => resolve();
        });
    }

    function clearSearch() { document.getElementById('search-input').value = ""; renderList(); }
    function filterTab(t) { currentTab = t; document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.innerText === t)); renderList(); }
    document.getElementById('search-input').addEventListener('input', renderList);
    function checkAdminPw() { if (prompt("비밀번호") === "1234") { document.getElementById('user-view').style.display='none'; document.getElementById('admin-view').style.display='block'; renderAdminTable(); } }

    function renderAdminTable() {
        const tbody = document.getElementById('admin-table-body');
        tbody.innerHTML = "";
        allData.forEach((item, idx) => {
            tbody.insertAdjacentHTML('beforeend', `<tr>
                <td><input style="width:100%" value="${item.cat||''}" oninput="allData[${idx}].cat=this.value"></td>
                <td><input style="width:100%" value="${item.dept||''}" oninput="allData[${idx}].dept=this.value"></td>
                <td><input style="width:100%" value="${item.name||''}" oninput="allData[${idx}].name=this.value"></td>
                <td><input style="width:100%" value="${item.tel||''}" oninput="allData[${idx}].tel=this.value"></td>
                <td><input style="width:100%" value="${item.hp||''}" oninput="allData[${idx}].hp=this.value"></td>
                <td><input style="width:100%" value="${item.work||''}" oninput="allData[${idx}].work=this.value"></td>
                <td style="text-align:center"><button onclick="allData.splice(${idx},1);renderAdminTable();">×</button></td>
            </tr>`);
        });
    }
    async function saveAll() { await performSave(); alert("저장됨"); location.reload(); }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
        });
    }
</script>
</body>
</html>
