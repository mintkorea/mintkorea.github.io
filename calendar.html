
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>근무 달력 V5 - 시각적 여유 개선</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8fafc; /* 더 밝은 배경으로 변경 */
            margin: 0;
            display: flex;
            justify-content: center;
        }
        
        .app-container {
            width: 100vw;
            max-width: 430px; /* 아이폰 Pro Max 대응 */
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 꽉 막힌 그리드 대신 여백이 있는 레이아웃으로 변경 */
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 8px; /* 셀 사이 여백 추가 */
            padding: 0 16px 16px 16px; /* 좌우 하단 여백 추가 */
        }
        
        .weekday { 
            padding: 12px 0; 
            text-align: center; 
            font-weight: 700; 
            font-size: 0.75rem; 
            color: #94a3b8; 
            text-transform: uppercase;
        }
        
        .calendar-day { 
            background-color: #ffffff;
            aspect-ratio: 1 / 1.4;
            display: flex;
            flex-direction: column;
            align-items: center; 
            justify-content: space-between; 
            padding: 8px 4px;
            position: relative;
            border-radius: 12px; /* 둥근 모서리로 답답함 해소 */
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); /* 부드러운 그림자 */
            transition: transform 0.1s;
        }
        
        .day-number { 
            font-size: 1rem; 
            font-weight: 700; 
            line-height: 1;
            margin-top: 2px;
        }
        
        .shift-badge {
            width: 85%;
            height: 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 900;
            margin-bottom: 2px;
        }

        /* 조별 컬러셋 - 조금 더 부드러운 파스텔톤 계열로 조정 */
        .shift-A { background-color: #fff7ed; color: #f97316; } 
        .shift-B { background-color: #fef2f2; color: #ef4444; } 
        .shift-C { background-color: #eff6ff; color: #3b82f6; } 

        /* 강조 효과 - 외곽선 대신 부드러운 글로우 효과 */
        .highlight-focus-A { box-shadow: 0 0 0 2px #f97316; z-index: 2; }
        .highlight-focus-B { box-shadow: 0 0 0 2px #ef4444; z-index: 2; }
        .highlight-focus-C { box-shadow: 0 0 0 2px #3b82f6; z-index: 2; }

        /* 오늘 표시 - 선명하게 강조 */
        .today-mark {
            background-color: #fff1f2 !important;
            box-shadow: inset 0 0 0 2px #ef4444 !important;
        }

        .sun { color: #f87171; }
        .sat { color: #60a5fa; }
        .other-month { opacity: 0; pointer-events: none; } /* 다른 달 날짜는 숨겨서 더 깔끔하게 */
        
        /* 탭 버튼 디자인 개선 */
        .tab-container {
            padding: 0 16px 20px 16px;
            display: flex;
            gap: 8px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 0;
            font-size: 0.85rem;
            font-weight: 700;
            background: #ffffff;
            color: #64748b;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .tab-btn.active.A { background: #f97316; color: white; border-color: #f97316; }
        .tab-btn.active.B { background: #ef4444; color: white; border-color: #ef4444; }
        .tab-btn.active.C { background: #3b82f6; color: white; border-color: #3b82f6; }

        .today-label {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: white;
            font-size: 0.5rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 800;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 상단 헤더 공간 확대 -->
        <div class="px-6 pt-10 pb-6 flex items-end justify-between">
            <div>
                <span id="yearLabel" class="text-sm font-bold text-slate-400 tracking-tighter">2026</span>
                <h2 id="monthLabel" class="text-4xl font-black text-slate-900 leading-none">4월</h2>
            </div>
            <div class="flex gap-3">
                <button onclick="changeMonth(-1)" class="w-12 h-12 flex items-center justify-center bg-white shadow-sm border border-slate-100 rounded-2xl active:scale-95 transition-transform">
                    <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <button onclick="changeMonth(1)" class="w-12 h-12 flex items-center justify-center bg-white shadow-sm border border-slate-100 rounded-2xl active:scale-95 transition-transform">
                    <svg class="w-6 h-6 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>
        </div>

        <!-- 탭 영역 여백 확보 -->
        <div class="tab-container">
            <button onclick="setFocusGroup('A')" id="btnA" class="tab-btn active A">A조</button>
            <button onclick="setFocusGroup('B')" id="btnB" class="tab-btn B">B조</button>
            <button onclick="setFocusGroup('C')" id="btnC" class="tab-btn C">C조</button>
        </div>

        <!-- 요일 헤더 -->
        <div class="calendar-grid !pb-0">
            <div class="weekday sun">SUN</div>
            <div class="weekday">MON</div>
            <div class="weekday">TUE</div>
            <div class="weekday">WED</div>
            <div class="weekday">THU</div>
            <div class="weekday">FRI</div>
            <div class="weekday sat">SAT</div>
        </div>

        <!-- 메인 달력 -->
        <div id="calendarBody" class="calendar-grid flex-grow"></div>
        
        <!-- 하단 정보 영역 여백 추가 -->
        <div class="mx-4 mb-8 p-5 bg-white rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Rotation Pattern</span>
                <span class="text-sm font-black text-slate-700">C → A → B Cycle</span>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Current Status</span>
                <div id="todayDateStr" class="text-sm font-black text-rose-500"></div>
            </div>
        </div>
    </div>

    <script>
        const baseDate = '2026-03-09';
        const patterns = ['C', 'A', 'B'];
        let viewDate = new Date();
        let focusGroup = 'A';

        function getShift(date) {
            let base = new Date(baseDate); base.setHours(0,0,0,0);
            let target = new Date(date); target.setHours(0,0,0,0);
            let diff = Math.round((target - base) / 86400000);
            return patterns[((diff % 3) + 3) % 3];
        }

        function setFocusGroup(group) {
            focusGroup = group;
            ['A', 'B', 'C'].forEach(g => {
                document.getElementById(`btn${g}`).classList.toggle('active', g === group);
            });
            renderCalendar();
        }

        function renderCalendar() {
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            document.getElementById('yearLabel').innerText = year;
            document.getElementById('monthLabel').innerText = `${month + 1}월`;

            const firstDay = new Date(year, month, 1);
            const startPoint = new Date(firstDay);
            startPoint.setDate(firstDay.getDate() - firstDay.getDay());

            const container = document.getElementById('calendarBody');
            container.innerHTML = '';

            const today = new Date();
            today.setHours(0,0,0,0);
            document.getElementById('todayDateStr').innerText = today.toLocaleDateString('ko-KR', {month:'short', day:'numeric', weekday:'short'});

            for (let i = 0; i < 42; i++) {
                const current = new Date(startPoint);
                current.setDate(startPoint.getDate() + i);
                
                const shift = getShift(current);
                const isToday = current.getTime() === today.getTime();
                const isOtherMonth = current.getMonth() !== month;
                const isFocused = (shift === focusGroup && !isOtherMonth);
                
                const dayOfWeek = current.getDay();
                let dayCls = dayOfWeek === 0 ? 'sun' : (dayOfWeek === 6 ? 'sat' : '');
                
                const cell = document.createElement('div');
                
                let classes = ['calendar-day'];
                if (isOtherMonth) classes.push('other-month');
                if (isFocused) classes.push(`highlight-focus-${shift}`);
                if (isToday) classes.push('today-mark');
                
                cell.className = classes.join(' ');
                
                if (!isOtherMonth) {
                    cell.innerHTML = `
                        ${isToday ? '<span class="today-label">TODAY</span>' : ''}
                        <span class="day-number ${dayCls}">${current.getDate()}</span>
                        <div class="shift-badge shift-${shift}">
                            ${shift}
                        </div>
                    `;
                } else {
                    cell.innerHTML = '';
                }
                
                container.appendChild(cell);
                if (i >= 34 && current.getMonth() !== month && current.getDay() === 6) break;
            }
        }

        function changeMonth(val) {
            viewDate.setMonth(viewDate.getMonth() + val);
            renderCalendar();
        }

        window.onload = renderCalendar;
    </script>
</body>
</html>
