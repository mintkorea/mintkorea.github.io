<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 커스텀 근무달력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-top: 1px solid #e2e8f0;
            border-left: 1px solid #e2e8f0;
        }

        .calendar-cell {
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
        }

        .detail-view .calendar-cell { aspect-ratio: 1 / 1.35; }

        .date-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            position: relative;
            z-index: 10;
        }

        .shift-area {
            flex: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            position: relative;
            z-index: 10;
        }

        .is-selected-day::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid #ef4444;
            z-index: 20;
            pointer-events: none;
        }
        
        .is-selected-day::after {
            content: "TODAY";
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            font-weight: 900;
            color: #ef4444;
            z-index: 21;
        }

        .sunday { color: #ef4444; }
        .saturday { color: #3b82f6; }

        .cell-highlighted .date-area {
            background-color: rgba(255, 255, 255, 0.45) !important;
            color: #ffffff !important;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .cell-highlighted .shift-area {
            color: #ffffff !important;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 800;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="p-3 md:p-6">

    <div id="appContainer" class="max-w-md mx-auto">
        <header class="bg-white rounded-2xl shadow-sm border border-gray-200 mb-5 p-4">
            <div class="flex items-center justify-between mb-3 border-b border-gray-50 pb-2">
                <div class="flex items-center gap-2">
                    <span id="displayAppIcon" class="text-xl">🎯</span>
                    <h1 id="displayAppTitle" class="text-xl font-black text-gray-800">근무달력</h1>
                </div>
                <button id="openAuthBtn" class="text-[11px] font-extrabold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg">⚙️ 설정</button>
            </div>
            
            <div class="flex items-center justify-between mb-4 bg-slate-50 p-2 rounded-xl border border-slate-100">
                <span class="text-xs font-bold text-slate-500 ml-1">강조 표시:</span>
                <select id="shiftSelect" class="text-xs p-1.5 bg-white text-gray-700 rounded-lg font-bold outline-none w-32 border border-gray-200"></select>
            </div>

            <div class="flex items-center justify-between bg-white p-1 rounded-xl border border-gray-100">
                <div class="flex gap-1">
                    <button id="prevMonth" class="nav-btn">＜</button>
                </div>
                <h2 id="currentDisplayTitle" class="text-[17px] font-black text-slate-800 px-1">2026년 3월</h2>
                <div class="flex gap-1">
                    <button id="nextMonth" class="nav-btn">＞</button>
                </div>
            </div>
        </header>

        <div id="calendarArea">
            <div class="detail-view bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
                <div class="grid grid-cols-7 text-center font-bold text-[11px] py-3 bg-slate-50 border-b border-gray-100 text-slate-400">
                    <div class="sunday">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="saturday">토</div>
                </div>
                <div id="singleCalendarBody" class="calendar-grid"></div>
            </div>
        </div>
    </div>

    <div id="authModal" class="modal-overlay">
        <div class="bg-white p-8 rounded-3xl w-72 text-center">
            <h3 class="font-black mb-4">설정 인증</h3>
            <input type="password" id="authPasswordInput" class="w-full p-3 bg-slate-50 border rounded-xl mb-4 text-center tracking-widest" placeholder="••••">
            <div class="flex gap-2">
                <button id="closeAuthBtn" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold">취소</button>
                <button id="confirmAuthBtn" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold">확인</button>
            </div>
        </div>
    </div>

    <script>
        // 수정된 설정: A조(황색), B조(적색), C조(청색)
        let config = JSON.parse(localStorage.getItem('shift_config_v2')) || {
            appTitle: '근무달력', appIcon: '🎯', baseDate: '2026-03-01', adminPassword: '0000',
            pattern: [
                { name: 'A', color: '#fef3c7', highlight: '#f59e0b' }, // A조: 황색
                { name: 'B', color: '#fee2e2', highlight: '#ef4444' }, // B조: 적색
                { name: 'C', color: '#dbeafe', highlight: '#3b82f6' }  // C조: 청색
            ]
        };

        const today = new Date(); today.setHours(0,0,0,0);
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth();

        function initAppUI() {
            document.getElementById('displayAppTitle').textContent = config.appTitle;
            document.getElementById('displayAppIcon').textContent = config.appIcon;
            const shiftSelect = document.getElementById('shiftSelect');
            shiftSelect.innerHTML = '<option value="none">강조 없음</option>';
            config.pattern.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name; opt.textContent = `${p.name}조 강조`;
                shiftSelect.appendChild(opt);
            });
        }

        function render() {
            document.getElementById('currentDisplayTitle').textContent = `${currentYear}년 ${currentMonth + 1}월`;
            const container = document.getElementById('singleCalendarBody');
            container.innerHTML = '';
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const base = new Date(config.baseDate); base.setHours(0,0,0,0);
            const targetShift = document.getElementById('shiftSelect').value;

            for (let i = 0; i < firstDay; i++) container.appendChild(Object.assign(document.createElement('div'), { className: 'calendar-cell bg-gray-50/30' }));

            for (let d = 1; d <= lastDate; d++) {
                const curr = new Date(currentYear, currentMonth, d); curr.setHours(0,0,0,0);
                const diff = Math.floor((curr - base) / (1000 * 60 * 60 * 24));
                const pIdx = ((diff % config.pattern.length) + config.pattern.length) % config.pattern.length;
                const shift = config.pattern[pIdx];

                const cell = document.createElement('div');
                cell.className = 'calendar-cell';
                if (curr.getTime() === today.getTime()) cell.classList.add('is-selected-day');

                const isHighlighted = (targetShift === shift.name);
                if (isHighlighted) {
                    cell.classList.add('cell-highlighted');
                    cell.style.backgroundColor = shift.highlight;
                }
                
                const dDiv = document.createElement('div');
                dDiv.className = `date-area ${curr.getDay()===0?'sunday':curr.getDay()===6?'saturday':''}`;
                dDiv.textContent = d;

                const sDiv = document.createElement('div');
                sDiv.className = 'shift-area';
                if (!isHighlighted) sDiv.style.backgroundColor = shift.color;
                sDiv.textContent = shift.name;

                cell.append(dDiv, sDiv);
                container.appendChild(cell);
            }
        }

        document.getElementById('shiftSelect').onchange = render;
        document.getElementById('prevMonth').onclick = () => { currentMonth--; if(currentMonth<0){currentMonth=11;currentYear--;} render(); };
        document.getElementById('nextMonth').onclick = () => { currentMonth++; if(currentMonth>11){currentMonth=0;currentYear++;} render(); };
        document.getElementById('openAuthBtn').onclick = () => document.getElementById('authModal').classList.add('active');
        document.getElementById('closeAuthBtn').onclick = () => document.getElementById('authModal').classList.remove('active');
        document.getElementById('confirmAuthBtn').onclick = () => {
            if (document.getElementById('authPasswordInput').value === config.adminPassword) {
                document.getElementById('authModal').classList.remove('active');
            }
        };

        window.onload = () => { initAppUI(); render(); };
    </script>
</body>
</html>
