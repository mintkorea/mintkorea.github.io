<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>연차 관리 시스템 (디자인 유지본)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; font-family: 'Malgun Gothic', 'Noto Sans KR', sans-serif; background: #f0f2f5; }
        
        /* 탭 메뉴 스타일 (모바일용 가독성 추가) */
        .no-print { background: #2c3e50; padding: 10px; color: white; }
        .tab-btn-container { display: flex; gap: 5px; margin-top: 10px; }
        .tab-btn { flex: 1; padding: 12px; border: 1px solid #000; font-weight: bold; cursor: pointer; text-align: center; border-radius: 4px; }
        .btn-active { background: #3498db !important; color: white; }
        .btn-inactive { background: #34495e; color: #bdc3c7; }

        /* 기존 표 디자인 유지 */
        .content-area { padding: 15px; background: white; min-height: 80vh; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
        th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
        th { background: #eee; position: sticky; top: 0; z-index: 5; }
        
        /* 입력부 스타일 */
        input[type="text"] { width: 95%; border: 1px solid #ddd; padding: 4px; font-weight: bold; text-align: center; }
        .row-hidden { display: none; }

        /* 인쇄 서식 유지 (기존 틀 그대로) */
        @media print {
            .no-print { display: none !important; }
            .tab-content { display: none !important; }
            #tab-report { display: block !important; } /* 인쇄 시 대장/일정표만 출력 */
            body { background: white; }
            .content-area { padding: 0; }
            table { font-size: 10pt; width: 100%; }
            @page { size: A4 landscape; margin: 10mm; }
        }

        .tab-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <header class="no-print">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="font-weight: bold; font-size: 16px;">📊 연차 통합 관리</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="month" id="targetMonth" value="2026-05" onchange="renderAll()" style="padding: 5px;">
                <label style="font-size: 12px; cursor: pointer;">
                    <input type="checkbox" id="hidePast" onchange="renderAll()"> 이전 달 숨김
                </label>
            </div>
        </div>
        
        <div class="tab-btn-container">
            <div id="btn-input" class="tab-btn btn-active" onclick="switchTab('input')">📝 입력/대장</div>
            <div id="btn-report" class="tab-btn btn-inactive" onclick="switchTab('report')">📅 일정표/출력</div>
            <div class="tab-btn btn-inactive" style="background: #27ae60;" onclick="window.print()">🖨️ 인쇄</div>
        </div>
    </header>

    <div class="content-area">
        
        <div id="tab-input" class="tab-content active">
            <table id="inputTable">
                </table>
            <div class="no-print" style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="downloadJSON()" style="padding: 10px; cursor: pointer; border: 1px solid #000;">💾 파일 저장</button>
                <input type="file" id="fileIn" style="display:none" onchange="uploadJSON(event)">
                <button onclick="document.getElementById('fileIn').click()" style="padding: 10px; cursor: pointer; border: 1px solid #000;">📂 파일 열기</button>
            </div>
        </div>

        <div id="tab-report" class="tab-content">
            <div id="calendarArea">
                </div>
        </div>

    </div>

    <script>
        let staffData = [
            { g: "성의교정", s: "관리", p: "소장", n: "이규용" },
            { g: "성의교정", s: "관리", p: "부소장", n: "박상현" },
            { g: "성의회관", s: "관리", p: "반장", n: "유정수" },
            { g: "성의회관", s: "A조", p: "조장", n: "배준용" },
            { g: "성의회관", s: "A조", p: "조원", n: "김영중" },
            { g: "성의회관", s: "A조", p: "조원", n: "이명구" },
            { g: "성의회관", s: "A조", p: "조원", n: "김삼동" },
            { g: "성의회관", s: "B조", p: "조장", n: "심규천" },
            { g: "성의회관", s: "B조", p: "조원", n: "권영국" },
            { g: "성의회관", s: "B조", p: "조원", n: "임종헌" },
            { g: "성의회관", s: "B조", p: "조원", n: "전준수" },
            { g: "성의회관", s: "C조", p: "조장", n: "황재업" },
            { g: "성의회관", s: "C조", p: "조원", n: "김태언" },
            { g: "성의회관", s: "C조", p: "조원", n: "이태원" },
            { g: "성의회관", s: "C조", p: "조원", n: "이정석" },
            { g: "옴니버스", s: "관리", p: "반장", n: "오재준" },
            { g: "옴니버스", s: "A조", p: "조장", n: "손병휘" },
            { g: "옴니버스", s: "A조", p: "조원", n: "김전식" },
            { g: "옴니버스", s: "A조", p: "조원", n: "권순호" },
            { g: "옴니버스", s: "B조", p: "조장", n: "황일범" },
            { g: "옴니버스", s: "B조", p: "조원", n: "이상길" },
            { g: "옴니버스", s: "B조", p: "조원", n: "허용" },
            { g: "옴니버스", s: "C조", p: "조장", n: "피재영" },
            { g: "옴니버스", s: "C조", p: "조원", n: "남형민" },
            { g: "옴니버스", s: "C조", p: "조원", n: "강경훈" },
            { g: "기숙사", s: "관리", p: "반장", n: "이강택" },
            { g: "기숙사", s: "관리", p: "조원", n: "유시균" },
            { g: "기숙사", s: "관리", p: "조원", n: "이상현" }
        ];

        let vData = JSON.parse(localStorage.getItem('v_data_v34')) || {};

        function renderAll() {
            renderInputTable();
            renderCalendarTable();
            // 근무달력(calendar7.html) 연동용 데이터 저장
            localStorage.setItem('v_data_v34_full', JSON.stringify({ staff: staffData, v: vData }));
        }

        // 입력/대장 통합 테이블 (기존 디자인 유지)
        function renderInputTable() {
            const mKey = document.getElementById('targetMonth').value;
            const hidePast = document.getElementById('hidePast').checked;
            const currentV = vData[mKey] || {};
            
            let html = `<thead><tr><th style="width:100px">소속/조</th><th style="width:80px">성명</th><th>연차 일자 (숫자만 입력)</th></tr></thead><tbody>`;
            
            staffData.forEach(p => {
                const val = currentV[p.n] || "";
                if (hidePast && val === "") return; // 이전 달 숨김 처리
                
                html += `<tr>
                    <td style="background:#f9f9f9; font-size:11px;">${p.g} ${p.s}</td>
                    <td style="font-weight:bold;">${p.n}</td>
                    <td style="padding:0;"><input type="text" value="${val}" onblur="updateV('${p.n}', this.value)"></td>
                </tr>`;
            });
            document.getElementById('inputTable').innerHTML = html + `</tbody>`;
        }

        // 일정표/출력 양식 (기존 100% 서식 유지)
        function renderCalendarTable() {
            const [y, m] = document.getElementById('targetMonth').value.split('-').map(Number);
            const mKey = document.getElementById('targetMonth').value;
            const currentV = vData[mKey] || {};
            const lastDay = new Date(y, m, 0).getDate();
            
            let html = `<h2 style="text-align:center; margin-bottom:10px;">${y}년 ${m}월 연차 일정표</h2>`;
            html += `<table><thead><tr><th style="width:120px">성명(조)</th>`;
            for(let i=1; i<=lastDay; i++) html += `<th style="width:25px; font-size:10px;">${i}</th>`;
            html += `</tr></thead><tbody>`;

            staffData.forEach(p => {
                const days = (currentV[p.n] || "").split(',').map(d => d.trim());
                html += `<tr><td style="font-size:11px; font-weight:bold; background:#f9f9f9;">${p.n}(${p.s})</td>`;
                for(let i=1; i<=lastDay; i++) {
                    const isV = days.includes(String(i));
                    html += `<td style="${isV ? 'background:#a855f7; color:white; font-weight:bold;' : ''}">${isV ? 'V' : ''}</td>`;
                }
                html += `</tr>`;
            });
            document.getElementById('calendarArea').innerHTML = html + `</tbody></table>`;
        }

        function updateV(name, val) {
            const mKey = document.getElementById('targetMonth').value;
            if(!vData[mKey]) vData[mKey] = {};
            vData[mKey][name] = val;
            localStorage.setItem('v_data_v34', JSON.stringify(vData));
            renderCalendarTable(); // 일정표 자동 갱신
            localStorage.setItem('v_data_v34_full', JSON.stringify({ staff: staffData, v: vData }));
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('btn-active', 'btn-inactive'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.replace('btn-inactive', 'btn-active');
        }

        function downloadJSON() {
            const blob = new Blob([JSON.stringify({ staff: staffData, v: vData }, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `연차데이터_${document.getElementById('targetMonth').value}.json`;
            a.click();
        }

        function uploadJSON(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = JSON.parse(ev.target.result);
                if(data.v) { vData = data.v; if(data.staff) staffData = data.staff; renderAll(); }
            };
            reader.readAsText(e.target.files[0]);
        }

        window.onload = renderAll;
    </script>
</body>
</html>
