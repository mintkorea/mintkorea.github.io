<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>성의교정 통합 관리 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --sat-bg: #f5faff; --sun-bg: #fff5f5; --today-border: #ff0000; --select-border: #0044ff; }
        body { margin: 0; font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; }
        .nav-header { background: #2c3e50; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-header h1 { margin: 0; font-size: 18px; }
        .floating-bar { position: fixed; bottom: 20px; right: 20px; display: flex; align-items: center; gap: 8px; z-index: 1000; background: white; padding: 10px 15px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid #ddd; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; font-weight: bold; font-size: 13px; border-radius: 20px; transition: 0.2s; }
        .btn-orange { background: #e67e22; color: white; }
        .btn-blue { background: #3498db; color: white; }
        .btn-red { background: #e74c3c; color: white; } /* 초기화 버튼용 */
        .content-area { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 50px); padding: 20px; }
        #paper { background: white; width: 297mm; height: 210mm; padding: 10mm; display: flex; flex-direction: column; align-items: center; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        #viewTitle { text-align: center; margin: 0 0 10px 0; font-size: 22px; text-decoration: underline; text-underline-offset: 5px; letter-spacing: 2px; }
        table { border-collapse: collapse; width: 100%; border: 1.8pt solid #000; table-layout: fixed; position: relative; background: white; }
        td { border: 0.5pt solid #000; text-align: center; font-weight: bold; height: 16.5pt; font-size: 10px; padding: 0; }
        .hdr { background: #f2f2f2 !important; height: 22pt; cursor: pointer; }
        .col-highlight { position: absolute; pointer-events: none; z-index: 10; top: 0; box-sizing: border-box; }
        .hl-today { border: 2.5px solid var(--today-border); }
        .hl-select { border: 2.5px solid var(--select-border); }
        .sat { background-color: var(--sat-bg) !important; color: #007bff !important; }
        .sun { background-color: var(--sun-bg) !important; color: #dc3545 !important; }
        .v-mark { background-color: #d4edda !important; color: #28a745; cursor: pointer; font-size: 11px; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; z-index: 2000; border-radius: 12px; box-shadow: 0 15px 50px rgba(0,0,0,0.4); min-width: 280px; overflow: hidden; }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1999; }
        .modal-hdr { background: #3498db; color: white; padding: 15px; font-weight: bold; text-align: center; }
        .modal-body { padding: 20px; text-align: center; line-height: 1.8; }
        .close-btn { width: 100%; padding: 12px; background: #f8f9fa; border: none; border-top: 1px solid #eee; cursor: pointer; font-weight: bold; }
        @media print { .nav-header, .floating-bar, #modal, #modalOverlay, .col-highlight { display: none !important; } #paper { box-shadow: none; zoom: 100%; } }
    </style>
</head>
<body>

<div class="nav-header">
    <h1>Catholic-Security-System</h1>
    <div id="syncStatus" style="font-size: 12px; color: #bdc3c7;">데이터 확인 중...</div>
</div>

<div id="modalOverlay" onclick="closeModal()"></div>
<div id="modal">
    <div class="modal-hdr" id="modalTitle">정보</div>
    <div class="modal-body" id="modalContent"></div>
    <button class="close-btn" onclick="closeModal()">닫기</button>
</div>

<div class="content-area">
    <div id="paper">
        <h2 id="viewTitle">데이터 동기화 중...</h2>
        <div id="tableWrapper" style="position:relative; width:100%;">
            <table id="displayTable"></table>
        </div>
    </div>
</div>

<div class="floating-bar">
    <button class="btn btn-red" onclick="firstTimeSetup()">DB 초기화(최초1회)</button>
    <input type="month" id="targetMonth" onchange="render()">
    <button class="btn btn-orange" onclick="changeTab('ledger')">연차대장</button>
    <button class="btn btn-blue" onclick="changeTab('schedule')">연차일정표</button>
    <button class="btn btn-blue" onclick="window.print()">인쇄</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
        authDomain: "catholic-security-system.firebaseapp.com",
        projectId: "catholic-security-system",
        storageBucket: "catholic-security-system.firebasestorage.app",
        messagingSenderId: "978946205343",
        appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa",
        databaseURL: "https://catholic-security-system-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentTab = 'schedule';
    let activeEditColumn = null;
    let selectedScheduleDay = null;
    let staffData = [];
    let vData = {};

    // [최초 실행용 데이터 업로드 함수]
    function firstTimeSetup() {
        const initialStaff = [
            { g: "성의교정", s: "관리", p: "소장", n: "이규용" }, { g: "성의교정", s: "관리", p: "부소장", n: "박상현" },
            { g: "성의회관", s: "관리", p: "반장", n: "유정수" }, { g: "성의회관", s: "A조", p: "조장", n: "배준용" },
            { g: "성의회관", s: "A조", p: "조원", n: "김영중" }, { g: "성의회관", s: "A조", p: "조원", n: "이명구" },
            { g: "성의회관", s: "A조", p: "조원", n: "김삼동" }, { g: "성의회관", s: "B조", p: "조장", n: "심규천" },
            { g: "성의회관", s: "B조", p: "조원", n: "권영국" }, { g: "성의회관", s: "B조", p: "조원", n: "임종현" },
            { g: "성의회관", s: "B조", p: "조원", n: "전준수" }, { g: "성의회관", s: "C조", p: "조장", n: "황재업" },
            { g: "성의회관", s: "C조", p: "조원", n: "김태언" }, { g: "성의회관", s: "C조", p: "조원", n: "이태원" },
            { g: "성의회관", s: "C조", p: "조원", n: "이정석" }, { g: "옴니버스", s: "관리", p: "반장", n: "오재준" },
            { g: "옴니버스", s: "A조", p: "조장", n: "손병휘" }, { g: "옴니버스", s: "A조", p: "조원", n: "김전식" },
            { g: "옴니버스", s: "A조", p: "조원", n: "권순호" }, { g: "옴니버스", s: "B조", p: "조장", n: "황일범" },
            { g: "옴니버스", s: "B조", p: "조원", n: "이상길" }, { g: "옴니버스", s: "B조", p: "조원", n: "허용" },
            { g: "옴니버스", s: "C조", p: "조장", n: "피재영" }, { g: "옴니버스", s: "C조", p: "조원", n: "남형민" },
            { g: "옴니버스", s: "C조", p: "조원", n: "강경훈" }, { g: "기숙사", s: "관리", p: "반장", n: "이강택" },
            { g: "기숙사", s: "관리", p: "조원", n: "유시균" }, { g: "기숙사", s: "관리", p: "조원", n: "이상현" }
        ];
        db.ref('vocation_system').set({ staff: initialStaff, vocation: {} })
        .then(() => alert("서버 데이터 초기화 완료!"));
    }

    function initSync() {
        db.ref('vocation_system').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.staff) {
                staffData = data.staff;
                vData = data.vocation || {};
                document.getElementById('syncStatus').innerText = "● 실시간 연결됨";
                render();
            } else {
                document.getElementById('syncStatus').innerText = "● 서버 데이터 없음 (초기화 필요)";
            }
        });
    }

    function saveData() { db.ref('vocation_system').update({ staff: staffData, vocation: vData }); }

    function render() {
        const val = document.getElementById('targetMonth').value;
        if(!val) return;
        const [y, mSelected] = val.split('-').map(Number);
        if (currentTab === 'ledger') renderLedger(y);
        else renderSchedule(y, mSelected);
        setTimeout(() => updateHighlightBoxes(y, mSelected), 50);
    }

    function updateHighlightBoxes(y, m) {
        document.querySelectorAll('.col-highlight').forEach(el => el.remove());
        if (currentTab !== 'schedule') return;
        const table = document.getElementById('displayTable');
        const today = new Date();
        if (today.getFullYear() === y && today.getMonth() + 1 === m) createBox(today.getDate(), 'hl-today');
        if (selectedScheduleDay) createBox(selectedScheduleDay, 'hl-select');

        function createBox(day, className) {
            const cell = document.querySelector(`.day-cell-${day}`);
            if (!cell) return;
            const box = document.createElement('div');
            box.className = `col-highlight ${className}`;
            box.style.left = cell.offsetLeft + 'px';
            box.style.width = cell.offsetWidth + 'px';
            box.style.height = table.offsetHeight + 'px';
            document.getElementById('tableWrapper').appendChild(box);
        }
    }

    function renderSchedule(y, m) {
        const lastDay = new Date(y, m, 0).getDate();
        document.getElementById('viewTitle').innerText = `성의교정 연차 일정표(${y}년 ${m}월)`;
        let h = `<colgroup><col style="width:55px;"><col style="width:40px;"><col style="width:45px;"><col style="width:60px;"></colgroup><thead><tr class="hdr"><td>구분</td><td>조</td><td>직위</td><td style="border-right:1.5pt solid #000">성명</td>`;
        for(let i=1; i<=lastDay; i++) {
            const we = new Date(y, m-1, i).getDay();
            h += `<td class="${we===0?'sun':we===6?'sat':''} day-cell-${i}" style="width:23px;" onclick="selectDay(${i})">${i}</td>`;
        }
        h += `</tr></thead><tbody>${generateRows(y, m, 0)}</tbody>`;
        document.getElementById('displayTable').innerHTML = h;
    }

    function renderLedger(y) {
        document.getElementById('viewTitle').innerText = `성의교정 연차 관리대장(${y}년)`;
        let editMonthNum = activeEditColumn && activeEditColumn.includes('-') ? parseInt(activeEditColumn.split('-')[1]) : 0;
        let h = `<colgroup><col style="width:55px;"><col style="width:40px;"><col style="width:45px;"><col style="width:60px;"></colgroup><thead><tr class="hdr"><td>구분</td><td>조</td><td>직위</td><td style="border-right:1.5pt solid #000" onclick="toggleEditCol('name')">성명</td>`;
        for(let i=1; i<=12; i++) {
            const mk = `${y}-${String(i).padStart(2,'0')}`;
            if (editMonthNum > 0 && i < editMonthNum) continue;
            h += `<td onclick="toggleEditCol('${mk}')" style="width:45px;">${i}월</td>`;
        }
        if (!editMonthNum) h += `<td style="width:45px;">합계</td>`;
        h += `</tr></thead><tbody>${generateRows(y, null, editMonthNum)}</tbody>`;
        document.getElementById('displayTable').innerHTML = h;
    }

    function generateRows(y, m, editMonthNum) {
        let rows = "";
        staffData.forEach((staff, idx) => {
            const isLast = (idx === staffData.length - 1) || (staffData[idx+1].s !== staff.s);
            rows += `<tr style="${isLast ? 'border-bottom:1.8pt solid #000' : ''}">`;
            if(idx===0 || staffData[idx-1].g !== staff.g) rows += `<td rowspan="${staffData.filter(x=>x.g===staff.g).length}">${staff.g}</td>`;
            if(idx===0 || staffData[idx-1].s !== staff.s) rows += `<td rowspan="${staffData.filter(x=>x.g===staff.g && x.s===staff.s).length}">${staff.s}</td>`;
            rows += `<td>${staff.p}</td>`;
            rows += (activeEditColumn === 'name') ? `<td style="border-right:1.5pt solid #000"><input type="text" style="width:100%; border:none; text-align:center; background:#e3f2fd;" value="${staff.n}" onchange="updateName(${idx}, this.value)"></td>` : `<td style="border-right:1.5pt solid #000">${staff.n}</td>`;
            if (m === null) {
                let total = 0;
                for(let i=1; i<=12; i++) {
                    const mk = `${y}-${String(i).padStart(2,'0')}`;
                    const val = vData[mk]?.[staff.n] || "";
                    total += (val && val.trim() !== "") ? val.split(',').length : 0;
                    if (editMonthNum > 0 && i < editMonthNum) continue;
                    rows += (activeEditColumn === mk) ? `<td><input type="text" style="width:100%; border:none; text-align:center; background:#fffde7;" value="${val}" onchange="updateV('${mk}', '${staff.n}', this.value)"></td>` : `<td>${val}</td>`;
                }
                if (!editMonthNum) rows += `<td style="color:blue;">${total || ''}</td>`;
            } else {
                const mk = `${y}-${String(m).padStart(2,'0')}`;
                const vArr = (vData[mk]?.[staff.n] || "").split(',').map(s => s.trim());
                for(let i=1; i<=new Date(y, m, 0).getDate(); i++) {
                    const isV = vArr.includes(String(i));
                    const we = new Date(y, m-1, i).getDay();
                    rows += `<td class="${isV ? 'v-mark' : ''} ${we===0?'sun':we===6?'sat':''}" ${isV ? `onclick='showVDetail(${JSON.stringify(staff)}, "${mk}")'` : ''}>${isV?'V':''}</td>`;
                }
            }
            rows += `</tr>`;
        });
        return rows;
    }

    function selectDay(day) { selectedScheduleDay = (selectedScheduleDay === day) ? null : day; render(); }
    function toggleEditCol(colId) { activeEditColumn = (activeEditColumn === colId) ? null : colId; render(); }
    function updateName(idx, val) { staffData[idx].n = val; saveData(); }
    function updateV(mk, n, v) { if(!vData[mk]) vData[mk] = {}; vData[mk][n] = v; saveData(); }
    function changeTab(tab) { currentTab = tab; activeEditColumn = null; selectedScheduleDay = null; render(); }
    function showVDetail(staffObj, monthStr) {
        const raw = vData[monthStr]?.[staffObj.n] || "내역 없음";
        document.getElementById('modalTitle').innerText = `상세 내역`;
        document.getElementById('modalContent').innerHTML = `<strong>${staffObj.g} ${staffObj.s}</strong><br><span style="font-size:1.2em; color:#3498db;">${staffObj.p} ${staffObj.n}</span><br><br><strong>연차 날짜:</strong> ${raw}일`;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('modalOverlay').style.display = 'block';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; document.getElementById('modalOverlay').style.display = 'none'; }

    window.onload = function() {
        const today = new Date();
        document.getElementById('targetMonth').value = today.toISOString().substring(0, 7);
        initSync();
    };
</script>
</body>
</html>
