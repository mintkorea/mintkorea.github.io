<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FREE AI 블로그 자동 생성기</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; color: #333; line-height: 1.6; }
        input, textarea, button { width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-size: 16px; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #219150; }
        .result-box { background: #f9f9f9; padding: 20px; border: 1px solid #ddd; border-radius: 4px; margin-top: 20px; }
        img { max-width: 100%; height: auto; display: block; margin: 20px auto; border-radius: 8px; }
        #status { font-weight: bold; margin: 10px 0; color: #27ae60; }
    </style>
</head>
<body>

    <h2>🌿 100% 무료 AI 블로그 게시글 & 인포그래픽 생성기</h2>

    <label>키워드 및 주제</label>
    <input type="text" id="topic" placeholder="예: 2026 가성비 노트북 추천">

    <button onclick="generateBlog()">🚀 무료 글 및 인포그래픽 생성하기</button>

    <div id="status"></div>
    
    <h3>📋 최종 변환된 HTML 소스 코드</h3>
    <textarea id="htmlOutput" rows="10" placeholder="생성된 HTML 코드가 여기에 표시됩니다."></textarea>

    <h3>👁️ 블로그 미리보기</h3>
    <div id="preview" class="result-box">배포 전 미리보기 화면입니다.</div>

    <script>
        // 🚨 배포된 구글 앱스 스크립트(GAS) Web App URL을 입력하세요.
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxQcHeIHsZyZ8eT8Ng7YMFAwmdyHD7grLZ00xB4BtWMI4iMVsLP4jPn_yigS07wxHul/exec";

        async function generateBlog() {
            const topic = document.getElementById('topic').value.trim();
            const statusDiv = document.getElementById('status');
            
            if (!topic) {
                alert("주제를 입력해 주세요.");
                return;
            }

            statusDiv.innerText = "⏳ Gemini & Pollinations AI로 생성 중입니다... (약 5~10초 소요)";
            
            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify({ topic: topic })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                document.getElementById('htmlOutput').value = data.result;
                document.getElementById('preview').innerHTML = data.result;
                statusDiv.innerText = "✨ 생성 완료! (비용 0원)";

            } catch (error) {
                console.error(error);
                statusDiv.innerText = `❌ 오류 발생: ${error.message}`;
            }
        }
    </script>
</body>
</html>
