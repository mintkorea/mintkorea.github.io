<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합근무 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --brand-navy: #2d3e75;
            --brand-yellow: #facc15;
            --bg-light: #f1f5f9;
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg-light); 
            color: #1e293b;
            letter-spacing: -0.04em;
            word-break: keep-all;
            margin: 0;
            padding: 0;
            line-height: 1.1; /* 전반적인 줄간 최소화 */
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: var(--bg-light);
        }

        .brand-header {
            background-color: var(--brand-navy);
            padding: 20px 18px 24px 18px;
            color: white;
            border-bottom-left-radius: 16px;
            border-bottom-right-radius: 16px;
        }

        .table-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            margin: 0 10px 6px 10px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .table-header {
            width: 60px;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.85rem; /* 폰트 키움 */
            color: #6366f1;
            border-right: 1px solid #f1f5f9;
            flex-shrink: 0;
            text-align: center;
            line-height: 1.1;
        }

        .table-body {
            flex-grow: 1;
            min-width: 0;
        }

        .inner-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .inner-table th, .inner-table td {
            padding: 6px 4px; /* 줄간 확실히 줄임 */
            text-align: center;
            font-size: 0.95rem; /* 폰트 키움 */
        }

        .inner-table th {
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.8rem;
            border-bottom: 1px solid #f8fafc;
        }

        .inner-table td {
            color: #334155;
            font-weight: 700;
        }

        .badge-yellow {
            background-color: var(--brand-yellow);
            color: #1e293b;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 0.9rem;
        }

        /* 상단 퀵버튼 높이 최소화 및 아이콘 좌측 배치 */
        .quick-btn {
            background: white;
            padding: 6px 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        #event-list {
            max-height: 250px; 
            overflow-y: auto;
            scrollbar-width: none;
        }
        #event-list::-webkit-scrollbar { display: none; }

        .building-group { margin-bottom: 4px; }
        .building-group:last-child { margin-bottom: 0; }

        .building-title {
            font-size: 11px;
            font-weight: 900;
            color: #475569;
            background: #f1f5f9;
            padding: 1px 6px;
            border-radius: 3px;
            display: inline-block;
            margin-bottom: 2px;
        }

        .event-item {
            display: flex;
            align-items: flex-start;
            gap: 4px;
            padding: 2px 0; /* 줄간 최소화 */
        }

        .place-tag {
            color: #2d3e75;
            font-weight: 900;
            font-size: 12px;
            white-space: nowrap;
            flex-shrink: 0;
            padding: 0 2px;
        }

        .event-name {
            font-size: 14px; /* 폰트 키움 */
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="brand-header">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-2xl font-black mb-0.5">성의교정 통합근무</h1>
                    <p id="today-display" class="text-base opacity-90 font-bold">--</p>
                </div>
                <div id="shift-badge" class="badge-yellow">--조</div>
            </div>
        </div>

        <!-- 상단 버튼 높이 및 레이아웃 수정 -->
        <div class="grid grid-cols-3 gap-2 px-2.5 -mt-3 mb-3">
            <div class="quick-btn">
                <span class="text-base">📅</span>
                <span class="text-[12px] font-black text-slate-700">근무달력</span>
            </div>
            <div class="quick-btn">
                <span class="text-base">📞</span>
                <span class="text-[12px] font-black text-slate-700">연락처</span>
            </div>
            <div class="quick-btn">
                <span class="text-base">🏥</span>
                <span class="text-[12px] font-black text-slate-700">시설안내</span>
            </div>
        </div>

        <!-- 근무예정 (간격 확실히 축소) -->
        <div class="table-card">
            <div class="table-header text-xs">근무<br>예정</div>
            <div class="table-body">
                <table class="inner-table">
                    <thead>
                        <tr>
                            <th style="width: 22%;">월/일</th>
                            <th style="width: 39%;">성의회관</th>
                            <th style="width: 39%;">의산연</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="py-1">4/14</td>
                            <td class="py-1 text-slate-400">황재업 김태언</td>
                            <td class="py-1 text-slate-400">이태원 이정석</td>
                        </tr>
                        <tr>
                            <td class="py-1">4/17</td>
                            <td class="py-1 text-slate-400">황재업 김태언</td>
                            <td class="py-1 text-slate-400">이정석 이태원</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 오늘행사 (중간 라인 제거 및 줄간 최소화) -->
        <div class="table-card">
            <div class="table-header">오늘<br>행사</div>
            <div id="event-list" class="table-body p-2">
                <div class="text-[12px] text-slate-400 text-center py-2 font-bold">데이터 로드 중...</div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-header">최신<br>공지</div>
            <div class="table-body p-2.5">
                <div class="text-[14px] font-black text-red-600 mb-0">시신기증 접수증 전송후 반드시 통화</div>
                <div class="text-[12px] font-bold text-red-400 opacity-80">(즉시모심, 삼일장 모두 해당)</div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-header">오늘<br>식단</div>
            <div class="table-body flex divide-x divide-slate-50">
                <div class="flex-1 p-2 text-center">
                    <span class="block text-[11px] font-bold text-slate-400">중식</span>
                    <span id="lunch-menu" class="text-[15px] font-black text-slate-800">--</span>
                </div>
                <div class="flex-1 p-2 text-center">
                    <span class="block text-[11px] font-bold text-slate-400">야식</span>
                    <span id="night-menu" class="text-[15px] font-black text-indigo-600">--</span>
                </div>
            </div>
        </div>

        <footer class="mt-4 text-center pb-8">
            <p class="text-[10px] text-slate-300 font-bold tracking-widest opacity-60">CATHOLIC MEDICAL CAMPUS</p>
        </footer>
    </div>

    <script>
        const CONFIG = {
            baseDate: '2026-03-09',
            patterns: ['C', 'A', 'B'],
            eventUrl: "https://script.google.com/macros/s/AKfycbzKtqrzNK11rX4sCdDFv0lcgUcdVwsNiUnlXYc8Zjm0dJNlNV8ThwKrtqOgKBeVrP3g/exec",
            mealUrl: "https://script.google.com/macros/s/AKfycbxZkcn8EEcGcxMaT98l_CKJTCM_0Ual_S2JefpHptm_dbEtQ5tjM00TEhU2XdqTObLh/exec"
        };

        function getShift(d) {
            const base = new Date(CONFIG.baseDate); base.setHours(0,0,0,0);
            const target = new Date(d); target.setHours(0,0,0,0);
            const diff = Math.round((target - base) / 86400000);
            return CONFIG.patterns[((diff % 3) + 3) % 3];
        }

        function updateUI() {
            const now = new Date();
            document.getElementById('today-display').innerText = now.toLocaleDateString('ko-KR', { year:'numeric', month:'numeric', day:'numeric', weekday:'short' });
            const shift = getShift(now);
            document.getElementById('shift-badge').innerText = `${shift}조`;
        }

        async function updateEvents() {
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            const eventContainer = document.getElementById('event-list');

            try {
                const res = await fetch(`${CONFIG.eventUrl}?t=${new Date().getTime()}`);
                const data = await res.json();
                
                const sunguiEvents = data.filter(r => r.rawDate === todayStr && r.bu.includes("성의회관"));
                const uisanEvents = data.filter(r => r.rawDate === todayStr && r.bu.includes("의생명산업연구원"));

                if (sunguiEvents.length === 0 && uisanEvents.length === 0) {
                    eventContainer.innerHTML = `<div class="text-[12px] text-slate-400 text-center py-2 font-bold">대관 내역 없음</div>`;
                    return;
                }

                let htmlContent = "";

                // 성의회관 그룹 (중간 선 없이 처리)
                if (sunguiEvents.length > 0) {
                    htmlContent += `<div class="building-group">
                        <div class="building-title">성의회관</div>
                        ${sunguiEvents.map(item => `
                            <div class="event-item">
                                <span class="place-tag">[${item.place}]</span>
                                <span class="event-name">${item.event}</span>
                            </div>
                        `).join('')}
                    </div>`;
                }

                // 의산연 그룹
                if (uisanEvents.length > 0) {
                    htmlContent += `<div class="building-group ${sunguiEvents.length > 0 ? 'mt-3' : ''}">
                        <div class="building-title">의산연</div>
                        ${uisanEvents.map(item => `
                            <div class="event-item">
                                <span class="place-tag">[${item.place}]</span>
                                <span class="event-name">${item.event}</span>
                            </div>
                        `).join('')}
                    </div>`;
                }

                eventContainer.innerHTML = htmlContent;

            } catch (e) {
                eventContainer.innerHTML = `<div class="text-[12px] text-red-400 text-center py-2 font-bold">로드 실패</div>`;
            }
        }

        async function updateMeal() {
            const now = new Date();
            const key = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            try {
                const res = await fetch(CONFIG.mealUrl);
                const data = await res.json();
                const day = data[key];
                if(day) {
                    document.getElementById('lunch-menu').innerText = (day["중식"] || day["중 식"])?.menu.split('(')[0] || "미등록";
                    document.getElementById('night-menu').innerText = (day["야식"] || day["야 식"])?.menu.split('(')[0] || "미등록";
                }
            } catch(e) {}
        }

        window.onload = () => {
            updateUI();
            updateEvents();
            updateMeal();
        };
    </script>
</body>
</html>
