<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합근무 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sungui-duty-app';

        // 실시간 공지사항 연동 (권한 오류 해결 버전)
        async function initNoticeSync() {
            try {
                // RULE 3: 인증을 먼저 수행하고 완료될 때까지 기다림
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // 인증 상태 변경 감지 후 데이터 로드 시작
                onAuthStateChanged(auth, (user) => {
                    if (!user) return;

                    const noticesCol = collection(db, 'artifacts', appId, 'public', 'data', 'notices');
                    
                    // 실시간 리스너 설정 (에러 콜백 포함 필수)
                    onSnapshot(noticesCol, (snapshot) => {
                        const posts = snapshot.docs.map(doc => doc.data());
                        // RULE 2: 자바스크립트 메모리에서 정렬
                        posts.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                        
                        const latestNotice = posts[0];
                        const noticeContainer = document.getElementById('latest-notice-container');
                        
                        if (latestNotice) {
                            noticeContainer.innerHTML = `
                                <div class="text-[14px] font-black text-red-600 mb-1 line-clamp-1">${latestNotice.content}</div>
                                <div class="text-[12px] font-bold text-slate-400">
                                    [${latestNotice.category}] ${latestNotice.author} · ${latestNotice.createdAt ? new Date(latestNotice.createdAt.seconds * 1000).toLocaleDateString() : '방금 전'}
                                </div>
                            `;
                        } else {
                            noticeContainer.innerHTML = `<div class="text-[12px] font-bold text-slate-300">등록된 공지사항이 없습니다.</div>`;
                        }
                    }, (error) => {
                        console.error("Firestore Permission/Sync Error:", error);
                        document.getElementById('latest-notice-container').innerHTML = 
                            `<div class="text-[10px] text-red-400 font-bold">공지 로드 권한 오류</div>`;
                    });
                });
            } catch (e) {
                console.error("Authentication failed:", e);
                document.getElementById('latest-notice-container').innerHTML = 
                    `<div class="text-[10px] text-red-400 font-bold">인증 실패</div>`;
            }
        }

        window.addEventListener('load', initNoticeSync);
    </script>
    <style>

        .quick-btn {

            border-radius: 8px; 
            display: flex; 
            align-items: center;

            overflow: hidden;
            display: flex; 
            margin: 0 16px;

        }

        .table-header {
            width: 60px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.85rem; flex-shrink: 0; text-align: center;
        }

        .label-duty { color: #3b82f6; border-right: 2px solid #3b82f6; background-color: #f8faff; }
        .label-event { color: #22c55e; border-right: 2px solid #22c55e; background-color: #f0fdf4; }
        .label-notice { color: #ef4444; border-right: 2px solid #ef4444; background-color: #fef2f2; }
        .label-meal { color: #f59e0b; border-right: 2px solid #f59e0b; background-color: #fffbeb; }

        .table-body { flex-grow: 1; padding: 12px; min-width: 0; }

        .duty-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: center; }
        .duty-table th { color: #94a3b8; font-weight: 700; padding-bottom: 8px; font-size: 0.75rem; }
        .duty-table td { padding: 10px 4px; font-weight: 800; border-top: 1px solid #f1f5f9; }

        .col-name-1 { background-color: #eff6ff; color: #1e40af; }
        .col-name-2 { background-color: #f0fdf4; color: #166534; }
        .col-name-3 { background-color: #fffbeb; color: #92400e; }
        .col-name-4 { background-color: #f5f3ff; color: #5b21b6; }

        .badge-yellow { 
            background-color: var(--brand-yellow); 
            color: #422006; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-weight: 900; 
            font-size: 0.75rem; 
        }

        .building-group { margin-bottom: 12px; }
        .building-group:last-child { margin-bottom: 0; }
        
        .building-badge { 
            font-size: 10px; 
            font-weight: 900; 
            padding: 2px 8px; 
            border-radius: 99px; 
            display: inline-block; 
            margin-bottom: 6px;
        }
        .badge-hall { background-color: #e0e7ff; color: #4338ca; }
        .badge-research { background-color: #f3e8ff; color: #7e22ce; }

        .event-item { margin-bottom: 4px; line-height: 1.4; }
        .event-text { font-size: 13px; font-weight: 700; color: #334155; }
        .event-place { color: #3b82f6; font-weight: 900; margin-right: 4px; }
        .no-data { font-size: 12px; color: #cbd5e1; font-weight: 700; text-align: left; padding: 2px 0; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->

            <div class="header-top">
                <span class="brand-title">성의교정 통합근무</span>

            </div>
            
            <div class="date-picker-container">
                <input type="text" id="datePicker" class="flatpickr-input-custom" readonly>

        </div>

        <!-- Quick Buttons -->
        <div class="px-4 -mt-8 relative z-10">

        <!-- Today Events Card -->
        <a href="rentalm.html" class="table-card">
            <div class="table-header label-event">오늘<br>행사</div>
            <div id="event-list" class="table-body">
                <div class="text-[12px] text-slate-400 font-bold text-center py-2">행사를 불러오는 중...</div>
            </div>

        <!-- Notice Card (Firebase 연동) -->
        <a href="./notice.jsx" class="table-card">
            <div class="table-header label-notice">최신<br>공지</div>
            <div class="table-body" id="latest-notice-container">
                <div class="text-[12px] text-slate-400 font-bold py-2">최신 공지를 확인 중...</div>

        <!-- Meal Card -->
        <a href="meal.html" class="table-card">

    <script>
        const HOLIDAYS = ["2026-01-01", "2026-02-16", "2026-02-17", "2026-02-18", "2026-03-01", "2026-05-05", "2026-05-24", "2026-06-06", "2026-08-15", "2026-09-24", "2026-09-25", "2026-09-26", "2026-10-03", "2026-10-09", "2026-12-25"];
        let currentDate = getKSTNow();
        let fp;

        function getKSTNow() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (9 * 60 * 60000));
        }

        const config = { baseDate: '2026-03-09', patterns: ['C', 'A', 'B'] };
        const workersPattern = [
            ["황재업", "김태언", "이태원", "이정석"], ["황재업", "김태언", "이정석", "이태원"], 
            ["황재업", "이정석", "김태언", "이태원"], ["황재업", "이정석", "이태원", "김태언"], 
            ["황재업", "이태원", "김태언", "이정석"], ["황재업", "이태원", "이정석", "김태언"]
        ];

        function getShiftName(d) {
            let base = new Date(config.baseDate); base.setHours(0,0,0,0);
            let target = new Date(d); target.setHours(0,0,0,0);
            let diff = Math.round((target - base) / 86400000);
            return config.patterns[((diff % 3) + 3) % 3];
        }

        function getWorkers(d) {
            let base = new Date(config.baseDate); base.setHours(0,0,0,0);
            let target = new Date(d); target.setHours(0,0,0,0);
            let diff = Math.round((target - base) / 86400000);
            let idx = Math.floor(((diff % 18) + 18) % 18 / 3);
            return workersPattern[idx];
        }

        function updateDisplay() {
            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            const dateStr = `${yyyy}-${mm}-${dd}`;
            
            if(fp) fp.setDate(currentDate, false);
            
            const pickerInput = document.getElementById('datePicker');
            pickerInput.classList.remove('day-sun', 'day-sat');
            const day = currentDate.getDay();
            if(day === 0 || HOLIDAYS.includes(dateStr)) pickerInput.classList.add('day-sun');
            else if(day === 6) pickerInput.classList.add('day-sat');
            
            document.getElementById('shift-badge').innerText = `${getShiftName(currentDate)}조 근무`;
            
            renderDutyPreview(currentDate);
            updateEvents(currentDate);
            updateMeal(currentDate);
        }

        function renderDutyPreview(startDate) {
            const tbody = document.getElementById('duty-preview-body');
            let results = [];
            let d = new Date(startDate); d.setHours(12,0,0,0);
            const days = ['일','월','화','수','목','금','토'];

            for(let i=0; results.length < 2 && i < 30; i++) {
                let temp = new Date(d);
                temp.setDate(d.getDate() + i);
                if(getShiftName(temp) === 'C') {
                    results.push({
                        dateStr: `${temp.getMonth()+1}/${temp.getDate()}(${days[temp.getDay()]})`,
                        dayClass: (temp.getDay()===0 || HOLIDAYS.includes(`${temp.getFullYear()}-${String(temp.getMonth()+1).padStart(2,'0')}-${String(temp.getDate()).padStart(2,'0')}`) ? 'day-sun' : temp.getDay()===6 ? 'day-sat' : ''),
                        workers: getWorkers(temp)
                    });
                }
            }

            tbody.innerHTML = results.map(item => `
                <tr>
                    <td class="${item.dayClass}">${item.dateStr}</td>
                    <td class="col-name-1">${item.workers[0]}</td>
                    <td class="col-name-2">${item.workers[1]}</td>
                    <td class="col-name-3">${item.workers[2]}</td>
                    <td class="col-name-4">${item.workers[3]}</td>
                </tr>
            `).join('');
        }

        async function updateEvents(date) {
            const container = document.getElementById('event-list');
            const url = "https://script.google.com/macros/s/AKfycbzKtqrzNK11rX4sCdDFv0lcgUcdVwsNiUnlXYc8Zjm0dJNlNV8ThwKrtqOgKBeVrP3g/exec";
            try {
                const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                const res = await fetch(`${url}?t=${Date.now()}`);
                const data = await res.json();
                const hallEvents = data.filter(r => r.rawDate === dateStr && r.bu.includes("성의회관"));
                const researchEvents = data.filter(r => r.rawDate === dateStr && r.bu.includes("의산연"));
                let html = `<div class="building-group"><span class="building-badge badge-hall">성의회관</span>`;
                html += hallEvents.length === 0 ? `<div class="no-data">대관 내역이 없습니다.</div>` : hallEvents.map(i => `<div class="event-item"><span class="event-text"><span class="event-place">[${i.place}]</span>${i.event}</span></div>`).join('');
                html += `</div><div class="building-group"><span class="building-badge badge-research">의산연</span>`;
                html += researchEvents.length === 0 ? `<div class="no-data">대관 내역이 없습니다.</div>` : researchEvents.map(i => `<div class="event-item"><span class="event-text"><span class="event-place">[${i.place}]</span>${i.event}</span></div>`).join('');
                html += `</div>`;
                container.innerHTML = html;
            } catch(e) { container.innerHTML = `<div class="text-[10px] text-red-400 text-center">정보 수신 실패</div>`; }
        }

        async function updateMeal(date) {
            const url = "https://script.google.com/macros/s/AKfycbxZkcn8EEcGcxMaT98l_CKJTCM_0Ual_S2JefpHptm_dbEtQ5tjM00TEhU2XdqTObLh/exec";
            try {
                const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
                const res = await fetch(url);
                const data = await res.json();
                const day = data[key];
                document.getElementById('lunch-menu').innerText = day ? (day["중식"] || day["중 식"])?.menu.split('(')[0] : "없음";
                document.getElementById('night-menu').innerText = day ? (day["야식"] || day["야 식"])?.menu.split('(')[0] : "없음";
            } catch(e) { }
        }

        window.addEventListener('DOMContentLoaded', () => {
            fp = flatpickr("#datePicker", {
                locale: "ko", 
                dateFormat: "Y.m.d (D)", 
                defaultDate: currentDate, 
                disableMobile: "true",
                onChange: (selectedDates) => { if(selectedDates.length > 0) { currentDate = selectedDates[0]; updateDisplay(); } }
            });
            updateDisplay();
        });
    </script>
</body>
