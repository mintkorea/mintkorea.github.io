<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성의교정 통합근무 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f1f5f9; 
            color: #1e293b;
            letter-spacing: -0.03em;
            -webkit-tap-highlight-color: transparent;
        }
        /* 카드 사이 간격 최소화 */
        .info-card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            display: grid;
            grid-template-columns: 50px 1fr;
            overflow: hidden;
            margin-bottom: 2px; /* 카드 사이 간격 거의 밀착 */
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .info-card:active {
            background-color: #f8fafc;
        }
        .label-side {
            background-color: #f8fafc;
            color: #64748b;
            font-size: 0.65rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1.2;
            border-right: 1px solid #f1f5f9;
        }
        .content-side {
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body class="p-2">

    <div class="max-w-md mx-auto">
        
        <!-- 상단 헤더 -->
        <header class="bg-[#003d7a] p-3 text-white rounded-t-xl flex justify-between items-center shadow-sm">
            <div>
                <h1 class="text-sm font-bold tracking-tight">성의교정 통합근무</h1>
                <p class="text-[9px] opacity-70 font-medium">2026. 4. 12 (일)</p>
            </div>
            <div class="text-right">
                <span class="bg-yellow-400 text-blue-900 text-[10px] font-black px-2 py-0.5 rounded shadow-sm">A조 근무중</span>
            </div>
        </header>

        <!-- 퀵 메뉴 -->
        <div class="grid grid-cols-3 bg-white border-x border-b border-gray-100 rounded-b-xl shadow-sm mb-2 font-bold text-gray-500 overflow-hidden">
            <a href="calendar.html" class="py-2.5 text-[11px] border-r border-gray-50 flex items-center justify-center gap-1 active:bg-gray-50">
                🗓️ 근무달력
            </a>
            <a href="yellowpage.html" class="py-2.5 text-[11px] border-r border-gray-50 flex items-center justify-center gap-1 active:bg-gray-50">
                📞 연락처
            </a>
            <a href="rentalm.html" class="py-2.5 text-[11px] flex items-center justify-center gap-1 active:bg-gray-50">
                🏥 시설안내
            </a>
        </div>

        <!-- 메인 정보 영역: 카드형 배치 (간격 2px) -->
        
        <!-- 근무현황 카드 -->
        <div class="info-card" onclick="location.href='team.html'">
            <div class="label-side text-blue-600">근무<br>현황</div>
            <div class="content-side">
                <div class="grid grid-cols-5 text-[8.5px] bg-blue-50/20 font-bold text-gray-400 text-center border-b border-gray-50">
                    <div class="py-0.5 border-r border-gray-50">월/일</div>
                    <div class="col-span-2 py-0.5 border-r border-gray-50">성의회관</div>
                    <div class="col-span-2 py-0.5">의산연</div>
                </div>
                <div class="grid grid-cols-5 text-[10.5px] text-center border-b border-gray-50">
                    <div class="py-1.5 border-r border-gray-50 font-bold text-gray-400 bg-gray-50/20">4/14</div>
                    <div class="py-1.5 border-r border-gray-50 font-semibold text-blue-700">황재업</div>
                    <div class="py-1.5 border-r border-gray-50 text-gray-400">김태언</div>
                    <div class="py-1.5 border-r border-gray-50 font-semibold text-green-700">이태원</div>
                    <div class="py-1.5 text-gray-400">이정석</div>
                </div>
                <div class="grid grid-cols-5 text-[10.5px] text-center">
                    <div class="py-1.5 border-r border-gray-50 font-bold text-gray-400 bg-gray-50/20">4/17</div>
                    <div class="py-1.5 border-r border-gray-50 font-semibold text-blue-700">황재업</div>
                    <div class="py-1.5 border-r border-gray-50 text-gray-400">김태언</div>
                    <div class="py-1.5 border-r border-gray-50 font-semibold text-green-700">이정석</div>
                    <div class="py-1.5 text-gray-400">이태원</div>
                </div>
            </div>
        </div>

        <!-- 오늘행사 카드 -->
        <div class="info-card" onclick="location.href='rentalm.html'">
            <div class="label-side text-indigo-600">오늘<br>행사</div>
            <div class="content-side">
                <div class="p-1.5 border-b border-gray-50 flex items-center gap-2">
                    <span class="text-[8px] bg-blue-100 text-blue-700 px-1 rounded font-bold shrink-0">성의</span>
                    <p class="text-[10.5px] font-medium text-gray-700 truncate">신장내과 연수교육 <span class="text-gray-400 font-normal">(마리아홀)</span></p>
                </div>
                <div class="p-1.5 flex items-center gap-2">
                    <span class="text-[8px] bg-green-100 text-green-700 px-1 rounded font-bold shrink-0">의산</span>
                    <p class="text-[10.5px] font-medium text-gray-700 truncate">SNUC보철 세미나 강연 <span class="text-gray-400 font-normal">(1002호)</span></p>
                </div>
            </div>
        </div>

        <!-- 최신공지 카드 (두 줄 높이로 압축) -->
        <div class="info-card border-red-100" onclick="location.href='notice.html'">
            <div class="label-side text-red-500 font-black">최신<br>공지</div>
            <div class="content-side bg-red-50/30 px-3 py-1.5">
                <p class="text-[10.5px] font-bold text-red-600 leading-[1.3]">
                    시신기증 접수증 전송후 <span class="text-red-800 underline decoration-red-200">반드시 통화할 것</span><br>
                    <span class="text-[9px] font-normal text-red-400">(즉시모심, 삼일장 모두 해당)</span>
                </p>
            </div>
        </div>

        <!-- 오늘식단 카드 -->
        <div class="info-card" onclick="location.href='meal.html'">
            <div class="label-side text-orange-600">오늘<br>식단</div>
            <div class="content-side flex-row divide-x divide-gray-50">
                <div class="flex-1 p-1.5 flex items-center gap-2">
                    <span class="text-[8px] font-bold text-gray-400">중식</span>
                    <span class="text-[10.5px] font-bold text-gray-700">제육볶음</span>
                </div>
                <div class="flex-1 p-1.5 flex items-center gap-2">
                    <span class="text-[8px] font-bold text-gray-400">야식</span>
                    <span class="text-[10.5px] font-bold text-gray-700 text-purple-700">바베큐치밥</span>
                </div>
            </div>
        </div>

    </div>

    <footer class="mt-4 text-center pb-4">
        <p class="text-[8px] text-gray-300 tracking-tight font-medium uppercase">Catholic Medical Campus - Duty System</p>
    </footer>

</body>
</html>
