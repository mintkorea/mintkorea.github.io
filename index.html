<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합근무 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    
    <!-- Firebase SDK (최적화된 연동 로직) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let config = null;
        try { if (typeof __firebase_config !== 'undefined' && __firebase_config) config = JSON.parse(__firebase_config); } catch (e) {}

        if (config && config.apiKey) {
            const app = initializeApp(config);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'sungui-duty-app';

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) { console.error("Auth Error", e); }
            };

            onAuthStateChanged(auth, (user) => {
                if (!user) return;
                const noticeCol = collection(db, 'artifacts', appId, 'public', 'data', 'notices');
                onSnapshot(noticeCol, (snap) => {
                    const noticeEl = document.getElementById('latest-notice-container');
                    if (snap.empty) {
                        noticeEl.innerHTML = `<div class="text-[12px] font-bold text-slate-300">등록된 공지사항이 없습니다.</div>`;
                        return;
                    }
                    const posts = snap.docs.map(doc => doc.data());
                    posts.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    const latest = posts[0];
                    noticeEl.innerHTML = `
                        <div class="text-[14px] font-black text-red-600 mb-0.5 line-clamp-1">${latest.content || ''}</div>
                        <div class="text-[11px] font-bold text-slate-400">
                            [${latest.category || '알림'}] ${latest.author || '관리자'} · ${latest.createdAt ? new Date(latest.createdAt.seconds * 1000).toLocaleDateString() : ''}
                        </div>
                    `;
                }, (err) => {
                    document.getElementById('latest-notice-container').innerHTML = `<div class="text-[10px] text-red-400">연결 권한 오류</div>`;
                });
            });
            initAuth();
        }
    </script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --brand-navy: #2d3e75; --brand-yellow: #facc15; }
        body { 
            font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b;
            letter-spacing: -0.05em; margin: 0; padding: 0; line-height: 1.2; -webkit-tap-highlight-color: transparent;
        }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px; }
        .brand-header { background-color: var(--brand-navy); padding: 25px 20px 45px 20px; color: white; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .table-card { background: white; border-radius: 8px; overflow: hidden; display: flex; margin: 0 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #eef2f6; text-decoration: none; color: inherit; }
        .table-header { width: 60px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; flex-shrink: 0; text-align: center; }
        .label-duty { color: #3b82f6; border-right: 2px solid #3b82f6; background-color: #f8faff; }
        .label-event { color: #22c55e; border-right: 2px solid #22c55e; background-color: #f0fdf4; }
        .label-notice { color: #ef4444; border-right: 2px solid #ef4444; background-color: #fef2f2; }
        .label-meal { color: #f59e0b; border-right: 2px solid #f59e0b; background-color: #fffbeb; }
        .table-body { flex-grow: 1; padding: 12px; min-width: 0; }
        .duty-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: center; }
        .duty-table th { color: #94a3b8; font-weight: 700; padding-bottom: 8px; font-size: 0.75rem; }
        .duty-table td { padding: 10px 4px; font-weight: 800; border-top: 1px solid #f1f5f9; }
        .col-name-1 { background-color: #eff6ff; color: #1e40af; }
        .col-name-2 { background-color: #f0fdf4; color: #166534; }
        .col-name-3 { background-color: #fffbeb; color: #92400e; }
        .col-name-4 { background-color: #f5f3ff; color: #5b21b6; }
        .building-badge { font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-bottom: 6px; }
        .badge-hall { background-color: #e0e7ff; color: #4338ca; }
        .badge-research { background-color: #f3e8ff; color: #7e22ce; }
        .event-place { color: #3b82f6; font-weight: 900; margin-right: 4px; }
        .day-sun { color: #EF4444 !important; } 
        .day-sat { color: #3B82F6 !important; }
        .quick-btn { background: white; padding: 12px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; cursor: pointer; text-decoration: none; transition: transform 0.1s; }
        .quick-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="brand-header">
            <div class="flex justify-between items-center w-full mb-2">
                <span class="text-xl font-black">성의교정 통합근무</span>
                <div id="shift-badge" class="bg-[#facc15] text-[#422006] px-3 py-1 rounded font-black text-xs">--조 근무</div>
            </div>
            <input type="text" id="datePicker" class="w-32 bg-white border-none rounded px-2 py-1 text-navy-900 font-black text-center outline-none cursor-pointer text-sm" readonly>
        </div>

        <div class="px-4 -mt-8 relative z-10">
            <div class="grid grid-cols-3 gap-2">
                <a href="calendar.html" class="quick-btn">
                    <img src="https://img.icons8.com/fluency/48/calendar.png" width="20">
                    <span class="text-xs font-black">근무달력</span>
                </a>
                <a href="yellowpage.html" class="quick-btn">
                    <img src="https://img.icons8.com/fluency/48/phone.png" width="20">
                    <span class="text-xs font-black">주요연락처</span>
                </a>
                <a href="https://m.catholic.ac.kr/html/intro/map_01.jsp" target="_blank" class="quick-btn">
                    <img src="https://img.icons8.com/fluency/48/hospital.png" width="20">
                    <span class="text-xs font-black">시설안내</span>
                </a>
            </div>
        </div>

        <!-- 근무 현황 -->
        <a href="team.html" class="table-card mt-2">
            <div class="table-header label-duty">근무<br>현황</div>
            <div class="table-body">
                <table class="duty-table">
                    <thead>
                        <tr><th style="width: 25%;">날짜</th><th>조장</th><th>회관</th><th>의산A</th><th>의산B</th></tr>
                    </thead>
                    <tbody id="duty-preview-body"></tbody>
                </table>
            </div>
        </a>

        <!-- 오늘 행사 -->
        <a href="rentalm.html" class="table-card">
            <div class="table-header label-event">오늘<br>행사</div>
            <div id="event-list" class="table-body">
                <div class="text-[12px] text-slate-400 font-bold text-center py-2">행사를 불러오는 중...</div>
            </div>
        </a>

        <!-- 공지사항 -->
        <a href="notice.html" class="table-card">
            <div class="table-header label-notice">최신<br>공지</div>
            <div id="latest-notice-container" class="table-body">
                <div class="text-[12px] text-slate-400 font-bold py-2">최신 공지를 확인 중...</div>
            </div>
        </a>

        <!-- 식단 -->
        <a href="meal.html" class="table-card">
            <div class="table-header label-meal">오늘<br>식단</div>
            <div class="table-body flex p-0 min-h-[60px]">
                <div class="flex-1 flex flex-col justify-center items-center border-r border-slate-100">
                    <span class="text-[10px] font-bold text-slate-400">중식</span>
                    <span id="lunch-menu" class="text-[14px] font-black text-slate-800">--</span>
                </div>
                <div class="flex-1 flex flex-col justify-center items-center">
                    <span class="text-[10px] font-bold text-slate-400">야식</span>
                    <span id="night-menu" class="text-[14px] font-black text-blue-700">--</span>
                </div>
            </div>
        </a>

        <footer class="mt-4 pb-8 text-center">
            <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">CATHOLIC MEDICAL CAMPUS</p>
        </footer>
    </div>

    <script>
        const HOLIDAYS = ["2026-01-01", "2026-03-01", "2026-05-05", "2026-06-06", "2026-08-15", "2026-10-03", "2026-10-09", "2026-12-25"];
        const baseDate = '2026-03-09';
        const patterns = ['C', 'A', 'B'];
        const workersPattern = [
            ["황재업", "김태언", "이태원", "이정석"], ["황재업", "김태언", "이정석", "이태원"], 
            ["황재업", "이정석", "김태언", "이태원"], ["황재업", "이정석", "이태원", "김태언"], 
            ["황재업", "이태원", "김태언", "이정석"], ["황재업", "이태원", "이정석", "김태언"]
        ];

        let currentDate = getKSTNow();
        function getKSTNow() { const now = new Date(); return new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (9 * 60 * 60000)); }

        function getShiftName(d) {
            let base = new Date(baseDate); base.setHours(0,0,0,0);
            let target = new Date(d); target.setHours(0,0,0,0);
            let diff = Math.round((target - base) / 86400000);
            return patterns[((diff % 3) + 3) % 3];
        }

        function getWorkers(d) {
            let base = new Date(baseDate); base.setHours(0,0,0,0);
            let target = new Date(d); target.setHours(0,0,0,0);
            let diff = Math.round((target - base) / 86400000);
            let idx = Math.floor(((diff % 18) + 18) % 18 / 3);
            return workersPattern[idx];
        }

        async function updateDisplay() {
            const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(currentDate.getDate()).padStart(2,'0')}`;
            const picker = document.getElementById('datePicker');
            picker.classList.toggle('day-sun', currentDate.getDay() === 0 || HOLIDAYS.includes(dateStr));
            picker.classList.toggle('day-sat', currentDate.getDay() === 6);
            
            document.getElementById('shift-badge').innerText = `${getShiftName(currentDate)}조 근무`;
            
            // 근무 현황 프리뷰
            const tbody = document.getElementById('duty-preview-body');
            let results = [];
            const days = ['일','월','화','수','목','금','토'];
            for(let i=0; results.length < 2 && i < 30; i++) {
                let temp = new Date(currentDate); temp.setDate(currentDate.getDate() + i);
                if(getShiftName(temp) === 'C') {
                    const ymd = `${temp.getFullYear()}-${String(temp.getMonth()+1).padStart(2,'0')}-${String(temp.getDate()).padStart(2,'0')}`;
                    results.push({
                        dateStr: `${temp.getMonth()+1}/${temp.getDate()}(${days[temp.getDay()]})`,
                        dayClass: (temp.getDay()===0 || HOLIDAYS.includes(ymd) ? 'day-sun' : temp.getDay()===6 ? 'day-sat' : ''),
                        workers: getWorkers(temp)
                    });
                }
            }
            tbody.innerHTML = results.map(item => `
                <tr><td class="${item.dayClass}">${item.dateStr}</td><td class="col-name-1">${item.workers[0]}</td><td class="col-name-2">${item.workers[1]}</td><td class="col-name-3">${item.workers[2]}</td><td class="col-name-4">${item.workers[3]}</td></tr>
            `).join('');

            updateEvents(currentDate);
            updateMeal(currentDate);
        }

        async function updateEvents(date) {
            const container = document.getElementById('event-list');
            const url = "https://script.google.com/macros/s/AKfycbzKtqrzNK11rX4sCdDFv0lcgUcdVwsNiUnlXYc8Zjm0dJNlNV8ThwKrtqOgKBeVrP3g/exec";
            try {
                const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                const res = await fetch(`${url}?t=${Date.now()}`);
                const data = await res.json();
                const hallEvents = data.filter(r => r.rawDate === dateStr && r.bu.includes("성의회관"));
                const researchEvents = data.filter(r => r.rawDate === dateStr && r.bu.includes("의산연"));
                
                let html = `<div class="mb-2"><span class="building-badge badge-hall">성의회관</span>`;
                html += hallEvents.length ? hallEvents.map(i => `<div class="text-[13px] font-bold"><span class="event-place">[${i.place}]</span>${i.event}</div>`).join('') : `<div class="text-[12px] text-slate-300">내역 없음</div>`;
                html += `</div><div><span class="building-badge badge-research">의산연</span>`;
                html += researchEvents.length ? researchEvents.map(i => `<div class="text-[13px] font-bold"><span class="event-place">[${i.place}]</span>${i.event}</div>`).join('') : `<div class="text-[12px] text-slate-300">내역 없음</div>`;
                html += `</div>`;
                container.innerHTML = html;
            } catch(e) { container.innerHTML = `<div class="text-xs text-red-400">행사 로드 실패</div>`; }
        }

        async function updateMeal(date) {
            const url = "https://script.google.com/macros/s/AKfycbxZkcn8EEcGcxMaT98l_CKJTCM_0Ual_S2JefpHptm_dbEtQ5tjM00TEhU2XdqTObLh/exec";
            try {
                const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
                const res = await fetch(url);
                const data = await res.json();
                const day = data[key];
                document.getElementById('lunch-menu').innerText = day ? (day["중식"] || day["중 식"])?.menu.split('(')[0] : "없음";
                document.getElementById('night-menu').innerText = day ? (day["야식"] || day["야 식"])?.menu.split('(')[0] : "없음";
            } catch(e) { }
        }

        window.onload = () => {
            flatpickr("#datePicker", {
                locale: "ko", dateFormat: "Y.m.d (D)", defaultDate: currentDate,
                onChange: (dates) => { if(dates.length) { currentDate = dates[0]; updateDisplay(); } }
            });
            updateDisplay();
        };
    </script>
</body>
</html>
