<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합조회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --brand-navy: #2d3e75; --brand-yellow: #facc15; }
        body { 
            font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b;
            letter-spacing: -0.05em; margin: 0; padding: 0; line-height: 1.2; -webkit-tap-highlight-color: transparent;
        }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
        
        .brand-header { background-color: var(--brand-navy); padding: 20px 20px 35px 20px; color: white; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 달력 입력창 모바일 가독성 수정 */
        #datePicker {
            background-color: rgba(255, 255, 255, 0.15) !important;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white !important;
            font-size: 0.75rem;
            padding: 4px 12px;
            width: 130px;
            transition: all 0.2s;
            -webkit-appearance: none;
            border-radius: 9999px;
        }
        #datePicker:focus { background-color: white !important; color: var(--brand-navy) !important; }

        .table-card { background: white; border-radius: 8px; overflow: hidden; display: flex; margin: 0 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #eef2f6; text-decoration: none; color: inherit; transition: background 0.2s; }
        .table-card:active { background: #f8fafc; }
        .table-header { width: 55px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; flex-shrink: 0; text-align: center; }
        
        .label-duty { color: #3b82f6; border-right: 2px solid #3b82f6; background-color: #f8faff; }
        .label-event { color: #22c55e; border-right: 2px solid #22c55e; background-color: #f0fdf4; }
        .label-notice { color: #ef4444; border-right: 2px solid #ef4444; background-color: #fef2f2; }
        .label-meal { color: #f59e0b; border-right: 2px solid #f59e0b; background-color: #fffbeb; }
        
        .table-body { flex-grow: 1; padding: 10px 12px; min-width: 0; }
        
        /* 근무편성 간격 및 개행 최적화 */
        .duty-item { font-size: 0.82rem; padding: 3px 0; border-bottom: 1px solid #f8fafc; display: flex; align-items: center; white-space: nowrap; }
        .duty-item:last-child { border-bottom: none; }
        .duty-date { font-weight: 700; color: #64748b; width: 62px; flex-shrink: 0; }
        .duty-shift { font-weight: 900; margin: 0 4px; flex-shrink: 0; }
        .duty-names { font-weight: 800; color: #1e293b; overflow: hidden; text-overflow: ellipsis; }

        /* 조별 색상 */
        .shift-A { color: #10b981; }
        .shift-B { color: #3b82f6; }
        .shift-C { color: #f97316; }

        /* 최신 공지 띄어쓰기 및 줄바꿈 유지 */
        #latest-notice-container { 
            white-space: pre-wrap; 
            word-break: break-all;
            line-height: 1.4;
        }

        .building-badge { font-size: 9px; font-weight: 900; padding: 1px 6px; border-radius: 4px; display: inline-block; margin-bottom: 4px; }
        .badge-hall { background-color: #e0e7ff; color: #4338ca; }
        .badge-research { background-color: #f3e8ff; color: #7e22ce; }
        .event-place { color: #3b82f6; font-weight: 900; margin-right: 4px; font-size: 0.75rem; }
        .day-sun { color: #EF4444 !important; } 
        .day-sat { color: #3B82F6 !important; }
        
        .quick-btn { background: white; padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; cursor: pointer; text-decoration: none; }
        .quick-btn span { font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 타이틀 및 날짜 헤더 -->
        <div class="brand-header">
            <div class="flex justify-between items-end w-full">
                <div class="flex flex-col">
                    <span class="text-xs font-bold text-white/60 mb-1">CATHOLIC UNIVERSITY</span>
                    <span class="text-xl font-black">성의교정 통합조회</span>
                </div>
                <div class="flex flex-col items-end gap-2">
                    <div id="shift-badge" class="bg-[#facc15] text-[#422006] px-2 py-0.5 rounded font-black text-[10px]">--조 근무</div>
                    <input type="text" id="datePicker" class="text-center outline-none cursor-pointer shadow-inner" readonly>
                </div>
            </div>
        </div>

        <!-- 퀵 버튼 영역 -->
        <div class="px-3 -mt-6 relative z-10">
            <div class="grid grid-cols-3 gap-2">
                <a href="calendar.html" class="quick-btn">
                    <img src="https://img.icons8.com/fluency/48/calendar.png" width="18">
                    <span class="font-black">근무달력</span>
                </a>
                <a href="yellowpage.html" class="quick-btn">
                    <img src="https://img.icons8.com/fluency/48/phone.png" width="18">
                    <span class="font-black">주요전화</span>
                </a>
                <a href="https://m.catholic.ac.kr/html/intro/map_01.jsp" target="_blank" class="quick-btn">
                    <img src="https://img.icons8.com/fluency/48/hospital.png" width="18">
                    <span class="font-black">시설안내</span>
                </a>
            </div>
        </div>

        <!-- 근무 편성 -->
        <a href="team.html" class="table-card mt-1">
            <div class="table-header label-duty">근무<br>편성</div>
            <div id="duty-preview-container" class="table-body flex flex-col justify-center">
                <!-- JS에서 동적 생성 -->
            </div>
        </a>

        <!-- 오늘 행사 -->
        <a href="rentalm.html" class="table-card">
            <div class="table-header label-event">오늘<br>행사</div>
            <div id="event-list" class="table-body">
                <div class="text-[11px] text-slate-400 font-bold text-center py-1">행사를 불러오는 중...</div>
            </div>
        </a>

        <!-- 최신 공지 -->
        <a href="notice.html" class="table-card">
            <div class="table-header label-notice">최신<br>공지</div>
            <div id="latest-notice-container" class="table-body">
                <div class="text-[11px] text-slate-400 font-bold py-1">최신 공지를 확인 중...</div>
            </div>
        </a>

        <!-- 식단 -->
        <a href="meal.html" class="table-card">
            <div class="table-header label-meal">오늘<br>식단</div>
            <div class="table-body flex p-0 min-h-[55px]">
                <div class="flex-1 flex flex-col justify-center items-center border-r border-slate-100">
                    <span class="text-[9px] font-bold text-slate-400">중식</span>
                    <span id="lunch-menu" class="text-[13px] font-black text-slate-800">--</span>
                </div>
                <div class="flex-1 flex flex-col justify-center items-center">
                    <span class="text-[9px] font-bold text-slate-400">야식</span>
                    <span id="night-menu" class="text-[13px] font-black text-blue-700">--</span>
                </div>
            </div>
        </a>

        <footer class="mt-2 pb-6 text-center">
            <p class="text-[9px] text-slate-300 font-bold tracking-widest uppercase">ST. MARY'S CAMPUS INTEGRATED INFO</p>
        </footer>
    </div>

    <script>
        const NOTICE_API_URL = "https://script.google.com/macros/s/AKfycbyZsShJ5BztRyC-eTNmCy2wfSYOd8NjpgnO-0AbfTfpQqxD-XotTs3oglQ5T0dJB-nW/exec";
        const HOLIDAYS = ["2026-01-01", "2026-03-01", "2026-05-05", "2026-06-06", "2026-08-15", "2026-10-03", "2026-10-09", "2026-12-25"];
        const baseDate = '2026-03-09';
        const patterns = ['C', 'A', 'B'];

        const teamA = ["배준용", "이명구", "김영중", "김삼동"];
        const teamB = ["심규천", "임종현", "권영국", "전준수"];
        const workersPatternC = [
            ["황재업", "김태언", "이태원", "이정석"], ["황재업", "김태언", "이정석", "이태원"], 
            ["황재업", "이정석", "김태언", "이태원"], ["황재업", "이정석", "이태원", "김태언"], 
            ["황재업", "이태원", "김태언", "이정석"], ["황재업", "이태원", "이정석", "김태언"]
        ];

        let currentDate = getKSTNow();
        function getKSTNow() { const now = new Date(); return new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (9 * 60 * 60000)); }

        async function fetchLatestNotice() {
            const container = document.getElementById('latest-notice-container');
            try {
                const response = await fetch(`${NOTICE_API_URL}?t=${Date.now()}`);
                const posts = await response.json();
                if (!posts || posts.length === 0) {
                    container.innerHTML = `<div class="text-[12px] font-bold text-slate-300">등록된 공지가 없습니다.</div>`;
                    return;
                }
                const latest = posts[posts.length - 1];
                const [id, user, category, title, content, date] = latest;
                container.innerHTML = `
                    <div class="text-[13px] font-black text-red-600 mb-0.5 line-clamp-2">${title}</div>
                    <div class="text-[10px] font-bold text-slate-400">[${category}] ${user} · ${date.split(' ')[0]}</div>
                `;
            } catch (e) { container.innerHTML = `<div class="text-[10px] text-red-400">공지 로드 실패</div>`; }
        }

        function getShiftName(d) {
            let base = new Date(baseDate); base.setHours(0,0,0,0);
            let target = new Date(d); target.setHours(0,0,0,0);
            let diff = Math.round((target - base) / 86400000);
            return patterns[((diff % 3) + 3) % 3];
        }

        function getWorkersForC(d) {
            let base = new Date(baseDate); base.setHours(0,0,0,0);
            let target = new Date(d); target.setHours(0,0,0,0);
            let diff = Math.round((target - base) / 86400000);
            let idx = Math.floor(((diff % 18) + 18) % 18 / 3);
            return workersPatternC[idx];
        }

        async function updateDisplay() {
            const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(currentDate.getDate()).padStart(2,'0')}`;
            const picker = document.getElementById('datePicker');
            picker.classList.toggle('day-sun', currentDate.getDay() === 0 || HOLIDAYS.includes(dateStr));
            picker.classList.toggle('day-sat', currentDate.getDay() === 6);
            
            const currentShift = getShiftName(currentDate);
            document.getElementById('shift-badge').innerText = `${currentShift}조 근무`;
            
            const container = document.getElementById('duty-preview-container');
            const days = ['일','월','화','수','목','금','토'];
            
            const getTeamMembers = (shift, date) => {
                if (shift === 'A') return teamA;
                if (shift === 'B') return teamB;
                if (shift === 'C') return getWorkersForC(date);
                return ["-", "-", "-", "-"];
            };

            let html = "";
            if (currentShift === 'C') {
                let results = [];
                for(let i=0; results.length < 2 && i < 30; i++) {
                    let temp = new Date(currentDate); temp.setDate(currentDate.getDate() + i);
                    if(getShiftName(temp) === 'C') {
                        const ymd = `${temp.getFullYear()}-${String(temp.getMonth()+1).padStart(2,'0')}-${String(temp.getDate()).padStart(2,'0')}`;
                        results.push({
                            dateLabel: `${temp.getMonth()+1}/${temp.getDate()}(${days[temp.getDay()]})`,
                            dayClass: (temp.getDay()===0 || HOLIDAYS.includes(ymd) ? 'day-sun' : temp.getDay()===6 ? 'day-sat' : ''),
                            shift: 'C',
                            names: getWorkersForC(temp).join(', ')
                        });
                    }
                }
                html = results.map(item => `
                    <div class="duty-item">
                        <span class="duty-date ${item.dayClass}">${item.dateLabel}</span>
                        <span class="duty-shift shift-${item.shift}">(${item.shift}조)</span>
                        <span class="duty-names">${item.names}</span>
                    </div>
                `).join('');
            } else {
                const tomorrow = new Date(currentDate);
                tomorrow.setDate(currentDate.getDate() + 1);
                const shiftToday = getShiftName(currentDate);
                const shiftTomorrow = getShiftName(tomorrow);
                const workersToday = getTeamMembers(shiftToday, currentDate);
                const workersTomorrow = getTeamMembers(shiftTomorrow, tomorrow);
                const todayYmd = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(currentDate.getDate()).padStart(2,'0')}`;
                const tomorrowYmd = `${tomorrow.getFullYear()}-${String(tomorrow.getMonth()+1).padStart(2,'0')}-${String(tomorrow.getDate()).padStart(2,'0')}`;
                const todayClass = (currentDate.getDay()===0 || HOLIDAYS.includes(todayYmd) ? 'day-sun' : currentDate.getDay()===6 ? 'day-sat' : '');
                const tomorrowClass = (tomorrow.getDay()===0 || HOLIDAYS.includes(tomorrowYmd) ? 'day-sun' : tomorrow.getDay()===6 ? 'day-sat' : '');

                html = `
                    <div class="duty-item">
                        <span class="duty-date ${todayClass}">${currentDate.getMonth()+1}/${currentDate.getDate()}(${days[currentDate.getDay()]})</span>
                        <span class="duty-shift shift-${shiftToday}">(${shiftToday}조)</span>
                        <span class="duty-names">${workersToday.join(', ')}</span>
                    </div>
                    <div class="duty-item opacity-50">
                        <span class="duty-date ${tomorrowClass}">${tomorrow.getMonth()+1}/${tomorrow.getDate()}(${days[tomorrow.getDay()]})</span>
                        <span class="duty-shift shift-${shiftTomorrow}">(${shiftTomorrow}조)</span>
                        <span class="duty-names">${workersTomorrow.join(', ')}</span>
                    </div>
                `;
            }
            container.innerHTML = html;

            updateEvents(currentDate);
            updateMeal(currentDate);
            fetchLatestNotice();
        }

        async function updateEvents(date) {
            const container = document.getElementById('event-list');
            const url = "https://script.google.com/macros/s/AKfycbzKtqrzNK11rX4sCdDFv0lcgUcdVwsNiUnlXYc8Zjm0dJNlNV8ThwKrtqOgKBeVrP3g/exec";
            try {
                const dateStr = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
                const res = await fetch(`${url}?t=${Date.now()}`);
                const data = await res.json();
                const hallEvents = data.filter(r => r.rawDate === dateStr && r.bu.includes("성의회관"));
                const researchEvents = data.filter(r => r.rawDate === dateStr && r.bu.includes("의산연"));
                
                let html = `<div class="mb-1"><span class="building-badge badge-hall">성의회관</span>`;
                html += hallEvents.length ? hallEvents.map(i => `<div class="text-[12px] font-bold"><span class="event-place">[${i.place}]</span>${i.event}</div>`).join('') : `<div class="text-[11px] text-slate-300">대관 내역이 없습니다.</div>`;
                html += `</div><div><span class="building-badge badge-research">의산연</span>`;
                html += researchEvents.length ? researchEvents.map(i => `<div class="text-[12px] font-bold"><span class="event-place">[${i.place}]</span>${i.event}</div>`).join('') : `<div class="text-[11px] text-slate-300">대관 내역이 없습니다.</div>`;
                html += `</div>`;
                container.innerHTML = html;
            } catch(e) { container.innerHTML = `<div class="text-xs text-red-400">행사 로드 실패</div>`; }
        }

        async function updateMeal(date) {
            const url = "https://script.google.com/macros/s/AKfycbxZkcn8EEcGcxMaT98l_CKJTCM_0Ual_S2JefpHptm_dbEtQ5tjM00TEhU2XdqTObLh/exec";
            try {
                const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
                const res = await fetch(url);
                const data = await res.json();
                const day = data[key];
                document.getElementById('lunch-menu').innerText = day ? (day["중식"] || day["중 식"])?.menu.split('(')[0] : "없음";
                document.getElementById('night-menu').innerText = day ? (day["야식"] || day["야 식"])?.menu.split('(')[0] : "없음";
            } catch(e) { }
        }

        window.onload = () => {
            flatpickr("#datePicker", {
                locale: "ko", dateFormat: "Y.m.d (D)", defaultDate: currentDate,
                disableMobile: "true", // 시스템 기본 테마 무시하고 flatpickr 테마 사용
                onChange: (dates) => { if(dates.length) { currentDate = dates[0]; updateDisplay(); } }
            });
            updateDisplay();
        };
    </script>
</body>
</html>
