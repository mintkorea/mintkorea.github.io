<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 식단조회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; color: #1e293b;
            letter-spacing: -0.05em; margin: 0; padding: 0;
        }
        /* [인덱스 디자인 복사] 브랜드 헤더 */
        .brand-header { 
            background: linear-gradient(135deg, #2d3e75 0%, #1e293b 100%);
            padding: 20px 16px 45px 16px; color: white; 
            border-bottom-left-radius: 24px; border-bottom-right-radius: 24px;
        }
        /* [인덱스 디자인 복사] 달력 트리거 버튼 스타일 */
        .custom-date-trigger {
            background-color: rgba(255, 255, 255, 0.15);
            color: white; font-size: 16px; font-weight: 800; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center;
            margin-top: 10px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 내용 카드 */
        .content-card {
            background: white; border-radius: 16px; margin: -25px 12px 12px 12px;
            padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative; z-index: 10;
        }
        .meal-title { font-size: 1.1rem; font-weight: 900; color: #1e293b; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        .meal-box { background-color: #f8fafc; border-radius: 12px; padding: 18px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .menu-text { font-size: 1.1rem; font-weight: 700; color: #334155; line-height: 1.7; word-break: keep-all; }
        
        /* 하단 네비게이션 */
        .nav-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; background: white; 
            display: flex; justify-content: space-around; padding: 12px;
            border-top: 1px solid #e2e8f0; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); z-index: 100;
        }
        .nav-btn { font-size: 0.85rem; font-weight: 800; color: #64748b; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; }
        .active-nav { color: #2d3e75; }
        .day-sun { color: #ef4444 !important; } .day-sat { color: #3b82f6 !important; }
    </style>
</head>
<body class="pb-24">
    <div class="brand-header">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-tighter">성의교정 식단안내</h1>
                <div id="datePickerTrigger" class="custom-date-trigger">날짜 선택</div>
            </div>
            <div id="shift-badge" class="px-3 py-1.5 rounded-lg font-black text-[12px] bg-white/20 text-white">
                MEAL INFO
            </div>
        </div>
    </div>

    <div class="content-card">
        <div class="meal-title"><span class="text-orange-500">☀️</span> 오늘의 중식</div>
        <div class="meal-box">
            <div id="lunch-menu" class="menu-text">조회 중...</div>
        </div>

        <div class="meal-title"><span class="text-indigo-500">🌙</span> 오늘의 야식</div>
        <div class="meal-box">
            <div id="night-menu" class="menu-text">조회 중...</div>
        </div>
    </div>

    <nav class="nav-bar">
        <div onclick="moveDate(-1)" class="nav-btn"><span>◀</span><span>이전날</span></div>
        <div onclick="moveDate(0)" class="nav-btn active-nav"><span>📅</span><span>오늘</span></div>
        <div onclick="moveDate(1)" class="nav-btn"><span>▶</span><span>다음날</span></div>
        <div onclick="location.href='index.html'" class="nav-btn"><span>🏠</span><span>홈으로</span></div>
    </nav>

    <script>
        const MEAL_API = "https://script.google.com/macros/s/AKfycbxZkcn8EEcGcxMaT98l_CKJTCM_0Ual_S2JefpHptm_dbEtQ5tjM00TEhU2XdqTObLh/exec";
        let currentDate = new Date();
        let mealData = null;
        let fp;

        // 1. URL 파라미터 날짜 우선 적용
        function initDate() {
            const params = new URLSearchParams(window.location.search);
            const dateParam = params.get('date');
            if (dateParam) {
                const parsed = new Date(dateParam);
                if (!isNaN(parsed)) currentDate = parsed;
            }
        }

        async function fetchMeals() {
            try {
                // 캐시 확인 로직 (필요시 추가 가능)
                const res = await fetch(MEAL_API);
                mealData = await res.json();
                updateDisplay();
            } catch (e) {
                document.getElementById('lunch-menu').innerText = "데이터 로드 실패";
            }
        }

        function updateDisplay() {
            const days = ['일','월','화','수','목','금','토'];
            const y = currentDate.getFullYear();
            const m = String(currentDate.getMonth() + 1).padStart(2, '0');
            const d = String(currentDate.getDate()).padStart(2, '0');
            const dateStr = `${y}-${m}-${d}`;

            // 인덱스와 동일한 날짜 표시 업데이트
            const trigger = document.getElementById('datePickerTrigger');
            trigger.innerText = `${y}.${currentDate.getMonth()+1}.${currentDate.getDate()} (${days[currentDate.getDay()]})`;
            
            // 요일별 색상 처리
            trigger.classList.remove('day-sun', 'day-sat');
            if(currentDate.getDay() === 0) trigger.classList.add('day-sun');
            else if(currentDate.getDay() === 6) trigger.classList.add('day-sat');

            // Flatpickr 날짜 동기화
            if(fp) fp.setDate(currentDate, false);
            
            // 데이터 매칭
            if (mealData && mealData[dateStr]) {
                document.getElementById('lunch-menu').innerText = mealData[dateStr]["중식"]?.menu || "중식 정보가 없습니다.";
                document.getElementById('night-menu').innerText = mealData[dateStr]["야식"]?.menu || "야식 정보가 없습니다.";
            } else if(mealData) {
                document.getElementById('lunch-menu').innerText = "등록된 식단이 없습니다.";
                document.getElementById('night-menu').innerText = "등록된 식단이 없습니다.";
            }
        }

        function moveDate(offset) {
            if (offset === 0) currentDate = new Date();
            else currentDate.setDate(currentDate.getDate() + offset);
            updateDisplay();
        }

        window.onload = () => {
            initDate();
            
            // 인덱스와 동일한 Flatpickr 설정
            fp = flatpickr("#datePickerTrigger", { 
                locale: "ko", 
                dateFormat: "Y.m.d (D)", 
                defaultDate: currentDate,
                disableMobile: true, // 인덱스와 동일하게 모바일 UI 대신 커스텀 UI 사용
                onChange: (dates) => {
                    if(dates.length) {
                        currentDate = dates[0];
                        updateDisplay();
                    }
                }
            });

            fetchMeals();
        };
    </script>
</body>
</html>
