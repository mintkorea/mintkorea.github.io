<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 대관 현황 (Mobile)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .day-sun { color: #EF4444 !important; } 
        .day-sat { color: #3B82F6 !important; } 
        .bu-chip { transition: all 0.2s; border: 1.5px solid #e2e8f0; cursor: pointer; background: white; white-space: nowrap; }
        .bu-chip.active { background-color: #1E3A5F; color: white; border-color: #1E3A5F; font-weight: 800; }
        
        .rental-card { border: 1.2px solid #e2e8f0; background: white; border-radius: 0.75rem; cursor: pointer; transition: transform 0.1s; }
        .rental-card:active { transform: scale(0.97); }
        
        .status-badge { font-weight: 800; padding: 1px 6px; border-radius: 4px; font-size: 10px; border-width: 1px; }
        .empty-box { border: 1.5px dashed #cbd5e1; border-radius: 0.75rem; padding: 1.25rem; text-align: center; color: #64748b; font-size: 11px; font-weight: 700; margin-bottom: 1rem; background-color: #ffffff; }
        .ctrl-item { display: flex; align-items: center; justify-content: center; height: 32px; padding: 0 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-weight: 900; font-size: 10px; color: #64748b; white-space: nowrap; }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; }
        .dot-online { background-color: #10B981; }
        .dot-offline { background-color: #EF4444; }
        .dot-cached { background-color: #F59E0B; }
        
        /* 돋보기 모달 업그레이드 */
        #modalOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center;
            z-index: 2000; padding: 20px;
        }
        .expanded-card {
            position: relative; width: 100%; max-width: 450px; background: white; border-radius: 1.5rem;
            padding: 2.5rem 1.5rem 1.5rem 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border-left: 12px solid #1E3A5F;
            animation: zoomIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes zoomIn {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .ex-close-x {
            position: absolute; top: 12px; right: 12px; width: 36px; height: 36px;
            background: #F1F5F9; color: #64748B; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 900; cursor: pointer; border: 1px solid #E2E8F0;
        }
        .ex-place { font-size: 1.15rem; font-weight: 800; color: #64748b; margin-bottom: 0.5rem; }
        .ex-time { font-size: 1.4rem; font-weight: 900; color: #EF4444; margin-bottom: 1.25rem; display: block; letter-spacing: -0.05rem; }
        .ex-title { font-size: 1.7rem; font-weight: 900; color: #0F172A; line-height: 1.3; margin-bottom: 1.5rem; word-break: keep-all; }
        .ex-dept { font-size: 1.15rem; font-weight: 800; color: #334155; }
        .ex-people { font-size: 1.1rem; font-weight: 700; color: #94a3b8; }
        .ex-status { font-size: 1.1rem; padding: 4px 14px; border-radius: 8px; font-weight: 900; }
        .ex-period { font-size: 1.05rem; color: #7C3AED; background: #F5F3FF; padding: 12px; border-radius: 10px; margin-bottom: 1.5rem; font-weight: 800; border: 1px solid #DDD6FE; }
        .btn-confirm {
            width: 100%; background: #1E3A5F; color: white; padding: 14px;
            border-radius: 12px; font-size: 1.1rem; font-weight: 900; margin-top: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }

        .nav-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 42rem; height: 60px; background: white; border-top: 1px solid #e2e8f0; display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="text-slate-800 pb-24">
    <div id="app" class="max-w-2xl mx-auto flex flex-col items-center p-2 pt-3">
        <div id="header" class="w-full bg-[#EEF2F6] rounded-2xl p-4 flex flex-col mb-3 border border-slate-200 shadow-sm items-center text-center">
            <div class="flex items-center gap-2 mb-3">
                <h1 class="text-lg font-black text-[#1E3A5F]">성의교정 대관 현황</h1>
                <span id="shiftBadge" class="text-white text-[10px] px-2 py-0.5 rounded-md font-black">--</span>
            </div>
            <input type="text" id="datePicker" class="flatpickr-input-custom" placeholder="날짜 선택">
        </div>

        <div class="w-full mb-3 px-1">
            <div class="grid grid-cols-4 gap-1.5" id="buContainer"></div>
        </div>

        <div id="results-anchor" class="w-full flex items-center justify-between mb-4 px-1 pb-2 border-b border-slate-100">
            <div class="flex items-center gap-1.5">
                <div class="ctrl-item"><span id="statusDot" class="status-dot dot-offline"></span><span id="statusText">WAIT</span></div>
                <button onclick="fetchOnlineData()" class="ctrl-item border-slate-400 text-slate-700">🔄 동기화</button>
            </div>
            <div class="flex gap-1">
                <button onclick="moveDate(-1)" class="ctrl-item px-2">← 이전</button>
                <button onclick="moveDate(0)" class="ctrl-item px-2.5">오늘</button>
                <button onclick="moveDate(1)" class="ctrl-item px-2">다음 →</button>
            </div>
        </div>

        <div id="listArea" class="w-full"></div>
    </div>

    <div id="modalOverlay" onclick="closeModal()">
        <div id="modalBody" onclick="event.stopPropagation()"></div>
    </div>

    <nav class="nav-bar shadow-lg">
        <button onclick="moveDate(-1)" class="nav-item"><span class="text-lg">◀</span><span class="text-[10px] font-black">이전날</span></button>
        <button onclick="moveDate(0)" class="nav-item"><span class="text-xl">📅</span><span class="text-[10px] font-black text-[#1E3A5F]">오늘</span></button>
        <button onclick="moveDate(1)" class="nav-item"><span class="text-lg">▶</span><span class="text-[10px] font-black">다음날</span></button>
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="nav-item"><span>▲</span><span class="text-[10px] font-black">TOP</span></button>
    </nav>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzKtqrzNK11rX4sCdDFv0lcgUcdVwsNiUnlXYc8Zjm0dJNlNV8ThwKrtqOgKBeVrP3g/exec";
        const BUILDINGS = ["전체", "성의회관", "의산연", "옴니버스 파크", "의과대학", "간호대학", "대학본관", "서울성모별관"];
        let selectedBu = ["성의회관", "의산연"]; 
        let allData = [];
        let currentDate = new Date();
        let fp;

        async function initApp() {
            const backup = localStorage.getItem("rental_db_cache");
            if (backup) {
                allData = JSON.parse(backup);
                updateStatusUI(false, "CACHED", "dot-cached");
                updateDisplay();
            }
            await fetchOnlineData(false);
        }

        async function fetchOnlineData(isAlert = true) {
            try {
                const res = await fetch(`${GAS_URL}?t=${new Date().getTime()}`);
                const data = await res.json();
                if (data && data.length > 0) {
                    allData = data;
                    localStorage.setItem("rental_db_cache", JSON.stringify(data));
                    updateStatusUI(true, "ONLINE", "dot-online");
                    updateDisplay();
                    if(isAlert) alert("업데이트 완료");
                }
            } catch (e) { updateStatusUI(false, "OFFLINE", "dot-offline"); }
        }

        function updateStatusUI(isOnline, msg, dotClass) {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            dot.className = `status-dot ${dotClass}`;
            txt.innerText = msg;
            txt.className = `uppercase font-black text-[9px] ${isOnline ? 'text-emerald-500' : 'text-amber-500'}`;
        }

        function updateDisplay() {
            const yyyy = currentDate.getFullYear();
            const mm = String(currentDate.getMonth() + 1).padStart(2, '0');
            const dd = String(currentDate.getDate()).padStart(2, '0');
            const dateStr = `${yyyy}-${mm}-${dd}`;
            if(fp) fp.setDate(currentDate, false);
            
            const baseDate = new Date('2026-03-09').setHours(0,0,0,0);
            const targetDate = new Date(dateStr).setHours(0,0,0,0);
            const diff = Math.round((targetDate - baseDate) / 86400000);
            const patterns = [{n:'C',c:'#1976D2'},{n:'A',c:'#F57C00'},{n:'B',c:'#D32F2F'}];
            const shift = patterns[((diff % 3) + 3) % 3];
            document.getElementById('shiftBadge').innerText = `${shift.n}조 근무`;
            document.getElementById('shiftBadge').style.backgroundColor = shift.c;
            
            renderRental(dateStr);
        }

        function renderRental(selectedDate) {
            const listArea = document.getElementById('listArea');
            listArea.innerHTML = "";
            selectedBu.forEach(buName => {
                if (buName === "전체") return;
                const searchBu = buName === "의산연" ? "의생명산업연구원" : buName;
                const filtered = allData.filter(r => r.rawDate === selectedDate && (r.bu && r.bu.includes(searchBu)));
                let buHtml = `<div class="mb-5"><div class="px-1 font-black text-[15px] text-[#1E3A5F] mb-2">● ${buName}</div>`;
                if (filtered.length === 0) buHtml += `<div class="empty-box">대관 없음</div>`;
                else filtered.forEach(r => {
                    const isPer = r.type === '기간';
                    const sCol = r.status === '확정' || r.status === '승인' ? 'bg-orange-50 text-orange-600 border-orange-100' : 'bg-slate-50 text-slate-500 border-slate-100';
                    buHtml += `<div class="rental-card p-3 mb-2 shadow-sm border-l-[4px] ${isPer ? 'border-l-purple-400' : 'border-l-blue-400'}" onclick="openModal(${JSON.stringify(r).replace(/"/g, '&quot;')})">
                        <div class="flex justify-between items-center mb-1"><span class="text-[12px] font-black text-slate-700">📍 ${r.place}</span><span class="text-[10px] font-bold text-red-500">🕒 ${r.time}</span></div>
                        <div class="text-[14px] font-black text-slate-900 mb-1 truncate">${r.event}</div>
                        <div class="flex justify-between items-center"><span class="status-badge ${sCol}">${r.status}</span><span class="text-[10px] font-bold text-slate-400">${r.dept}</span></div>
                    </div>`;
                });
                listArea.innerHTML += buHtml + `</div>`;
            });
        }

        function openModal(data) {
            const modalBody = document.getElementById('modalBody');
            const sCol = data.status === '확정' || data.status === '승인' ? 'bg-orange-50 text-orange-600 border-orange-200' : 'bg-slate-50 text-slate-500 border-slate-200';
            modalBody.innerHTML = `
                <div class="expanded-card">
                    <div class="ex-close-x" onclick="closeModal()">×</div>
                    <div class="ex-place">📍 ${data.place}</div>
                    <span class="ex-status ${sCol} border mb-2 inline-block">${data.status}</span>
                    <div class="ex-time">🕒 ${data.time}</div>
                    <div class="ex-title">${data.event}</div>
                    ${data.type === '기간' ? `<div class="ex-period">📅 기간: ${data.period} (${data.yoil})</div>` : ''}
                    <div class="flex justify-between items-center pt-5 border-t border-slate-100">
                        <div class="ex-dept">🏢 ${data.dept}</div>
                        <div class="ex-people">👥 ${data.people}명</div>
                    </div>
                    <button class="btn-confirm" onclick="closeModal()">확인 후 닫기</button>
                </div>
            `;
            document.getElementById('modalOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function moveDate(offset) {
            if (offset === 0) currentDate = new Date();
            else currentDate.setDate(currentDate.getDate() + offset);
            updateDisplay();
        }

        window.onload = () => {
            fp = flatpickr("#datePicker", { locale: "ko", dateFormat: "Y.m.d (D)", defaultDate: new Date(), disableMobile: true, onChange: (d) => { if(d.length>0){currentDate=d[0]; updateDisplay();} } });
            const container = document.getElementById('buContainer');
            BUILDINGS.forEach(bu => {
                const chip = document.createElement('div');
                chip.className = `bu-chip py-1.5 rounded-lg text-[10px] font-black text-center ${selectedBu.includes(bu) ? 'active' : ''}`;
                chip.innerText = bu;
                chip.onclick = () => {
                    if (bu === "전체") selectedBu = selectedBu.length === BUILDINGS.length - 1 ? [] : BUILDINGS.filter(b => b !== "전체");
                    else selectedBu.includes(bu) ? selectedBu = selectedBu.filter(b => b !== bu) : selectedBu.push(bu);
                    document.querySelectorAll('.bu-chip').forEach((c, i) => c.classList.toggle('active', selectedBu.includes(BUILDINGS[i])));
                    updateDisplay();
                };
                container.appendChild(chip);
            });
            initApp();
        };
    </script>
</body>
</html>
