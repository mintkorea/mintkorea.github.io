<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>식단표 관리자 - 분석 및 등록</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f4f7f9;
    margin: 0;
    padding: 20px;
    color: #222;
  }
  .card {
    background: white;
    padding: 24px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    max-width: 720px;
    margin: 0 auto 20px auto;
  }
  h2 { margin-top: 0; }
  #status { margin: 16px 0; font-size: 14px; font-weight: bold; color: #555; min-height: 20px; white-space: pre-wrap; }
  .btn {
    width: 100%; padding: 15px; border: none; border-radius: 10px;
    font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
  }
  .btn-primary { background: #1a73e8; color: white; }
  .btn-primary:disabled { background: #dadce0; cursor: not-allowed; }
  .btn-success { background: #1e8e3e; color: white; }
  .btn-success:disabled { background: #dadce0; cursor: not-allowed; }

  table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
  th, td { border: 1px solid #e0e0e0; padding: 6px; text-align: left; vertical-align: top; }
  th { background: #f0f4f8; }
  td[contenteditable="true"], .cell-edit { background: #fffef5; cursor: text; }
  td[contenteditable="true"]:focus, .cell-edit:focus { outline: 2px solid #1a73e8; background: white; }
  .table-wrap { overflow-x: auto; }
  td.needs-review { background: #fff3cd; }
  .suggestions { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
  .suggestion-chip {
    font-size: 11px; background: #e8f0fe; color: #1a73e8; border: 1px solid #c6dafc;
    border-radius: 10px; padding: 2px 8px; cursor: pointer; white-space: nowrap;
  }
  .suggestion-chip:hover { background: #d2e3fc; }
  .legend { font-size: 12px; color: #777; margin-top: 8px; display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 12px; height: 12px; background: #fff3cd; border: 1px solid #e0c987; border-radius: 3px; display: inline-block; }
</style>
</head>
<body>

<div class="card" id="loginCard">
  <h2>🔒 관리자 로그인</h2>
  <input type="password" id="pwInput" placeholder="비밀번호 입력"
         style="width:100%;padding:12px;border:1px solid #ccc;border-radius:8px;font-size:15px;"
         onkeydown="if(event.key==='Enter') login()">
  <button class="btn btn-primary" onclick="login()">로그인</button>
  <div id="loginStatus" style="font-size:13px;color:red;margin-top:8px;"></div>
</div>

<div class="card" id="uploadCard" style="display:none;">
  <h2>🍱 식단표 이미지 분석</h2>
  <p style="font-size:13px;color:#777;margin-top:-8px;">
    현장에서 식단표 고화질 사진을 업로드하면 자동으로 분석합니다.<br>
    <b>카메라로 직접 촬영</b>하거나 <b>원본 화질</b> 이미지를 사용해주세요 — 카톡 등으로 전달받은 압축 이미지는 인식률이 떨어질 수 있습니다.
  </p>
  <input type="file" id="fileInput" accept="image/*" capture="environment"
         onchange="handleFileSelect()">
  <div id="resWarning" style="display:none; font-size:12px; color:#b45309; background:#fff7ed; border:1px solid #fed7aa; border-radius:8px; padding:8px 10px; margin-top:8px; text-align:left;"></div>
  <button id="analyzeBtn" class="btn btn-primary" onclick="analyze()" disabled>1. 이미지 분석</button>
  <div id="status"></div>
</div>

<div class="card" id="resultCard" style="display:none;">
  <h2>📋 분석 결과 확인 / 수정</h2>
  <p style="font-size:13px;color:#777;margin-top:-8px;">
    셀을 눌러 직접 수정할 수 있습니다. 확인 후 저장하세요.
  </p>
  <div class="table-wrap">
    <table id="resultTable">
      <thead>
        <tr><th>날짜</th><th>구분</th><th>메인메뉴</th><th>반찬/사이드</th><th>코멘트</th></tr>
      </thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>
  <div class="legend"><span class="legend-dot"></span> 노란색 = AI가 확신하지 못한 메뉴명 (직접 확인 필요, 후보 클릭 시 자동 입력)</div>
  <button id="saveBtn" class="btn btn-success" onclick="saveData()">2. 확정 저장</button>
</div>

<script>
  // ────────────────────────────────────────────────────────────
  // ⚙️ 여기에 Apps Script "웹 앱으로 배포" 후 발급받은 URL을 넣으세요.
  // 배포 방법: Apps Script 편집기 > 배포 > 새 배포 > 유형: 웹 앱
  //   - 실행할 사용자: 나
  //   - 액세스 권한이 있는 사용자: 전체 (Anyone)
  // 발급된 URL은 보통 https://script.google.com/macros/s/xxxxx/exec 형태입니다.
  // ────────────────────────────────────────────────────────────
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwlyqqk8K4r_X-yA4r3eRGYZuUqg6GbP2v_TNLk7G7JTcHORN0XRMAtB56iIj2u-JdD7w/exec";

  let parsedItems = [];
  let adminPassword = "";

  async function callBackend(action, extraPayload) {
    // 주의: Content-Type을 'text/plain'으로 보내야 브라우저가 CORS 프리플라이트(OPTIONS)를
    // 발생시키지 않습니다. Apps Script 웹 앱은 OPTIONS 요청을 처리하지 못하므로
    // 여기서 절대 'application/json' 헤더를 쓰면 안 됩니다. (본문 내용은 JSON 문자열로 보냄)
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action, password: adminPassword, ...extraPayload })
    });
    if (!res.ok) throw new Error("서버 응답 오류: " + res.status);
    return res.json();
  }

  async function login() {
    const pw = document.getElementById('pwInput').value;
    const statusEl = document.getElementById('loginStatus');
    if (!pw) return;

    statusEl.style.color = "#555";
    statusEl.textContent = "확인 중...";
    adminPassword = pw;

    try {
      const res = await callBackend("ping", {});
      if (!res.ok) throw new Error(res.error || "로그인 실패");

      // 세션 동안만 유지 (새로고침 시 재입력) — sessionStorage는 사용하지 않음
      document.getElementById('loginCard').style.display = 'none';
      document.getElementById('uploadCard').style.display = 'block';
      statusEl.textContent = "";
    } catch (err) {
      adminPassword = "";
      statusEl.style.color = "red";
      statusEl.textContent = "❌ " + err.message;
    }
  }

  const MIN_WIDTH = 1600; // 이 값보다 좁으면 저해상도로 간주 (카톡 전달 이미지 등)

  function handleFileSelect() {
    const file = document.getElementById('fileInput').files[0];
    const warningBox = document.getElementById('resWarning');
    const analyzeBtn = document.getElementById('analyzeBtn');
    warningBox.style.display = 'none';
    if (!file) { analyzeBtn.disabled = true; return; }

    const img = new Image();
    const objectUrl = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(objectUrl);
      const w = img.naturalWidth, h = img.naturalHeight;

      if (w < MIN_WIDTH) {
        warningBox.style.display = 'block';
        warningBox.innerHTML =
          `⚠️ 이미지 해상도가 낮습니다 (${w}×${h}px). 인식 오류가 늘어날 수 있어요.<br>` +
          `카카오톡으로 받은 이미지라면, 대화방에서 사진을 <b>길게 눌러 "저장"</b> 후 갤러리의 <b>원본 사진</b>을 다시 선택해주세요.<br>` +
          `(카톡으로 전달된 이미지는 자동으로 압축되어 화질이 떨어집니다)`;
      } else {
        warningBox.style.display = 'none';
      }
      analyzeBtn.disabled = false;
    };
    img.onerror = () => { analyzeBtn.disabled = false; };
    img.src = objectUrl;
  }

  function analyze() {
    const file = document.getElementById('fileInput').files[0];
    const btn = document.getElementById('analyzeBtn');
    const status = document.getElementById('status');
    if (!file) return;

    btn.disabled = true;
    status.textContent = "⏳ 데이터를 정밀 분석 중입니다... (최대 30초 소요)";
    document.getElementById('resultCard').style.display = 'none';

    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const res = await callBackend("processImage", {
          base64Data: e.target.result,
          mimeType: file.type
        });

        if (!res.ok) throw new Error(res.error || "분석 실패");

        let items;
        try {
          items = JSON.parse(res.result);
        } catch (parseErr) {
          throw new Error("AI 응답을 JSON으로 해석하지 못했습니다: " + res.result);
        }
        if (items && items.error) throw new Error(items.error);

        parsedItems = items;
        renderTable(items);
        const reviewCount = items.filter(it => it.matched === false).length;
        status.textContent = reviewCount > 0
          ? `✅ 분석 완료: ${items.length}건 인식됨. ⚠️ ${reviewCount}건은 확인이 필요합니다 (노란 셀).`
          : `✅ 분석 완료: ${items.length}건 인식됨. 아래 표에서 확인/수정 후 저장하세요.`;
        document.getElementById('resultCard').style.display = 'block';
      } catch (err) {
        status.innerHTML = `<span style="color:red">❌ ${err.message}</span>`;
      } finally {
        btn.disabled = false;
      }
    };
    reader.readAsDataURL(file);
  }

  function renderTable(items) {
    const body = document.getElementById('resultBody');
    body.innerHTML = "";
    items.forEach((item, idx) => {
      const tr = document.createElement('tr');
      const needsReview = item.matched === false;
      const suggestions = item.suggestions || [];

      const suggestionHtml = (needsReview && suggestions.length > 0)
        ? `<div class="suggestions">${suggestions.map(s =>
            `<span class="suggestion-chip" onclick="applySuggestion(${idx}, this)">${escapeHtml(s)}</span>`
          ).join('')}</div>`
        : "";

      tr.innerHTML = `
        <td><div class="cell-edit" contenteditable="true" data-idx="${idx}" data-field="date">${escapeHtml(item.date || "")}</div></td>
        <td><div class="cell-edit" contenteditable="true" data-idx="${idx}" data-field="type">${escapeHtml(item.type || "")}</div></td>
        <td class="${needsReview ? 'needs-review' : ''}">
          <div class="cell-edit" contenteditable="true" data-idx="${idx}" data-field="main">${escapeHtml(item.main || "")}</div>
          ${suggestionHtml}
        </td>
        <td><div class="cell-edit" contenteditable="true" data-idx="${idx}" data-field="all">${escapeHtml(item.all || "")}</div></td>
        <td><div class="cell-edit" contenteditable="true" data-idx="${idx}" data-field="comment">${escapeHtml(item.comment || "")}</div></td>
      `;
      body.appendChild(tr);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function applySuggestion(idx, chipEl) {
    const chosen = chipEl.textContent;
    const td = chipEl.closest('td');
    const editDiv = td.querySelector('.cell-edit[data-field="main"]');
    editDiv.textContent = chosen;
    td.classList.remove('needs-review');
    const suggestionsBox = td.querySelector('.suggestions');
    if (suggestionsBox) suggestionsBox.remove();
    parsedItems[idx].main = chosen;
    parsedItems[idx].matched = true;
  }

  function syncEditsFromTable() {
    document.querySelectorAll('#resultBody .cell-edit[data-field]').forEach(el => {
      const idx = Number(el.dataset.idx);
      const field = el.dataset.field;
      parsedItems[idx][field] = el.textContent.trim();
    });
  }

  async function saveData() {
    const btn = document.getElementById('saveBtn');
    const status = document.getElementById('status');
    syncEditsFromTable();

    btn.disabled = true;
    status.textContent = "⏳ 시트에 저장 중입니다...";

    try {
      const res = await callBackend("saveConfirmedData", { items: parsedItems });
      if (!res.ok) throw new Error(res.message || "저장 실패");
      status.innerHTML = `<span style="color:blue">${res.message}</span>`;
    } catch (err) {
      status.innerHTML = `<span style="color:red">❌ ${err.message}</span>`;
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
