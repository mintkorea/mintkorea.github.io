<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>업무 게시판 (영구저장)</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; }
        body { font-family: -apple-system, 'Malgun Gothic', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 15px; }
        
        /* 사용자 설정 상단바 */
        .auth-bar { background: #343a40; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .auth-bar input { width: 80px; border: none; border-radius: 4px; padding: 3px 7px; }

        /* 입력 폼 스타일 */
        .form-section { border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        select, input[type="text"] { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; }
        #category { width: 110px; }
        #title { flex: 1; }
        #editor-container { height: 180px; margin-bottom: 10px; border-radius: 0 0 8px 8px; }
        .ql-toolbar { border-radius: 8px 8px 0 0 !important; }

        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:active { background: #0056b3; transform: scale(0.98); }

        /* 게시글 목록 스타일 */
        .post-card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 15px; margin-top: 15px; position: relative; }
        .post-header { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
        .badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; color: white; background: #6c757d; font-weight: bold; }
        .badge.notice { background: #dc3545; }
        .post-title { font-weight: bold; font-size: 17px; color: #111; }
        .post-meta { font-size: 12px; color: #999; margin-bottom: 10px; }
        .post-body { font-size: 15px; line-height: 1.5; color: #444; word-break: break-all; }
        .delete-btn { width: auto; padding: 4px 8px; font-size: 11px; background: #ff4d4d; margin-top: 10px; }
        .loading { text-align: center; padding: 20px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-bar">
        <span>👤 접속자: <input type="text" id="currentUser" value="사용자1" onchange="renderPosts()"></span>
        <small>(admin은 전체 관리)</small>
    </div>

    <div class="form-section">
        <div class="input-row">
            <select id="category">
                <option value="성의회관">성의회관</option>
                <option value="의산연">의산연</option>
                <option value="공지사항">공지사항</option>
            </select>
            <input type="text" id="title" placeholder="제목을 입력하세요">
        </div>
        <div id="editor-container"></div>
        <button onclick="saveToGoogle()">게시글 등록하기</button>
    </div>

    <div id="loading" class="loading" style="display:none;">데이터 처리 중...</div>
    <div id="post-list"></div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    // 1. 배포하신 구글 앱스 스크립트 URL 연동
    const API_URL = "https://script.google.com/macros/s/AKfycbyZsShJ5BztRyC-eTNmCy2wfSYOd8NjpgnO-0AbfTfpQqxD-XotTs3oglQ5T0dJB-nW/exec";
    
    // 2. 에디터 초기화
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'size': ['small', false, 'large', 'huge'] }],
                ['bold', { 'color': [] }, { 'background': [] }],
                ['clean']
            ]
        }
    });

    let cachedPosts = [];

    // 3. 게시글 저장 (POST)
    async function saveToGoogle() {
        const title = document.getElementById('title').value;
        const content = quill.root.innerHTML;
        const user = document.getElementById('currentUser').value;
        const category = document.getElementById('category').value;

        if(!title || quill.getText().trim().length === 0) return alert("제목과 내용을 입력해주세요.");

        document.getElementById('loading').style.display = 'block';

        const payload = {
            id: Date.now().toString(),
            user: user,
            category: category,
            title: title,
            content: content,
            date: new Date().toLocaleString('ko-KR')
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            alert("등록되었습니다.");
            location.reload();
        } catch (e) {
            alert("저장 실패: " + e);
            document.getElementById('loading').style.display = 'none';
        }
    }

    // 4. 게시글 불러오기 (GET)
    async function fetchPosts() {
        document.getElementById('loading').style.display = 'block';
        try {
            const response = await fetch(API_URL);
            cachedPosts = await response.json();
            renderPosts();
        } catch (e) {
            document.getElementById('post-list').innerHTML = "<p class='loading'>데이터를 불러올 수 없습니다.</p>";
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // 5. 화면에 그리기 및 권한 체크
    function renderPosts() {
        const listDiv = document.getElementById('post-list');
        const currentUser = document.getElementById('currentUser').value;
        listDiv.innerHTML = "";

        if(cachedPosts.length === 0) {
            listDiv.innerHTML = "<p class='loading'>등록된 게시글이 없습니다.</p>";
            return;
        }

        cachedPosts.slice().reverse().forEach(post => {
            // 구글 시트 데이터 구조: [id, user, category, title, content, date]
            const [id, user, category, title, content, date] = post;
            const canManage = (user === currentUser || currentUser === 'admin');
            const categoryClass = (category === '공지사항') ? 'badge notice' : 'badge';

            listDiv.innerHTML += `
                <div class="post-card">
                    <div class="post-header">
                        <span class="${categoryClass}">${category}</span>
                        <span class="post-title">${title}</span>
                    </div>
                    <div class="post-meta">작성자: ${user} | ${date}</div>
                    <div class="post-body">${content}</div>
                    ${canManage ? `<button class="delete-btn" onclick="alert('삭제 기능은 구글 시트에서 직접 행을 삭제하거나 스크립트 보완이 필요합니다.')">본인글 확인됨</button>` : ''}
                </div>
            `;
        });
    }

    // 실행
    fetchPosts();
</script>

</body>
</html>
