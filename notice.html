<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성의교정 통합 공지사항</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel for In-browser Compilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Firebase modules from CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        function App() {
            const [user, setUser] = useState(null);
            const [posts, setPosts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [viewMode, setViewMode] = useState('list'); // 'list', 'detail', 'write'
            const [selectedPost, setSelectedPost] = useState(null);
            const [activeCategory, setActiveCategory] = useState('전체');
            const [searchQuery, setSearchQuery] = useState('');
            
            // Form states
            const [title, setTitle] = useState('');
            const [author, setAuthor] = useState('관리자');
            const [category, setCategory] = useState('공지사항');
            const editorRef = useRef(null);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'sungui-duty-app';
            const firebaseConfig = JSON.parse(__firebase_config);
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error("Auth Error", e); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'notices');
                const unsub = onSnapshot(q, (snap) => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    setPosts(data);
                }, (err) => console.error("Firestore Error", err));
                return () => unsub();
            }, [user]);

            const handleSave = async () => {
                if (!title.trim()) return alert("제목을 입력해주세요.");
                const contentHtml = editorRef.current?.innerText || "";
                
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'notices'), {
                        title, author, category, 
                        content: contentHtml,
                        createdAt: serverTimestamp()
                    });
                    setViewMode('list');
                    setTitle('');
                } catch (e) { alert("저장 실패"); }
            };

            const handleDelete = async (id, e) => {
                e.stopPropagation();
                if (!confirm("정말 삭제하시겠습니까?")) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notices', id));
                    if (selectedPost?.id === id) setViewMode('list');
                } catch (e) { alert("삭제 실패"); }
            };

            const filteredPosts = posts.filter(p => {
                const matchesSearch = p.title.includes(searchQuery) || p.content?.includes(searchQuery);
                const matchesCategory = activeCategory === '전체' || p.category === activeCategory;
                return matchesSearch && matchesCategory;
            });

            if (loading) return (
                <div class="flex items-center justify-center h-screen bg-white">
                    <div class="text-slate-400 font-bold animate-pulse text-lg">데이터 로딩 중...</div>
                </div>
            );

            return (
                <div class="max-w-2xl mx-auto min-h-screen bg-white shadow-xl flex flex-col">
                    {/* Header */}
                    <div class="bg-[#2d3e75] text-white p-6 flex justify-between items-center sticky top-0 z-20">
                        {viewMode !== 'list' && (
                            <button onClick={() => setViewMode('list')} class="mr-4 p-1 hover:bg-white/10 rounded-full transition-all">
                                <i data-lucide="chevron-left"></i>
                            </button>
                        )}
                        <h1 class="text-xl font-black flex-grow">
                            {viewMode === 'list' ? '성의교정 통합 공지' : viewMode === 'detail' ? '공지 상세' : '새 글 작성'}
                        </h1>
                        {viewMode === 'list' && (
                            <button onClick={() => setViewMode('write')} class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2 transition-all active:scale-95 shadow-lg">
                                <i data-lucide="plus" class="w-4 h-4"></i> 글쓰기
                            </button>
                        )}
                    </div>

                    <div class="flex-grow p-4">
                        {viewMode === 'list' && (
                            <div class="space-y-4">
                                {/* Search */}
                                <div class="relative">
                                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                                    <input 
                                        type="text" 
                                        placeholder="검색어를 입력하세요..." 
                                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-400 font-medium"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>

                                {/* Categories */}
                                <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                    {['전체', '공지사항', '인수인계', '업무연락'].map(cat => (
                                        <button 
                                            key={cat}
                                            onClick={() => setActiveCategory(cat)}
                                            class={`px-5 py-2 rounded-xl text-sm font-bold whitespace-nowrap transition-all ${activeCategory === cat ? 'bg-[#2d3e75] text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50'}`}
                                        >
                                            {cat}
                                        </button>
                                    ))}
                                </div>

                                {/* List Items */}
                                <div class="grid gap-3">
                                    {filteredPosts.map(post => (
                                        <div 
                                            key={post.id}
                                            onClick={() => { setSelectedPost(post); setViewMode('detail'); window.scrollTo(0,0); }}
                                            class="bg-white p-5 rounded-[24px] border border-slate-100 shadow-sm hover:border-blue-300 transition-all cursor-pointer active:scale-[0.98] group relative"
                                        >
                                            <div class="flex justify-between items-start mb-2">
                                                <span class="text-[10px] font-black px-3 py-1 bg-blue-50 text-blue-600 rounded-full">{post.category}</span>
                                                <button onClick={(e) => handleDelete(post.id, e)} class="text-slate-200 hover:text-red-500 transition-colors">
                                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                                </button>
                                            </div>
                                            <h3 class="text-lg font-black text-slate-800 group-hover:text-blue-700 transition-colors mb-2">{post.title}</h3>
                                            <div class="flex items-center gap-3 text-xs font-bold text-slate-400">
                                                <div class="flex items-center gap-1"><i data-lucide="user" class="w-3 h-3"></i> {post.author}</div>
                                                <div class="flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3"></i> {post.createdAt?.toDate().toLocaleDateString()}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {viewMode === 'detail' && selectedPost && (
                            <div class="animate-in fade-in slide-in-from-bottom-4 duration-300">
                                <div class="mb-6">
                                    <span class="text-xs font-black px-3 py-1 bg-blue-100 text-blue-700 rounded-full mb-3 inline-block">{selectedPost.category}</span>
                                    <h2 class="text-2xl font-black text-slate-900 leading-tight mb-4">{selectedPost.title}</h2>
                                    <div class="flex items-center gap-4 text-sm font-bold text-slate-400 pb-6 border-b border-slate-100">
                                        <span>작성자: {selectedPost.author}</span>
                                        <span>날짜: {selectedPost.createdAt?.toDate().toLocaleString()}</span>
                                    </div>
                                </div>
                                <div class="text-slate-700 leading-relaxed min-h-[300px] whitespace-pre-wrap py-4 font-medium">
                                    {selectedPost.content}
                                </div>
                                <button 
                                    onClick={() => setViewMode('list')}
                                    class="w-full mt-10 py-4 bg-slate-100 text-slate-600 font-black rounded-2xl hover:bg-slate-200 transition-all"
                                >
                                    목록으로 돌아가기
                                </button>
                            </div>
                        )}

                        {viewMode === 'write' && (
                            <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-300">
                                <div class="space-y-2">
                                    <label class="text-sm font-black text-slate-400 ml-1">카테고리</label>
                                    <div class="flex gap-2 overflow-x-auto pb-1">
                                        {['공지사항', '인수인계', '업무연락'].map(cat => (
                                            <button 
                                                key={cat}
                                                onClick={() => setCategory(cat)}
                                                class={`px-4 py-2 rounded-xl text-sm font-bold transition-all border ${category === cat ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-slate-200 text-slate-500'}`}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-sm font-black text-slate-400 ml-1">제목</label>
                                    <input 
                                        type="text" 
                                        class="w-full bg-slate-50 border-none rounded-2xl p-4 text-lg font-black focus:ring-2 focus:ring-blue-400 outline-none" 
                                        placeholder="공지 제목을 입력하세요"
                                        value={title}
                                        onChange={(e) => setTitle(e.target.value)}
                                    />
                                </div>
                                <div class="space-y-2">
                                    <label class="text-sm font-black text-slate-400 ml-1">내용</label>
                                    <div 
                                        ref={editorRef}
                                        contentEditable
                                        class="w-full min-h-[300px] bg-slate-50 border-none rounded-2xl p-4 focus:ring-2 focus:ring-blue-400 outline-none font-medium text-slate-700"
                                        placeholder="공지 내용을 상세히 적어주세요..."
                                    ></div>
                                </div>
                                <div class="flex gap-3 pt-4">
                                    <button onClick={() => setViewMode('list')} class="flex-1 py-4 bg-slate-100 text-slate-500 font-black rounded-2xl">취소</button>
                                    <button onClick={handleSave} class="flex-[2] py-4 bg-blue-600 text-white font-black rounded-2xl shadow-lg shadow-blue-200">등록하기</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize icons after React render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
