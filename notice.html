<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공지사항 - SUNGUI PORTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .app-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            padding: 24px 16px;
            border-bottom-left-radius: 32px;
            border-bottom-right-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        .notice-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            border: 1px solid #f1f5f9;
            transition: all 0.2s ease;
        }
        .notice-card:active { transform: scale(0.97); background-color: #f1f5f9; }
        .icon-box {
            width: 48px;
            height: 48px;
            background-color: #f1f5f9;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            flex-shrink: 0;
        }
        .loading-spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <button onclick="handleBack()" class="p-2 bg-white/10 rounded-xl active:bg-white/20">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <h1 class="text-xl font-bold">공지사항</h1>
            <div class="w-10"></div>
        </div>
    </div>

    <div id="view-list" class="max-w-md mx-auto p-5">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-extrabold text-slate-800">전체 알림 목록</h2>
            <span id="post-count" class="text-[11px] font-black text-blue-600 bg-blue-50 px-3 py-1 rounded-full">CHECKING...</span>
        </div>
        
        <div id="list-container" class="space-y-3">
            <div class="py-32 flex flex-col items-center justify-center">
                <div class="loading-spinner mb-4"></div>
                <p class="text-slate-400 font-bold">데이터를 안전하게 동기화 중...</p>
            </div>
        </div>
    </div>

    <div id="view-detail" class="hidden min-h-screen bg-white">
        <div class="max-w-md mx-auto p-6">
            <div class="mb-8">
                <span class="inline-block bg-blue-600 text-white text-[10px] font-black px-2 py-0.5 rounded mb-3">OFFICIAL</span>
                <h2 id="det-title" class="text-2xl font-black text-slate-900 leading-tight mb-4">...</h2>
                <div class="flex items-center text-slate-400 text-xs font-bold">
                    <span id="det-author">Admin</span>
                    <span class="mx-2">•</span>
                    <span id="det-date">-</span>
                </div>
            </div>
            <div id="det-content" class="text-slate-700 leading-relaxed text-base whitespace-pre-wrap"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 환경 설정
        const firebaseConfig = JSON.parse(window.__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'sungui-integrated-system';

        const urlParams = new URLSearchParams(window.location.search);
        const noticeId = urlParams.get('id');

        window.handleBack = function() {
            if (noticeId || !document.getElementById('view-detail').classList.contains('hidden')) {
                window.location.href = 'notice.html';
            } else {
                window.location.href = 'index.html';
            }
        };

        // 초기화 및 인증
        async function startApp() {
            try {
                if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                    await signInWithCustomToken(auth, window.__initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        if (noticeId) renderDetail(noticeId);
                        else renderList();
                    }
                });
            } catch (err) {
                console.error("Auth Error:", err);
                document.getElementById('list-container').innerHTML = `<div class="p-10 text-center text-red-500 font-bold">인증에 실패했습니다. (App ID 확인 필요)</div>`;
            }
        }

        function renderList() {
            const listContainer = document.getElementById('list-container');
            const countBadge = document.getElementById('post-count');
            
            // 경로: /artifacts/{appId}/public/data/notices
            // 대시보드에서 사용하는 appId와 반드시 일치해야 함
            const noticeRef = collection(db, 'artifacts', appId, 'public', 'data', 'notices');
            
            // query 함수를 사용하여 에러 방지 및 데이터 감시
            onSnapshot(noticeRef, (snapshot) => {
                const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                
                // 시간순 정렬
                docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                
                countBadge.innerText = `${docs.length} Posts`;

                if (docs.length === 0) {
                    listContainer.innerHTML = `
                        <div class="py-20 text-center border-2 border-dashed border-slate-200 rounded-3xl">
                            <p class="text-slate-400 font-bold">등록된 공지사항이 없습니다.</p>
                        </div>
                    `;
                    return;
                }

                listContainer.innerHTML = docs.map(data => {
                    const date = data.createdAt?.toDate ? data.createdAt.toDate() : new Date();
                    const dateStr = date.toLocaleDateString();
                    
                    return `
                        <div class="notice-card" onclick="location.href='notice.html?id=${data.id}'">
                            <div class="icon-box">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-slate-800 truncate text-base mb-1">${data.title}</h3>
                                <p class="text-xs font-semibold text-slate-400">${dateStr} • ${data.author || 'Admin'}</p>
                            </div>
                            <svg class="ml-2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
                        </div>
                    `;
                }).join('');
            }, (error) => {
                console.error("Firestore Error:", error);
                listContainer.innerHTML = `
                    <div class="p-8 text-center bg-red-50 rounded-2xl border border-red-100">
                        <p class="text-red-500 font-bold mb-2">데이터를 불러올 수 없습니다.</p>
                        <p class="text-red-400 text-xs">사유: ${error.message}</p>
                        <p class="text-slate-400 text-[10px] mt-4">Path: artifacts/${appId}/public/data/notices</p>
                    </div>
                `;
            });
        }

        async function renderDetail(id) {
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-detail').classList.remove('hidden');
            
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'notices', id);
                const snap = await getDoc(docRef);
                
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('det-title').innerText = data.title;
                    document.getElementById('det-author').innerText = data.author || 'Admin';
                    document.getElementById('det-date').innerText = data.createdAt?.toDate().toLocaleString() || '-';
                    document.getElementById('det-content').innerText = data.content;
                } else {
                    document.getElementById('det-content').innerText = "삭제된 게시물입니다.";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('det-content').innerText = "데이터를 불러오는 중 오류가 발생했습니다.";
            }
        }

        startApp();
    </script>
</body>
</html>
