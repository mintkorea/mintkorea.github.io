<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성의 교정 통합 게시판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; margin: 0; padding-bottom: 50px; }
        .header-gradient { background: linear-gradient(180deg, #4272d7 0%, #2d55b3 100%); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; transition: all 0.2s; }
        .btn-edit { background-color: #28a745; color: white; }
        .btn-delete { background-color: #dc3545; color: white; }
        .tag-notice { background-color: #fff1f0; color: #ff4d4f; border: 1px solid #ffa39e; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 4px; }
        .search-input { border-radius: 8px; border: 1px solid #d1d5db; padding: 10px 10px 10px 35px; width: 100%; }
        .write-section { background: white; border-radius: 16px; border: 2px solid #2d55b3; overflow: hidden; }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header class="header-gradient p-6 mb-6">
        <div class="max-w-3xl mx-auto flex items-center justify-center gap-3 text-white">
            <span class="text-3xl">🏛️</span>
            <h1 class="text-2xl font-black tracking-tight">성의 교정 통합 게시판</h1>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4">
        
        <!-- 검색 및 버튼 영역 -->
        <div class="flex flex-col gap-4 mb-8">
            <div class="flex justify-end">
                <button onclick="scrollToWrite()" class="bg-[#1e293b] text-white px-5 py-2 rounded-lg font-bold text-sm shadow-md flex items-center gap-2">
                    📝 새 글 등록하기
                </button>
            </div>
            <div class="relative">
                <span class="absolute left-3 top-3 text-gray-400">🔍</span>
                <input type="text" id="search-input" oninput="searchPosts()" placeholder="제목 또는 작성자 검색..." class="search-input shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <!-- 게시글 리스트 -->
        <div id="post-list" class="space-y-6 mb-12">
            <!-- 데이터가 여기에 렌더링됩니다 -->
        </div>

        <!-- 페이지네이션 (사진과 동일하게 장식용으로 추가) -->
        <div class="flex justify-center gap-2 mb-12">
            <span class="w-8 h-8 flex items-center justify-center bg-[#2d55b3] text-white rounded font-bold">1</span>
        </div>

        <!-- 게시글 작성 섹션 (하단 고정형) -->
        <section class="write-section shadow-xl" id="write-section">
            <div class="bg-slate-50 p-4 border-b flex items-center justify-between">
                <h2 class="font-bold text-slate-700 flex items-center gap-2">✍️ 게시글 작성</h2>
                <span class="text-xs text-slate-400 font-bold">👤 접속자: 관리자</span>
            </div>
            <div class="p-6">
                <div class="flex gap-3 mb-4">
                    <select id="new-category" class="border rounded-lg p-3 text-sm font-bold bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option>공지사항</option>
                        <option>성의회관</option>
                        <option>의생명</option>
                    </select>
                    <input type="text" id="new-title" placeholder="제목을 입력하세요" class="flex-1 border rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <!-- 툴바 (사진 구현) -->
                <div class="flex gap-4 p-2 bg-slate-50 border-t border-l border-r rounded-t-lg text-slate-500 text-sm">
                    <span class="font-bold border-r pr-3 cursor-pointer">B</span>
                    <span class="italic border-r pr-3 cursor-pointer">I</span>
                    <span class="underline border-r pr-3 cursor-pointer">U</span>
                    <span class="border-r pr-3 cursor-pointer">≡</span>
                    <span class="cursor-pointer">A</span>
                </div>
                <textarea id="new-content" rows="8" class="w-full border p-4 text-sm rounded-b-lg focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4" placeholder="내용을 입력하세요"></textarea>
                
                <div class="mb-6">
                    <label class="block text-xs font-bold text-slate-500 mb-2">📎 사진 첨부</label>
                    <input type="file" class="text-xs text-slate-400 border w-full p-2 rounded-lg bg-slate-50">
                </div>

                <button onclick="addPost()" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black text-lg transition-all shadow-lg">
                    게시글 등록 완료
                </button>
            </div>
        </section>

        <!-- 코드 복사 영역 (업데이트용) -->
        <div id="update-area" class="hidden mt-10 p-6 bg-slate-800 rounded-2xl">
            <p class="text-emerald-400 text-sm font-bold mb-3">✅ 데이터가 저장되었습니다. 아래 코드를 전체 복사하여 파일을 업데이트 하세요.</p>
            <textarea id="full-code" class="w-full h-40 bg-slate-900 text-slate-400 text-[10px] p-4 rounded-lg font-mono" readonly onclick="this.select()"></textarea>
        </div>
    </main>

    <script id="post-data">
        // 초기 데이터 (사진에 있는 내용)
        let posts = [
            {
                id: 1,
                category: '공지사항',
                title: '시신기증 접수증 전송 후 통화의 건',
                author: '관리자',
                date: '04. 13. 오후 05:57',
                content: '시신기증 접수증 전송 후 기준에는 즉시모심에 한하여 담당자와 통화하였으나 현 담당자인 주상건 차장의 요청에 의하여 모든 건에 대하여 통화를 실시하여야 합니다.\n\n즉시모심, 삼일장 구분없이 접수증 전송 후 통화하시기 바랍니다.'
            },
            {
                id: 2,
                category: '공지사항',
                title: '성의회관 옥상 방수공사의 건',
                author: '관리자',
                date: '04. 13. 오후 05:51',
                content: '금주 금요일부터 성의회관 옥상 방수공사가 진행될 예정입니다. 소음이 발생할 수 있으니 양해 부탁드립니다.'
            }
        ];
    </script>

    <script>
        function renderPosts(data = posts) {
            const list = document.getElementById('post-list');
            list.innerHTML = data.map(post => `
                <div class="card p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <span class="tag-notice">${post.category}</span>
                            <h3 class="text-lg font-bold text-slate-800">${post.title}</h3>
                        </div>
                        <div class="text-xs text-slate-400 font-bold flex items-center gap-1">
                            ✍️ ${post.author}
                        </div>
                    </div>
                    <div class="text-[11px] text-slate-400 mb-4 flex items-center gap-2">
                        📅 ${post.date}
                    </div>
                    <div class="text-sm text-slate-600 leading-relaxed mb-6 whitespace-pre-wrap">${post.content}</div>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="editPost(${post.id})" class="btn-edit py-2 rounded-lg font-bold text-sm shadow-sm opacity-90 hover:opacity-100">수정</button>
                        <button onclick="deletePost(${post.id})" class="btn-delete py-2 rounded-lg font-bold text-sm shadow-sm opacity-90 hover:opacity-100">삭제</button>
                    </div>
                </div>
            `).join('');
        }

        function addPost() {
            const title = document.getElementById('new-title').value;
            const category = document.getElementById('new-category').value;
            const content = document.getElementById('new-content').value;
            
            if(!title || !content) { alert('내용을 입력해주세요.'); return; }

            const now = new Date();
            const dateStr = `${(now.getMonth()+1).toString().padStart(2, '0')}. ${now.getDate().toString().padStart(2, '0')}. ${now.getHours() >= 12 ? '오후' : '오전'} ${ (now.getHours()%12 || 12).toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            const newPost = {
                id: Date.now(),
                category,
                title,
                author: '관리자',
                date: dateStr,
                content
            };

            posts.unshift(newPost);
            updateFile();
        }

        function deletePost(id) {
            if(!confirm('삭제하시겠습니까?')) return;
            posts = posts.filter(p => p.id !== id);
            updateFile();
        }

        function editPost(id) {
            const post = posts.find(p => p.id === id);
            document.getElementById('new-title').value = post.title;
            document.getElementById('new-content').value = post.content;
            document.getElementById('new-category').value = post.category;
            document.getElementById('submit-btn').innerText = "수정 완료 (파일 업데이트 필요)";
            document.getElementById('submit-btn').onclick = function() {
                post.title = document.getElementById('new-title').value;
                post.content = document.getElementById('new-content').value;
                post.category = document.getElementById('new-category').value;
                updateFile();
            };
            scrollToWrite();
        }

        function searchPosts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const filtered = posts.filter(p => p.title.toLowerCase().includes(query) || p.author.toLowerCase().includes(query));
            renderPosts(filtered);
        }

        function scrollToWrite() {
            document.getElementById('write-section').scrollIntoView({ behavior: 'smooth' });
        }

        function updateFile() {
            renderPosts();
            
            const fullHtml = document.documentElement.outerHTML;
            const dataMarker = 'let posts = [';
            const endMarker = '];';
            const startIndex = fullHtml.indexOf(dataMarker);
            const endIndex = fullHtml.indexOf(endMarker, startIndex) + 2;
            
            const newDataString = `let posts = ${JSON.stringify(posts, null, 12)};`;
            const newHtml = fullHtml.substring(0, startIndex) + newDataString + fullHtml.substring(endIndex);

            document.getElementById('full-code').value = "<!DOCTYPE html>\n" + newHtml;
            document.getElementById('update-area').classList.remove('hidden');
            document.getElementById('update-area').scrollIntoView({ behavior: 'smooth' });
            
            // 초기화
            document.getElementById('new-title').value = "";
            document.getElementById('new-content').value = "";
            document.getElementById('submit-btn').innerText = "게시글 등록 완료";
            document.getElementById('submit-btn').onclick = addPost;
        }

        window.onload = renderPosts;
    </script>
</body>
</html>
