<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; padding: 15px; font-family: sans-serif; }
    .container { max-width: 650px; margin: auto; }
    .form-box { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
    #editor { height: 200px; }
    .post-card { background: white; border-radius: 10px; margin-bottom: 10px; border-left: 6px solid #007bff; cursor: pointer; }
    .post-body { display: none; padding: 15px; border-top: 1px solid #eee; background: #fdfdfd; }
    .img-preview { max-width: 100%; border-radius: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <div class="form-box">
    <div class="d-flex justify-content-between mb-3">
      <small>👤 접속자: <input type="text" id="user" value="관리자" style="border:none; border-bottom:1px solid #ddd; width:70px;"></small>
      <button id="cancelBtn" class="btn btn-sm btn-secondary" onclick="resetForm()" style="display:none;">취소</button>
    </div>
    <div class="row g-2 mb-2">
      <div class="col-4"><select id="cat" class="form-select"><option>공지사항</option><option>성의회관</option><option>의산연</option></select></div>
      <div class="col-8"><input type="text" id="ttl" class="form-control" placeholder="제목"></div>
    </div>
    <div id="editor"></div>
    <input type="file" id="file" accept="image/*" class="form-control mt-3">
    <input type="hidden" id="editId">
    <input type="hidden" id="oldUrl">
    <button id="saveBtn" class="btn btn-primary w-100 mt-3 fw-bold" onclick="save()">게시글 등록</button>
  </div>

  <input type="text" id="search" class="form-control mb-3" placeholder="🔍 검색..." onkeyup="filter()">

  <div id="list"><div class="text-center p-4">불러오는 중...</div></div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
  const quill = new Quill('#editor', { theme: 'snow' });
  let posts = [];

  // 1. 데이터 불러오기
  function load() {
    google.script.run.withSuccessHandler(res => {
      posts = JSON.parse(res);
      render();
    }).getPostsJson();
  }

  // 2. 리스트 그리기
  function render() {
    const list = document.getElementById('list');
    const currUser = document.getElementById('user').value;
    list.innerHTML = posts.length ? "" : "<div class='text-center p-5 card'>글이 없습니다.</div>";
    
    posts.slice().reverse().forEach(p => {
      const [id, author, cat, title, cont, url, date] = p;
      const fileId = url ? (url.match(/[-\w]{25,}/) || [])[0] : null;
      const div = document.createElement('div');
      div.className = 'post-card shadow-sm';
      div.innerHTML = `
        <div class="p-3" onclick="toggle('${id}')">
          <div class="d-flex justify-content-between mb-1"><span class="badge bg-secondary">${cat}</span><small class="text-muted">${date}</small></div>
          <div class="fw-bold">${title}</div>
          <small class="text-muted">작성자: ${author}</small>
        </div>
        <div id="det-${id}" class="post-body">
          <div>${cont}</div>
          ${fileId ? `<img src="https://drive.google.com/thumbnail?id=${fileId}&sz=w800" class="img-preview">` : ''}
          ${author === currUser || currUser === '관리자' ? `
            <div class="mt-3 d-flex gap-2">
              <button class="btn btn-sm btn-outline-success flex-fill" onclick="edit('${id}','${cat}',\`${title}\`,\`${cont}\`,'${url}')">수정</button>
              <button class="btn btn-sm btn-outline-danger flex-fill" onclick="del('${id}')">삭제</button>
            </div>` : ''}
        </div>`;
      list.appendChild(div);
    });
  }

  // 3. 등록/수정 저장
  async function save() {
    const btn = document.getElementById('saveBtn');
    const f = document.getElementById('file').files[0];
    btn.disabled = true; btn.innerText = "처리 중...";
    
    let imgData = null;
    if (f) {
      imgData = await new Promise(r => {
        const rd = new FileReader();
        rd.onload = e => r({ base64: e.target.result.split(',')[1], mimeType: f.type, name: f.name });
        rd.readAsDataURL(f);
      });
    }

    const payload = {
      action: document.getElementById('editId').value ? "update" : "insert",
      id: document.getElementById('editId').value || Date.now().toString(),
      user: document.getElementById('user').value,
      category: document.getElementById('cat').value,
      title: document.getElementById('ttl').value,
      content: quill.root.innerHTML,
      imageBtn: imgData,
      existingFileUrl: document.getElementById('oldUrl').value,
      date: new Date().toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
    };

    google.script.run.withSuccessHandler(res => {
      alert(res); resetForm(); load(); btn.disabled = false; btn.innerText = "게시글 등록";
    }).processAction(payload);
  }

  function toggle(id) {
    const d = document.getElementById('det-' + id);
    const vis = d.style.display === 'block';
    document.querySelectorAll('.post-body').forEach(el => el.style.display = 'none');
    d.style.display = vis ? 'none' : 'block';
  }

  function filter() {
    const q = document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.post-card').forEach(item => {
      item.style.display = item.innerText.toLowerCase().includes(q) ? "" : "none";
    });
  }

  function edit(id, cat, title, cont, url) {
    document.getElementById('editId').value = id;
    document.getElementById('cat').value = cat;
    document.getElementById('ttl').value = title;
    document.getElementById('oldUrl').value = url;
    quill.root.innerHTML = cont;
    document.getElementById('saveBtn').innerText = "수정 완료";
    document.getElementById('cancelBtn').style.display = "block";
    window.scrollTo(0,0);
  }

  function del(id) {
    if(!confirm("삭제할까요?")) return;
    google.script.run.withSuccessHandler(res => { alert(res); load(); }).processAction({action: "delete", id: id});
  }

  function resetForm() {
    document.getElementById('editId').value = "";
    document.getElementById('ttl').value = "";
    document.getElementById('oldUrl').value = "";
    document.getElementById('file').value = "";
    quill.root.innerHTML = "";
    document.getElementById('saveBtn').innerText = "게시글 등록";
    document.getElementById('cancelBtn').style.display = "none";
  }

  load();
</script>
</body>
</html>
