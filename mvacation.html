<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        
        .section-row { display: flex; background: #fff; border-radius: 8px; margin-bottom: 4px; border: 1px solid #e2e2e2; overflow: hidden; }
        .tab-cell { width: 44px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; background: #eee; flex-shrink: 0; }
        .grid-area { display: grid; grid-template-columns: repeat(4, 1fr); flex-grow: 1; gap: 4px; padding: 6px; }
        
        /* 사진 기준 컬러 구분 (좌: 회관-베이지 / 우: 옴니-그린) */
        .border-leader { border: 2.5px solid #999 !important; }
        .border-sung { border: 2.5px solid #dccfbf !important; } 
        .border-omni { border: 2.5px solid #b7d5b9 !important; } 
        
        .card { background: #fff; border-radius: 4px; height: 38px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .name { font-size: 14px; font-weight: 900; color: #000; }
        .pos { font-size: 8px; font-weight: 800; color: #777; }

        /* 모달 월 표시 크게 */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 340px; border-radius: 15px; padding: 20px; }
        .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .month-box { border: 2px solid #eee; border-radius: 10px; padding: 12px 0; text-align: center; }
        .month-name { font-size: 24px; font-weight: 900; color: #000; }
        .month-input { width: 100%; border: none; text-align: center; font-size: 18px; font-weight: 900; color: #007aff; outline: none; }
    </style>
</head>
<body class="p-2">
    <div class="max-w-md mx-auto">
        <header class="flex items-center justify-between mb-4 px-1">
            <h1 class="text-2xl font-black text-black">연차 현황</h1>
            <a href="calendar.html" class="px-3 py-1.5 bg-black text-white rounded font-bold text-xs">근무달력 🔗</a>
        </header>

        <div class="section-row">
            <div class="tab-cell">지휘부</div>
            <div class="grid-area" style="grid-template-columns: repeat(2, 1fr);">
                <div class="card border-leader" onclick="openModal('이규용')"><span class="pos">보안소장</span><span class="name">이규용</span></div>
                <div class="card border-leader" onclick="openModal('박상현')"><span class="pos">부소장</span><span class="name">박상현</span></div>
            </div>
        </div>

        <div class="flex mt-2 mb-1"><div style="width:44px;"></div>
            <div class="grid-area" style="padding:0 6px; gap:4px;">
                <div class="col-span-2 bg-[#e5dbcd] text-black text-[10px] font-black h-5 rounded flex items-center justify-center">성 의 회 관</div>
                <div class="col-span-2 bg-[#c9decb] text-black text-[10px] font-black h-5 rounded flex items-center justify-center">옴 니 버 스</div>
            </div>
        </div>

        <div class="section-row">
            <div class="tab-cell">반장</div>
            <div class="grid-area">
                <div class="col-span-2 card border-sung" onclick="openModal('유정수')"><span class="name">유정수</span></div>
                <div class="col-span-2 card border-omni" onclick="openModal('오제준')"><span class="name">오제준</span></div>
            </div>
        </div>

        <div class="section-row"><div class="tab-cell">A조</div>
            <div class="grid-area">
                <div class="card border-sung" onclick="openModal('배준용')"><span class="name">배준용</span></div>
                <div class="card border-sung" onclick="openModal('이명구')"><span class="name">이명구</span></div>
                <div class="card border-omni" onclick="openModal('손병휘')"><span class="name">손병휘</span></div>
                <div class="card border-omni" onclick="openModal('권순호')"><span class="name">권순호</span></div>
                <div class="card border-omni" onclick="openModal('김영중')"><span class="name">김영중</span></div>
                <div class="card border-omni" onclick="openModal('김삼동')"><span class="name">김삼동</span></div>
                <div class="card border-omni" onclick="openModal('김전식')"><span class="name">김전식</span></div>
            </div>
        </div>

        <div class="section-row"><div class="tab-cell">B조</div>
            <div class="grid-area">
                <div class="card border-sung" onclick="openModal('심규천')"><span class="name">심규천</span></div>
                <div class="card border-sung" onclick="openModal('임종현')"><span class="name">임종현</span></div>
                <div class="card border-omni" onclick="openModal('황일범')"><span class="name">황일범</span></div>
                <div class="card border-omni" onclick="openModal('이상길')"><span class="name">이상길</span></div>
                <div class="card border-omni" onclick="openModal('권영국')"><span class="name">권영국</span></div>
                <div class="card border-omni" onclick="openModal('전준수')"><span class="name">전준수</span></div>
                <div class="card border-omni" onclick="openModal('허용')"><span class="name">허용</span></div>
            </div>
        </div>

        <div class="section-row"><div class="tab-cell">C조</div>
            <div class="grid-area">
                <div class="card border-sung" onclick="openModal('황재업')"><span class="name">황재업</span></div>
                <div class="card border-sung" onclick="openModal('이태원')"><span class="name">이태원</span></div>
                <div class="card border-omni" onclick="openModal('피재영')"><span class="name">피재영</span></div>
                <div class="card border-omni" onclick="openModal('남형민')"><span class="name">남형민</span></div>
                <div class="card border-omni" onclick="openModal('김태언')"><span class="name">김태언</span></div>
                <div class="card border-omni" onclick="openModal('이정석')"><span class="name">이정석</span></div>
                <div class="card border-omni" onclick="openModal('강경훈')"><span class="name">강경훈</span></div>
            </div>
        </div>
    </div>

    <div id="modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalName" class="font-black text-lg mb-4 border-b pb-2"></h2>
            <div class="month-grid" id="monthGrid"></div>
            <button onclick="document.getElementById('modal').style.display='none'" class="w-full mt-6 py-3 bg-black text-white font-black rounded-lg">확인</button>
        </div>
    </div>

    <script>
        function openModal(name) {
            document.getElementById('modalName').innerText = name;
            const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
            for(let i=1; i<=12; i++) {
                grid.innerHTML += `<div class="month-box"><div class="month-name">${i}월</div><input type="number" class="month-input" value="0"></div>`;
            }
            document.getElementById('modal').style.display = 'flex';
        }
    </script>
</body>
</html>
