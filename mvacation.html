<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 연차 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* 헤더 스타일 */
        .calendar-header-style { background: white; border-radius: 0.75rem; border: 1px solid #e2e8f0; padding: 0.75rem; margin-bottom: 0.75rem; }
        .header-controls { display: flex; align-items: center; gap: 0.5rem; }
        #monthSelect { flex: 1.2; height: 44px; background-color: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 0.6rem; font-size: 14px; font-weight: 700; padding: 0 0.75rem; outline: none; }
        .btn-link-cal { flex: 1; height: 44px; background-color: #334155; color: white; border-radius: 0.6rem; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; text-decoration: none; }

        /* 섹션 레이아웃 */
        .section-row { display: flex; background: #fff; border-radius: 12px; margin-bottom: 6px; border: 1px solid #e5e7eb; overflow: hidden; min-height: 58px; }
        .tab-cell { width: 48px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; flex-shrink: 0; border-right: 1px solid #f1f5f9; }
        
        .split-container { display: flex; flex-grow: 1; }
        .split-cell { flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px 0; }
        .fixed-card { width: 45%; height: 42px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; border: 2px solid !important; background-color: #fff; }
        
        .grid-area { display: grid; grid-template-columns: repeat(4, 1fr); flex-grow: 1; gap: 6px; padding: 8px; }
        .card { border-radius: 10px; height: 42px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; border: 2px solid !important; background-color: #fff; }
        
        .name { font-size: 15px; font-weight: 900; color: #1e293b; }
        .v-badge { position: absolute; top: -6px; right: -4px; background: #ef4444; color: white; font-size: 10px; font-weight: 900; min-width: 20px; height: 20px; border-radius: 10px; display: none; align-items: center; justify-content: center; border: 2px solid white; z-index: 10; }

        .border-sung { border-color: #f3e8ff !important; } 
        .border-omni { border-color: #ffedd5 !important; } 
        .border-leader { border-color: #f1f5f9 !important; }

        /* 모달 베이스 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
        .modal-content { background: white; width: 100%; max-width: 420px; border-radius: 24px; padding: 24px; max-height: 90vh; overflow-y: auto; }

        /* 월 그리드 섹션 */
        .month-input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .month-box { border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; cursor: pointer; background: #fff; }
        .m-label { background: #f8fafc; text-align: center; font-size: 12px; font-weight: 900; padding: 6px 0; border-bottom: 1px solid #e2e8f0; color: #64748b; }
        .m-value { height: 38px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: #3b82f6; overflow: hidden; padding: 0 4px; }
        .has-value { border-color: #3b82f6; border-width: 2px; }
        .has-value .m-label { background: #3b82f6; color: white; }

        /* 최상단 입력 팝업 (키패드 대응) */
        #editPopup { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 200; 
            background: rgba(0, 0, 0, 0.6); 
            display: none; 
            justify-content: center; 
            align-items: flex-start; /* 상단 고정 */
            padding-top: 10vh; 
        }
        .popup-box { background: white; width: 90%; max-width: 340px; border-radius: 24px; padding: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="p-3">
    <div class="max-w-md mx-auto">
        <header class="calendar-header-style">
            <div class="flex items-center gap-2 mb-3 px-1">
                <span class="text-2xl">📅</span>
                <h1 class="text-xl font-black text-slate-800">성의교정 연차관리</h1>
            </div>
            <div class="header-controls">
                <select id="monthSelect" onchange="showMonthlyList()">
                    <option value="">연차 명단 (월 선택)</option>
                    <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i}월 연차자 전체명단</option>`);</script>
                </select>
                <a href="calendar.html" class="btn-link-cal">🗓️ 달력으로 이동</a>
            </div>
        </header>

        <div class="section-row">
            <div class="tab-cell bg-slate-100 text-slate-600">지휘부</div>
            <div class="split-container">
                <div class="split-cell">
                    <div class="fixed-card border-leader" onclick="openModal('이규용','성의교정','소장')"><span class="v-badge"></span><div class="text-[9px] font-black text-slate-400">소장</div><span class="name">이규용</span></div>
                </div>
                <div class="split-cell">
                    <div class="fixed-card border-leader" onclick="openModal('박상현','성의교정','부소장')"><span class="v-badge"></span><div class="text-[9px] font-black text-slate-400">부소장</div><span class="name">박상현</span></div>
                </div>
            </div>
        </div>
        <div class="section-row">
            <div class="tab-cell bg-slate-700 text-white text-[10px]">반장</div>
            <div class="split-container">
                <div class="split-cell">
                    <div class="fixed-card border-sung" onclick="openModal('유정수','성의회관','반장')"><span class="v-badge"></span><span class="name">유정수</span></div>
                </div>
                <div class="split-cell">
                    <div class="fixed-card border-omni" onclick="openModal('오제준','옴니버스','반장')"><span class="v-badge"></span><span class="name">오제준</span></div>
                </div>
            </div>
        </div>

        <div id="group-areas"></div>
    </div>

    <div id="modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="text-center mb-6">
                <div id="modalInfo" class="text-[12px] text-blue-500 font-bold mb-1 bg-blue-50 px-3 py-1 rounded-full inline-block"></div>
                <h2 id="modalName" class="font-black text-2xl text-slate-800 mt-2"></h2>
                <p class="text-[11px] text-slate-400 mt-2">수정할 월을 선택하세요</p>
            </div>
            <div class="month-input-grid" id="monthGrid"></div>
            <button onclick="closeModal()" class="w-full mt-8 py-4 bg-slate-800 text-white rounded-2xl font-black">닫기</button>
        </div>
    </div>

    <div id="editPopup" onclick="this.style.display='none'">
        <div class="popup-box" onclick="event.stopPropagation()">
            <h3 id="popupTitle" class="text-lg font-black text-slate-800 mb-3 text-center"></h3>
            <input type="text" id="popupInput" inputmode="decimal" 
                   class="w-full h-14 border-2 border-blue-500 rounded-xl text-center text-2xl font-bold text-blue-600 focus:outline-none bg-blue-50" 
                   placeholder="날짜 입력 (예: 5,12)">
            <p class="text-[11px] text-slate-400 mt-3 text-center">숫자와 쉼표(,)만 입력 가능합니다.</p>
            <div class="flex gap-2 mt-5">
                <button onclick="document.getElementById('editPopup').style.display='none'" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold">취소</button>
                <button id="saveBtn" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md">저장</button>
            </div>
        </div>
    </div>

    <div id="listModal" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="listContainer"></div>
            <button onclick="document.getElementById('listModal').style.display='none'" class="w-full mt-6 py-4 bg-slate-100 text-slate-600 rounded-2xl font-black">닫기</button>
        </div>
    </div>

    <script>
        const membersData = [
            {n:'배준용',g:'A',t:'sung'}, {n:'이명구',g:'A',t:'sung'}, {n:'손병휘',g:'A',t:'omni'}, {n:'권순호',g:'A',t:'omni'}, {n:'김영중',g:'A',t:'sung'}, {n:'김삼동',g:'A',t:'sung'}, {n:'김전식',g:'A',t:'omni'},
            {n:'심규천',g:'B',t:'sung'}, {n:'임종현',g:'B',t:'sung'}, {n:'황일범',g:'B',t:'omni'}, {n:'이상길',g:'B',t:'omni'}, {n:'권영국',g:'B',t:'sung'}, {n:'전준수',g:'B',t:'sung'}, {n:'허용',g:'B',t:'omni'},
            {n:'황재업',g:'C',t:'sung'}, {n:'이태원',g:'C',t:'sung'}, {n:'피재영',g:'C',t:'omni'}, {n:'남형민',g:'C',t:'omni'}, {n:'김태언',g:'C',t:'sung'}, {n:'이정석',g:'C',t:'sung'}, {n:'강경훈',g:'C',t:'omni'}
        ];

        const firebaseConfig = { apiKey: "AIzaSyAu38FXMBUgoeYy1GDViTetsJ68ivHsGyM", authDomain: "catholic-security-system.firebaseapp.com", projectId: "catholic-security-system", storageBucket: "catholic-security-system.firebasestorage.app", messagingSenderId: "978946205343", appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("vacation_system").doc("data");
        let allVData = {}; let activeUser = "";

        docRef.onSnapshot(doc => { 
            if (doc.exists) { 
                allVData = doc.data().vacation || {}; 
                updateMainBadges(); 
                if(document.getElementById('modal').style.display === 'flex') refreshModalGrid();
            } 
        });

        function renderMembers() {
            let html = '';
            const gColors = { 'A': 'background:#eff6ff; color:#3b82f6;', 'B': 'background:#fffbeb; color:#f59e0b;', 'C': 'background:#fef2f2; color:#ef4444;' };
            ['A','B','C'].forEach(g => {
                html += `<div class="section-row"><div class="tab-cell" style="${gColors[g]}">${g}조</div><div class="grid-area">`;
                membersData.filter(m => m.g === g).forEach(m => {
                    html += `<div class="card ${m.t==='sung'?'border-sung':'border-omni'}" onclick="openModal('${m.n}','${m.t==='sung'?'성의회관':'옴니버스'}','${g}조')"><span class="v-badge"></span><span class="name">${m.n}</span></div>`;
                });
                html += `</div></div>`;
            });
            document.getElementById('group-areas').innerHTML = html;
        }

        function openModal(name, loc, group) {
            activeUser = name;
            document.getElementById('modalInfo').innerText = `${loc} • ${group}`;
            document.getElementById('modalName').innerText = name;
            refreshModalGrid();
            document.getElementById('modal').style.display = 'flex';
        }

        function refreshModalGrid() {
            const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
            for(let i=1; i<=12; i++) {
                const mk = `2026-${String(i).padStart(2,'0')}`;
                const val = allVData[mk]?.[activeUser] || "";
                grid.innerHTML += `
                <div class="month-box ${val?'has-value':''}" onclick="openEditPopup('${mk}', ${i})">
                    <div class="m-label">${i}월</div>
                    <div class="m-value" id="val-${mk}">${val || '-'}</div>
                </div>`;
            }
        }

        function openEditPopup(mk, month) {
            const popup = document.getElementById('editPopup');
            const input = document.getElementById('popupInput');
            document.getElementById('popupTitle').innerText = `${month}월 날짜 입력`;
            input.value = allVData[mk]?.[activeUser] || "";
            
            document.getElementById('saveBtn').onclick = async () => {
                const newVal = input.value.trim().replace(/[^0-9,]/g, ''); // 숫자와 쉼표 외 제거
                if (!allVData[mk]) allVData[mk] = {};
                allVData[mk][activeUser] = newVal;
                await docRef.update({ vacation: allVData });
                popup.style.display = 'none';
            };

            popup.style.display = 'flex';
            setTimeout(() => {
                input.focus();
                input.setSelectionRange(input.value.length, input.value.length);
            }, 100);
        }

        function showMonthlyList() {
            const m = document.getElementById('monthSelect').value; if(!m) return;
            const mk = `2026-${m.padStart(2,'0')}`;
            const raw = allVData[mk] || {};
            const dateMap = {};

            Object.entries(raw).forEach(([name, dates]) => {
                if(!dates) return;
                dates.split(',').forEach(d => {
                    const dNum = d.trim(); if(!dNum) return;
                    const dObj = new Date(2026, parseInt(m)-1, parseInt(dNum));
                    const dayName = ["일", "월", "화", "수", "목", "금", "토"][dObj.getDay()];
                    const key = `${dNum}(${dayName})`;
                    if(!dateMap[key]) dateMap[key] = [];
                    let mInfo = membersData.find(md => md.n === name);
                    if(!mInfo) { // 지휘부/반장 대응
                        if(name==='이규용') mInfo={n:'이규용',g:'지휘부',t:'sung'};
                        if(name==='박상현') mInfo={n:'박상현',g:'지휘부',t:'omni'};
                        if(name==='유정수') mInfo={n:'유정수',g:'반장',t:'sung'};
                        if(name==='오제준') mInfo={n:'오제준',g:'반장',t:'omni'};
                    }
                    dateMap[key].push(mInfo);
                });
            });

            let html = `<div class="mb-4 text-center"><h2 class="text-xl font-black text-slate-800">${m}월 연차 명단</h2></div>`;
            const sorted = Object.keys(dateMap).sort((a,b) => parseInt(a) - parseInt(b));
            
            sorted.forEach(key => {
                let row = `<div class="list-row"><span class="l-date ${key.includes("(일)")?'text-red-500':''}">${m}/${key}</span><div class="l-content">`;
                ['A','B','C','지휘부','반장'].forEach(g => {
                    const ps = dateMap[key].filter(p => p && p.g === g);
                    if(ps.length > 0) {
                        row += `<span class="l-badge ${g==='A'?'bg-a':g==='B'?'bg-b':'bg-c'}">${g}${['A','B','C'].includes(g)?'조':''}</span>`;
                        const sung = ps.filter(p => p.t === 'sung').map(p => p.n);
                        const omni = ps.filter(p => p.t === 'omni').map(p => p.n);
                        if(sung.length > 0) row += `<span class="text-purple-600">회관</span> ${sung.join(', ')} `;
                        if(omni.length > 0) row += `<span class="text-orange-600 ml-1">옴니</span> ${omni.join(', ')} `;
                    }
                });
                row += `</div></div>`;
                html += row;
            });

            document.getElementById('listContainer').innerHTML = html || '<p class="text-center py-10 text-slate-400">등록된 연차가 없습니다.</p>';
            document.getElementById('listModal').style.display = 'flex';
            document.getElementById('monthSelect').value = "";
        }

        function updateMainBadges() {
            document.querySelectorAll('.fixed-card, .card').forEach(card => {
                const name = card.querySelector('.name')?.innerText;
                const badge = card.querySelector('.v-badge');
                if(!name || !badge) return;
                let total = 0;
                for(let m=1; m<=12; m++) {
                    const val = allVData[`2026-${String(m).padStart(2,'0')}`]?.[name] || "";
                    if(val) total += val.split(',').filter(x => x.trim()).length;
                }
                badge.innerText = total; badge.style.display = total > 0 ? 'flex' : 'none';
            });
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        renderMembers();
    </script>
</body>
</html>
