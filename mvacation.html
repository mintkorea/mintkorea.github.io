<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        .unified-header { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e5e7eb; padding: 0.75rem 1rem; margin-bottom: 1rem; }
        
        /* [수정] 드롭박스 폰트 12 및 여백 최소화 */
        #monthSelect { 
            font-size: 12px !important; 
            font-weight: 700; 
            padding: 0 4px !important; 
            height: 32px !important;
            letter-spacing: -0.5px;
        }
        .btn-cal { height: 32px !important; padding: 0 12px !important; font-size: 12px !important; font-weight: 900; }

        .section-row { display: flex; background: #fff; border-radius: 8px; margin-bottom: 4px; border: 1px solid #f1f3f5; overflow: hidden; }
        .tab-cell { width: 48px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; color: #495057; background: #f1f3f5; flex-shrink: 0; }
        .grid-area { display: grid; grid-template-columns: repeat(4, 1fr); flex-grow: 1; gap: 8px; padding: 8px; }
        
        .span-2-center { grid-column: span 2; display: flex; justify-content: center; align-items: center; }
        .span-2-center .card { width: 100%; max-width: 125px; } 

        .card { background: #fff; border-radius: 6px; height: 42px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; border-width: 2.5px !important; }
        .border-sung { border-color: #e5dbcd !important; } 
        .border-omni { border-color: #c9decb !important; } 
        .border-leader { border-color: #cbd5e1 !important; }

        .label-building { font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; height: 34px; border-radius: 6px; width: 100%; }
        .bg-sung { background-color: #f3ece3; color: #5d564f; border: 1px solid #e5dbcd; }
        .bg-omni { background-color: #d9eada; color: #4d5d4d; border: 1px solid #c9decb; }

        .pos { font-size: 8px; font-weight: 900; color: #64748b; margin-bottom: -1px; }
        .name { font-size: 15px; font-weight: 900; color: #1e293b; }
        .v-badge { position: absolute; top: -6px; right: -4px; background: #ef4444; color: white; font-size: 10px; font-weight: 900; min-width: 18px; height: 18px; border-radius: 9px; display: none; align-items: center; justify-content: center; border: 1.5px solid white; z-index: 10; }
        
        .row-A .tab-cell { background: #d3f9d8; }
        .row-B .tab-cell { background: #ffec99; }
        .row-C .tab-cell { background: #ffc9c9; }

        #modal, #listModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 420px; border-radius: 20px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        
        /* 리스트 배지 스타일 */
        .badge-group { font-size: 11px; font-weight: 900; padding: 2px 6px; border-radius: 4px; color: white; }
        .bg-a-group { background-color: #f59e0b; }
        .bg-b-group { background-color: #ef4444; }
        .bg-c-group { background-color: #3b82f6; }
        .badge-loc { font-size: 11px; font-weight: 900; padding: 2px 6px; border-radius: 4px; }
        .loc-sung { background-color: #a855f7; color: white; }
        .loc-omni { background-color: #f97316; color: white; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto">
        <div class="unified-header">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2"><span class="text-xl">📅</span><h1 class="text-lg font-black text-slate-800">보안 연차 현황</h1></div>
            </div>
            <div class="flex items-center gap-2">
                <select id="monthSelect" class="flex-1 rounded border border-slate-200 bg-slate-50 outline-none" onchange="showMonthlyList()">
                    <option value="">월 선택 (명단확인)</option>
                    <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i}월 연차자</option>`);</script>
                </select>
                <a href="calendar.html" class="btn-cal bg-slate-800 text-white rounded font-black flex items-center shadow-sm">근무달력</a>
            </div>
        </div>

        <div class="section-row">
            <div class="tab-cell">지휘부</div>
            <div class="grid-area">
                <div class="span-2-center"><div class="card border-leader" onclick="openModal('이규용')"><span class="v-badge"></span><span class="pos">보안소장</span><span class="name">이규용</span></div></div>
                <div class="span-2-center"><div class="card border-leader" onclick="openModal('박상현')"><span class="v-badge"></span><span class="pos">부소장</span><span class="name">박상현</span></div></div>
            </div>
        </div>

        <div class="flex mb-2 mt-2"><div style="width:48px;"></div><div class="flex flex-grow gap-2 px-2">
            <div class="label-building bg-sung">성 의 회 관</div><div class="label-building bg-omni">옴니버스 파크</div>
        </div></div>

        <div class="section-row">
            <div class="tab-cell">반장</div>
            <div class="grid-area">
                <div class="span-2-center"><div class="card border-sung" onclick="openModal('유정수')"><span class="v-badge"></span><span class="name">유정수</span></div></div>
                <div class="span-2-center"><div class="card border-omni" onclick="openModal('오제준')"><span class="v-badge"></span><span class="name">오제준</span></div></div>
            </div>
        </div>

        <div class="section-row row-A"><div class="tab-cell">A조</div><div class="grid-area" id="group-A"></div></div>
        <div class="section-row row-B"><div class="tab-cell">B조</div><div class="grid-area" id="group-B"></div></div>
        <div class="section-row row-C"><div class="tab-cell">C조</div><div class="grid-area" id="group-C"></div></div>
    </div>

    <div id="listModal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()"><div id="listContainer"></div></div></div>
    <div id="modal" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()"><h2 id="modalName" class="font-black text-lg mb-4 text-slate-800"></h2><div class="grid grid-cols-3 gap-3" id="monthGrid"></div><button onclick="closeModal()" class="w-full mt-6 py-3 bg-slate-100 rounded-xl font-bold text-slate-600">닫기</button></div></div>

    <script>
        // 사진 순서 및 건물 데이터 (유지)
        const members = {
            'A': [{n:'배준용',t:'sung'}, {n:'이명구',t:'sung'}, {n:'손병휘',t:'omni'}, {n:'권순호',t:'omni'}, {n:'김영중',t:'sung'}, {n:'김삼동',t:'sung'}, {n:'김전식',t:'omni'}],
            'B': [{n:'심규천',t:'sung'}, {n:'임종현',t:'sung'}, {n:'황일범',t:'omni'}, {n:'이상길',t:'omni'}, {n:'권영국',t:'sung'}, {n:'전준수',t:'sung'}, {n:'허용',t:'omni'}],
            'C': [{n:'황재업',t:'sung'}, {n:'이태원',t:'sung'}, {n:'피재영',t:'omni'}, {n:'남형민',t:'omni'}, {n:'김태언',t:'sung'}, {n:'이정석',t:'sung'}, {n:'강경훈',t:'omni'}]
        };

        function renderMembers() {
            ['A','B','C'].forEach(g => {
                const container = document.getElementById(`group-${g}`);
                let html = '';
                members[g].forEach(m => {
                    const bc = m.t === 'sung' ? 'border-sung' : 'border-omni';
                    html += `<div class="card ${bc}" onclick="openModal('${m.n}')"><span class="v-badge"></span><span class="name">${m.n}</span></div>`;
                });
                container.innerHTML = html;
            });
        }
        renderMembers();

        // Firebase 설정 (유지)
        const firebaseConfig = { apiKey: "AIzaSyAu38FXMBUgoeYy1GDViTetsJ68ivHsGyM", authDomain: "catholic-security-system.firebaseapp.com", projectId: "catholic-security-system", storageBucket: "catholic-security-system.firebasestorage.app", messagingSenderId: "978946205343", appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("vacation_system").doc("data");
        let allVData = {}; let activeUser = "";

        docRef.onSnapshot(doc => { if (doc.exists) { allVData = doc.data().vocation || {}; updateMainBadges(); } });

        function updateMainBadges() {
            document.querySelectorAll('.card').forEach(card => {
                const name = card.querySelector('.name')?.innerText;
                const badge = card.querySelector('.v-badge');
                if(!name || !badge) return;
                let total = 0;
                for(let m=1; m<=12; m++) {
                    const mk = `2026-${String(m).padStart(2,'0')}`;
                    const val = allVData[mk]?.[name] || "";
                    if(val) total += val.split(',').filter(x => x.trim()).length;
                }
                if(total > 0) { badge.innerText = total; badge.style.display = 'flex'; }
                else { badge.style.display = 'none'; }
            });
        }

        function openModal(name) {
            activeUser = name;
            document.getElementById('modalName').innerText = name + " 연차 설정";
            const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
            for(let i=1; i<=12; i++) {
                const mk = `2026-${String(i).padStart(2,'0')}`;
                const val = allVData[mk]?.[activeUser] || "";
                grid.innerHTML += `<div class="bg-slate-50 p-2 rounded-lg border border-slate-100 text-center"><div class="text-[10px] font-bold text-slate-400">${i}월</div><input type="text" class="w-full text-center font-bold text-blue-600 outline-none bg-transparent" value="${val}" onchange="saveData('${mk}', this.value)"></div>`;
            }
            document.getElementById('modal').style.display = 'flex';
        }

        async function saveData(mk, val) { if(!allVData[mk]) allVData[mk] = {}; allVData[mk][activeUser] = val; await docRef.update({ vocation: allVData }); }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // 이미지 리스트 스타일 구현
        function showMonthlyList() {
            const m = document.getElementById('monthSelect').value; if(!m) return;
            const mk = `2026-${m.padStart(2,'0')}`;
            const data = allVData[mk] || {};
            let html = `<h2 class="text-xl font-black mb-4 text-slate-800">${m}월 연차자 명단</h2><div class="space-y-2">`;
            let hasData = false;
            
            const allMembers = [
                {n:'이규용', t:'sung', g:'-'}, {n:'박상현', t:'-', g:'-'}, {n:'유정수', t:'sung', g:'-'}, {n:'오제준', t:'omni', g:'-'},
                ...members.A.map(x=>({...x, g:'A'})), ...members.B.map(x=>({...x, g:'B'})), ...members.C.map(x=>({...x, g:'C'}))
            ];

            Object.entries(data).forEach(([name, dates]) => {
                if(dates.trim()) {
                    const info = allMembers.find(x => x.n === name);
                    const gClass = info?.g === 'A' ? 'bg-a-group' : info?.g === 'B' ? 'bg-b-group' : 'bg-c-group';
                    const locClass = info?.t === 'sung' ? 'loc-sung' : 'loc-omni';
                    const locName = info?.t === 'sung' ? '성의회관' : (info?.t === 'omni' ? '옴니버스' : '-');

                    html += `
                    <div class="flex items-center gap-2 p-3 bg-white border border-slate-200 rounded-xl shadow-sm">
                        <span class="text-blue-600 font-black text-sm min-w-[50px]">${dates}</span>
                        ${info?.g !== '-' ? `<span class="badge-group ${gClass}">${info.g}</span>` : ''}
                        ${info?.t ? `<span class="badge-loc ${locClass}">${locName}</span>` : ''}
                        <span class="flex-1 text-right font-black text-slate-800 text-base">${name}</span>
                    </div>`;
                    hasData = true;
                }
            });
            
            if(!hasData) html += `<div class="text-center py-10 text-slate-400 font-bold">등록된 연차가 없습니다.</div>`;
            html += `</div><button onclick="document.getElementById('listModal').style.display='none'" class="w-full mt-6 py-4 bg-slate-800 text-white rounded-xl font-black shadow-lg">확인</button>`;
            document.getElementById('listContainer').innerHTML = html;
            document.getElementById('listModal').style.display = 'flex';
        }
    </script>
</body>
</html>
