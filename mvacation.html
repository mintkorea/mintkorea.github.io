<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        .unified-header { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e5e7eb; padding: 1.25rem; margin-bottom: 1rem; }
        
        .section-row { display: flex; background: #fff; border-radius: 8px; margin-bottom: 4px; border: 1px solid #f1f3f5; overflow: hidden; }
        .tab-cell { width: 48px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 12px; flex-shrink: 0; }
        .grid-area { display: grid; grid-template-columns: repeat(4, 1fr); flex-grow: 1; gap: 8px; padding: 8px; }
        
        .span-2-center { grid-column: span 2; display: flex; justify-content: center; align-items: center; }
        .card { background: #fff; border-radius: 6px; height: 42px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; border-width: 2.5px !important; width: 100%; }
        
        /* 건물별 테두리 및 배지 컬러 (캘린더 일치) */
        .border-sung { border-color: #a855f7 !important; }  /* 성의: 보라 */
        .border-omni { border-color: #f97316 !important; }  /* 옴니: 주황 */
        .border-leader { border-color: #cbd5e1 !important; }

        .label-building { font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; height: 34px; border-radius: 6px; width: 100%; }
        .bg-sung { background-color: #f3e8ff; color: #6b21a8; border: 1px solid #a855f7; }
        .bg-omni { background-color: #ffedd5; color: #9a3412; border: 1px solid #f97316; }

        .name { font-size: 15px; font-weight: 900; color: #1e293b; }
        .v-badge { position: absolute; top: -6px; right: -4px; background: #ef4444; color: white; font-size: 10px; font-weight: 900; min-width: 18px; height: 18px; border-radius: 9px; display: none; align-items: center; justify-content: center; border: 1.5px solid white; z-index: 10; }
        
        /* 조별 배경색 (캘린더 일치) */
        .row-A .tab-cell { background: #fffbeb; color: #d97706; } 
        .row-B .tab-cell { background: #fef2f2; color: #dc2626; } 
        .row-C .tab-cell { background: #eff6ff; color: #2563eb; } 

        /* 리스트 모달 내 배지 스타일 */
        .badge-group { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 900; color: white; }
        .badge-A { background-color: #f59e0b; }
        .badge-B { background-color: #ef4444; }
        .badge-C { background-color: #3b82f6; }

        #modal, #listModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: white; width: 100%; max-width: 450px; border-radius: 24px; padding: 24px; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto">
        <div class="unified-header text-center">
            <h1 class="text-xl font-black text-slate-800 mb-4">📅 보안 연차 현황</h1>
            <div class="flex gap-2">
                <select id="monthSelect" class="flex-1 h-12 rounded-xl border border-slate-200 px-4 font-bold text-slate-600 bg-slate-50 outline-none appearance-none" onchange="showMonthlyList()">
                    <option value="">월 선택 (명단확인)</option>
                    <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">${i}월 연차자</option>`);</script>
                </select>
                <a href="calendar.html" class="bg-slate-800 text-white px-6 h-12 rounded-xl font-bold flex items-center shadow-lg">달력보기</a>
            </div>
        </div>

        <div class="flex mb-2 mt-4"><div style="width:48px;"></div><div class="flex flex-grow gap-2 px-2">
            <div class="label-building bg-sung">성 의 / 의 산 연</div><div class="label-building bg-omni">옴 니 버 스</div>
        </div></div>

        <div class="section-row row-A"><div class="tab-cell">A조</div><div class="grid-area" id="group-A"></div></div>
        <div class="section-row row-B"><div class="tab-cell">B조</div><div class="grid-area" id="group-B"></div></div>
        <div class="section-row row-C"><div class="tab-cell">C조</div><div class="grid-area" id="group-C"></div></div>
    </div>

    <div id="listModal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()"><div id="listContainer"></div></div></div>
    
    <div id="modal" onclick="closeModal()"><div class="modal-content" onclick="event.stopPropagation()"><h2 id="modalName" class="font-black text-xl mb-6"></h2><div class="grid grid-cols-3 gap-3" id="monthGrid"></div><button onclick="closeModal()" class="w-full mt-8 py-4 bg-slate-100 rounded-2xl font-bold text-slate-600">설정 닫기</button></div></div>

    <script>
        // [수정] 비상연락망 기준 소속 완전 교정
        const members = {
            'A': { sung: ['배준용','이명구','김영중','김삼동'], omni: ['손병휘','권순호','김전식'] },
            'B': { sung: ['심규천','임종현','권영국','전준수'], omni: ['황일범','이상길','허용'] },
            'C': { sung: ['황재업','이태원','김태언','이정석'], omni: ['피재영','남형민','강경훈'] }
        };

        const memberInfo = {}; // 역방향 참조용 (이름 -> {조, 소속})
        function initMemberInfo() {
            Object.entries(members).forEach(([group, locs]) => {
                locs.sung.forEach(n => memberInfo[n] = { group, loc: '성의회관' });
                locs.omni.forEach(n => memberInfo[n] = { group, loc: '옴니버스' });
            });
        }
        initMemberInfo();

        function renderMembers() {
            ['A','B','C'].forEach(g => {
                const container = document.getElementById(`group-${g}`);
                let html = '';
                members[g].sung.forEach(n => html += `<div class="card border-sung" onclick="openModal('${n}')"><span class="v-badge"></span><span class="name">${n}</span></div>`);
                members[g].omni.forEach(n => html += `<div class="card border-omni" onclick="openModal('${n}')"><span class="v-badge"></span><span class="name">${n}</span></div>`);
                container.innerHTML = html;
            });
        }
        renderMembers();

        const firebaseConfig = {
            apiKey: "AIzaSyAu38FXMBUgoeYy1GDViTetsJ68ivHsGyM",
            authDomain: "catholic-security-system.firebaseapp.com",
            projectId: "catholic-security-system",
            storageBucket: "catholic-security-system.firebasestorage.app",
            messagingSenderId: "978946205343",
            appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const docRef = db.collection("vacation_system").doc("data");
        let allVData = {};
        let activeUser = "";

        docRef.onSnapshot(doc => { if (doc.exists) { allVData = doc.data().vocation || {}; updateMainBadges(); } });

        function updateMainBadges() {
            document.querySelectorAll('.card').forEach(card => {
                const name = card.querySelector('.name')?.innerText;
                const badge = card.querySelector('.v-badge');
                if(!name || !badge) return;
                let total = 0;
                for(let m=1; m<=12; m++) {
                    const mk = `2026-${String(m).padStart(2,'0')}`;
                    const val = allVData[mk]?.[name] || "";
                    if(val) total += val.split(',').filter(x => x.trim()).length;
                }
                if(total > 0) { badge.innerText = total; badge.style.display = 'flex'; }
                else { badge.style.display = 'none'; }
            });
        }

        // [수정] 연차자 리스트 출력 (날짜별 정렬 및 배지 디자인 적용)
        function showMonthlyList() {
            const m = document.getElementById('monthSelect').value;
            if(!m) return;
            const mk = `2026-${m.padStart(2,'0')}`;
            const data = allVData[mk] || {};
            
            // 날짜별로 데이터 재정리
            const dayMap = {};
            Object.entries(data).forEach(([name, dates]) => {
                if(!dates.trim()) return;
                dates.split(',').forEach(d => {
                    const day = d.trim();
                    if(!dayMap[day]) dayMap[day] = [];
                    dayMap[day].push(name);
                });
            });

            const sortedDays = Object.keys(dayMap).sort((a,b) => Number(a)-Number(b));
            
            let html = `<div class="flex justify-between items-center mb-6"><h2 class="text-xl font-black">${m}월 연차자 명단</h2><button onclick="document.getElementById('listModal').style.display='none'" class="text-slate-400 text-2xl">✕</button></div><div class="space-y-3">`;
            
            if(sortedDays.length === 0) {
                html += `<div class="text-center py-16 text-slate-400 font-bold">등록된 연차가 없습니다.</div>`;
            } else {
                sortedDays.forEach(day => {
                    dayMap[day].forEach(name => {
                        const info = memberInfo[name] || { group: '-', loc: '-' };
                        const locClass = info.loc === '성의회관' ? 'bg-sung' : 'bg-omni';
                        html += `
                        <div class="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <div class="text-sm font-black text-slate-800 min-w-[50px]">${m}/${day}</div>
                            <div class="badge-group badge-${info.group}">${info.group}</div>
                            <div class="badge-group ${locClass}" style="color:inherit; font-size:10px;">${info.loc}</div>
                            <div class="flex-1 text-right font-black text-slate-900">${name}</div>
                        </div>`;
                    });
                });
            }
            html += `</div>`;
            document.getElementById('listContainer').innerHTML = html;
            document.getElementById('listModal').style.display = 'flex';
        }

        function openModal(name) {
            activeUser = name;
            document.getElementById('modalName').innerText = name + " 연차 설정";
            const grid = document.getElementById('monthGrid'); grid.innerHTML = '';
            for(let i=1; i<=12; i++) {
                const mk = `2026-${String(i).padStart(2,'0')}`;
                const val = allVData[mk]?.[activeUser] || "";
                grid.innerHTML += `<div class="bg-slate-50 p-3 rounded-2xl border border-slate-100 text-center"><div class="text-[10px] font-black text-slate-400 mb-1">${i}월</div><input type="text" class="w-full text-center font-bold text-blue-600 outline-none bg-transparent" value="${val}" placeholder="날짜입력" onchange="saveData('${mk}', this.value)"></div>`;
            }
            document.getElementById('modal').style.display = 'flex';
        }

        async function saveData(mk, val) {
            if(!allVData[mk]) allVData[mk] = {};
            allVData[mk][activeUser] = val;
            await docRef.update({ vocation: allVData });
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
    </script>
</body>
</html>
