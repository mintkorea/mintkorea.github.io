<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 모바일 관리</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --bg: #f8f9fa; --tab-bg: #fff; --border: #eceef0;
            --blue-main: #3498db;
            
            /* [새 요청] 조별 파스텔톤 컬러 정의 */
            /* A조: 파스텔 오렌지 */
            --orange-hdr: #ffd8a8; --orange-card: #fff4e6; --orange-txt: #d9480f;
            /* B조: 파스텔 레드 */
            --red-hdr: #ffc9c9; --red-card: #fff5f5; --red-txt: #c92a2a;
            /* C조: 파스텔 블루 */
            --blue-hdr: #a5d8ff; --blue-card: #e7f5ff; --blue-txt: #1864ab;
            
            /* 지휘부/반장: 차분한 그레이 파스텔 */
            --gray-hdr: #e9ecef; --gray-card: #f8f9fa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding-bottom: 70px; color: #333; }

        .header { background: #fff; padding: 12px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #sync-badge { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
        #sync-text { font-size: 11px; color: #adb5bd; font-weight: bold; }

        .app-container { max-width: 800px; margin: 10px auto; padding: 0 8px; }
        
        .group-table { 
            display: flex; width: 100%; background: #fff; border-radius: 12px; 
            overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.04); margin-bottom: 12px; 
            border: 1px solid var(--border);
        }
        
        .left-header { 
            width: 45px; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 13px; writing-mode: vertical-lr; text-orientation: mixed; 
            letter-spacing: 1px; flex-shrink: 0;
        }
        
        .right-content { flex-grow: 1; padding: 10px; }
        .member-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }

        .person-card { 
            background: #fff; border: 1px solid var(--border); border-radius: 10px; 
            padding: 6px 2px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; cursor: pointer; transition: 0.1s; min-height: 52px; 
        }
        /* 연차 입력 시 블루 테두리 강조 */
        .person-card.active { border: 2px solid var(--blue-main) !important; box-shadow: 0 0 8px rgba(52, 152, 219, 0.2); }
        
        .pos { font-size: 8px; color: #868e96; font-weight: bold; margin-bottom: 2px; white-space: nowrap; }
        .name { font-size: 13px; font-weight: 900; color: #212529; }

        /* --- [색상 테마 적용] --- */
        
        /* 지휘부 & 반장 (Gray) */
        .gr-지휘부 .left-header, .gr-반장 .left-header { background: var(--gray-hdr); color: #495057; writing-mode: horizontal-tb; width: 55px; }
        .gr-지휘부 .person-card, .gr-반장 .person-card { background: var(--gray-card); }

        /* A조 (Pastel Orange) */
        .gr-A조 .left-header { background: var(--orange-hdr); color: var(--orange-txt); }
        .gr-A조 .person-card { background: var(--orange-card); border-color: #ffe8cc; }
        
        /* B조 (Pastel Red) */
        .gr-B조 .left-header { background: var(--red-hdr); color: var(--red-txt); }
        .gr-B조 .person-card { background: var(--red-card); border-color: #ffebec; }
        
        /* C조 (Pastel Blue) */
        .gr-C조 .left-header { background: var(--blue-hdr); color: var(--blue-txt); }
        .gr-C조 .person-card { background: var(--blue-card); border-color: #d0ebff; }

        .empty-card { border: 1px dashed #dee2e6; border-radius: 10px; background: transparent; min-height: 52px; }

        /* 탭 및 모달 스타일 유지 */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 55px; background: #fff; display: flex; border-top: 1px solid #eee; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #adb5bd; font-size: 10px; font-weight: bold; }
        .tab.active { color: var(--blue-main); }
        .tab-icon { font-size: 18px; margin-bottom: 1px; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: flex-end; }
        .modal-content { background: #fff; width: 100%; max-width: 500px; padding: 20px; border-radius: 20px 20px 0 0; }
        .m-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .m-input { background: #f8f9fa; padding: 8px; border-radius: 10px; border: 1px solid #eee; text-align: center; }
        .m-input input { width: 100%; border: none; background: transparent; text-align: center; font-size: 16px; font-weight: bold; color: var(--blue-main); outline: none; }
        .m-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; font-size: 15px; background: var(--blue-main); color: #fff; }
    </style>
</head>
<body>

<header class="header">
    <div id="sync-badge"></div>
    <div id="sync-text">연결 대기...</div>
</header>

<div class="app-container" id="list-area"></div>

<nav class="tab-bar">
    <a href="#" class="tab active"><span class="tab-icon">👤</span>입력</a>
    <a href="calendar.html" class="tab"><span class="tab-icon">📅</span>대장</a>
</nav>

<div id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="m-header" style="text-align:center;">
            <div id="m-pos" style="font-size:11px; color:#868e96; font-weight:bold;"></div>
            <div id="m-name" style="font-size:18px; font-weight:900; margin-bottom:12px;"></div>
        </div>
        <div class="m-grid" id="m-grid"></div>
        <button class="m-btn" onclick="save()">저장하기</button>
    </div>
</div>

<script>
    // Firebase 및 스크립트 로직은 이전과 동일 (vocation_app 경로 유지)
    const firebaseConfig = {
        apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
        authDomain: "catholic-security-system.firebaseapp.com",
        projectId: "catholic-security-system",
        storageBucket: "catholic-security-system.firebasestorage.app",
        messagingSenderId: "978946205343",
        appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let staffList = [];
    let vData = {};
    let selectedUser = null;
    let currentY = new Date().getFullYear();

    const mGrid = document.getElementById('m-grid');
    for(let i=1; i<=12; i++) {
        mGrid.innerHTML += `<div class="m-input"><label style="font-size:10px; color:#adb5bd; display:block; margin-bottom:2px;">${i}월</label><input type="text" id="month-${i}" inputmode="decimal"></div>`;
    }

    function init() {
        db.collection("vocation_app").doc("data").onSnapshot(doc => {
            const badge = document.getElementById('sync-badge');
            const text = document.getElementById('sync-text');
            if(doc.exists) {
                const data = doc.data();
                staffList = data.staff || [];
                vData = data.vocation || {};
                render();
                badge.style.background = "#51cf66"; text.innerText = "● 실시간 동기화";
            }
        });
    }

    function render() {
        const area = document.getElementById('list-area');
        area.innerHTML = '';
        const groups = ["지휘부", "반장", "A조", "B조", "C조"];
        
        groups.forEach(gName => {
            const members = staffList.filter(s => s.g === gName);
            if(members.length > 0) {
                const table = document.createElement('div');
                table.className = `group-table gr-${gName}`;
                table.innerHTML = `<div class="left-header">${gName}</div><div class="right-content"><div class="member-grid"></div></div>`;
                const grid = table.querySelector('.member-grid');
                
                // 4열 배치 로직 (성의/지휘 vs 옴니/의산연)
                const leftM = members.filter(s => s.p.includes("성의") || s.p.includes("소장") || (gName === "반장" && s.n === members[0].n));
                const rightM = members.filter(s => s.p.includes("옴니") || s.p.includes("의산연") || (gName === "반장" && s.n === members[1]?.n));
                
                const rows = Math.max(Math.ceil(leftM.length / 2), Math.ceil(rightM.length / 2), 1);
                
                for(let r=0; r<rows; r++) {
                    for(let i=0; i<2; i++) {
                        const idx = r*2 + i;
                        if(leftM[idx]) grid.appendChild(createCard(leftM[idx]));
                        else grid.appendChild(createEmptyCard());
                    }
                    for(let i=0; i<2; i++) {
                        const idx = r*2 + i;
                        if(rightM[idx]) grid.appendChild(createCard(rightM[idx]));
                        else grid.appendChild(createEmptyCard());
                    }
                }
                area.appendChild(table);
            }
        });
    }

    function createCard(staffObj) {
        let hasV = false;
        for(let i=1; i<=12; i++) {
            const mk = `${currentY}-${String(i).padStart(2,'0')}`;
            if(vData[mk]?.[staffObj.n]) { hasV = true; break; }
        }
        const card = document.createElement('div');
        card.className = `person-card ${hasV ? 'active' : ''}`;
        card.innerHTML = `<span class="pos">${staffObj.p}</span><span class="name">${staffObj.n}</span>`;
        card.onclick = () => openModal(staffObj);
        return card;
    }

    function createEmptyCard() {
        const div = document.createElement('div');
        div.className = 'empty-card';
        return div;
    }

    function openModal(staffObj) {
        selectedUser = staffObj;
        document.getElementById('m-pos').innerText = staffObj.g + " · " + staffObj.p;
        document.getElementById('m-name').innerText = staffObj.n;
        for(let i=1; i<=12; i++) {
            const mk = `${currentY}-${String(i).padStart(2,'0')}`;
            document.getElementById(`month-${i}`).value = vData[mk]?.[staffObj.n] || "";
        }
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function save() {
        const updates = {};
        for(let i=1; i<=12; i++) {
            const mk = `${currentY}-${String(i).padStart(2,'0')}`;
            const val = document.getElementById(`month-${i}`).value.trim();
            updates[`vocation.${mk}.${selectedUser.n}`] = val;
        }
        await db.collection("vocation_app").doc("data").update(updates);
        closeModal();
    }
    window.onload = init;
</script>
</body>
</html>
