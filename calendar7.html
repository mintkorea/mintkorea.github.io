<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 연차 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; background: white; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; position: relative; aspect-ratio: 1 / 1.25; cursor: pointer; }
        
        /* 날짜 영역: 높이 고정 및 점 배치를 위한 relative */
        .date-area { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; position: relative; z-index: 10; }
        .shift-area { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; z-index: 5; }
        
        /* 강조 투톤: 날짜부분 투명도 */
        .cell-highlighted .date-area { background-color: rgba(255,255,255,0.6); }
        .cell-highlighted .shift-area { color: white !important; }

        .is-today { border: 2.5px solid #ef4444 !important; z-index: 20; }
        .is-today::after { content: 'T'; position: absolute; top: 0; left: 2px; color: #ef4444; font-size: 9px; font-weight: 900; }
        
        /* [수정] 연차 점: 좌우 및 하단에 절대 좌표로 배치 (셀 크기에 영향 없음) */
        .v-dot { position: absolute; width: 6px; height: 6px; border-radius: 50%; z-index: 30; }
        .dot-sung { top: 4px; right: 4px; background-color: #a855f7; } /* 성의: 우상단 */
        .dot-omni { top: 4px; left: 4px; background-color: #f97316; } /* 옴니: 좌상단 */
        .dot-etc { bottom: 4px; left: 50%; transform: translateX(-50%); background-color: #14b8a6; } /* 기타: 중앙하단 */

        .sunday { color: #ef4444; }
        .saturday { color: #3b82f6; }
        
        /* 모달 스타일 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 320px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .admin-input { width: 100%; padding: 7px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; margin-top: 3px; }
    </style>
</head>
<body class="p-2">
    <div class="max-w-md mx-auto h-screen flex flex-col">
        <header class="bg-white rounded-xl shadow-sm border border-gray-200 mb-2 p-3">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2" onclick="adminClick()">
                    <span class="text-lg">📅</span>
                    <h1 id="appTitle" class="text-lg font-black text-slate-800 tracking-tight">성의교정 근무달력</h1>
                </div>
                <div id="dbStatus" class="text-[9px] font-bold text-slate-400">연결 중...</div>
            </div>
            <div class="flex items-center justify-between gap-2 mb-2">
                <select id="shiftSelect" class="text-xs p-1.5 bg-slate-50 text-gray-700 rounded-lg font-bold outline-none border border-gray-100 flex-1" onchange="render()"></select>
                <div class="flex items-center bg-white border rounded-lg overflow-hidden h-8">
                    <button onclick="changeMonth(-1)" class="px-3 font-bold text-slate-400">＜</button>
                    <span id="monthTitle" class="text-sm font-black text-slate-700 px-2 min-w-[90px] text-center"></span>
                    <button onclick="changeMonth(1)" class="px-3 font-bold text-slate-400">＞</button>
                </div>
            </div>
        </header>

        <div id="calendarBody" class="calendar-grid rounded-xl shadow-lg overflow-hidden border border-gray-200"></div>
    </div>

    <!-- 연차 상세 모달 -->
    <div id="commonModal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalHeader" class="bg-[#3498db] p-4 text-white font-bold text-center text-md"></div>
            <div id="modalBody" class="p-4 space-y-2 max-h-[50vh] overflow-y-auto"></div>
            <button onclick="closeModal()" class="w-full p-3 bg-gray-50 font-bold border-t text-sm">닫기</button>
        </div>
    </div>

    <!-- 관리자 모달 -->
    <div id="adminModal" class="modal-overlay">
        <div class="modal-content">
            <div class="bg-slate-800 p-3 text-white font-bold text-center text-sm">환경 설정 (Admin)</div>
            <div class="p-4 space-y-3 text-xs overflow-y-auto max-h-[60vh]">
                <div><label class="font-bold">앱 타이틀</label><input id="setAppTitle" class="admin-input"></div>
                <div><label class="font-bold">관리자 비번</label><input id="setAdminPw" type="password" class="admin-input"></div>
                <div><label class="font-bold">근무 순서 (쉼표 구분)</label><input id="setShiftOrder" class="admin-input"></div>
                <div id="colorSettings" class="space-y-1 mt-2"></div>
            </div>
            <div class="flex border-t">
                <button onclick="closeAdmin()" class="flex-1 p-3 bg-gray-100 font-bold text-xs">취소</button>
                <button onclick="saveSettings()" class="flex-1 p-3 bg-blue-600 text-white font-bold text-xs">저장</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
            authDomain: "catholic-security-system.firebaseapp.com",
            projectId: "catholic-security-system",
            storageBucket: "catholic-security-system.firebasestorage.app",
            messagingSenderId: "978946205343",
            appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let settings = JSON.parse(localStorage.getItem('cal_settings')) || {
            title: "성의교정 근무달력",
            adminPw: "1234",
            baseDate: "2026-03-09",
            shifts: ['C', 'A', 'B'],
            colors: { C: ['#dbeafe', '#3b82f6'], A: ['#fef3c7', '#f59e0b'], B: ['#fee2e2', '#ef4444'] }
        };

        let staffData = [], vData = {}, clickCount = 0;
        const today = new Date(); today.setHours(0,0,0,0);
        let currentYear = today.getFullYear(), currentMonth = today.getMonth();

        function adminClick() {
            clickCount++;
            if(clickCount >= 5) {
                const pw = prompt("관리자 비번 입력 (초기: 1234)");
                if(pw === settings.adminPw) openAdmin();
                clickCount = 0;
            }
            setTimeout(() => { clickCount = 0; }, 2000);
        }

        function openAdmin() {
            document.getElementById('setAppTitle').value = settings.title;
            document.getElementById('setAdminPw').value = settings.adminPw;
            document.getElementById('setShiftOrder').value = settings.shifts.join(',');
            const colorArea = document.getElementById('colorSettings');
            colorArea.innerHTML = '<p class="font-bold mb-1">조별 색상 (배경 / 강조)</p>';
            settings.shifts.forEach(s => {
                const c = settings.colors[s] || ['#f1f5f9', '#475569'];
                colorArea.innerHTML += `<div class="flex items-center gap-2"><span>${s}</span><input type="color" id="bg_${s}" value="${c[0]}"><input type="color" id="fg_${s}" value="${c[1]}"></div>`;
            });
            document.getElementById('adminModal').classList.add('active');
        }

        function saveSettings() {
            settings.title = document.getElementById('setAppTitle').value;
            settings.adminPw = document.getElementById('setAdminPw').value;
            settings.shifts = document.getElementById('setShiftOrder').value.split(',').map(v => v.trim().toUpperCase());
            settings.shifts.forEach(s => {
                settings.colors[s] = [document.getElementById(`bg_${s}`)?.value || '#f1f5f9', document.getElementById(`fg_${s}`)?.value || '#000000'];
            });
            localStorage.setItem('cal_settings', JSON.stringify(settings));
            location.reload();
        }

        function init() {
            document.getElementById('appTitle').textContent = settings.title;
            const select = document.getElementById('shiftSelect');
            select.innerHTML = '<option value="none">강조 없음</option>';
            settings.shifts.forEach(s => { select.innerHTML += `<option value="${s}">${s}조 강조 모드</option>`; });
            db.collection("vocation_app").doc("data").onSnapshot(doc => {
                if(doc.exists) { staffData = doc.data().staff || []; vData = doc.data().vocation || {}; render(); document.getElementById('dbStatus').innerText = "● 실시간"; }
            });
        }

        function render() {
            const mKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            document.getElementById('monthTitle').textContent = `${currentYear}년 ${currentMonth + 1}월`;
            const container = document.getElementById('calendarBody');
            container.innerHTML = '<div class="grid grid-cols-7 text-center font-bold text-[10px] py-2 bg-slate-50 border-b text-slate-400 col-span-7"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>';
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const base = new Date(settings.baseDate);
            const targetShift = document.getElementById('shiftSelect').value;

            for (let i = 0; i < firstDay; i++) container.appendChild(Object.assign(document.createElement('div'), { className: 'calendar-cell bg-slate-50/50' }));

            for (let d = 1; d <= lastDate; d++) {
                const curr = new Date(currentYear, currentMonth, d);
                const diff = Math.floor((curr - base) / 86400000);
                const shiftName = settings.shifts[((diff % settings.shifts.length) + settings.shifts.length) % settings.shifts.length];
                const shiftColor = settings.colors[shiftName] || ['#ffffff', '#000000'];
                
                let vList = [], hasSung = false, hasOmni = false, hasEtc = false;
                const monthV = vData[mKey] || {};
                for (let name in monthV) {
                    if (monthV[name].split(',').map(v=>v.trim()).includes(String(d))) {
                        const info = staffData.find(s => s.n === name);
                        if(info) {
                            vList.push({ name, g: info.g, s: info.s });
                            if(info.g.includes("성의")) hasSung = true;
                            else if(info.g.includes("옴니")) hasOmni = true;
                            else hasEtc = true;
                        }
                    }
                }

                const cell = document.createElement('div');
                cell.className = 'calendar-cell' + (curr.getTime() === today.getTime() ? ' is-today' : '');
                
                const dDiv = document.createElement('div');
                dDiv.className = `date-area ${curr.getDay()===0?'sunday':curr.getDay()===6?'saturday':''}`;
                dDiv.textContent = d;

                // 점 배치 (날짜 영역 안에 삽입)
                if(hasSung) dDiv.innerHTML += '<div class="v-dot dot-sung"></div>';
                if(hasOmni) dDiv.innerHTML += '<div class="v-dot dot-omni"></div>';
                if(hasEtc) dDiv.innerHTML += '<div class="v-dot dot-etc"></div>';

                const sDiv = document.createElement('div');
                sDiv.className = 'shift-area';
                sDiv.textContent = shiftName;

                if (targetShift === shiftName) {
                    cell.classList.add('cell-highlighted');
                    cell.style.backgroundColor = shiftColor[1];
                } else {
                    sDiv.style.backgroundColor = shiftColor[0];
                }

                if (vList.length > 0) cell.onclick = () => showVNames(`${currentMonth+1}/${d} 연차`, vList);
                cell.append(dDiv, sDiv);
                container.appendChild(cell);
            }
        }

        function showVNames(title, list) {
            document.getElementById('modalHeader').textContent = title;
            document.getElementById('modalBody').innerHTML = list.map(item => `
                <div class="p-2 bg-slate-50 rounded-lg border text-center">
                    <span class="text-[10px] text-gray-400 block">[${item.g}]</span>
                    <span class="text-slate-700 font-bold text-sm">${item.s} ${item.name}</span>
                </div>`).join('');
            document.getElementById('commonModal').classList.add('active');
        }

        function closeModal() { document.getElementById('commonModal').classList.remove('active'); }
        function closeAdmin() { document.getElementById('adminModal').classList.remove('active'); }
        function changeMonth(v) { currentMonth += v; if(currentMonth<0){currentMonth=11;currentYear--;} else if(currentMonth>11){currentMonth=0;currentYear++;} render(); }
        window.onload = init;
    </script>
</body>
</html>
