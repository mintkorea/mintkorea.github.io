<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합 근무달력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; background: white; position: relative; aspect-ratio: 1 / 1.35; cursor: pointer; }
        .date-area { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; }
        .shift-area { flex: 1.3; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; position: relative; }
        .cell-highlighted .date-area { color: #ffffff !important; }
        .cell-highlighted .shift-area { color: #ffffff !important; }
        .is-today { border: 3.5px solid #ef4444 !important; z-index: 30; }
        .is-today::after { content: 'TODAY'; position: absolute; top: -1px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 1px 4px; border-radius: 0 0 4px 4px; }
        .v-dot { position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; background-color: #a855f7; border-radius: 50%; }
        .sunday { color: #ef4444; }
        .saturday { color: #3b82f6; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .nav-btn { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; border-radius: 10px; background-color: #f1f5f9; color: #475569; font-weight: 800; }
    </style>
</head>
<body class="p-3">
    <div class="max-w-md mx-auto">
        <header class="bg-white rounded-2xl shadow-sm border border-gray-200 mb-4 p-4">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <span class="text-xl">📅</span>
                    <h1 id="appTitle" class="text-xl font-black text-slate-800">성의교정 근무달력</h1>
                </div>
                <button onclick="openAuthModal()" class="text-[11px] font-extrabold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg">⚙️ 설정</button>
            </div>
            <div class="flex items-center justify-between mb-4 bg-slate-50 p-2 rounded-xl border border-slate-100">
                <span class="text-xs font-bold text-slate-500 ml-1">강조 표시:</span>
                <select id="shiftSelect" class="text-xs p-1.5 bg-white text-gray-700 rounded-lg font-bold outline-none w-32 border border-gray-200" onchange="render()"></select>
            </div>
            <div class="flex items-center justify-between bg-white p-1 rounded-xl border border-gray-100">
                <button onclick="changeMonth(-1)" class="nav-btn">＜</button>
                <h2 id="monthTitle" class="text-[17px] font-black text-slate-800 text-center flex-1"></h2>
                <button onclick="changeMonth(1)" class="nav-btn">＞</button>
            </div>
        </header>
        <div id="calendarBody" class="calendar-grid bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200"></div>
    </div>

    <div id="commonModal" class="modal-overlay" onclick="closeModal()">
        <div class="bg-white rounded-3xl w-[90%] max-w-sm overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div id="modalHeader" class="p-4 border-b font-black text-center text-lg"></div>
            <div id="modalBody" class="p-6 space-y-3 font-bold text-center"></div>
            <div id="modalFooter" class="flex border-t">
                <button onclick="closeModal()" class="flex-1 p-4 bg-slate-100 text-slate-600 font-bold">닫기</button>
                <button id="modalConfirmBtn" class="flex-1 p-4 bg-blue-600 text-white font-bold hidden">저장</button>
            </div>
        </div>
    </div>

    <script>
        let settings = JSON.parse(localStorage.getItem('cal_settings')) || {
            title: "성의교정 근무달력",
            baseDate: "2026-03-09",
            adminPw: "0000",
            colors: { C: ['#dbeafe', '#3b82f6'], A: ['#fef3c7', '#f59e0b'], B: ['#fee2e2', '#ef4444'] }
        };

        const today = new Date(); today.setHours(0,0,0,0);
        let currentYear = today.getFullYear(), currentMonth = today.getMonth();

        function init() {
            document.getElementById('appTitle').textContent = settings.title;
            const select = document.getElementById('shiftSelect');
            select.innerHTML = '<option value="none" selected>강조 없음</option>';
            ['C', 'A', 'B'].forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.textContent = `${name}조 강조`;
                select.appendChild(opt);
            });
            render();
        }

        function render() {
            // [중요] vocation.html에서 저장한 풀데이터 가져오기
            const fullData = JSON.parse(localStorage.getItem('v_data_v34_full')) || { staff: [], v: {} };
            const vData = fullData.v;
            const staffList = fullData.staff;
            
            const mKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            document.getElementById('monthTitle').textContent = `${currentYear}년 ${currentMonth + 1}월`;
            const container = document.getElementById('calendarBody');
            container.innerHTML = '<div class="grid grid-cols-7 text-center font-bold text-[11px] py-3 bg-slate-50 border-b text-slate-400 col-span-7"><div class="sunday">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="saturday">토</div></div>';
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const base = new Date(settings.baseDate); base.setHours(0,0,0,0);
            const targetShift = document.getElementById('shiftSelect').value;

            for (let i = 0; i < firstDay; i++) container.appendChild(Object.assign(document.createElement('div'), { className: 'calendar-cell bg-slate-50/30' }));

            for (let d = 1; d <= lastDate; d++) {
                const curr = new Date(currentYear, currentMonth, d);
                const diff = Math.floor((curr - base) / 86400000);
                const shiftIdx = ((diff % 3) + 3) % 3;
                const shiftName = ['C', 'A', 'B'][shiftIdx];
                const shiftColor = settings.colors[shiftName];
                
                let vNamesFormatted = []; 
                const monthV = vData[mKey] || {};
                
                for (let name in monthV) {
                    const daysArr = monthV[name].split(',').map(v => v.trim());
                    if (daysArr.includes(String(d))) {
                        // staffList에서 해당 이름의 소속(g)과 조(s) 찾기
                        const info = staffList.find(s => s.n === name);
                        if(info) vNamesFormatted.push(`${info.g} ${info.s} ${name}`);
                        else vNamesFormatted.push(name);
                    }
                }

                const cell = document.createElement('div');
                cell.className = 'calendar-cell' + (curr.getTime() === today.getTime() ? ' is-today' : '');
                if (targetShift === shiftName) { 
                    cell.classList.add('cell-highlighted'); 
                    cell.style.backgroundColor = shiftColor[1]; 
                }

                const dDiv = document.createElement('div');
                dDiv.className = `date-area ${curr.getDay()===0?'sunday':curr.getDay()===6?'saturday':''}`;
                dDiv.textContent = d;

                const sDiv = document.createElement('div');
                sDiv.className = 'shift-area';
                if (targetShift !== shiftName) sDiv.style.backgroundColor = shiftColor[0];
                sDiv.textContent = shiftName;

                if (vNamesFormatted.length > 0) {
                    const dot = document.createElement('div');
                    dot.className = 'v-dot';
                    sDiv.appendChild(dot);
                    cell.onclick = () => showVNames(`${currentMonth+1}월 ${d}일 연차자`, vNamesFormatted);
                }
                cell.append(dDiv, sDiv);
                container.appendChild(cell);
            }
        }

        function showVNames(title, list) {
            const h = document.getElementById('modalHeader'), b = document.getElementById('modalBody'), f = document.getElementById('modalConfirmBtn');
            h.textContent = title;
            b.innerHTML = list.map(item => `<div class="p-3 bg-purple-50 text-purple-800 rounded-xl border border-purple-100">${item}</div>`).join('');
            f.classList.add('hidden');
            document.getElementById('commonModal').classList.add('active');
        }

        function openAuthModal() {
            const h = document.getElementById('modalHeader'), b = document.getElementById('modalBody'), f = document.getElementById('modalConfirmBtn');
            h.textContent = "⚙️ 설정 인증"; 
            b.innerHTML = `<input type="password" id="pwIn" class="w-full p-4 bg-slate-100 rounded-2xl text-center text-2xl outline-none" placeholder="••••">`;
            f.classList.remove('hidden'); f.textContent = "확인";
            f.onclick = () => {
                if(document.getElementById('pwIn').value === settings.adminPw) openSettings();
                else alert('비밀번호가 틀립니다.');
            };
            document.getElementById('commonModal').classList.add('active');
        }

        function openSettings() {
            const h = document.getElementById('modalHeader'), b = document.getElementById('modalBody'), f = document.getElementById('modalConfirmBtn');
            h.textContent = "시스템 환경 설정";
            b.innerHTML = `
                <div class="space-y-3 text-left">
                    <div><label class="text-xs text-slate-400">앱 타이틀</label><input id="set_title" class="w-full p-3 bg-slate-50 border rounded-xl" value="${settings.title}"></div>
                    <div><label class="text-xs text-slate-400">기준일(C조)</label><input type="date" id="set_date" class="w-full p-3 bg-slate-50 border rounded-xl" value="${settings.baseDate}"></div>
                    <div><label class="text-xs text-slate-400">비밀번호 변경</label><input id="set_pw" class="w-full p-3 bg-slate-50 border rounded-xl" value="${settings.adminPw}"></div>
                    <hr><button onclick="if(confirm('데이터를 초기화할까요?')){localStorage.clear();location.reload();}" class="w-full p-3 bg-red-50 text-red-600 rounded-xl border border-red-100 font-bold">⚠️ 데이터 초기화</button>
                </div>`;
            f.textContent = "저장";
            f.onclick = () => {
                settings.title = document.getElementById('set_title').value;
                settings.baseDate = document.getElementById('set_date').value;
                settings.adminPw = document.getElementById('set_pw').value;
                localStorage.setItem('cal_settings', JSON.stringify(settings));
                location.reload();
            };
        }

        function closeModal() { document.getElementById('commonModal').classList.remove('active'); }
        function changeMonth(v) { currentMonth += v; if(currentMonth<0){currentMonth=11;currentYear--;} else if(currentMonth>11){currentMonth=0;currentYear++;} render(); }
        window.onload = init;
    </script>
</body>
</html>
