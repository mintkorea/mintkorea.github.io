<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합 근무달력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-top: 1px solid #e2e8f0;
            border-left: 1px solid #e2e8f0;
        }

        .calendar-cell {
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
            aspect-ratio: 1 / 1.35;
            cursor: pointer;
        }

        /* 숫자 영역 사각형 투톤 디자인 */
        .date-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            position: relative;
            z-index: 10;
            font-size: 15px;
            background-color: rgba(255, 255, 255, 0.5);
        }

        /* 근무 조 표시 영역 */
        .shift-area {
            flex: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            position: relative;
            z-index: 10;
            font-size: 18px;
        }

        /* 오늘 날짜 표시 */
        .is-selected-day::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 4px solid #ef4444;
            z-index: 20;
            pointer-events: none;
        }

        /* 연차 표시용 보라색 원 */
        .v-mark {
            position: absolute;
            width: 28px;
            height: 28px;
            background-color: #f3e8ff;
            border: 1px solid #d8b4fe;
            border-radius: 50%;
            z-index: -1;
        }

        .sunday { color: #ef4444; }
        .saturday { color: #3b82f6; }

        .cell-highlighted .date-area { background-color: rgba(255, 255, 255, 0.4) !important; color: #fff !important; }
        .cell-highlighted .shift-area { color: #fff !important; }

        .nav-btn {
            display: flex; align-items: center; justify-content: center;
            width: 38px; height: 38px; border-radius: 10px;
            background-color: #f1f5f9; color: #475569; font-weight: 800;
        }

        /* 연차자 명단 모달 */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="p-3">

    <div class="max-w-md mx-auto">
        <header class="bg-white rounded-2xl shadow-sm border border-gray-200 mb-4 p-4">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <span class="text-xl">📅</span>
                    <h1 id="displayAppTitle" class="text-xl font-black text-slate-800">성의교정 근무달력</h1>
                </div>
            </div>
            
            <div class="flex items-center justify-between mb-4 bg-slate-50 p-2 rounded-xl border border-slate-100">
                <span class="text-xs font-bold text-slate-500 ml-1">조별 강조:</span>
                <select id="shiftSelect" class="text-xs p-1.5 bg-white text-gray-700 rounded-lg font-bold outline-none w-32 border border-gray-200" onchange="render()"></select>
            </div>

            <div class="flex items-center justify-between bg-white p-1 rounded-xl border border-gray-100">
                <button onclick="changeMonth(-1)" class="nav-btn">＜</button>
                <h2 id="currentDisplayTitle" class="text-[17px] font-black text-slate-800"></h2>
                <button onclick="changeMonth(1)" class="nav-btn">＞</button>
            </div>
        </header>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <div class="grid grid-cols-7 text-center font-bold text-[11px] py-3 bg-slate-50 border-b text-slate-400">
                <div class="sunday">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="saturday">토</div>
            </div>
            <div id="singleCalendarBody" class="calendar-grid"></div>
        </div>
    </div>

    <div id="vModal" class="modal-overlay" onclick="this.classList.remove('active')">
        <div class="bg-white rounded-3xl w-72 overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div id="vHeader" class="p-4 border-b bg-purple-50 font-black text-center text-purple-700 text-lg"></div>
            <div id="vBody" class="p-5 space-y-2 font-bold text-center max-h-60 overflow-y-auto"></div>
            <button onclick="document.getElementById('vModal').classList.remove('active')" class="w-full p-4 bg-purple-700 text-white font-bold text-lg">닫기</button>
        </div>
    </div>

    <script>
        // 1. 연차 관리 시스템(vocation.html)의 저장소 데이터와 연동
        let vData = JSON.parse(localStorage.getItem('v_data_v34')) || {};

        let config = JSON.parse(localStorage.getItem('shift_config_v2')) || {
            appTitle: '근무달력', baseDate: '2025-01-01',
            pattern: [
                { name: 'C', color: '#dbeafe', highlight: '#3b82f6' },
                { name: 'A', color: '#fef3c7', highlight: '#f59e0b' },
                { name: 'B', color: '#fee2e2', highlight: '#ef4444' }
            ]
        };

        const today = new Date(); today.setHours(0,0,0,0);
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth();

        function initUI() {
            const select = document.getElementById('shiftSelect');
            select.innerHTML = '<option value="none">강조 없음</option>';
            config.pattern.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name; opt.textContent = `${p.name}조 강조`;
                if(p.name === 'C') opt.selected = true; // 기본 C조 강조
                select.appendChild(opt);
            });
        }

        function render() {
            // 연차 관리 시스템의 최신 데이터를 다시 읽어옴
            vData = JSON.parse(localStorage.getItem('v_data_v34')) || {};
            
            const mKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            document.getElementById('currentDisplayTitle').textContent = `${currentYear}년 ${currentMonth + 1}월`;
            
            const container = document.getElementById('singleCalendarBody');
            container.innerHTML = '';
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const base = new Date(config.baseDate); base.setHours(0,0,0,0);
            const targetShift = document.getElementById('shiftSelect').value;

            // 빈 칸 생성
            for (let i = 0; i < firstDay; i++) {
                container.appendChild(Object.assign(document.createElement('div'), { className: 'calendar-cell bg-slate-50/30' }));
            }

            // 날짜 생성
            for (let d = 1; d <= lastDate; d++) {
                const curr = new Date(currentYear, currentMonth, d); curr.setHours(0,0,0,0);
                const diff = Math.floor((curr - base) / 86400000);
                const shift = config.pattern[((diff % 3) + 3) % 3];

                // 해당 날짜 연차자 추출 (vocation.html 데이터 기반)
                let vNames = [];
                const monthV = vData[mKey] || {};
                for (let name in monthV) {
                    const days = monthV[name].split(',').map(v => v.trim());
                    if (days.includes(String(d))) vNames.push(name);
                }

                const cell = document.createElement('div');
                cell.className = 'calendar-cell';
                if (curr.getTime() === today.getTime()) cell.classList.add('is-selected-day');

                const isHighlighted = (targetShift === shift.name);
                if (isHighlighted) {
                    cell.classList.add('cell-highlighted');
                    cell.style.backgroundColor = shift.highlight;
                }

                // 날짜 영역 (연차 마크 포함)
                const dDiv = document.createElement('div');
                dDiv.className = `date-area ${curr.getDay()===0?'sunday':curr.getDay()===6?'saturday':''}`;
                if (vNames.length > 0) {
                    const mark = document.createElement('div');
                    mark.className = 'v-mark';
                    dDiv.appendChild(mark);
                }
                dDiv.textContent = d;

                // 근무 조 영역
                const sDiv = document.createElement('div');
                sDiv.className = 'shift-area';
                if (!isHighlighted) sDiv.style.backgroundColor = shift.color;
                sDiv.textContent = shift.name;

                // 클릭 시 연차자 명단 모달 표시
                cell.onclick = () => {
                    if (vNames.length > 0) {
                        document.getElementById('vHeader').textContent = `${currentMonth+1}월 ${d}일 연차자`;
                        document.getElementById('vBody').innerHTML = vNames.map(n => `<div class="bg-slate-50 p-3 rounded-xl border border-slate-100">${n}</div>`).join('');
                        document.getElementById('vModal').classList.add('active');
                    }
                };

                cell.append(dDiv, sDiv);
                container.appendChild(cell);
            }
        }

        function changeMonth(v) {
            currentMonth += v;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            render();
        }

        window.onload = () => { initUI(); render(); };
    </script>
</body>
</html>
