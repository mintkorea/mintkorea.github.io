<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 커스텀 근무달력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            border-top: 1px solid #e2e8f0;
            border-left: 1px solid #e2e8f0;
        }

        .calendar-cell {
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
            aspect-ratio: 1 / 1.35;
        }

        .date-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            position: relative;
            z-index: 10;
        }

        .shift-area {
            flex: 1.3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            position: relative;
            z-index: 10;
        }

        /* 오늘 날짜 표시 */
        .is-selected-day::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 4px solid #ef4444;
            z-index: 20;
            pointer-events: none;
        }

        /* 연차 표시용 보라색 원 배경 */
        .v-mark {
            position: absolute;
            width: 32px;
            height: 32px;
            background-color: #f3e8ff;
            border: 1px solid #d8b4fe;
            border-radius: 50%;
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sunday { color: #ef4444; }
        .saturday { color: #3b82f6; }

        .cell-highlighted .date-area { background-color: rgba(255, 255, 255, 0.45) !important; color: #ffffff !important; }
        .cell-highlighted .shift-area { color: #ffffff !important; }

        .nav-btn {
            display: flex; align-items: center; justify-content: center;
            width: 34px; height: 34px; border-radius: 8px;
            background-color: #f1f5f9; color: #475569; font-weight: 800;
        }

        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px);
            z-index: 100; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body class="p-3">

    <div class="max-w-md mx-auto">
        <header class="bg-white rounded-2xl shadow-sm border border-gray-200 mb-5 p-4">
            <div class="flex items-center justify-between mb-3 border-b border-gray-50 pb-2">
                <div class="flex items-center gap-2">
                    <span class="text-xl">📅</span>
                    <h1 id="displayAppTitle" class="text-xl font-black text-gray-800">성의교정 근무달력</h1>
                </div>
                <button id="openAuthBtn" class="text-[11px] font-extrabold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg">⚙️ 설정</button>
            </div>
            
            <div class="flex items-center justify-between mb-4 bg-slate-50 p-2 rounded-xl border border-slate-100">
                <span class="text-xs font-bold text-slate-500 ml-1">강조 표시:</span>
                <select id="shiftSelect" class="text-xs p-1.5 bg-white text-gray-700 rounded-lg font-bold outline-none w-32 border border-gray-200" onchange="render()"></select>
            </div>

            <div class="flex items-center justify-between bg-white p-1 rounded-xl border border-gray-100">
                <button id="prevMonth" class="nav-btn">＜</button>
                <h2 id="currentDisplayTitle" class="text-[17px] font-black text-slate-800"></h2>
                <button id="nextMonth" class="nav-btn">＞</button>
            </div>
        </header>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
            <div class="grid grid-cols-7 text-center font-bold text-[11px] py-3 bg-slate-50 border-b border-gray-100 text-slate-400">
                <div class="sunday">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="saturday">토</div>
            </div>
            <div id="singleCalendarBody" class="calendar-grid"></div>
        </div>
    </div>

    <div id="vModal" class="modal-overlay" onclick="this.classList.remove('active')">
        <div class="bg-white rounded-3xl w-72 overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div id="vHeader" class="p-4 border-b bg-purple-50 font-black text-center text-purple-700 text-lg"></div>
            <div id="vBody" class="p-5 space-y-2 font-bold text-center"></div>
            <button onclick="document.getElementById('vModal').classList.remove('active')" class="w-full p-4 bg-purple-700 text-white font-bold">닫기</button>
        </div>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('shift_config_v2')) || {
            appTitle: '근무달력', baseDate: '2025-01-01',
            pattern: [
                { name: 'C', color: '#dbeafe', highlight: '#3b82f6' },
                { name: 'A', color: '#fef3c7', highlight: '#f59e0b' },
                { name: 'B', color: '#fee2e2', highlight: '#ef4444' }
            ]
        };

        const today = new Date(); today.setHours(0,0,0,0);
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth();

        function initAppUI() {
            document.getElementById('displayAppTitle').textContent = config.appTitle;
            const select = document.getElementById('shiftSelect');
            select.innerHTML = '<option value="none">강조 없음</option>';
            config.pattern.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name; opt.textContent = `${p.name}조 강조`;
                if(p.name === 'C') opt.selected = true;
                select.appendChild(opt);
            });
        }

            const mKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;

            const container = document.getElementById('singleCalendarBody');
