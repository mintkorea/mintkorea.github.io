<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 주간식단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .tab-transition { transition: all 0.2s ease-in-out; }
        .menu-main-style { white-space: nowrap !important; letter-spacing: -0.03em !important; word-break: keep-all; font-size: 1.5rem; line-height: 2rem; }
        .day-sun { color: #EF4444; }
        .day-sat { color: #3B82F6; }
        .status-pill { display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; }
        .dot-online { background-color: #10B981; box-shadow: 0 0 6px #10B981; }
        .dot-offline { background-color: #EF4444; box-shadow: 0 0 6px #EF4444; }
        .menu-card-custom { background-color: white; border-radius: 0 0 2rem 2rem; border-top-width: 7px; border-right-width: 2px; border-bottom-width: 2px; border-left-width: 2px; border-style: solid; }
        #hiddenDatePicker { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        @media (min-width: 640px) { .menu-main-style { font-size: 1.875rem; line-height: 2.25rem; } }
    </style>
</head>
<body class="text-slate-800">
    <div id="app" class="max-w-2xl mx-auto flex flex-col items-center p-2 pt-3 pb-20">
        <div id="header" class="w-full bg-[#EEF2F6] rounded-2xl p-4 flex flex-col mb-3 border border-slate-200 shadow-sm items-center">
            <div class="flex items-center gap-2 mb-1">
                <h1 class="text-lg font-black text-[#1E3A5F] tracking-tighter">성의교정 주간식단</h1>
                <span id="shiftBadge" class="text-white text-[10px] px-2 py-0.5 rounded-md font-black shadow-sm tracking-tight">--</span>
            </div>
            <div class="relative flex items-center">
                <span id="dateDisplay" class="font-black text-slate-600 text-xl tracking-tight cursor-pointer">날짜 로딩...</span>
                <input type="date" id="hiddenDatePicker" onchange="syncDateInput(this)">
            </div>
        </div>

        <div id="results-anchor" class="w-full flex items-center justify-between mb-3 px-1 pb-2 border-b border-slate-100">
            <div class="flex items-center">
                <div id="statusPill" class="status-pill">
                    <span id="statusDot" class="status-dot dot-offline"></span>
                    <span id="statusText" class="text-[10px] font-black text-slate-400 uppercase tracking-tight">접속 중...</span>
                </div>
            </div>
            <div class="flex gap-1.5">
                <button onclick="changeDate(-1)" class="bg-white border border-slate-300 rounded-lg px-4 py-2 text-[12px] font-black text-slate-600 shadow-sm active:bg-slate-50">← PREV</button>
                <button onclick="goToday()" class="bg-white border border-slate-300 rounded-lg px-4 py-2 text-[12px] font-black text-[#1E3A5F] shadow-sm active:bg-slate-50">TODAY</button>
                <button onclick="changeDate(1)" class="bg-white border border-slate-300 rounded-lg px-4 py-2 text-[12px] font-black text-slate-600 shadow-sm active:bg-slate-50">NEXT →</button>
            </div>
        </div>

        <div class="w-full px-2 mb-3">
            <div class="flex items-center gap-1.5 text-slate-400 text-[11px] font-bold italic bg-white/50 py-1 px-2 rounded-lg inline-flex">
                <span id="timer-icon">⏳</span>
                <span id="timer-text">데이터 확인 중...</span>
            </div>
        </div>

        <div id="tabs-container" class="grid grid-cols-5 w-full"></div>

        <div id="menu-card" class="w-full menu-card-custom min-h-[250px] flex flex-col transition-all duration-300 shadow-sm overflow-hidden">
            <div class="flex-grow flex flex-col justify-center items-center text-center p-6 pb-4">
                <h2 id="main-menu" class="font-black mb-3 text-slate-800 menu-main-style"></h2>
                <div class="w-14 h-[1.5px] bg-slate-200 mb-4"></div>
                <p id="sub-menu" class="text-slate-600 leading-relaxed max-w-full font-bold text-base md:text-lg px-2"></p>
            </div>
            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex items-center justify-center gap-2 text-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                <p id="comment-text" class="text-sm font-bold text-slate-500 leading-snug"></p>
            </div>
        </div>
        
        <div class="w-full py-8 text-center">
            <p class="text-[10px] font-bold text-slate-300 tracking-widest uppercase mt-4">Catholic Univ. Songeui Campus</p>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxZkcn8EEcGcxMaT98l_CKJTCM_0Ual_S2JefpHptm_dbEtQ5tjM00TEhU2XdqTObLh/exec";
        
        // 근무조 및 칼라 설정 (요청하신 색상 반영)
        const shiftConfig = { 
            baseDate: new Date('2026-03-09'), 
            pattern: [
                { name: 'C', color: '#3B82F6' }, // 3월 9일 C조 (Blue)
                { name: 'A', color: '#F59E0B' }, // 3월 10일 A조 (Amber)
                { name: 'B', color: '#EF4444' }  // 3월 11일 B조 (Red)
            ] 
        };
        
        const mealMeta = {
            '조식': { color: '#E65D4F', inactiveBg: '#F9DEDC', startTime: '07:00', endTime: '09:00' },
            '간편식': { color: '#F2A134', inactiveBg: '#FDF2E2', startTime: '07:00', endTime: '09:30' },
            '중식': { color: '#6AB04C', inactiveBg: '#EDF6E9', startTime: '11:20', endTime: '14:00' },
            '석식': { color: '#3498DB', inactiveBg: '#EBF3FA', startTime: '17:20', endTime: '19:20' },
            '야식': { color: '#8E44AD', inactiveBg: '#F0ECF7', startTime: '18:00', endTime: '20:00' }
        };
        const MEAL_ORDER = ["조식", "간편식", "중식", "석식", "야식"];
        
        let allData = {}; 
        let currentDate = new Date();
        let activeTab = "중식";

        function normalize(str) { return String(str).replace(/[^ㄱ-ㅎ가-힣a-zA-Z0-9]/g, ""); }

        async function loadData() {
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            try {
                const res = await fetch(GAS_URL + "?t=" + new Date().getTime());
                allData = await res.json();
                localStorage.setItem("meal_db_cache", JSON.stringify(allData));
                dot.className = "status-dot dot-online";
                txt.innerText = "ONLINE";
                txt.className = "text-[10px] font-black text-emerald-500 tracking-tight";
                updateUI();
            } catch (e) {
                const backup = localStorage.getItem("meal_db_cache");
                if (backup) {
                    allData = JSON.parse(backup);
                    dot.className = "status-dot dot-online"; // 캐시 사용 시에도 사용자 경험을 위해 유지
                    txt.innerText = "CACHED";
                    txt.className = "text-[10px] font-black text-amber-500 tracking-tight";
                    updateUI();
                }
            }
        }

        function updateUI() {
            const y = currentDate.getFullYear(), m = currentDate.getMonth() + 1, d = currentDate.getDate();
            const weekIdx = currentDate.getDay();
            const weekNames = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('dateDisplay').innerHTML = `${y}.${String(m).padStart(2,'0')}.${String(d).padStart(2,'0')} <span class="${weekIdx===0?'day-sun':(weekIdx===6?'day-sat':'')}">(${weekNames[weekIdx]})</span>`;
            document.getElementById('hiddenDatePicker').value = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

            const targetDate = new Date(currentDate); targetDate.setHours(0,0,0,0);
            const baseDate = new Date(shiftConfig.baseDate); baseDate.setHours(0,0,0,0);
            const diffDays = Math.floor((targetDate - baseDate) / 86400000);
            const shift = shiftConfig.pattern[((diffDays % 3) + 3) % 3];
            
            const badge = document.getElementById('shiftBadge');
            badge.innerText = `${shift.name}조 근무`;
            badge.style.backgroundColor = shift.color;

            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = '';
            MEAL_ORDER.forEach(meal => {
                const isActive = meal === activeTab;
                const meta = mealMeta[meal];
                const btn = document.createElement('button');
                btn.innerText = meal;
                btn.className = `py-3.5 text-[11px] font-black rounded-t-2xl tab-transition`;
                btn.style.backgroundColor = isActive ? meta.color : meta.inactiveBg;
                btn.style.color = isActive ? 'white' : '#64748b';
                btn.onclick = () => { activeTab = meal; updateUI(); };
                tabsContainer.appendChild(btn);
            });

            const key = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayData = allData[key] || allData[`${y}-${m}-${d}`] || null;
            let info = null;
            if (dayData) {
                for (const k in dayData) { if (normalize(k) === normalize(activeTab)) { info = dayData[k]; break; } }
            }

            const menuCard = document.getElementById('menu-card');
            menuCard.style.borderColor = mealMeta[activeTab].color;
            document.getElementById('main-menu').innerText = info?.menu || "식단 정보가 없습니다.";
            document.getElementById('sub-menu').innerText = info?.side || "-";
            document.getElementById('comment-text').innerText = info?.comment || "오늘도 즐거운 하루 되세요! 😊";

            updateStatusMsg();
        }

        function updateStatusMsg() {
            const now = new Date();
            const isToday = currentDate.toDateString() === now.toDateString();
            const y = currentDate.getFullYear(), m = currentDate.getMonth() + 1, d = currentDate.getDate();

            if (!isToday) {
                document.getElementById('timer-text').innerText = `${m}월 ${d}일의 ${activeTab} 식단입니다.`;
                document.getElementById('timer-icon').innerText = "📅";
                return;
            }

            const meta = mealMeta[activeTab];
            const [sH, sM] = meta.startTime.split(':').map(Number);
            const [eH, eM] = meta.endTime.split(':').map(Number);
            const start = new Date(); start.setHours(sH, sM, 0);
            const end = new Date(); end.setHours(eH, eM, 0);

            let msg = "";
            let icon = "";

            if (now < start) {
                const diffMin = Math.ceil((start - now) / 60000);
                const diffHr = Math.floor(diffMin / 60);
                msg = `${activeTab} 제공시간까지 ${diffHr > 0 ? diffHr + '시간 ' : ''}${diffMin % 60}분 남았습니다.`;
                icon = "⏳";
            } else if (now <= end) {
                const diffMin = Math.floor((end - now) / 60000);
                msg = `${activeTab} 배식 중입니다! (남은 시간: ${diffMin}분)`;
                icon = "🍽️";
            } else {
                msg = `${activeTab} 배식이 종료되었습니다.`;
                icon = "✅";
            }

            document.getElementById('timer-text').innerText = msg;
            document.getElementById('timer-icon').innerText = icon;
        }

        function changeDate(n) { currentDate.setDate(currentDate.getDate() + n); updateUI(); }
        function goToday() { currentDate = new Date(); activeTab = autoMeal(); updateUI(); }
        function syncDateInput(input) { if (input.value) { currentDate = new Date(input.value); updateUI(); } }
        function autoMeal() { const h = new Date().getHours(); if (h < 9) return "조식"; if (h < 14) return "중식"; return "석식"; }

        window.onload = () => { activeTab = autoMeal(); loadData(); };
        setInterval(updateStatusMsg, 60000);
    </script>
</body>
</html>
