<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 주간 식단표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
        .menu-card { transition: all 0.3s ease; border-left: 8px solid #1e3a8a; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto space-y-6">
        <div class="bg-white p-6 rounded-3xl shadow-sm text-center border border-slate-200">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">🍱 AI 스마트 식단표</h1>
            <div class="flex justify-center items-center gap-4 mt-4">
                <button onclick="changeDate(-1)" class="p-2 bg-slate-100 rounded-full hover:bg-slate-200">◀</button>
                <span id="dateDisplay" class="text-lg font-bold text-blue-600">로딩 중...</span>
                <button onclick="changeDate(1)" class="p-2 bg-slate-100 rounded-full hover:bg-slate-200">▶</button>
            </div>
        </div>

        <div id="menuContainer" class="space-y-4">
            </div>

        <div class="bg-white p-6 rounded-3xl shadow-md border-2 border-dashed border-blue-200">
            <h2 class="text-sm font-black text-blue-600 mb-3 italic"># PHOTO TO MENU (AI)</h2>
            <input type="file" id="imageInput" accept="image/*" class="block w-full text-xs text-slate-500 mb-3 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700">
            <button id="uploadBtn" onclick="handleUpload()" class="w-full bg-blue-600 text-white font-black py-3 rounded-xl shadow-lg active:scale-95 transition-all">
                식단표 이미지 분석 시작
            </button>
            <p id="uploadStatus" class="text-center text-[10px] mt-2 font-bold text-slate-400 uppercase tracking-widest"></p>
        </div>
    </div>

    
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx7MYh-RkIM6C6LHniuz1oSKS_D9394qv0PObxiAKwUY9JqLPghhJVBcoE6RqUnTPyn/exec";
        let allData = {};
        let currentDate = new Date();

        async function loadData() {
            try {
                const res = await fetch(GAS_URL);
                allData = await res.json();
                renderUI();
            } catch (e) { alert("데이터 로드 실패"); }
        }

        function renderUI() {
            const dateKey = currentDate.toISOString().split('T')[0];
            document.getElementById('dateDisplay').innerText = dateKey;
            const container = document.getElementById('menuContainer');
            container.innerHTML = '';

            const dayData = allData[dateKey];
            if (!dayData) {
                container.innerHTML = '<p class="text-center text-slate-400 py-10 font-bold">등록된 식단 데이터가 없습니다.</p>';
                return;
            }

            for (const [type, info] of Object.entries(dayData)) {
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl shadow-sm menu-card">
                        <span class="text-xs font-black text-blue-500 uppercase">${type}</span>
                        <h3 class="text-xl font-black text-slate-800 mt-1">${info.menu}</h3>
                        <p class="text-sm text-slate-500 mt-1 font-medium">${info.side}</p>
                        <div class="mt-4 pt-3 border-t border-slate-50 text-sm italic text-blue-700 font-bold">
                            "${info.comment || '맛있는 식사 하세요!'}"
                        </div>
                    </div>
                `;
            }
        }

        async function handleUpload() {
            const input = document.getElementById('imageInput');
            const status = document.getElementById('uploadStatus');
            const btn = document.getElementById('uploadBtn');

            if (!input.files.length) return alert("이미지를 선택하세요.");

            btn.disabled = true;
            btn.innerText = "Gemini 분석 중...";
            status.innerText = "AI가 메뉴를 읽고 코멘트를 작성하고 있습니다.";

            const reader = new FileReader();
            reader.onload = async function() {
                const base64 = reader.result.split(',')[1];
                try {
                    const res = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ base64: base64, mimeType: input.files[0].type })
                    });
                    const result = await res.json();
                    if (result.result === "success") {
                        alert(`${result.count}개의 식단을 업데이트했습니다!`);
                        location.reload();
                    } else { alert("오류: " + result.error); }
                } catch (e) { alert("연결 실패"); }
                finally { btn.disabled = false; btn.innerText = "식단표 이미지 분석 시작"; }
            };
            reader.readAsDataURL(input.files[0]);
        }

        function changeDate(n) { currentDate.setDate(currentDate.getDate() + n); renderUI(); }
        window.onload = loadData;
    </script>
</body>
</html>
