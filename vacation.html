<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성의교정 연차 관리 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        /* [1] 레이아웃 및 인쇄 설정: 인쇄 시 여백 없이 꽉 차게 */
        @media print {
            @page { size: A4 landscape; margin: 5mm; }
            .no-print { display: none !important; }
            body { background: white; }
            #paper { box-shadow: none !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            table { font-size: 9px !important; width: 100% !important; }
            .hidden-day { display: table-cell !important; } /* 인쇄할 땐 숨긴 날짜 다 보여줌 */
        }

        /* [2] 모바일 감응형 스크롤 및 숨김 */
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; background: #f0f2f5; }
        .container { padding: 15px; display: flex; flex-direction: column; align-items: center; }
        #paper { background: white; padding: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.1); width: 287mm; max-width: 100%; box-sizing: border-box; }
        .table-resp { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        
        /* [3] 테이블 디자인: 굵은 외곽선 및 고정 폭 */
        table { border-collapse: collapse; width: 100%; border: 1.5pt solid #000; table-layout: fixed; }
        td, th { border: 0.5pt solid #000; text-align: center; height: 22px; font-size: 11px; padding: 0; position: relative; }
        .hdr { background: #f2f2f2 !important; height: 32px; font-weight: bold; }
        .b-right { border-right: 1.5pt solid #000 !important; }
        
        /* [4] 하이라이트: 오늘 날짜 열의 좌우만 붉은 선으로 (그물 현상 방지) */
        .today-col { background-color: rgba(255, 0, 0, 0.05) !important; color: #ff0000 !important; }
        .today-left { border-left: 2pt solid #ff0000 !important; }
        .today-right { border-right: 2pt solid #ff0000 !important; }
        /* 오늘 날짜 열의 첫 번째 행과 마지막 행에만 위아래 테두리 추가 */
        tr:first-child .today-col { border-top: 2pt solid #ff0000 !important; }
        tr:last-child .today-col { border-bottom: 2pt solid #ff0000 !important; }

        .sat { background: #f5faff; color: #007bff; }
        .sun { background: #fff5f5; color: #dc3545; }
        .v-mark { background: #d4edda !important; color: #28a745; font-weight: bold; }
        .hidden-day { display: none; }

        /* 하단 컨트롤 바 */
        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 9999; }
        .btn { padding: 10px 18px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-blue { background: #3498db; }
        .btn-gray { background: #34495e; }
    </style>
</head>
<body>

<div class="container">
    <div id="paper">
        <h2 id="viewTitle" style="text-align:center; text-decoration: underline; margin-bottom: 20px;"></h2>
        <div class="table-resp">
            <table id="displayTable"></table>
        </div>
    </div>
</div>

<div class="controls no-print">
    <input type="month" id="targetMonth" onchange="render()">
    <button class="btn btn-gray" onclick="toggleDays()">날짜 숨김/표시</button>
    <button class="btn btn-blue" onclick="window.print()">인쇄</button>
</div>

<script>
    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
        authDomain: "catholic-security-system.firebaseapp.com",
        projectId: "catholic-security-system",
        storageBucket: "catholic-security-system.firebasestorage.app",
        messagingSenderId: "978946205343",
        appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let staffData = [], vData = {}, isDaysHidden = true;

    function initSync() {
        db.collection("vocation_app").doc("data").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                staffData = data.staff || [];
                vData = data.vocation || {};
                render();
            }
        });
    }

    function toggleDays() { isDaysHidden = !isDaysHidden; render(); }

    function render() {
        const val = document.getElementById('targetMonth').value;
        if(!val) return;
        const [y, m] = val.split('-').map(Number);
        const lastDay = new Date(y, m, 0).getDate();
        const now = new Date();
        const today = (now.getFullYear() === y && now.getMonth() + 1 === m) ? now.getDate() : -1;

        document.getElementById('viewTitle').innerText = `성의교정 연차 일정표(${y}년 ${m}월)`;

        let h = `<colgroup><col width="50"><col width="35"><col width="45"><col width="75"></colgroup>
                 <thead><tr class="hdr"><td>구분</td><td>조</td><td>직위</td><td class="b-right">성명</td>`;
        
        for(let i=1; i<=lastDay; i++) {
            const we = new Date(y, m-1, i).getDay();
            const isT = (i === today);
            const hide = (i < today && isDaysHidden) ? 'hidden-day' : '';
            h += `<th class="${we===0?'sun':we===6?'sat':''} ${hide} ${isT?'today-col today-left today-right':''}">${i}</th>`;
        }
        h += `</tr></thead><tbody>`;

        staffData.forEach((s, idx) => {
            h += `<tr><td>${s.g}</td><td>${s.s}</td><td>${s.p}</td><td class="b-right">${s.n}</td>`;
            const mk = `${y}-${String(m).padStart(2,'0')}`;
            const vArr = (vData[mk]?.[s.n] || "").split(',').map(v => v.trim());
            
            for(let i=1; i<=lastDay; i++) {
                const isT = (i === today);
                const isV = vArr.includes(String(i));
                const hide = (i < today && isDaysHidden) ? 'hidden-day' : '';
                const we = new Date(y, m-1, i).getDay();
                h += `<td class="${isV?'v-mark':''} ${we===0?'sun':we===6?'sat':''} ${hide} ${isT?'today-col today-left today-right':''}">${isV?'V':''}</td>`;
            }
            h += `</tr>`;
        });

        document.getElementById('displayTable').innerHTML = h + `</tbody>`;
    }

    window.onload = function() {
        document.getElementById('targetMonth').value = "2026-04";
        initSync();
    };
</script>
</body>
</html>
