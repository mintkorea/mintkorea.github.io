<!DOCTYPE html>
<html lang="ko">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; margin: 0; -webkit-tap-highlight-color: transparent; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-tab.active { color: #2E4077; border-bottom: 3px solid #2E4077; background-color: white; }
        
        /* 탭1 전용: team03-탭1 스타일 이식 */
        .big-msg-box { position: relative; line-height: 1.6; }
        .next-duty-inline { display: block; font-size: 10px; color: #ef4444; margin-top: 8px; font-weight: 800; }
        .worker-name-label { font-size: 10px; font-weight: 900; color: #94a3b8; margin-bottom: 2px; }
        .worker-pos-text { font-size: 14px; font-weight: 900; }
        .time-cell { background-color: #f8fafc; font-weight: bold; color: #1e293b; }

        /* 달력 스타일 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid #e2e8f0; background: white; border-radius: 12px; overflow: hidden; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; position: relative; cursor: pointer; min-height: 85px; }
        .date-area { height: 38px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; z-index: 10; position: relative; }
        .is-highlighted .date-area { background-color: rgba(255, 255, 255, 0.2); }
        .shift-area { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; z-index: 5; }
        .is-today { border: 2.5px solid #ef4444 !important; z-index: 50; }
        .is-today::before { content: 'TODAY'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 1px 5px; border-radius: 4px; z-index: 60; }
        .dot-container { display: flex; gap: 2px; justify-content: center; height: 6px; margin-top: 2px; }
        .v-dot { width: 5px; height: 5px; border-radius: 50%; }
        .dot-sung { background-color: #a855f7; } 
        .dot-omni { background-color: #f97316; }
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; color: white; margin-right: 6px; display: inline-block; }
        .badge-sung { background-color: #a855f7; }
        .badge-omni { background-color: #f97316; }
        .name-text { font-weight: 700; color: #334155; font-size: 13px; }

        /* 모달 및 테이블 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .custom-table { width: 100%; border-collapse: collapse; font-size: 11px; text-align: center; table-layout: fixed; background: white; }
        .custom-table th { background: #f8fafc; color: #1e293b; padding: 6px 1px; border: 1px solid #e2e8f0; font-weight: 800; }
        .custom-table td { border: 1px solid #e2e8f0; padding: 6px 1px; color: #475569; height: 38px; }
        #floatingList { position: fixed; top: 0; right: -100%; width: 100%; max-width: 448px; height: 100%; background: #f8f9fa; z-index: 1000; transition: 0.3s ease; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        #floatingList.active { right: 0; }
        @media (min-width: 448px) { #floatingList.active { right: 50%; transform: translateX(50%); } }
    </style>
</head>
<body>

    <script>
        firebase.initializeApp({ apiKey: "AIzaSyCXNQ3b9qcaJjQAGua3-vcgRZ2j0wASaXM", projectId: "catholic-security-system" });
        const db = firebase.firestore();

        let vData = {}, staffData = [], currentYear = 2026, currentMonth = 3, viewMode = 'single';
        let isFullTable = false; 
        let scheduleMonthRange = 1; 
        
        let config = {
            baseDate: '2025-01-01',
            shifts: ['C', 'A', 'B'],
            colors: { C: ['#E3F2FD', '#1976D2'], A: ['#FFF3E0', '#F57C00'], B: ['#FFEBEE', '#D32F2F'] },
            adminPw: '1234',
            holidays: {}
        };

        const WORKER_COLORS = { "황재업": { bg: "#2E4077", toneUp: "#E3F2FD" }, "김태언": { bg: "#059669", toneUp: "#ECFDF5" }, "이태원": { bg: "#D97706", toneUp: "#FFFBEB" }, "이정석": { bg: "#7C3AED", toneUp: "#F5F3FF" } };
        const DATA_LIST = [["07:00", "08:00", "보안실", "로비", "로비", "휴게"], ["08:00", "09:00", "보안실", "휴게", "휴게", "로비"], ["09:00", "10:00", "보안실", "순찰", "휴게", "로비"], ["10:00", "11:00", "휴게", "보안실", "로비", "휴게"], ["11:00", "12:00", "보안실", "중식", "로비", "중식"], ["12:00", "13:00", "중식", "보안실", "중식", "로비"], ["13:00", "14:00", "보안실", "휴게", "순찰", "로비"], ["14:00", "15:00", "순찰", "보안실", "로비", "휴게"], ["15:00", "16:00", "보안실", "휴게", "로비", "휴게"], ["16:00", "17:00", "휴게", "보안실", "휴게", "로비"], ["17:00", "18:00", "보안실", "휴게", "휴게", "로비"], ["18:00", "19:00", "보안실", "석식", "로비", "석식"], ["19:00", "20:00", "보안실", "보안실", "석식", "로비"], ["20:00", "21:00", "석식", "보안실", "로비", "휴게"], ["21:00", "22:00", "보안실", "순찰", "로비", "휴게"], ["22:00", "23:00", "순찰", "보안실", "순찰", "로비"], ["23:00", "00:00", "보안실", "휴게", "휴게", "로비"], ["00:00", "01:00", "보안실", "휴게", "휴게", "로비"], ["01:00", "01:40", "보안실", "휴게", "휴게", "로비"], ["01:40", "02:00", "보안실", "보안실", "로비", "로비"], ["02:00", "03:00", "휴게", "보안실", "로비", "휴게"], ["03:00", "04:00", "휴게", "보안실", "로비", "휴게"], ["04:00", "05:00", "휴게", "보안실", "로비", "휴게"], ["05:00", "06:00", "보안실", "순찰", "로비", "순찰"], ["06:00", "07:00", "보안실", "정리", "로비", "정리"]];

        // 근무 로직 및 탭1 렌더링 (team03-탭1 로직으로 전면 교체)
        function getShiftInfo(date) {
            const base = new Date(config.baseDate); base.setHours(0,0,0,0);
            const target = new Date(date); target.setHours(0,0,0,0);
            const diff = Math.round((target - base) / 86400000);
            const sName = config.shifts[((diff % config.shifts.length) + config.shifts.length) % config.shifts.length];
            return { name: sName, colors: config.colors[sName] || ['#f1f5f9', '#64748b'] };
        }

        function getNextCDate(date) {
            let d = new Date(date); d.setHours(12,0,0,0);
            for (let i = 0; i <= 7; i++) {
                if (getShiftInfo(d).name === 'C') return d;
                d.setDate(d.getDate() + 1);
            }
            return d;
        }

/* 주신 파일의 <script> 부분 중 getWorkers 함수만 아래 내용으로 교체하거나, 
   아래 전체 코드를 새 파일로 저장하세요. */

       function getWorkers(date) {
            const base = new Date(config.baseDate); base.setHours(0,0,0,0);
            const targetDt = new Date(date); targetDt.setHours(0,0,0,0);
            const diffDays = Math.round((targetDt - base) / 86400000);
            const dutyCount = Math.floor(diffDays / 3);
            
            // 1. 기본 순번 결정 (지정하신 선임 순서: 김태언, 이태원, 이정석)
            const members = ["김태언", "이정석", "이태원"];
            const hallIdx = Math.floor(((dutyCount % 6) + 6) % 6 / 2);
            let hallWorker = members[hallIdx];
            let medA, medB;
            
            // 회관 근무자 제외 나머지 인원 배치
            if (hallWorker === "김태언") { medA = "이태원"; medB = "이정석"; }
            else if (hallWorker === "이태원") { medA = "김태언"; medB = "이정석"; }
            else { medA = "김태언"; medB = "이태원"; }
            
            // 3일 주기에 따른 의산연 A/B 내부 스왑
            if (dutyCount % 2 !== 0) [medA, medB] = [medB, medA];

            // 2. 파이어베이스 연차 데이터 확인
            const y = targetDt.getFullYear();
            const m = String(targetDt.getMonth() + 1).padStart(2, '0');
            const d = String(targetDt.getDate());
            const dailyVocs = vData[`${y}-${m}`] || {};

            const isV = (name) => {
                if (!dailyVocs[name]) return false;
                return dailyVocs[name].split(',').map(v => v.trim()).includes(d);
            };

            // 3. 핵심 로직: 연차자 발생 시 '회관' 자리에 고정 (맞교환)
            // 의산연A가 연차인 경우 -> 회관 근무자와 교대
            if (isV(medA)) {
                let temp = hallWorker;
                hallWorker = medA;
                medA = temp;
            } 
            // 의산연B가 연차인 경우 -> 회관 근무자와 교대
            else if (isV(medB)) {
                let temp = hallWorker;
                hallWorker = medB;
                medB = temp;
            }
            // ※ 회관 근무자 본인이 연차인 경우는 자기 자리를 유지하므로 별도 처리 불필요

            return ["황재업", hallWorker, medA, medB];
        }

        function renderStatus() {
            const now = new Date();
            const hr = now.getHours();
            const min = now.getMinutes();
            const realMin = hr * 60 + min;

            const todayShift = getShiftInfo(now).name;
            const yesterdayShift = getShiftInfo(new Date(now.getTime() - 86400000)).name;

            let mainMsg = "", showCards = false, isHighlight = false, targetDate = now;
            const isBefore7 = realMin < 420;

            if (todayShift === 'C') {
                targetDate = now;
                if (isBefore7) {
                    mainMsg = (realMin < 390) ? "🗓️ 오늘 근무 예정입니다.<br>여유 있게 준비하세요." : "🛡️ 곧 근무 투입입니다.<br>복장 및 장비를 점검하세요.";
                    showCards = (realMin >= 390);
                } else {
                    showCards = true; isHighlight = true;
                    if (realMin < 540) mainMsg = "🌅 좋은 아침입니다. 근무를 시작합니다.";
                    else if (realMin < 660) mainMsg = "🛡️ 근무 중입니다. 안전에 유의하세요.";
                    else if (realMin < 780) mainMsg = "🍱 점심시간입니다.";
                    else if (realMin < 960) mainMsg = "🛡️ 오후 근무 중입니다.";
                    else if (realMin < 1200) mainMsg = "🌙 저녁 시간입니다.";
                    else mainMsg = "🌌 야간 근무 중입니다.";
                }
            } else if (yesterdayShift === 'C' && isBefore7) {
                showCards = true; isHighlight = true; targetDate = new Date(now.getTime() - 86400000);
                if (realMin < 380) mainMsg = "🛡️ 야간 근무 중입니다. 안전에 유의하세요.";
                else if (realMin < 400) mainMsg = "👋 근무 마무리 중입니다.";
                else mainMsg = "🤝 근무 교대 중입니다.";
            } else {
                mainMsg = "☕ 휴무일입니다. 편안하게 쉬세요.";
                showCards = false; targetDate = getNextCDate(now);
            }

            const nextC = getNextCDate(now);
            document.getElementById('time-msg').innerHTML = `<div class="big-msg-box">${mainMsg}<span class="next-duty-inline">📅 다음 근무: ${nextC.getMonth()+1}월 ${nextC.getDate()}일</span></div>`;

            const workers = getWorkers(targetDate);
            const logicNowMin = hr < 7 ? realMin + 1440 : realMin;
            let currentIdx = -1;
            if (isHighlight) {
                DATA_LIST.forEach((r, i) => {
                    let [sH, sM] = r[0].split(':').map(Number);
                    let sT = (sH < 7 ? sH * 60 + sM + 1440 : sH * 60 + sM);
                    let [eH, eM] = r[1].split(':').map(Number);
                    let eT = (eH < 7 && r[1] !== "07:00") ? (eH * 60 + eM + 1440) : (eH === 7 ? 1860 : eH * 60 + eM);
                    if (logicNowMin >= sT && logicNowMin < eT) currentIdx = i;
                });
            }

            const cardsContainer = document.getElementById('worker-cards');
            cardsContainer.style.display = showCards ? 'grid' : 'none';
            cardsContainer.innerHTML = workers.map((w, idx) => `
                <div class="worker-card bg-white p-3 rounded-xl border" style="border-left: 8px solid ${WORKER_COLORS[w]?.bg}">
                    <div class="worker-name-label">${['조장','회관','의산A','의산B'][idx]} ${w}</div>
                    <div class="worker-pos-text" style="color:${WORKER_COLORS[w]?.bg}">${(currentIdx !== -1 && showCards) ? DATA_LIST[currentIdx][idx+2] : '대기'}</div>
                </div>`).join('');

            let h = `<thead><tr><th rowspan="2" class="time-cell">시간</th><th colspan="2">성의회관</th><th colspan="2">의산연</th></tr><tr>`;
            workers.forEach(w => { h += `<th style="background-color:${WORKER_COLORS[w]?.toneUp}">${w}</th>`; });
            h += `</tr></thead><tbody>`;
            const startIdx = (isHighlight && !isFullTable) ? Math.max(0, currentIdx) : 0;
            DATA_LIST.forEach((r, i) => {
                if (i >= startIdx || isFullTable) {
                    const isNow = isHighlight && i === currentIdx;
                    h += `<tr ${isNow ? 'style="background:#fff7ed; outline:2px solid #ef4444; font-weight:bold;"' : ''}><td class="time-cell">${r[0]}~${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td></tr>`;
                }
            });
            document.getElementById('status-table').innerHTML = h + `</tbody>`;
        }

        // --- 탭 2: 근무 편성표 로직 ---
        function updateScheduleRange(val) { scheduleMonthRange = val; renderSchedule(); }
        function renderSchedule() {
            const focus = document.getElementById('worker-focus').value;
            const weekDays = ['일','월','화','수','목','금','토'];
            let h = `<thead><tr><th>날짜</th><th>조장</th><th>회관</th><th>의산연A</th><th>의산연B</th></tr></thead><tbody>`;
    
            let startDate = new Date();
            startDate.setHours(12, 0, 0, 0); // 날짜 계산 오차 방지
    
            let totalDays = 0;

            // scheduleMonthRange가 음수면 과거 N개월 전부터 오늘까지, 양수면 오늘부터 미래까지
            if (scheduleMonthRange < 0) {
                startDate.setMonth(startDate.getMonth() + scheduleMonthRange);
                const today = new Date();
                today.setHours(12, 0, 0, 0);
                // 시작일부터 오늘까지의 총 일수 계산
               totalDays = Math.round((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            } else {
                totalDays = scheduleMonthRange * 31;
            }

            const todayStr = new Date().toDateString();

            for (let i = 0; i < totalDays; i++) {
                let d = new Date(startDate);
                d.setDate(startDate.getDate() + i);
        
                // C조인 날짜만 행으로 생성
                if (getShiftInfo(d).name === 'C') {
                    const ws = getWorkers(d);
                    const y = d.getFullYear();
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const ds = String(d.getDate());
                    const dayIdx = d.getDay();
            
                    // 오늘 날짜인 경우 강조 (과거 목록 볼 때 유용함)
                    const isToday = d.toDateString() === todayStr;
                    const rowStyle = isToday ? 'style="background-color: #fff7ed; outline: 2px solid #fdba74;"' : '';
            
                    const holidayList = config.holidays[`${y}-${m}`] || [];
                    let dateColorClass = (dayIdx === 0 || holidayList.includes(parseInt(ds))) ? "text-red-500" : (dayIdx === 6 ? "text-blue-500" : "text-slate-800");
            
                    const mv = vData[`${y}-${m}`] || {};
                    h += `<tr ${rowStyle}><td class="font-black bg-slate-50 ${dateColorClass}">${d.getMonth() + 1}/${d.getDate()}(${weekDays[dayIdx]})</td>`;
            
                    ws.forEach(w => {
                        const isV = mv[w] && mv[w].split(',').map(v => v.trim()).includes(ds);
                        // 인덱스 안전 접근을 위해 ? 사용
                        const bgColor = w === focus ? WORKER_COLORS[w]?.bg : WORKER_COLORS[w]?.toneUp;
                        const textColor = w === focus ? 'white' : 'black';
                        h += `<td style="background:${bgColor}; color:${textColor}">${w}${isV ? '🚩' : ''}</td>`;
                    });
                    h += "</tr>";
                }
            }
            document.getElementById('schedule-list').innerHTML = h + "</tbody>";
        }

        // --- 탭 3: 달력 로직 ---
        function getSortedDayVocs(y, m, d) {
            const key = `${y}-${String(m+1).padStart(2,'0')}`;
            let list = [];
            if(vData[key]) {
                for(let name in vData[key]) {
                    if(vData[key][name].split(',').includes(String(d))) {
                        const info = staffData.find(s => s.n === name) || { g: '기타', s: '?' };
                        list.push({ name, g: info.g, s: info.s });
                    }
                }
            }
            return list.sort((a, b) => (a.g.includes('성의') ? -1 : 1));
        }

        function createGrid(year, month) {
            const grid = document.createElement('div'); grid.className = 'calendar-grid';
            ['일','월','화','수','목','금','토'].forEach(d => grid.innerHTML += `<div class="text-center font-bold text-[10px] py-2 bg-slate-50 border-b text-slate-400">${d}</div>`);
            const first = new Date(year, month, 1).getDay(), last = new Date(year, month+1, 0).getDate();
            const targetS = document.getElementById('shiftSelect').value;
            const todayStr = new Date().toDateString();
            for (let i=0; i<first; i++) grid.innerHTML += `<div class="calendar-cell bg-slate-50/50"></div>`;
            for (let d=1; d<=last; d++) {
                const dt = new Date(year, month, d), sInfo = getShiftInfo(dt), isH = (targetS === sInfo.name);
                const isToday = dt.toDateString() === todayStr;
                const holidayList = config.holidays[`${year}-${String(month+1).padStart(2,'0')}`] || [];
                const isHoliday = holidayList.includes(d);
                const dayVocs = getSortedDayVocs(year, month, d);
                const cell = document.createElement('div');
                cell.className = `calendar-cell ${isToday ? 'is-today' : ''} ${isH ? 'is-highlighted' : ''}`;
                if(isH) cell.style.backgroundColor = sInfo.colors[1];
                cell.innerHTML = `<div class="date-area ${dt.getDay()===0 || isHoliday ? 'text-red-500' : ''} ${isH ? 'text-white' : ''}">
                        <span>${d}</span><div class="dot-container">
                            ${dayVocs.some(v=>v.g.includes("성의")) ? '<div class="v-dot dot-sung"></div>' : ''}
                            ${dayVocs.some(v=>v.g.includes("옴니")) ? '<div class="v-dot dot-omni"></div>' : ''}
                        </div></div>
                    <div class="shift-area" style="background:${isH?'transparent':sInfo.colors[0]}; color:${isH?'white':sInfo.colors[1]}">${sInfo.name}</div>`;
                if(dayVocs.length > 0) cell.onclick = () => showDetail(`${month+1}월 ${d}일 연차자`, dayVocs);
                grid.appendChild(cell);
            }
            return grid;
        }

        function renderCalendar() {
            document.getElementById('monthTitle').innerText = `${currentYear}년 ${currentMonth + 1}월`;
            const body = document.getElementById('calendarBody'); body.innerHTML = '';
            body.appendChild(createGrid(currentYear, currentMonth));
            const mv = document.getElementById('multiView'); mv.innerHTML = '';
            if(viewMode === 'multi') {
                for(let i=0; i<6; i++) {
                    const d = new Date(currentYear, currentMonth + i, 1);
                    const wrap = document.createElement('div'); wrap.className = "bg-white rounded-2xl shadow-sm border overflow-hidden p-2";
                    wrap.innerHTML = `<div class="text-center font-black text-xs mb-2">${d.getFullYear()}년 ${d.getMonth()+1}월</div>`;
                    wrap.appendChild(createGrid(d.getFullYear(), d.getMonth()));
                    mv.appendChild(wrap);
                }
            }
        }

        function renderFloatingList() {
    const container = document.getElementById('listContent');
    const showAll = document.getElementById('showAllCheck').checked;
    if (!container) return;
    
    container.innerHTML = '';
    const now = new Date();
    now.setHours(0,0,0,0);
    
    // 선택된 월의 마지막 날짜 계산
    const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
    
    for (let d = 1; d <= lastDate; d++) {
        const targetDate = new Date(currentYear, currentMonth, d);
        if (!showAll && targetDate < now) continue;

        const vocs = getSortedDayVocs(currentYear, currentMonth, d);
        if (vocs.length > 0) {
            const sInfo = getShiftInfo(targetDate);
            const item = document.createElement('div');
            // 가로 한 줄 레이아웃 적용
            item.className = "flex items-center gap-2 p-3 bg-white border rounded-2xl shadow-sm mb-2";
            
            let html = `
                <div class="text-[12px] font-black text-slate-700 whitespace-nowrap min-w-[55px]">
                    ${currentMonth + 1}/${d} (${['일','월','화','수','목','금','토'][targetDate.getDay()]})
                </div>
                <div class="px-2 py-0.5 rounded text-[10px] font-black text-white" style="background-color:${sInfo.colors[1]}">
                    ${sInfo.name}
                </div>
                <div class="flex flex-wrap gap-1 items-center">
            `;
            
            vocs.forEach(v => {
                const isSung = v.g.includes('성의');
                html += `
                    <div class="flex items-center gap-1">
                        <span class="px-1.5 py-0.5 rounded text-[8px] font-bold text-white ${isSung ? 'bg-purple-500' : 'bg-orange-500'}">
                            ${isSung ? '성의회관' : '옴니버스'}
                        </span>
                        <span class="text-[12px] font-bold text-slate-700">${v.name}</span>
                    </div>
                `;
            });
            
            item.innerHTML = html + `</div>`;
            container.appendChild(item);
        }
    }
}


        // --- 기타 UI 제어 함수들 ---
        function toggleFullTable() { isFullTable = !isFullTable; renderStatus(); }
        function openTab(id) { 
            document.querySelectorAll('.tab-content, .nav-tab').forEach(el => el.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
            document.getElementById('btn-'+id).classList.add('active'); 
            if(id==='status') renderStatus(); else if(id==='schedule') renderSchedule(); else if(id==='calendar') renderCalendar();
        }
        function changeMonth(v) { currentMonth += v; if(currentMonth<0){currentMonth=11;currentYear--;} else if(currentMonth>11){currentMonth=0;currentYear++;} renderCalendar(); }
        function toggleViewMode() { 
            viewMode = viewMode==='single'?'multi':'single'; 
            document.getElementById('singleView').classList.toggle('hidden'); 
            document.getElementById('multiView').classList.toggle('hidden'); 
            document.getElementById('viewModeBtn').innerText = viewMode==='single'?'6개월 모아보기':'단일 보기';
            renderCalendar(); 
        }
        function toggleFloatingList() { document.getElementById('floatingList').classList.toggle('active'); renderFloatingList(); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function showDetail(title, vocs) {
            document.getElementById('detailHeader').innerText = title;
            
            // 현재 날짜의 조 정보를 가져오기 위해 타이틀에서 날짜 추출 (또는 현재 선택된 날짜 기준)
            const sInfo = getShiftInfo(new Date(currentYear, currentMonth, parseInt(title.match(/\d+일/)[0])));

            document.getElementById('detailBody').innerHTML = vocs.map(v => {
                const isSung = v.g.includes('성의');
                return `
                    <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                        <div class="flex items-center gap-2">
                            <span class="px-2 py-0.5 rounded text-[10px] font-black text-white ${isSung ? 'bg-[#a855f7]' : 'bg-[#f97316]'}">
                                ${isSung ? '성의회관' : '옴니버스'}
                            </span>
                            <span class="px-2 py-0.5 rounded text-[10px] font-black text-white" style="background-color:${sInfo.colors[1]}">
                                ${sInfo.name}조
                            </span>
                            <span class="font-bold text-slate-700 text-sm ml-1">${v.name}</span>
                        </div>
                        <span class="text-[10px] font-bold text-slate-400 italic">연차</span>
                    </div>
                `;
            }).join('');
            
            document.getElementById('detailModal').classList.add('active');
        }

        // --- 관리자 설정 로직 ---
        function openAdmin() {
            const pw = prompt("관리자 암호를 입력하세요.");
            if(pw === config.adminPw) {
                document.getElementById('baseDateInput').value = config.baseDate;
                initHolidayUI();
                const container = document.getElementById('patternContainer');
                container.querySelectorAll('.pattern-row').forEach(e => e.remove());
                config.shifts.forEach(s => addRoutineRowUI(s, config.colors[s][0], config.colors[s][1]));
                document.getElementById('adminModal').classList.add('active');
            } else if(pw !== null) alert("암호가 틀렸습니다.");
        }
        function initHolidayUI() {
            const ySel = document.getElementById('holidayYear'), mSel = document.getElementById('holidayMonth');
            ySel.innerHTML = ''; mSel.innerHTML = '';
            for(let y=2025; y<=2030; y++) ySel.innerHTML += `<option value="${y}" ${y==currentYear?'selected':''}>${y}년</option>`;
            for(let m=1; m<=12; m++) mSel.innerHTML += `<option value="${m}" ${m==currentMonth+1?'selected':''}>${m}월</option>`;
            const updateInput = () => {
                const key = `${ySel.value}-${String(mSel.value).padStart(2,'0')}`;
                document.getElementById('holidayDays').value = (config.holidays[key] || []).join(', ');
            };
            ySel.onchange = updateInput; mSel.onchange = updateInput; updateInput();
        }
        function addRoutineRowUI(name, bg, pt) {
            const row = document.createElement('div'); row.className = "pattern-row flex items-center gap-2 p-2 bg-slate-50 rounded-lg mb-1";
            row.innerHTML = `<input type="text" value="${name}" class="r-name w-12 p-2 border rounded-lg text-center font-black text-sm">
                <input type="color" value="${bg}" class="r-bg w-8 h-8 border-none cursor-pointer">
                <input type="color" value="${pt}" class="r-point w-8 h-8 border-none cursor-pointer">
                <button onclick="this.parentElement.remove()" class="ml-auto text-slate-300">×</button>`;
            document.getElementById('patternContainer').appendChild(row);
        }
        function saveAdminSettings() {
            const rows = document.querySelectorAll('.pattern-row');
            let ns = []; let nc = {};
            rows.forEach(r => {
                const n = r.querySelector('.r-name').value.trim().toUpperCase();
                if(n) { ns.push(n); nc[n] = [r.querySelector('.r-bg').value, r.querySelector('.r-point').value]; }
            });
            const hYear = document.getElementById('holidayYear').value, hMonth = document.getElementById('holidayMonth').value;
            const hDays = document.getElementById('holidayDays').value.split(',').map(d => parseInt(d.trim())).filter(d => !isNaN(d));
            config.holidays[`${hYear}-${String(hMonth).padStart(2,'0')}`] = hDays;
            const newPw = document.getElementById('adminPwInput').value.trim();
            if(newPw) config.adminPw = newPw;
            config.shifts = ns; config.colors = nc; config.baseDate = document.getElementById('baseDateInput').value;
            db.collection("vocation_app").doc("config").set(config); 
            updateShiftSelector(); renderCalendar(); closeModal('adminModal'); alert("저장되었습니다.");
        }
        function updateShiftSelector() {
            const sel = document.getElementById('shiftSelect');
            sel.innerHTML = '<option value="none">조별 강조 선택</option>';
            config.shifts.forEach(s => sel.innerHTML += `<option value="${s}">${s}조 하이라이트</option>`);
        }

        window.onload = () => {
            updateShiftSelector();
            db.collection("vocation_app").doc("config").get().then(doc => { if(doc.exists) { config = {...config, ...doc.data()}; updateShiftSelector(); } });
            db.collection("vocation_app").doc("data").onSnapshot(doc => { if(doc.exists) { vData = doc.data().vocation || {}; staffData = doc.data().staff || []; // 탭1을 열면서 관련 데이터를 모두 렌더링하도록 강제 호출
        openTab('status'); } });
            setInterval(() => { 
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleString(); 
                if(document.getElementById('status').classList.contains('active')) renderStatus();
            }, 1000);
        };
    </script>
</body>
