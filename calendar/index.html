<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 근무달력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* --- 달력 레이아웃 & TODAY 하이라이트 --- */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; background: white; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; position: relative; cursor: pointer; min-height: 80px; overflow: hidden; }
        
        .date-area { height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; position: relative; z-index: 10; }
        .shift-area { aspect-ratio: 1 / 1; width: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; z-index: 5; transition: all 0.2s; }
        
        /* 조별 강조 시 투톤 효과 (상단 날짜영역 반투명) */
        .cell-highlighted .date-area { background-color: rgba(255, 255, 255, 0.7); }
        .cell-highlighted .shift-area { color: white !important; }

        /* TODAY 배지 및 붉은 테두리 */
        .is-today { border: 2px solid #ef4444 !important; z-index: 20; box-shadow: inset 0 0 0 1px #ef4444; }
        .is-today::after { 
            content: 'TODAY'; position: absolute; top: 0; left: 50%; transform: translateX(-50%); 
            background: #ef4444; color: white; font-size: 8px; font-weight: 900; 
            padding: 1px 4px; border-radius: 0 0 4px 4px; z-index: 30; 
        }
        
        .sunday { color: #ef4444; }
        .saturday { color: #3b82f6; }

        /* --- 명단 리스트 (플로팅) 스타일 --- */
        #floatingList { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: #f8f9fa; z-index: 200; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        #floatingList.active { right: 0; }
        .list-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0; }
        
        .building-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; color: white; margin-right: 8px; }
        .bg-sung { background-color: #a855f7; } 
        .bg-omni { background-color: #f97316; } 
        .person-name { font-size: 15px; font-weight: 700; color: #1e293b; }

        /* --- 블루톤 모달 스타일 (이미지 반영) --- */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 320px; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .modal-header { background-color: #5dade2; padding: 15px; color: white; font-weight: 800; text-align: center; font-size: 16px; }
        .modal-item { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px 10px; text-align: center; }
        .modal-item .dept { color: #cbd5e1; font-size: 11px; margin-bottom: 4px; display: block; font-weight: 500; }
        .modal-item .name { color: #334155; font-size: 17px; font-weight: 900; }

        /* 기타 UI */
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: #1e293b; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 150; cursor: pointer; }
        .dot-container { display: flex; gap: 2px; justify-content: center; height: 6px; margin-top: 1px; }
        .v-dot { width: 5px; height: 5px; border-radius: 50%; }
        .dot-sung { background-color: #a855f7; } 
        .dot-omni { background-color: #f97316; }
    </style>
</head>
<body class="p-2">

    <div class="max-w-md mx-auto">
        <header class="bg-white rounded-xl shadow-sm border border-gray-200 mb-2 p-3">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2" onclick="adminClick()">
                    <span class="text-xl">📅</span>
                    <h1 id="appTitle" class="text-lg font-black text-slate-800">성의교정 근무달력</h1>
                </div>
                <div id="dbStatus" class="text-[8px] font-bold text-slate-400">● 연결됨</div>
            </div>
            <div class="flex items-center gap-2">
                <div class="flex items-center bg-white border rounded-lg h-10 flex-1">
                    <button onclick="changeMonth(-1)" class="px-4 font-bold text-slate-400">＜</button>
                    <span id="monthTitle" class="text-sm font-black text-slate-700 flex-1 text-center"></span>
                    <button onclick="changeMonth(1)" class="px-4 font-bold text-slate-400">＞</button>
                </div>
                <select id="shiftSelect" class="text-xs h-10 bg-slate-100 rounded-lg font-bold border border-slate-200 px-2" onchange="render()"></select>
            </div>
        </header>
        <div id="calendarBody" class="calendar-grid rounded-xl shadow-lg overflow-hidden border border-gray-200"></div>
    </div>

    <div class="fab" onclick="toggleFloatingList()"><span class="text-sm font-black">명단</span></div>

    <div id="floatingList">
        <div class="p-4 bg-white border-b flex justify-between items-center sticky top-0 z-10">
            <h2 class="font-black text-lg text-slate-800">연차자 명단</h2>
            <div class="flex gap-2">
                <button id="togglePast" onclick="toggleHidePast()" class="text-[10px] bg-slate-100 px-3 py-1.5 rounded-full font-bold text-slate-500">전체보기</button>
                <button onclick="toggleFloatingList()" class="text-xl px-2">✕</button>
            </div>
        </div>
        <div id="listContent" class="p-3 flex-1 overflow-y-auto"></div>
    </div>

    <div id="commonModal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalHeader" class="modal-header"></div>
            <div id="modalBody" class="p-5 space-y-3 max-h-[50vh] overflow-y-auto"></div>
            <button onclick="closeModal()" class="w-full p-4 bg-white font-black border-t text-slate-800 text-sm active:bg-gray-50">닫기</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
            authDomain: "catholic-security-system.firebaseapp.com",
            projectId: "catholic-security-system",
            storageBucket: "catholic-security-system.firebasestorage.app",
            messagingSenderId: "978946205343",
            appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let settings = JSON.parse(localStorage.getItem('cal_settings')) || {
            title: "성의교정 근무달력", adminPw: "1234", baseDate: "2026/03/09",
            shifts: ['C', 'A', 'B'],
            colors: { C: ['#eff6ff', '#3b82f6'], A: ['#fffbeb', '#f59e0b'], B: ['#fef2f2', '#ef4444'] }
        };

        let staffData = [], vData = {}, hidePast = true;
        const today = new Date(); today.setHours(0,0,0,0);
        let currentYear = today.getFullYear(), currentMonth = today.getMonth();

        function init() {
            document.getElementById('appTitle').textContent = settings.title;
            const select = document.getElementById('shiftSelect');
            select.innerHTML = '<option value="none">강조 없음</option>';
            settings.shifts.forEach(s => { select.innerHTML += `<option value="${s}">${s}조 강조</option>`; });
            db.collection("vocation_app").doc("data").onSnapshot(doc => {
                if(doc.exists) { staffData = doc.data().staff || []; vData = doc.data().vocation || {}; render(); }
            });
        }

        function render() {
            const mKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            document.getElementById('monthTitle').textContent = `${currentYear}년 ${currentMonth + 1}월`;
            renderCalendar(mKey);
            renderFloatingList(mKey);
        }

        function renderCalendar(mKey) {
            const container = document.getElementById('calendarBody');
            container.innerHTML = '<div class="grid grid-cols-7 text-center font-bold text-[10px] py-2 bg-slate-50 border-b text-slate-400 col-span-7"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>';
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const base = new Date(settings.baseDate);
            const targetShift = document.getElementById('shiftSelect').value;

            for (let i = 0; i < firstDay; i++) container.appendChild(Object.assign(document.createElement('div'), { className: 'calendar-cell bg-slate-50/50' }));

            for (let d = 1; d <= lastDate; d++) {
                const curr = new Date(currentYear, currentMonth, d);
                curr.setHours(0,0,0,0);
                const diffDays = Math.round((curr - base) / 86400000); 
                const sName = settings.shifts[((diffDays % settings.shifts.length) + settings.shifts.length) % settings.shifts.length];
                const sCol = settings.colors[sName] || ['#ffffff', '#000000'];
                const {vList, dots} = getDayVocation(mKey, d);

                const isToday = curr.getTime() === today.getTime();
                const cell = document.createElement('div');
                cell.className = `calendar-cell ${isToday ? 'is-today' : ''}`;
                
                if (targetShift === sName) {
                    cell.classList.add('cell-highlighted');
                    cell.style.backgroundColor = sCol[1];
                }

                cell.innerHTML = `
                    <div class="date-area ${curr.getDay()===0?'sunday':curr.getDay()===6?'saturday':''}">
                        <span>${d}</span><div class="dot-container">${dots}</div>
                    </div>
                    <div class="shift-area" style="background:${targetShift===sName?'transparent':sCol[0]}; color:${sCol[1]}">${sName}</div>
                `;
                
                if (vList.length > 0) cell.onclick = () => showModal(`${currentMonth+1}월 ${d}일 연차`, vList);
                container.appendChild(cell);
            }
        }

        function renderFloatingList(mKey) {
            const container = document.getElementById('listContent');
            container.innerHTML = '';
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const base = new Date(settings.baseDate);

            for (let d = 1; d <= lastDate; d++) {
                const curr = new Date(currentYear, currentMonth, d);
                curr.setHours(0,0,0,0);
                if(hidePast && curr < today) continue;

                const {vList} = getDayVocation(mKey, d);
                if (vList.length === 0) continue;

                const diffDays = Math.round((curr - base) / 86400000); 
                const sName = settings.shifts[((diffDays % settings.shifts.length) + settings.shifts.length) % settings.shifts.length];
                const sCol = settings.colors[sName] || ['#fff', '#000'];

                const item = document.createElement('div');
                item.className = `list-card ${curr.getTime() === today.getTime() ? 'ring-2 ring-red-400' : ''}`;
                
                let html = `
                    <div class="flex items-center justify-between mb-3">
                        <span class="text-sm font-black text-slate-700">${currentMonth+1}/${d} (${['일','월','화','수','목','금','토'][curr.getDay()]})</span>
                        <span class="text-[9px] font-black px-2 py-0.5 rounded text-white" style="background:${sCol[1]}">${sName}조</span>
                    </div>
                    <div class="flex flex-wrap gap-y-2">
                `;

                vList.forEach(v => {
                    const bClass = v.g.includes("성의") ? "bg-sung" : "bg-omni";
                    html += `<div class="flex items-center w-full"><span class="building-badge ${bClass}">${v.g}</span><span class="person-name">${v.name}</span></div>`;
                });
                item.innerHTML = html + `</div>`;
                container.appendChild(item);
            }
        }

        function getDayVocation(mKey, day) {
            let vList = [], dots = "", hasSung = false, hasOmni = false;
            const monthV = vData[mKey] || {};
            for (let name in monthV) {
                if (monthV[name].split(',').map(v=>v.trim()).includes(String(day))) {
                    const info = staffData.find(s => s.n === name);
                    if(info) {
                        vList.push({ name, g: info.g.includes("성의") ? "성의회관" : "옴니버스파크", s: info.s });
                        if(info.g.includes("성의")) hasSung = true;
                        else if(info.g.includes("옴니")) hasOmni = true;
                    }
                }
            }
            if(hasSung) dots += '<div class="v-dot dot-sung"></div>';
            if(hasOmni) dots += '<div class="v-dot dot-omni"></div>';
            return { vList, dots };
        }

        function showModal(title, list) {
            document.getElementById('modalHeader').textContent = title;
            document.getElementById('modalBody').innerHTML = list.map(item => `
                <div class="modal-item">
                    <span class="dept">[${item.g}]</span>
                    <span class="name">${item.s} ${item.name}</span>
                </div>`).join('');
            document.getElementById('commonModal').classList.add('active');
        }

        function closeModal() { document.getElementById('commonModal').classList.remove('active'); }
        function toggleFloatingList() { document.getElementById('floatingList').classList.toggle('active'); }
        function toggleHidePast() { hidePast = !hidePast; document.getElementById('togglePast').textContent = hidePast ? "전체보기" : "오늘 이후만 보기"; render(); }
        function changeMonth(v) { currentMonth += v; if(currentMonth<0){currentMonth=11;currentYear--;} else if(currentMonth>11){currentMonth=0;currentYear++;} render(); }
        
        let clickCount = 0;
        function adminClick() {
            clickCount++;
            if(clickCount >= 5) {
                const pw = prompt("관리자 비번");
                if(pw === settings.adminPw) {
                    const newTitle = prompt("타이틀 수정", settings.title);
                    if(newTitle) { settings.title = newTitle; localStorage.setItem('cal_settings', JSON.stringify(settings)); location.reload(); }
                }
                clickCount = 0;
            }
            setTimeout(() => { clickCount = 0; }, 2000);
        }
        window.onload = init;
    </script>
</body>
</html>
