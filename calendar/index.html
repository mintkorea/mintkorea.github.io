<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 근무달력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* 달력 기본 스타일 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; background: white; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; position: relative; cursor: pointer; min-height: 80px; }
        .date-area { height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; position: relative; }
        .shift-area { aspect-ratio: 1 / 1; width: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; z-index: 5; }
        .is-today { border: 2px solid #ef4444 !important; z-index: 20; }
        .sunday { color: #ef4444; }
        .saturday { color: #3b82f6; }

        /* 플로팅 메뉴(명단) 스타일 */
        #floatingList { 
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%; 
            background: #f8f9fa; z-index: 200; transition: 0.3s ease-in-out;
            display: flex; flex-direction: column;
        }
        #floatingList.active { right: 0; }
        .list-card { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0; }

        /* 배지 스타일 */
        .v-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 800; border: 1px solid rgba(0,0,0,0.1); }
        
        /* 플로팅 버튼 */
        .fab { 
            position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; 
            background: #1e293b; color: white; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 150; cursor: pointer;
        }

        .dot-container { display: flex; gap: 2px; justify-content: center; align-items: center; height: 6px; margin-top: 1px; }
        .v-dot { width: 5px; height: 5px; border-radius: 50%; }
        .dot-sung { background-color: #a855f7; } 
        .dot-omni { background-color: #f97316; } 
    </style>
</head>
<body class="p-2">

    <div class="max-w-md mx-auto">
        <header class="bg-white rounded-xl shadow-sm border border-gray-200 mb-2 p-3">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2" onclick="adminClick()">
                    <span class="text-xl">📅</span>
                    <h1 id="appTitle" class="text-lg font-black text-slate-800">로딩 중...</h1>
                </div>
                <div id="dbStatus" class="text-[8px] font-bold text-slate-400">● 연결됨</div>
            </div>
            <div class="flex items-center gap-2">
                <div class="flex items-center bg-white border rounded-lg h-10 flex-1">
                    <button onclick="changeMonth(-1)" class="px-4 font-bold text-slate-400">＜</button>
                    <span id="monthTitle" class="text-sm font-black text-slate-700 flex-1 text-center"></span>
                    <button onclick="changeMonth(1)" class="px-4 font-bold text-slate-400">＞</button>
                </div>
                <select id="shiftSelect" class="text-xs h-10 bg-slate-100 rounded-lg font-bold outline-none border border-slate-200 px-2" onchange="render()"></select>
            </div>
        </header>

        <div id="calendarBody" class="calendar-grid rounded-xl shadow-lg overflow-hidden border border-gray-200"></div>
    </div>

    <div class="fab" onclick="toggleFloatingList()">
        <span class="text-sm font-black">명단</span>
    </div>

    <div id="floatingList">
        <div class="p-4 bg-white border-b flex justify-between items-center sticky top-0 z-10">
            <h2 class="font-black text-lg">연차자 명단</h2>
            <div class="flex gap-2">
                <button id="togglePast" onclick="toggleHidePast()" class="text-[10px] bg-slate-100 px-2 py-1 rounded font-bold text-slate-500">전체보기</button>
                <button onclick="toggleFloatingList()" class="text-xl px-2">✕</button>
            </div>
        </div>
        <div id="listContent" class="p-4 flex-1 overflow-y-auto">
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
            authDomain: "catholic-security-system.firebaseapp.com",
            projectId: "catholic-security-system",
            storageBucket: "catholic-security-system.firebasestorage.app",
            messagingSenderId: "978946205343",
            appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let settings = JSON.parse(localStorage.getItem('cal_settings')) || {
            title: "성의교정 근무달력", adminPw: "1234", baseDate: "2026/03/09",
            shifts: ['C', 'A', 'B'],
            colors: { C: ['#dbeafe', '#3498db'], A: ['#fef3c7', '#f39c12'], B: ['#fee2e2', '#e74c3c'] }
        };

        let staffData = [], vData = {}, hidePast = true;
        const today = new Date(); today.setHours(0,0,0,0);
        let currentYear = today.getFullYear(), currentMonth = today.getMonth();

        function init() {
            document.getElementById('appTitle').textContent = settings.title;
            const select = document.getElementById('shiftSelect');
            select.innerHTML = '<option value="none">강조 없음</option>';
            settings.shifts.forEach(s => { select.innerHTML += `<option value="${s}">${s}조</option>`; });
            db.collection("vocation_app").doc("data").onSnapshot(doc => {
                if(doc.exists) { staffData = doc.data().staff || []; vData = doc.data().vocation || {}; render(); }
            });
        }

        function render() {
            const mKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            document.getElementById('monthTitle').textContent = `${currentYear}년 ${currentMonth + 1}월`;
            renderCalendar(mKey);
            renderFloatingList(mKey);
        }

        function renderCalendar(mKey) {
            const container = document.getElementById('calendarBody');
            container.innerHTML = '<div class="grid grid-cols-7 text-center font-bold text-[10px] py-2 bg-slate-50 border-b text-slate-400 col-span-7"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>';
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const base = new Date(settings.baseDate);
            const targetShift = document.getElementById('shiftSelect').value;

            for (let i = 0; i < firstDay; i++) container.appendChild(Object.assign(document.createElement('div'), { className: 'calendar-cell bg-slate-50/50' }));

            for (let d = 1; d <= lastDate; d++) {
                const curr = new Date(currentYear, currentMonth, d);
                curr.setHours(0,0,0,0);
                const diffDays = Math.round((curr - base) / 86400000); 
                const sName = settings.shifts[((diffDays % settings.shifts.length) + settings.shifts.length) % settings.shifts.length];
                const sCol = settings.colors[sName] || ['#ffffff', '#000000'];
                const {vList, dots} = getDayVocation(mKey, d);

                const cell = document.createElement('div');
                cell.className = 'calendar-cell' + (curr.getTime() === today.getTime() ? ' is-today' : '');
                cell.innerHTML = `
                    <div class="date-area ${curr.getDay()===0?'sunday':curr.getDay()===6?'saturday':''}">
                        <span>${d}</span><div class="dot-container">${dots}</div>
                    </div>
                    <div class="shift-area" style="background:${targetShift===sName?sCol[1]:sCol[0]}; color:${targetShift===sName?'#fff':sCol[1]}">${sName}</div>
                `;
                if (vList.length > 0) cell.onclick = () => { toggleFloatingList(); document.getElementById(mKey+'-'+d)?.scrollIntoView(); };
                container.appendChild(cell);
            }
        }

        function renderFloatingList(mKey) {
            const container = document.getElementById('listContent');
            container.innerHTML = '';
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const base = new Date(settings.baseDate);

            // 날짜 배열 생성 및 오늘 기준으로 정렬 로직
            let dates = [];
            for (let d = 1; d <= lastDate; d++) dates.push(d);

            dates.forEach(d => {
                const curr = new Date(currentYear, currentMonth, d);
                curr.setHours(0,0,0,0);
                
                // 지나간 날짜 숨김 로직
                if(hidePast && curr < today) return;

                const {vList} = getDayVocation(mKey, d);
                if (vList.length === 0) return;

                // 성의회관 우선 정렬
                vList.sort((a, b) => a.g.includes("성의회관") ? -1 : 1);

                const diffDays = Math.round((curr - base) / 86400000); 
                const sName = settings.shifts[((diffDays % settings.shifts.length) + settings.shifts.length) % settings.shifts.length];
                const sCol = settings.colors[sName] || ['#fff', '#000'];

                const item = document.createElement('div');
                item.id = mKey + '-' + d;
                item.className = `list-card ${curr.getTime() === today.getTime() ? 'ring-2 ring-red-500' : ''}`;
                
                let html = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="font-black ${curr.getDay()===0?'text-red-500':curr.getDay()===6?'text-blue-500':'text-slate-800'}">
                            ${currentMonth+1}/${d} (${['일','월','화','수','목','금','토'][curr.getDay()]})
                            ${curr.getTime() === today.getTime() ? '<span class="ml-2 text-red-500 text-xs">오늘</span>' : ''}
                        </span>
                        <span class="text-[10px] font-black px-2 py-0.5 rounded" style="background:${sCol[0]}; color:${sCol[1]}">${sName}조</span>
                    </div>
                    <div class="flex flex-col gap-2">
                `;

                vList.forEach(v => {
                    html += `
                        <div class="v-badge" style="background:${sCol[0]}; color:${sCol[1]}">
                            <span class="opacity-60 text-[10px] font-bold">[${v.g}]</span>
                            <span>${v.s} ${v.name}</span>
                        </div>
                    `;
                });
                item.innerHTML = html + `</div>`;
                container.appendChild(item);
            });
        }

        function getDayVocation(mKey, day) {
            let vList = [], dots = "", hasSung = false, hasOmni = false;
            const monthV = vData[mKey] || {};
            for (let name in monthV) {
                if (monthV[name].split(',').map(v=>v.trim()).includes(String(day))) {
                    const info = staffData.find(s => s.n === name);
                    if(info) {
                        vList.push({ name, g: info.g, s: info.s });
                        if(info.g.includes("성의")) hasSung = true;
                        else if(info.g.includes("옴니")) hasOmni = true;
                    }
                }
            }
            if(hasSung) dots += '<div class="v-dot dot-sung"></div>';
            if(hasOmni) dots += '<div class="v-dot dot-omni"></div>';
            return { vList, dots };
        }

        function toggleFloatingList() { document.getElementById('floatingList').classList.toggle('active'); }
        function toggleHidePast() { 
            hidePast = !hidePast; 
            document.getElementById('togglePast').textContent = hidePast ? "전체보기" : "지나간 연차 숨김";
            render(); 
        }
        function changeMonth(v) { currentMonth += v; if(currentMonth<0){currentMonth=11;currentYear--;} else if(currentMonth>11){currentMonth=0;currentYear++;} render(); }
        
        // 관리자 클릭 로직 (기본 1234)
        let clickCount = 0;
        function adminClick() {
            clickCount++;
            if(clickCount >= 5) {
                const pw = prompt("관리자 비번");
                if(pw === settings.adminPw) {
                    const newTitle = prompt("앱 타이틀 수정", settings.title);
                    if(newTitle) { settings.title = newTitle; localStorage.setItem('cal_settings', JSON.stringify(settings)); location.reload(); }
                }
                clickCount = 0;
            }
            setTimeout(() => { clickCount = 0; }, 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
