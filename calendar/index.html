<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>성의교정 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* 캘린더 그리드 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #e2e8f0; border-left: 1px solid #e2e8f0; background: white; width: 100%; }
        .calendar-cell { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; position: relative; cursor: pointer; min-height: 80px; overflow: hidden; }
        
        /* 강조 시 스타일 */
        .date-area { height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; position: relative; z-index: 10; }
        .cell-highlighted .date-area { background: rgba(255, 255, 255, 0.3); color: white !important; }
        .cell-highlighted .shift-area { color: white !important; }
        .cell-highlighted .sunday, .cell-highlighted .saturday { color: white !important; }

        .shift-area { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; z-index: 5; }
        .is-today { border: 2.5px solid #ef4444 !important; z-index: 20; }
        .is-today::after { content: 'TODAY'; position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; font-size: 8px; font-weight: 900; padding: 1px 4px; border-radius: 0 0 4px 4px; z-index: 30; }
        
        .sunday { color: #ef4444; }
        .saturday { color: #3b82f6; }
        
        /* 연차 표시 점 */
        .dot-container { display: flex; gap: 2px; justify-content: center; height: 6px; margin-top: 1px; }
        .v-dot { width: 5px; height: 5px; border-radius: 50%; }
        .dot-sung { background-color: #a855f7; } 
        .dot-omni { background-color: #f97316; }

        /* 모바일 연차 명단 리스트 */
        #floatingList { position: fixed; top: 0; right: -100%; width: 100%; max-width: 448px; height: 100%; background: #f8f9fa; z-index: 400; transition: 0.3s ease; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        #floatingList.active { right: 50%; transform: translateX(50%); }
        
        .list-card { background: white; border-radius: 15px; padding: 12px 16px; margin-bottom: 8px; border: 1px solid #e2e8f0; display: flex; align-items: center; gap: 10px; }
        .list-date { font-size: 14px; font-weight: 800; color: #1e293b; min-width: 70px; }
        .list-shift { font-size: 11px; font-weight: 900; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: white; }
        
        /* [중요] 명칭 배지 스타일: 성의회관, 옴니버스 */
        .building-badge { padding: 3px 6px; border-radius: 6px; font-size: 10px; font-weight: 800; color: white; min-width: 50px; text-align: center; white-space: nowrap; }
        .bg-sung { background-color: #a855f7; } 
        .bg-omni { background-color: #f97316; }
        .staff-name { font-size: 14px; font-weight: 700; color: #334155; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 320px; border-radius: 20px; overflow: hidden; }
        .modal-header { background-color: #5dade2; padding: 15px; color: white; font-weight: 800; text-align: center; }
        
        .fab { position: fixed; bottom: 25px; left: 50%; transform: translateX(150px); width: 60px; height: 60px; background: #334155; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 150; cursor: pointer; }
        @media (max-width: 448px) { .fab { left: auto; right: 20px; transform: none; } }
    </style>
</head>
<body class="p-2 md:p-4">
    <div id="appContainer" class="max-w-md mx-auto">
        <header class="bg-white rounded-xl shadow-sm border border-gray-200 mb-3 p-3">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2 cursor-pointer" onclick="adminClick()">
                    <span class="text-xl">📅</span>
                    <h1 id="appTitle" class="text-lg font-black text-slate-800">로딩 중...</h1>
                </div>
            </div>
            <div class="flex items-center gap-2 w-full">
                <div class="flex items-center bg-white border rounded-lg h-10 flex-1">
                    <button onclick="changeMonth(-1)" class="px-4 font-bold text-slate-400">＜</button>
                    <span id="monthTitle" class="text-sm font-black text-slate-700 flex-1 text-center"></span>
                    <button onclick="changeMonth(1)" class="px-4 font-bold text-slate-400">＞</button>
                </div>
                <select id="shiftSelect" class="text-xs h-10 bg-slate-100 rounded-lg font-bold border border-slate-200 flex-1 text-center outline-none" onchange="render()"></select>
            </div>
        </header>

        <div id="singleView" class="rounded-xl shadow-lg overflow-hidden border border-gray-200 bg-white mb-20">
            <div id="calendarBody"></div>
        </div>
    </div>

    <div id="fabBtn" class="fab" onclick="toggleFloatingList()"><span class="text-sm font-black">명단</span></div>

    <!-- 모바일 연차 관리 리스트 -->
    <div id="floatingList">
        <div class="p-4 bg-white border-b flex justify-between items-center sticky top-0 z-10">
            <h2 id="listHeaderTitle" class="font-black text-lg text-slate-800">연차자 명단</h2>
            <div class="flex gap-2">
                <button id="togglePast" onclick="toggleHidePast()" class="text-[10px] bg-slate-100 px-3 py-1.5 rounded-full font-bold">전체보기</button>
                <button onclick="toggleFloatingList()" class="text-xl px-2 text-slate-400">✕</button>
            </div>
        </div>
        <div id="listContent" class="p-3 flex-1 overflow-y-auto"></div>
    </div>

    <!-- 공용 모달 -->
    <div id="commonModal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modalHeader" class="modal-header"></div>
            <div id="modalBody" class="p-5 max-h-[60vh] overflow-y-auto"></div>
            <button onclick="closeModal()" class="w-full p-4 bg-white font-black border-t text-sm text-slate-500">닫기</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
            authDomain: "catholic-security-system.firebaseapp.com",
            projectId: "catholic-security-system",
            storageBucket: "catholic-security-system.firebasestorage.app",
            messagingSenderId: "978946205343",
            appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const COLL = "vacation_system";
        const DOC = "data";

        let settings = {
            title: "성의교정 근무달력", adminPw: "1234", baseDate: "2026/03/09",
            shifts: ['C', 'A', 'B'],
            colors: { C: ['#eff6ff', '#3b82f6'], A: ['#fffbeb', '#f59e0b'], B: ['#fef2f2', '#ef4444'] }
        };

        let staffData = [], vData = {}, clickCount = 0, hidePast = true, isAdmin = false;
        const today = new Date(); today.setHours(0,0,0,0);
        let currentYear = today.getFullYear(), currentMonth = today.getMonth();

        function adminClick() {
            clickCount++;
            if(clickCount >= 5) {
                const pw = prompt("관리자 비번");
                if(pw === settings.adminPw) { isAdmin = true; alert("관리자 모드 활성화"); }
                clickCount = 0;
            }
            setTimeout(() => { clickCount = 0; }, 2000);
        }

        function getDayVocation(mKey, day) {
            let vList = [], dots = "", hasSung = false, hasOmni = false;
            const monthData = vData[mKey] || {};
            for (let name in monthData) {
                const days = String(monthData[name]).split(',').map(v=>v.trim());
                if (days.includes(String(day))) {
                    const info = staffData.find(s => s.n === name);
                    if(info) {
                        // [수정] 명칭을 성의회관, 옴니버스로 정확히 고정
                        let displayG = info.g.includes("성의") ? "성의회관" : "옴니버스";
                        vList.push({ name, g: displayG });
                        if(info.g.includes("성의")) hasSung = true; else hasOmni = true;
                    }
                }
            }
            vList.sort((a, b) => a.g === "성의회관" ? -1 : 1);
            if(hasSung) dots += '<div class="v-dot dot-sung"></div>';
            if(hasOmni) dots += '<div class="v-dot dot-omni"></div>';
            return { vList, dots };
        }

        function createGrid(year, month) {
            const grid = document.createElement('div');
            grid.className = 'calendar-grid';
            ['일','월','화','수','목','금','토'].forEach((day, i) => {
                grid.innerHTML += `<div class="text-center font-bold text-[10px] py-2 bg-slate-50 border-b text-slate-400 ${i===0?'sunday':i===6?'saturday':''}">${day}</div>`;
            });
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const base = new Date(settings.baseDate);
            const targetShift = document.getElementById('shiftSelect').value;
            const mKey = `${year}-${String(month + 1).padStart(2, '0')}`;
            
            for (let i = 0; i < firstDay; i++) grid.appendChild(Object.assign(document.createElement('div'), { className: 'calendar-cell bg-slate-50/50' }));
            
            for (let d = 1; d <= lastDate; d++) {
                const curr = new Date(year, month, d); curr.setHours(0,0,0,0);
                const diffDays = Math.round((curr - base) / 86400000); 
                const sName = settings.shifts[((diffDays % 3) + 3) % 3];
                const sCol = settings.colors[sName];
                const {vList, dots} = getDayVocation(mKey, d);
                
                const cell = document.createElement('div');
                cell.className = 'calendar-cell' + (curr.getTime() === today.getTime() ? ' is-today' : '');
                if (targetShift === sName) { 
                    cell.classList.add('cell-highlighted'); 
                    cell.style.backgroundColor = sCol[1]; 
                }
                
                cell.innerHTML = `
                    <div class="date-area ${curr.getDay()===0?'sunday':curr.getDay()===6?'saturday':''}">
                        <span>${d}</span><div class="dot-container">${dots}</div>
                    </div>
                    <div class="shift-area" style="background:${targetShift===sName?'transparent':sCol[0]}; color:${targetShift===sName?'white':sCol[1]}">${sName}</div>
                `;
                if (vList.length > 0) cell.onclick = () => showModal(`${month+1}월 ${d}일 연차`, vList);
                grid.appendChild(cell);
            }
            return grid;
        }

        function renderFloatingList(mKey) {
            const container = document.getElementById('listContent'); container.innerHTML = '';
            const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();
            const base = new Date(settings.baseDate);

            for (let d = 1; d <= lastDate; d++) {
                const curr = new Date(currentYear, currentMonth, d); curr.setHours(0,0,0,0);
                if(hidePast && curr < today) continue;
                const {vList} = getDayVocation(mKey, d); if (vList.length === 0) continue;
                
                const diffDays = Math.round((curr - base) / 86400000); 
                const sName = settings.shifts[((diffDays % 3) + 3) % 3];
                const sCol = settings.colors[sName];

                const item = document.createElement('div');
                item.className = `list-card ${curr.getTime() === today.getTime() ? 'ring-2 ring-red-400' : ''}`;
                
                let html = `
                    <div class="list-date">${currentMonth+1}/${d} (${['일','월','화','수','목','금','토'][curr.getDay()]})</div>
                    <div class="list-shift" style="background:${sCol[1]}">${sName}</div>
                    <div class="flex flex-wrap gap-2 flex-1">`;
                
                vList.forEach(v => {
                    html += `
                        <div class="flex items-center gap-1.5">
                            <span class="building-badge ${v.g === '성의회관' ? 'bg-sung' : 'bg-omni'}">${v.g}</span>
                            <span class="staff-name">${v.name}</span>
                        </div>`;
                });
                
                item.innerHTML = html + `</div>`;
                container.appendChild(item);
            }
        }

        function showModal(title, list) {
            document.getElementById('modalHeader').textContent = title;
            document.getElementById('modalBody').innerHTML = list.map(item => `
                <div class="flex items-center gap-2 p-3 border rounded-xl mb-2" onclick="${isAdmin ? `openEditor('${item.name}')` : ''}">
                    <span class="building-badge ${item.g === '성의회관' ? 'bg-sung' : 'bg-omni'}">${item.g}</span>
                    <span class="font-bold text-slate-700">${item.name}</span>
                </div>`).join('');
            document.getElementById('commonModal').classList.add('active');
        }

        function render() {
            const mKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
            document.getElementById('monthTitle').textContent = `${currentYear}년 ${currentMonth + 1}월`;
            const cb = document.getElementById('calendarBody'); cb.innerHTML = '';
            cb.appendChild(createGrid(currentYear, currentMonth));
            renderFloatingList(mKey);
        }

        function closeModal() { document.getElementById('commonModal').classList.remove('active'); }
        function toggleFloatingList() { document.getElementById('floatingList').classList.toggle('active'); }
        function toggleHidePast() { hidePast = !hidePast; document.getElementById('togglePast').textContent = hidePast ? "전체보기" : "과거포함"; render(); }
        function changeMonth(v) { currentMonth += v; if(currentMonth<0){currentMonth=11;currentYear--;} else if(currentMonth>11){currentMonth=0;currentYear++;} render(); }

        window.onload = () => {
            // [수정] 메인 타이틀과 리스트 헤더 타이틀 동일하게 적용
            document.getElementById('appTitle').textContent = settings.title;
            document.getElementById('listHeaderTitle').textContent = settings.title;

            const select = document.getElementById('shiftSelect');
            select.innerHTML = '<option value="none">강조 선택</option>';
            settings.shifts.forEach(s => { select.innerHTML += `<option value="${s}">${s}조 강조</option>`; });
            
            db.collection(COLL).doc(DOC).onSnapshot(doc => {
                if(doc.exists) { staffData = doc.data().staff || []; vData = doc.data().vacation || {}; render(); }
            });
        };
    </script>
</body>
</html>
