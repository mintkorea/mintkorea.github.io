<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 HTML 링크 자동 변환기</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --primary-color: #4f46e5;
            --primary-hover: #6366f1;
            --accent-color: #10b981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 5px;
        }

        .description {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .grid {
            display: flex;
            gap: 20px;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        textarea {
            width: 100%;
            height: 250px;
            background-color: #121212;
            color: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .options {
            margin-top: 15px;
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .option-item {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .option-item:last-child {
            margin-bottom: 0;
        }

        input[type="text"] {
            background-color: #121212;
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 6px 10px;
            width: 60px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .success-msg {
            color: var(--accent-color);
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        /* 미디어 쿼리 - 모바일 대응 */
        @media (max-width: 768px) {
            .grid {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔗 게시글 HTML 링크 자동 변환기</h1>
    <div class="description">텍스트 형태의 제목 리스트를 입력하면 등록된 게시글 DB에서 URL을 찾아 HTML <code>&lt;a&gt;</code> 태그로 변환합니다.</div>

    <div class="grid">
        <!-- 왼쪽: 입력 창 및 옵션 -->
        <div class="column">
            <h2>📝 제목 입력</h2>
            <textarea id="rawInput" placeholder="여기에 기호가 포함된 제목들을 통째로 붙여넣으세요..."></textarea>
            
            <div class="options">
                <div class="option-item">
                    <label for="prefixIcon">링크 앞 기호 지정 :</label>
                    <input type="text" id="prefixIcon" value="▶">
                </div>
                <div class="option-item">
                    <input type="checkbox" id="targetBlank" checked>
                    <label for="targetBlank">새 창으로 열기 (target="_blank")</label>
                </div>
            </div>

            <button onclick="generateHTML()">HTML 소스 생성하기</button>
        </div>

        <!-- 오른쪽: 출력 및 복사 -->
        <div class="column">
            <h2>💻 생성된 HTML 소스</h2>
            <textarea id="htmlOutput" readonly placeholder="결과 코드가 여기에 표시됩니다."></textarea>
            <button onclick="copyToClipboard()" style="background-color: #333333;">📋 코드 복사하기</button>
            <div id="successMsg" class="success-msg">✔ 코드가 클립보드에 복사되었습니다!</div>
        </div>
    </div>
</div>

<script>
// 1. 실제 운영중인 글의 [제목 : URL] 데이터베이스 역할을 하는 객체입니다.
// 신규 글이 발행될 때마다 아래 형식으로 줄을 추가해 주시면 됩니다.
const POST_DATABASE = {
    "식후 걷기가 혈당에 좋은 이유 | 식후 10분 걷기가 혈당을 낮추는 가장 쉬운 습관": "https://example.com/post/walking-blood-sugar",
    "복부비만 기준(cm)은 몇 cm부터일까? 내장지방 줄이는 가장 효과적인 방법": "https://example.com/post/belly-fat-guide",
    "근육 감소 예방! 대사 건강을 위해 단백질을 안전하게 섭취하는 방법": "https://example.com/post/protein-intake",
    "인슐린 저항성이란? 당뇨 전단계의 시작과 대사질환의 핵심 원인": "https://example.com/post/insulin-resistance",
    "대사증후군이란? 건강검진 결과표에서 꼭 확인해야 할 위험 수치 5가지": "https://example.com/post/metabolic-syndrome"
};

// 페이지 로드 시 예시 텍스트 미리 넣어주기
window.onload = function() {
    document.getElementById('rawInput').value = 
`🔗 함께 보면 좋은 글
▶ 식후 걷기가 혈당에 좋은 이유 | 식후 10분 걷기가 혈당을 낮추는 가장 쉬운 습관
▶ 복부비만 기준(cm)은 몇 cm부터일까? 내장지방 줄이는 가장 효과적인 방법
▶ 근육 감소 예방! 대사 건강을 위해 단백질을 안전하게 섭취하는 방법
▶ 인슐린 저항성이란? 당뇨 전단계의 시작과 대사질환의 핵심 원인
▶ 대사증후군이란? 건강검진 결과표에서 꼭 확인해야 할 위험 수치 5가지`;
};

// 앞뒤 불필요한 이모지나 기호 걷어내기 함수
function cleanTitle(titleText) {
    return titleText.replace(/^[🔗▶\s\-\•\*\d\.]+/g, '').trim();
}

// 데이터베이스에서 알맞은 URL 매칭하기
function findLink(inputLine) {
    const target = cleanTitle(inputLine);
    if (!target) return null;

    // 1단계: 완전 매칭 또는 포함 매칭 확인
    for (let dbTitle in POST_DATABASE) {
        if (dbTitle.includes(target) || target.includes(dbTitle)) {
            return { title: dbTitle, url: POST_DATABASE[dbTitle] };
        }
    }

    // 2단계: 띄어쓰기 기준 키워드가 2개 이상 매칭되는지 체크
    const keywords = target.split(/\s+/).filter(kw => kw.length > 1);
    for (let dbTitle in POST_DATABASE) {
        let matchCount = 0;
        keywords.forEach(kw => {
            if (dbTitle.includes(kw)) matchCount++;
        });
        if (matchCount >= 2) {
            return { title: dbTitle, url: POST_DATABASE[dbTitle] };
        }
    }

    return null;
}

// HTML 생성 메인 로직
function generateHTML() {
    const rawInput = document.getElementById('rawInput').value;
    const prefixIcon = document.getElementById('prefixIcon').value;
    const targetBlank = document.getElementById('targetBlank').checked;
    
    const lines = rawInput.split('\n');
    let htmlResults = [];

    lines.forEach(line => {
        const trimmedLine = line.trim();
        if (!trimmedLine) return;

        // "함께 보면 좋은 글" 같은 제목 텍스트 상단 고정 처리
        if (trimmedLine.includes("함께 보면") || trimmedLine.includes("추천") || trimmedLine.includes("관련 글")) {
            htmlResults.push(`<p><strong>${trimmedLine}</strong></p>`);
            return;
        }

        const match = findLink(trimmedLine);

        if (match) {
            const blankAttr = targetBlank ? " target='_blank'" : "";
            const displayTitle = cleanTitle(trimmedLine);
            // 깔끔한 HTML p 및 a 태그 생성
            htmlResults.push(`<p>${prefixIcon} <a href="${match.url}"${blankAttr}>${displayTitle}</a></p>`);
        } else {
            // DB에 없는 글일 경우 원본 유지 및 HTML 주석 처리
            htmlResults.push(`<!-- 매칭 실패: ${trimmedLine} -->`);
            htmlResults.append ? htmlResults.push(`<p>${trimmedLine}</p>`) : htmlResults.push(`<p>${trimmedLine}</p>`);
        }
    });

    document.getElementById('htmlOutput').value = htmlResults.join('\n');
    document.getElementById('successMsg').style.display = 'none'; // 새 소스 생성 시 알림 숨김
}

// 클립보드 복사 기능
function copyToClipboard() {
    const outputTextArea = document.getElementById('htmlOutput');
    if (!outputTextArea.value) return;

    outputTextArea.select();
    document.execCommand('copy');
    
    const successMsg = document.getElementById('successMsg');
    successMsg.style.display = 'block';
    setTimeout(() => {
        successMsg.style.display = 'none';
    }, 3000);
}
</script>

</body>
</html>
