<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root { --primary: #1a73e8; --private: #d93025; }
    body { font-family: 'Noto Sans KR', sans-serif; margin: 0; background: #f8f9fa; padding-bottom: 70px; }
    .header { background: var(--primary); color: white; padding: 15px; text-align: center; sticky; top: 0; }
    .header.private-mode { background: var(--private); }
    
    /* 탭 메뉴 */
    .tabs { display: flex; background: white; border-bottom: 1px solid #ddd; }
    .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; color: #666; }
    .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
    .tab.active.private { color: var(--private); border-bottom-color: var(--private); }

    /* 검색창 */
    .search-box { padding: 15px; display: flex; gap: 10px; }
    input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
    button { padding: 10px 15px; border: none; border-radius: 5px; background: var(--primary); color: white; cursor: pointer; }

    /* 리스트 및 애니메이션 */
    .card { background: white; margin: 10px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .pw-area { 
      font-weight: bold; color: #333; display: inline-block;
      filter: blur(5px); animation: rotate 3s infinite linear; 
      transition: 0.3s; cursor: pointer; border: 1px dashed #ccc; padding: 2px 10px;
    }
    .pw-area:active { filter: blur(0); animation-play-state: paused; }
    @keyframes rotate { from { transform: rotateX(0); } to { transform: rotateX(360deg); } }

    /* 모달 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
  </style>
</head>
<body>

<div class="header" id="mainHeader">시설 및 PW 관리</div>

<div class="tabs">
  <div class="tab active" onclick="switchMode('DOORLOCK')">도어락</div>
  <div class="tab" onclick="switchMode('PRIVATE')">개인용</div>
</div>

<div class="search-box">
  <input type="search" id="searchInput" placeholder="검색어 입력 (엔터)" onkeypress="handleEnter(event)">
  <button onclick="renderList()"><i class="fa fa-search"></i></button>
</div>

<div id="listContainer"></div>

<!-- 데이터 입력 버튼 (Floating) -->
<button style="position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:30px; font-size:24px;" onclick="showInputModal()">+</button>

<script>
  let currentMode = 'DOORLOCK';
  let allData = [];

  // 모드 전환 및 추가 인증[cite: 1]
  function switchMode(mode) {
    if (mode === 'PRIVATE') {
      const pin = prompt("개인용 자료 접근을 위해 PIN을 입력하세요:");
      if (pin !== "1234") { // 예시 PIN
        alert("인증 실패");
        return;
      }
      document.getElementById('mainHeader').classList.add('private-mode');
    } else {
      document.getElementById('mainHeader').classList.remove('private-mode');
    }
    currentMode = mode;
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText === (mode === 'DOORLOCK' ? '도어락' : '개인용')));
    loadData();
  }

  function handleEnter(e) { if (e.key === 'Enter') renderList(); }

  function loadData() {
    google.script.run.withSuccessHandler(data => {
      allData = data;
      renderList();
    }).getListData(currentMode === 'DOORLOCK' ? '도어락' : '개인용');
  }

  function renderList() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();
    const container = document.getElementById('listContainer');
    container.innerHTML = '';

    const filtered = allData.filter(item => 
      Object.values(item).some(v => String(v).toLowerCase().includes(keyword))
    );

    filtered.forEach(item => {
      const div = document.createElement('div');
      div.className = 'card';
      const idVal = currentMode === 'DOORLOCK' ? item.호수 : item.사이트;
      const pwVal = currentMode === 'DOORLOCK' ? item.비밀번호 : item.PW;
      
      div.innerHTML = `
        <div style="display:flex; justify-content:space-between;">
          <b>${idVal} (${item.명칭 || item.ID})</b>
          <div>
            <i class="fa fa-edit" onclick="editItem('${idVal}')"></i>
            <i class="fa fa-trash" onclick="deleteItem('${idVal}')"></i>
          </div>
        </div>
        <div style="margin-top:10px;">
          PW: <span class="pw-area">${pwVal}</span> 
          <small style="color:#999; margin-left:10px;">(누르면 보임)</small>
        </div>
        <div style="font-size:0.8em; color:#666; margin-top:5px;">${item.비고 || ''}</div>
      `;
      container.appendChild(div);
    });
  }

  // 초기 로드
  loadData();
</script>
</body>
</html>
