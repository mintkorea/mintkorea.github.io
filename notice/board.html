<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Advanced Cloud Board v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #f1f5f9; }
        .editor-box { min-height: 500px; outline: none; padding: 25px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; line-height: 1.6; }
        .editor-box table { border-collapse: collapse; width: 100%; margin: 10px 0; border: 1px solid #ddd; }
        .editor-box td { border: 1px solid #ddd; padding: 8px; min-width: 50px; }
        .toolbar-btn { padding: 6px 10px; background: white; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .toolbar-btn:hover { background: #f8fafc; border-color: #6366f1; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .comp-wrapper { border: 2px dashed #6366f1; border-radius: 8px; margin: 15px 0; background: #fff; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto">
    <!-- 헤더 및 검색바 -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <h1 class="text-3xl font-black text-indigo-600 cursor-pointer" onclick="location.reload()">CLOUD BOARD Pro</h1>
        <div class="flex w-full md:w-auto gap-2">
            <input type="text" id="search-input" placeholder="제목 검색..." class="px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none w-full md:w-64">
            <button onclick="searchPosts()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold">검색</button>
            <button onclick="openWriter()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl font-bold whitespace-nowrap">+ 새 글</button>
        </div>
    </header>

    <!-- 목록 섹션 -->
    <section id="view-list" class="view-section active">
        <div id="post-list" class="grid gap-4"></div>
    </section>

    <!-- 작성/수정 섹션 -->
    <section id="view-write" class="view-section">
        <div class="bg-white rounded-3xl shadow-xl border p-6 md:p-8">
            <input type="text" id="post-title" placeholder="제목을 입력하세요" class="w-full text-3xl font-black mb-6 outline-none border-b-2 focus:border-indigo-500 pb-2 transition-all">
            
            <!-- 강화된 툴바 -->
            <div class="flex flex-wrap gap-2 mb-4 p-3 bg-slate-50 rounded-xl border border-slate-200">
                <div class="flex items-center gap-1 border-r pr-2 mr-1">
                    <span class="text-xs font-bold text-slate-400 mr-1">폰트</span>
                    <select onchange="exec('fontSize', this.value)" class="border rounded px-1 py-1 text-sm outline-none">
                        <option value="1">1단계</option><option value="2">2단계</option><option value="3" selected>3단계(기본)</option>
                        <option value="4">4단계</option><option value="5">5단계</option><option value="6">6단계</option><option value="7">7단계</option>
                    </select>
                </div>
                <div class="flex items-center gap-1 border-r pr-2 mr-1">
                    <button onclick="exec('bold')" class="toolbar-btn">B</button>
                    <button onclick="exec('italic')" class="toolbar-btn italic">I</button>
                    <button onclick="exec('underline')" class="toolbar-btn underline">U</button>
                    <input type="color" onchange="exec('foreColor', this.value)" title="글자색" class="w-8 h-8 cursor-pointer border rounded">
                    <input type="color" onchange="exec('hiliteColor', this.value)" title="배경색" value="#ffffff" class="w-8 h-8 cursor-pointer border rounded">
                </div>
                <div class="flex items-center gap-1 border-r pr-2 mr-1">
                    <button onclick="exec('justifyLeft')" class="toolbar-btn">좌</button>
                    <button onclick="exec('justifyCenter')" class="toolbar-btn">중</button>
                    <button onclick="exec('justifyRight')" class="toolbar-btn">우</button>
                </div>
                <div class="flex items-center gap-1">
                    <button onclick="addTable()" class="toolbar-btn">표 삽입</button>
                    <button onclick="document.getElementById('file-html').click()" class="toolbar-btn bg-blue-50 text-blue-600">HTML</button>
                    <button onclick="document.getElementById('file-img').click()" class="toolbar-btn bg-emerald-50 text-emerald-600">이미지</button>
                    <button onclick="document.getElementById('file-etc').click()" class="toolbar-btn bg-slate-50 text-slate-600">파일</button>
                </div>
            </div>

            <div id="editor" contenteditable="true" class="editor-box"></div>

            <div id="attach-list" class="mt-4 flex flex-wrap gap-2"></div>

            <div class="mt-8 flex justify-end gap-3">
                <button onclick="showView('list')" class="px-8 py-3 text-slate-400 font-bold">취소</button>
                <button onclick="savePost()" class="px-12 py-3 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all">저장 및 게시</button>
            </div>
        </div>
    </section>

    <!-- 상세 보기 섹션 -->
    <section id="view-detail" class="view-section">
        <div class="bg-white rounded-3xl p-8 md:p-12 shadow-sm border">
            <div class="flex justify-between items-start mb-6">
                <h2 id="det-title" class="text-4xl font-black text-slate-800"></h2>
                <div class="flex gap-2">
                    <button onclick="openEditor()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg font-bold">수정</button>
                    <button onclick="deletePost()" class="px-4 py-2 bg-red-50 text-red-500 rounded-lg font-bold">삭제</button>
                </div>
            </div>
            <div id="det-content" class="min-h-[300px] mb-10 pb-10 border-b text-lg"></div>
            
            <div class="mb-10">
                <h4 class="font-bold text-slate-400 text-sm mb-3 uppercase tracking-widest">Attached Files</h4>
                <div id="det-files" class="flex flex-wrap gap-3"></div>
            </div>

            <!-- 댓글 -->
            <div class="bg-slate-50 p-8 rounded-2xl border border-slate-100">
                <h4 class="font-bold mb-6 text-xl">Comments</h4>
                <div id="comment-list" class="space-y-4 mb-6"></div>
                <div class="flex gap-3">
                    <input type="text" id="cmt-input" placeholder="의견을 남겨주세요..." class="flex-1 px-4 py-3 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
                    <button onclick="addComment()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold">등록</button>
                </div>
            </div>

            <button onclick="showView('list')" class="mt-10 text-slate-400 font-bold flex items-center gap-2">
                <span>← 목록으로 돌아가기</span>
            </button>
        </div>
    </section>
</div>

<input type="file" id="file-html" class="hidden" accept=".html" onchange="handleHtml(event)">
<input type="file" id="file-img" class="hidden" accept="image/*" onchange="handleImg(event)">
<input type="file" id="file-etc" class="hidden" onchange="handleEtc(event)">

<script>
    // Firebase Config (vocation_3.html과 동일하게 설정하세요)
    const firebaseConfig = {
        apiKey: "AIzaSyDGDUudF49hnXwU55er7joyeSLEPrme1GU",
        authDomain: "catholic-security-system.firebaseapp.com",
        projectId: "catholic-security-system",
        storageBucket: "catholic-security-system.firebasestorage.app",
        messagingSenderId: "978946205343",
        appId: "1:978946205343:web:38c30a21bf0dd522f9a4aa"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentPostId = null;
    let attachedFiles = [];
    let allPosts = []; // 로컬 검색용

    function exec(cmd, val = null) { document.execCommand(cmd, false, val); }

    function addTable() {
        const r = prompt("행 개수", "3"); const c = prompt("열 개수", "3");
        if(!r || !c) return;
        let h = "<table style='border-collapse:collapse; width:100%; border:1px solid #ddd;'>";
        for(let i=0; i<r; i++) {
            h += "<tr>";
            for(let j=0; j<c; j++) h += "<td style='border:1px solid #ddd; padding:8px;'>&nbsp;</td>";
            h += "</tr>";
        }
        exec('insertHTML', h + "</table><p><br></p>");
    }

    function handleHtml(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            const wrap = document.createElement('div');
            wrap.className = 'comp-wrapper';
            wrap.setAttribute('contenteditable', 'false');
            wrap.innerHTML = `<div class="bg-indigo-600 text-white text-[10px] px-2 py-1 flex justify-between"><span>HTML: ${file.name}</span><button onclick="this.closest('.comp-wrapper').remove()">삭제</button></div>
                              <div contenteditable="true" class="p-4 overflow-auto">${ev.target.result}</div>`;
            document.getElementById('editor').appendChild(wrap);
        };
        reader.readAsText(file);
    }

    function handleImg(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => { exec('insertHTML', `<img src="${ev.target.result}" style="max-width:100%; border-radius:8px; margin:10px 0;">`); };
        reader.readAsDataURL(file);
    }

    function handleEtc(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            attachedFiles.push({ name: file.name, data: ev.target.result });
            renderAttachList();
        };
        reader.readAsDataURL(file);
    }

    function renderAttachList() {
        document.getElementById('attach-list').innerHTML = attachedFiles.map((f, i) => `
            <span class="bg-slate-200 px-3 py-1 rounded-lg text-xs font-bold">${f.name} <b onclick="attachedFiles.splice(${i},1);renderAttachList()" class="cursor-pointer text-red-500 ml-2">X</b></span>
        `).join('');
    }

    function showView(v) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
    }

    function openWriter() {
        currentPostId = null; attachedFiles = [];
        document.getElementById('post-title').value = "";
        document.getElementById('editor').innerHTML = "";
        renderAttachList();
        showView('write');
    }

    // --- 수정 모드 진입 ---
    async function openEditor() {
        const doc = await db.collection("posts").doc(currentPostId).get();
        const data = doc.data();
        document.getElementById('post-title').value = data.title;
        document.getElementById('editor').innerHTML = data.content;
        attachedFiles = data.attachedFiles || [];
        renderAttachList();
        showView('write');
    }

    async function savePost() {
        const title = document.getElementById('post-title').value;
        const content = document.getElementById('editor').innerHTML;
        if(!title) return alert("제목은 필수입니다.");

        const data = {
            title, content, attachedFiles,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (currentPostId) {
            await db.collection("posts").doc(currentPostId).update(data);
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection("posts").add(data);
        }
        loadPosts();
        showView('list');
    }

    async function loadPosts() {
        const snap = await db.collection("posts").orderBy("createdAt", "desc").limit(30).get();
        allPosts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderPostList(allPosts);
    }

    function renderPostList(posts) {
        const list = document.getElementById('post-list');
        list.innerHTML = posts.map(p => `
            <div onclick="viewPost('${p.id}')" class="bg-white p-6 rounded-2xl border border-slate-200 cursor-pointer hover:shadow-md hover:border-indigo-400 transition-all">
                <h3 class="text-xl font-bold text-slate-800 mb-2">${p.title}</h3>
                <div class="flex justify-between text-xs text-slate-400">
                    <span>${p.createdAt?.toDate().toLocaleString() || ""}</span>
                    <span>첨부파일: ${p.attachedFiles?.length || 0}</span>
                </div>
            </div>
        `).join('') || '<div class="text-center py-20 text-slate-400">게시글이 없습니다.</div>';
    }

    // --- 검색 기능 (로컬 필터링) ---
    function searchPosts() {
        const keyword = document.getElementById('search-input').value.toLowerCase();
        const filtered = allPosts.filter(p => p.title.toLowerCase().includes(keyword));
        renderPostList(filtered);
    }

    async function viewPost(id) {
        currentPostId = id;
        const doc = await db.collection("posts").doc(id).get();
        const data = doc.data();
        document.getElementById('det-title').innerText = data.title;
        document.getElementById('det-content').innerHTML = data.content;
        document.getElementById('det-files').innerHTML = (data.attachedFiles || []).map(f => `
            <a href="${f.data}" download="${f.name}" class="bg-white border-2 border-indigo-100 text-indigo-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-indigo-50">${f.name} ↓</a>
        `).join('') || '<span class="text-slate-300">첨부파일 없음</span>';
        showView('detail');
        loadComments(id);
    }

    async function addComment() {
        const input = document.getElementById('cmt-input');
        if(!input.value) return;
        await db.collection("posts").doc(currentPostId).collection("comments").add({
            text: input.value, createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = ""; loadComments(currentPostId);
    }

    async function loadComments(id) {
        const snap = await db.collection("posts").doc(id).collection("comments").orderBy("createdAt", "asc").get();
        document.getElementById('comment-list').innerHTML = snap.docs.map(doc => `
            <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm text-slate-700">${doc.data().text}</div>
        `).join('');
    }

    async function deletePost() {
        if(!confirm("영구 삭제됩니다. 계속하시겠습니까?")) return;
        await db.collection("posts").doc(currentPostId).delete();
        loadPosts(); showView('list');
    }

    window.onload = loadPosts;
</script>
</body>
</html>
