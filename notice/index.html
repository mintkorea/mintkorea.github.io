<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Board & Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }

        .editor-content {
            min-height: 400px;
            outline: none;
            line-height: 1.6;
        }

        .editor-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        .editor-content td, .editor-content th {
            border: 1px solid #cbd5e1;
            padding: 10px;
            min-width: 50px;
        }

        .editor-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 10px 0;
        }

        /* HTML 소스 삽입 시 스타일 */
        .html-snippet {
            background: #f1f5f9;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            border-left: 4px solid #6366f1;
            margin: 10px 0;
        }

        font[size="1"] { font-size: 12px; }
        font[size="2"] { font-size: 14px; }
        font[size="3"] { font-size: 16px; }
        font[size="4"] { font-size: 20px; }
        font[size="5"] { font-size: 24px; }
        font[size="6"] { font-size: 32px; }
        font[size="7"] { font-size: 48px; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 90; }
        
        .view-section { display: none; }
        .view-section.active { display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- 상단 헤더 -->
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Smart System</h1>
                <p id="view-subtitle" class="text-slate-500 font-medium">게시글 목록</p>
            </div>
            <div id="header-actions">
                <button id="btn-write-trigger" onclick="showEditor()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg flex items-center gap-2">
                    새 글 작성
                </button>
            </div>
        </header>

        <!-- 1. 목록 화면 (ListView) -->
        <section id="section-list" class="view-section active">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="p-4 pl-8 text-slate-500 font-bold text-sm w-20">번호</th>
                            <th class="p-4 text-slate-500 font-bold text-sm">제목</th>
                            <th class="p-4 text-slate-500 font-bold text-sm w-32 text-center">작성일</th>
                        </tr>
                    </thead>
                    <tbody id="post-list-body">
                        <!-- 게시글 렌더링 영역 -->
                    </tbody>
                </table>
                <div id="empty-msg" class="p-20 text-center text-slate-400 font-medium hidden">
                    등록된 게시글이 없습니다. 첫 글을 작성해보세요!
                </div>
            </div>
        </section>

        <!-- 2. 글쓰기 화면 (EditorView) -->
        <section id="section-editor" class="view-section space-y-4">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                <div class="p-4 border-b border-slate-200">
                    <input type="text" id="post-title-input" placeholder="제목을 입력하세요" class="w-full text-xl font-bold outline-none placeholder:text-slate-300">
                </div>

                <!-- 툴바 -->
                <div class="bg-slate-50 border-b border-slate-200 p-3 flex flex-wrap gap-2 items-center">
                    <button onclick="execCmd('bold')" class="p-2 hover:bg-white rounded-lg border border-transparent hover:border-slate-200 font-bold">B</button>
                    <button onclick="execCmd('italic')" class="p-2 hover:bg-white rounded-lg border border-transparent hover:border-slate-200 italic">I</button>
                    <div class="w-px h-6 bg-slate-300 mx-1"></div>
                    <select onchange="execCmd('fontSize', this.value)" class="bg-white px-2 py-1 rounded-lg border border-slate-200 text-sm font-semibold outline-none">
                        <option value="3">크기</option>
                        <option value="2">작게</option>
                        <option value="4">크게</option>
                        <option value="6">매우 크게</option>
                    </select>
                    <input type="color" onchange="execCmd('foreColor', this.value)" class="w-8 h-8 p-1 bg-white border border-slate-200 rounded-lg cursor-pointer">
                    <div class="w-px h-6 bg-slate-300 mx-1"></div>
                    <button onclick="toggleTableModal()" class="bg-white px-3 py-1.5 rounded-lg border border-slate-200 text-sm font-bold hover:bg-slate-50">표 삽입</button>
                    
                    <!-- 파일 첨부 (HTML 및 이미지 지원) -->
                    <label class="flex items-center gap-1 bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg border border-indigo-200 text-sm font-bold hover:bg-indigo-100 cursor-pointer">
                        파일 첨부 (HTML/이미지)
                        <input type="file" id="file-input" class="hidden" accept="image/*, .html" onchange="handleFileUpload(event)">
                    </label>
                </div>

                <div id="editor-body" contenteditable="true" class="editor-content p-8 md:p-10 focus:outline-none"></div>
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="showList()" class="px-6 py-2.5 rounded-xl font-bold text-slate-500 hover:bg-slate-200 transition-all">취소</button>
                <button onclick="savePost()" class="bg-indigo-600 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transition-all">저장하기</button>
            </div>
        </section>

        <!-- 3. 상세 보기 화면 (ReadView) -->
        <section id="section-read" class="view-section space-y-4">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                <div class="p-6 md:p-8 border-b border-slate-100">
                    <h2 id="read-title" class="text-3xl font-black text-slate-900 mb-2"></h2>
                    <p id="read-date" class="text-slate-400 text-sm font-medium"></p>
                </div>
                <div id="read-content" class="editor-content p-8 md:p-10 bg-white">
                    <!-- 상세 내용이 여기에 표시됩니다 -->
                </div>
            </div>
            <div class="flex justify-between items-center">
                <button onclick="deleteCurrentPost()" class="text-red-500 font-bold hover:bg-red-50 px-4 py-2 rounded-lg transition-colors">삭제</button>
                <button onclick="showList()" class="bg-slate-900 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-slate-800 shadow-lg transition-all">목록으로</button>
            </div>
        </section>
    </div>

    <!-- 표 설정 모달 -->
    <div id="overlay" class="overlay" onclick="toggleTableModal()"></div>
    <div id="tableModal" class="modal bg-white p-6 rounded-3xl shadow-2xl border border-slate-200 w-72">
        <h3 class="text-lg font-black text-slate-800 mb-4">표 생성</h3>
        <div class="space-y-4 mb-6">
            <div class="flex justify-between items-center text-sm font-bold text-slate-500">
                <label>행(Rows)</label>
                <input type="number" id="rowInput" value="3" min="1" max="10" class="w-16 px-2 py-1 border rounded-lg text-center">
            </div>
            <div class="flex justify-between items-center text-sm font-bold text-slate-500">
                <label>열(Cols)</label>
                <input type="number" id="colInput" value="3" min="1" max="10" class="w-16 px-2 py-1 border rounded-lg text-center">
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleTableModal()" class="flex-1 py-2 rounded-lg font-bold text-slate-400">취소</button>
            <button onclick="createTable()" class="flex-1 py-2 bg-indigo-600 text-white rounded-lg font-bold">생성</button>
        </div>
    </div>

    <script>
        // 게시글 데이터 관리 (인메모리)
        let posts = [];
        let currentReadId = null;

        // 섹션 요소들
        const sections = {
            list: document.getElementById('section-list'),
            editor: document.getElementById('section-editor'),
            read: document.getElementById('section-read')
        };
        const subtitle = document.getElementById('view-subtitle');
        const btnWriteTrigger = document.getElementById('btn-write-trigger');

        // 1. 화면 전환 함수
        function switchView(viewName) {
            Object.values(sections).forEach(s => s.classList.remove('active'));
            sections[viewName].classList.add('active');

            if (viewName === 'list') {
                subtitle.innerText = "게시글 목록";
                btnWriteTrigger.style.display = "flex";
                renderPostList();
            } else if (viewName === 'editor') {
                subtitle.innerText = "게시글 작성";
                btnWriteTrigger.style.display = "none";
            } else if (viewName === 'read') {
                subtitle.innerText = "게시글 읽기";
                btnWriteTrigger.style.display = "none";
            }
        }

        function showList() { switchView('list'); }
        function showEditor() { 
            document.getElementById('post-title-input').value = "";
            document.getElementById('editor-body').innerHTML = "";
            switchView('editor'); 
        }

        // 2. 게시글 저장
        function savePost() {
            const title = document.getElementById('post-title-input').value;
            const content = document.getElementById('editor-body').innerHTML;

            if (!title.trim()) {
                showToast("제목을 입력해주세요!");
                return;
            }

            const newPost = {
                id: Date.now(),
                title: title,
                content: content,
                date: new Date().toLocaleString('ko-KR')
            };

            posts.unshift(newPost);
            showList();
        }

        // 3. 목록 렌더링
        function renderPostList() {
            const tbody = document.getElementById('post-list-body');
            const empty = document.getElementById('empty-msg');
            tbody.innerHTML = "";

            if (posts.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            posts.forEach((post, index) => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-100 hover:bg-slate-50 cursor-pointer transition-colors";
                tr.innerHTML = `
                    <td class="p-4 pl-8 text-slate-400 text-sm font-medium">${posts.length - index}</td>
                    <td class="p-4 font-bold text-slate-700">${post.title}</td>
                    <td class="p-4 text-slate-400 text-sm text-center">${post.date.split(' ')[0]}</td>
                `;
                tr.onclick = () => readPost(post.id);
                tbody.appendChild(tr);
            });
        }

        // 4. 글 읽기 (상세 보기)
        function readPost(id) {
            const post = posts.find(p => p.id === id);
            if (!post) return;

            currentReadId = id;
            document.getElementById('read-title').innerText = post.title;
            document.getElementById('read-date').innerText = "작성일: " + post.date;
            document.getElementById('read-content').innerHTML = post.content;

            switchView('read');
        }

        // 5. 글 삭제
        function deleteCurrentPost() {
            if (confirm("정말로 이 글을 삭제하시겠습니까?")) {
                posts = posts.filter(p => p.id !== currentReadId);
                showList();
            }
        }

        // 6. 파일 업로드 (이미지 및 HTML 처리)
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            // HTML 파일인 경우
            if (file.name.endsWith('.html')) {
                reader.onload = function(e) {
                    const content = e.target.result;
                    // HTML을 시각적으로 구분하여 삽익 (에디터 내부에 코드 블록처럼 삽입)
                    const htmlBox = `<div class="html-snippet" contenteditable="false"><strong>[첨부된 HTML 파일: ${file.name}]</strong><br><br>${escapeHtml(content)}</div><p><br></p>`;
                    execCmd('insertHTML', htmlBox);
                };
                reader.readAsText(file);
            } 
            // 이미지 파일인 경우
            else if (file.type.startsWith('image/')) {
                reader.onload = function(e) {
                    const imgHtml = `<img src="${e.target.result}" alt="uploaded-image">`;
                    execCmd('insertHTML', imgHtml);
                };
                reader.readAsDataURL(file);
            }
            
            // 파일 입력 리셋
            event.target.value = "";
        }

        // HTML 이스케이프 함수 (소스 코드를 안전하게 텍스트로 표시)
        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        // --- 에디터 코어 기능 ---
        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('editor-body').focus();
        }

        function toggleTableModal() {
            const modal = document.getElementById('tableModal');
            const overlay = document.getElementById('overlay');
            const isVisible = modal.style.display === 'block';
            modal.style.display = isVisible ? 'none' : 'block';
            overlay.style.display = isVisible ? 'none' : 'block';
        }

        function createTable() {
            const rows = document.getElementById('rowInput').value;
            const cols = document.getElementById('colInput').value;
            let tableHtml = '<table>';
            for (let i = 0; i < rows; i++) {
                tableHtml += '<tr>';
                for (let j = 0; j < cols; j++) {
                    tableHtml += `<td>&nbsp;</td>`;
                }
                tableHtml += '</tr>';
            }
            tableHtml += '</table><p><br></p>';
            execCmd('insertHTML', tableHtml);
            toggleTableModal();
        }

        function showToast(msg) {
            alert(msg); // 간단하게 alert로 처리 (커스텀 가능)
        }

        // 초기 실행
        showList();
    </script>
</body>
</html>
