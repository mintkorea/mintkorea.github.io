<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Board Pro - Persistence Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
        }

        .editor-content {
            min-height: 450px;
            outline: none;
            line-height: 1.8;
        }

        /* Iframe 스타일 최적화 */
        .html-render-wrapper {
            border: 2px solid #e2e8f0;
            border-radius: 1.25rem;
            margin: 1.5rem 0;
            overflow: hidden;
            background: #ffffff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        .html-render-header {
            background: #f8fafc;
            padding: 0.75rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 700;
            color: #475569;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .html-render-frame {
            width: 100%;
            height: 500px;
            border: none;
            display: block;
            background: white;
        }

        .view-section { display: none; }
        .view-section.active { display: block; animation: slideUp 0.3s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #4f46e5;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <!-- 헤더 -->
        <header class="flex justify-between items-end mb-10">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">BOARD<span class="text-indigo-600">PREVIEW</span></h1>
                <p class="text-slate-500 mt-1 font-medium">첨부 파일 영구 저장 및 렌더링 시스템</p>
            </div>
            <button id="btn-create" onclick="openEditor()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                새 글 작성
            </button>
        </header>

        <!-- [1] 목록 -->
        <section id="view-list" class="view-section active">
            <div id="post-container" class="grid gap-4">
                <!-- 게시글 카드 렌더링 영역 -->
            </div>
            <div id="empty-state" class="bg-white rounded-3xl p-20 text-center border-2 border-dashed border-slate-200 hidden">
                <p class="text-slate-400 font-bold">작성된 게시글이 없습니다.</p>
            </div>
        </section>

        <!-- [2] 에디터 (쓰기/수정) -->
        <section id="view-editor" class="view-section">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                <div class="p-8 border-b border-slate-100">
                    <input type="text" id="input-title" placeholder="제목을 입력하세요" class="w-full text-3xl font-extrabold outline-none">
                </div>
                
                <div class="bg-slate-50 p-4 border-b border-slate-200 flex items-center gap-3">
                    <button onclick="triggerFile()" class="bg-white border border-slate-200 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-indigo-50 hover:border-indigo-200 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" /></svg>
                        HTML / 이미지 첨부
                    </button>
                    <input type="file" id="file-hidden" class="hidden" accept="image/*, .html" onchange="handleFileUpload(event)">
                    <span id="upload-indicator" class="text-xs text-slate-400 font-bold"></span>
                </div>

                <div id="input-body" contenteditable="true" class="editor-content p-8 md:p-12 focus:outline-none bg-white"></div>
            </div>

            <div class="mt-8 flex justify-end gap-4">
                <button onclick="goList()" class="px-6 py-3 font-bold text-slate-400 hover:text-slate-600">취소</button>
                <button onclick="savePost()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold hover:bg-black shadow-xl transition-all">저장하기</button>
            </div>
        </section>

        <!-- [3] 상세보기 -->
        <section id="view-read" class="view-section">
            <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                <div class="p-10 border-b border-slate-50 flex justify-between items-start">
                    <div>
                        <h2 id="display-title" class="text-4xl font-black text-slate-900 leading-tight"></h2>
                        <p id="display-date" class="text-slate-400 font-medium mt-2"></p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editPost()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                        </button>
                        <button onclick="deletePost()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                </div>
                <div id="display-body" class="p-10 editor-content"></div>
            </div>
            <div class="mt-10 text-center">
                <button onclick="goList()" class="bg-slate-900 text-white px-12 py-4 rounded-2xl font-bold hover:shadow-2xl transition-all">목록으로 돌아가기</button>
            </div>
        </section>
    </div>

    <script>
        let posts = [];
        let activePostId = null;

        function showSection(name) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`view-${name}`).classList.add('active');
            const btn = document.getElementById('btn-create');
            btn.style.display = (name === 'list') ? 'flex' : 'none';
            if(name === 'list') renderList();
            window.scrollTo(0,0);
        }

        function goList() { showSection('list'); }
        
        function openEditor() {
            activePostId = null;
            document.getElementById('input-title').value = "";
            document.getElementById('input-body').innerHTML = "";
            showSection('editor');
        }

        function triggerFile() { document.getElementById('file-hidden').click(); }

        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const indicator = document.getElementById('upload-indicator');
            indicator.innerHTML = `<span class="loader"></span> 분석 중...`;

            const reader = new FileReader();

            if (file.name.toLowerCase().endsWith('.html')) {
                reader.onload = function(event) {
                    const rawHtml = event.target.result;
                    // 중요: 저장 시에도 데이터가 유지되도록 srcdoc을 사용한 iframe 구조 삽입
                    // 특수문자 처리를 위해 base64나 이스케이프가 필요할 수 있으나 여기서는 간단히 처리
                    const escapedHtml = rawHtml.replace(/"/g, '&quot;'); 
                    
                    const iframeWrapper = `
                        <div class="html-render-wrapper" contenteditable="false">
                            <div class="html-render-header">
                                <span>컴포넌트: ${file.name}</span>
                                <span class="text-indigo-500 text-xs flex items-center gap-1">
                                    <span class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-pulse"></span> LIVE
                                </span>
                            </div>
                            <iframe class="html-render-frame" srcdoc="${escapedHtml}"></iframe>
                        </div>
                        <p><br></p>
                    `;
                    insertHtml(iframeWrapper);
                    indicator.innerText = "HTML 삽입 완료";
                };
                reader.readAsText(file);
            } else if (file.type.startsWith('image/')) {
                reader.onload = function(event) {
                    const img = `<img src="${event.target.result}" style="max-width:100%; border-radius:1rem; margin:1rem 0;" alt="Image"> <p><br></p>`;
                    insertHtml(img);
                    indicator.innerText = "이미지 삽입 완료";
                };
                reader.readAsDataURL(file);
            }
            e.target.value = "";
        }

        function insertHtml(html) {
            const editor = document.getElementById('input-body');
            editor.focus();
            document.execCommand('insertHTML', false, html);
        }

        function savePost() {
            const title = document.getElementById('input-title').value.trim();
            const body = document.getElementById('input-body').innerHTML;

            if(!title) { alert("제목을 입력해주세요."); return; }

            if(activePostId) {
                const idx = posts.findIndex(p => p.id === activePostId);
                posts[idx] = { ...posts[idx], title, body, date: new Date().toLocaleString() };
            } else {
                posts.unshift({ id: Date.now(), title, body, date: new Date().toLocaleString() });
            }
            goList();
        }

        function renderList() {
            const container = document.getElementById('post-container');
            const empty = document.getElementById('empty-state');
            container.innerHTML = "";

            if(posts.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            posts.forEach(p => {
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-3xl border border-slate-200 hover:border-indigo-300 hover:shadow-xl hover:shadow-indigo-50 cursor-pointer transition-all group";
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-bold text-slate-800 group-hover:text-indigo-600 mb-1">${p.title}</h3>
                            <p class="text-sm text-slate-400 font-medium">${p.date}</p>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-300 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                        </div>
                    </div>
                `;
                card.onclick = () => viewPost(p.id);
                container.appendChild(card);
            });
        }

        function viewPost(id) {
            activePostId = id;
            const post = posts.find(p => p.id === id);
            document.getElementById('display-title').innerText = post.title;
            document.getElementById('display-date').innerText = post.date;
            document.getElementById('display-body').innerHTML = post.body;
            showSection('read');
        }

        function editPost() {
            const post = posts.find(p => p.id === activePostId);
            document.getElementById('input-title').value = post.title;
            document.getElementById('input-body').innerHTML = post.body;
            showSection('editor');
        }

        function deletePost() {
            if(confirm("정말 삭제하시겠습니까?")) {
                posts = posts.filter(p => p.id !== activePostId);
                goList();
            }
        }
    </script>
</body>
</html>
